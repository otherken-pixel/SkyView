        /* =========================================
           ROUTE TIMELINE — Vertical stepper showing
           route airports with live weather data.
           Used in the Briefing "Brief" tab.
        ========================================= */
        function RouteTimeline({ routePts, wxData, effectiveWxData }) {
            function catColor(cat) {
                return ({ VFR: 'var(--vfr)', MVFR: 'var(--mvfr)', IFR: 'var(--ifr)', LIFR: 'var(--lifr)' })[cat] || 'var(--text-tertiary)';
            }
            function catBgColor(cat) {
                return ({ VFR: 'var(--vfr-bg)', MVFR: 'var(--mvfr-bg)', IFR: 'var(--ifr-bg)', LIFR: 'var(--lifr-bg)' })[cat] || 'var(--card-high)';
            }
            function parseDeg(windStr) {
                if (!windStr) return null;
                var m = windStr.match(/^(\d{3})@(\d+)/);
                return m ? parseInt(m[1]) : null;
            }
            function parseKts(windStr) {
                if (!windStr) return null;
                var m = windStr.match(/^(\d{3})@(\d+)/);
                return m ? parseInt(m[2]) : null;
            }

            return (
                <div className="route-timeline" style={{ marginBottom: 20 }}>
                    {routePts.map(function(icao, idx) {
                        var isFirst = idx === 0;
                        var isLast  = idx === routePts.length - 1;
                        var apt = getAirport(icao);
                        var wxEntry = wxData && wxData.find(function(w){ return w.icao === icao; });
                        var effEntry = effectiveWxData && effectiveWxData.find(function(e){ return e.icao === icao; });
                        var wx = effEntry ? effEntry.effectiveWx : (wxEntry ? wxEntry.metar : null);
                        var cat = wx ? wx.cat : null;
                        var nodeClr = cat ? catColor(cat) : 'var(--text-tertiary)';
                        var nodeBg  = cat ? catBgColor(cat) : 'var(--card-high)';
                        var role = isFirst ? 'DEP' : isLast ? 'DEST' : ('WP' + idx);

                        // Wind direction and speed for barb
                        var windDeg = wx ? parseDeg(wx.wind) : null;
                        var windKts = wx ? parseKts(wx.wind) : null;

                        // Next leg distance
                        var legDist = null, legEte = null;
                        if (!isLast) {
                            var p1 = apt;
                            var p2 = getAirport(routePts[idx + 1]);
                            if (p1 && p2) {
                                legDist = Math.round(calcDist(p1.lat, p1.lon, p2.lat, p2.lon));
                            }
                        }

                        return (
                            <div key={icao} className="timeline-node">
                                {/* Spine column */}
                                <div className="timeline-spine">
                                    <div className="timeline-line" style={{ background: isFirst ? 'transparent' : 'var(--card-border)', minHeight: isFirst ? 8 : 12 }} />
                                    <div className="timeline-dot" style={{ background: nodeBg, border: '2.5px solid ' + nodeClr, boxShadow: cat ? ('0 0 10px ' + nodeClr + '55') : 'none' }}>
                                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: nodeClr }} />
                                    </div>
                                    <div className="timeline-line" style={{ background: isLast ? 'transparent' : 'var(--card-border)' }} />
                                </div>

                                {/* Station card */}
                                <div style={{ flex: 1, paddingBottom: isLast ? 0 : 4, paddingTop: 0 }}>
                                    <div className="timeline-station-card" style={{
                                        borderLeftColor: nodeClr,
                                        background: 'var(--card-mid)',
                                        border: '1px solid var(--card-border-soft)',
                                        borderLeftWidth: 3,
                                    }}>
                                        {/* Station header */}
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
                                            <span className="font-mono" style={{ fontSize: 17, fontWeight: 800, color: nodeClr, letterSpacing: '-0.3px' }}>{icao}</span>
                                            <span style={{ fontSize: 9, fontWeight: 800, background: nodeClr, color: '#fff', borderRadius: 99, padding: '1px 8px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>{role}</span>
                                            {cat && (
                                                <span className={'cat-badge cat-' + cat.toLowerCase()}>
                                                    <MdIcon name={cat === 'VFR' ? 'check_circle' : cat === 'MVFR' ? 'warning' : 'cancel'} style={{ fontSize: 10 }} />
                                                    {cat}
                                                </span>
                                            )}
                                            {apt && <span style={{ fontSize: 12, color: 'var(--text-tertiary)', marginLeft: 'auto' }}>{apt.city || apt.name}</span>}
                                        </div>

                                        {/* Weather data row */}
                                        {wx && (
                                            <div className="wx-metric-grid">
                                                {/* Wind with barb */}
                                                <div className="wx-metric-tile" style={{ gridColumn: 'span 1' }}>
                                                    <div className="wx-metric-label">Wind</div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                                                        {windDeg != null && windKts != null && (
                                                            <WindBarb deg={windDeg} kts={windKts} size={24} />
                                                        )}
                                                        <span className="wx-metric-value" style={{ fontSize: 11 }}>{wx.wind || '—'}</span>
                                                    </div>
                                                </div>
                                                {/* Visibility */}
                                                <div className="wx-metric-tile">
                                                    <div className="wx-metric-label">Vis</div>
                                                    <span className="wx-metric-value" style={{ fontSize: 11 }}>{wx.vis || '—'}</span>
                                                </div>
                                                {/* Sky with icon */}
                                                <div className="wx-metric-tile">
                                                    <div className="wx-metric-label">Sky</div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                                        <WeatherIcon sky={wx.sky} size={18} color="var(--text-secondary)" />
                                                        <span className="wx-metric-value" style={{ fontSize: 10 }}>{wx.sky || '—'}</span>
                                                    </div>
                                                </div>
                                                {/* Temp */}
                                                <div className="wx-metric-tile">
                                                    <div className="wx-metric-label">Temp</div>
                                                    <span className="wx-metric-value" style={{ fontSize: 11 }}>{wx.temp || '—'}</span>
                                                </div>
                                            </div>
                                        )}
                                        {!wx && (
                                            <div style={{ fontSize: 12, color: 'var(--text-tertiary)', fontStyle: 'italic' }}>No weather data available</div>
                                        )}
                                    </div>

                                    {/* Inter-leg distance strip */}
                                    {!isLast && legDist && (
                                        <div className="timeline-leg-strip" style={{ paddingLeft: 6, paddingRight: 8, marginBottom: 4 }}>
                                            <div className="timeline-leg-line" />
                                            <span className="timeline-leg-label">
                                                <MdIcon name="flight" style={{ fontSize: 10, marginRight: 3, display: 'inline-block', transform: 'rotate(45deg)' }} />
                                                {legDist} NM
                                            </span>
                                            <div className="timeline-leg-line" />
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function SemiGauge({ score, size }) {
            size = size || 180;
            var cx = size / 2, cy = size * 0.58, r = size * 0.40;
            var arcLen = Math.PI * r;
            var col = score >= 75 ? 'var(--go)' : score >= 50 ? 'var(--caution)' : 'var(--nogo)';
            var pathD = 'M ' + (cx - r).toFixed(1) + ' ' + cy.toFixed(1) + ' A ' + r.toFixed(1) + ' ' + r.toFixed(1) + ' 0 0 1 ' + (cx + r).toFixed(1) + ' ' + cy.toFixed(1);
            return (
                <div style={{ position:'relative', width:size, margin:'0 auto' }}>
                    <svg width={size} height={Math.round(cy + 20)} viewBox={'0 0 ' + size + ' ' + Math.round(cy + 20)} style={{ display:'block' }}>
                        <path d={pathD} fill="none" stroke="var(--md-sys-color-surface-container-highest)" strokeWidth="10" strokeLinecap="round" />
                        <path d={pathD} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round"
                            strokeDasharray={arcLen.toFixed(1)} strokeDashoffset={(arcLen * (1 - score / 100)).toFixed(1)}
                            style={{ transition:'stroke-dashoffset 0.9s ease-out' }} />
                        <text x={cx - r - 2} y={cy + 16} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif">0</text>
                        <text x={cx + r + 2} y={cy + 16} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif">100</text>
                        <text x={cx} y={cy - r * 0.1} textAnchor="middle" fontSize={Math.round(size * 0.18)} fontWeight="800" fill={col} fontFamily="monospace">{score}</text>
                        <text x={cx} y={cy + 8} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif" letterSpacing="1">SAFETY SCORE</text>
                    </svg>
                </div>
            );
        }

        /* =========================================
           SCORE BREAKDOWN PANEL
        ========================================= */
        function ScoreBreakdown({ breakdown, total }) {
            return (
                <div style={{ background: 'var(--card)', border: '1px solid var(--card-border)', borderRadius: 20, padding: '20px 22px', marginBottom: 16, boxShadow: '0 2px 16px rgba(0,0,0,0.35)' }}>
                    {/* Header row */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 18 }}>
                        <div style={{ width: 28, height: 28, borderRadius: 8, background: 'var(--accent-dim)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <MdIcon name="analytics" style={{ color: 'var(--accent)', fontSize: 16 }} />
                        </div>
                        <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-secondary)' }}>Safety Score Breakdown</span>
                        <span className="font-mono" style={{ marginLeft: 'auto', fontSize: 22, fontWeight: 900, color: getGoColor(total) }}>{total}<span style={{ fontSize: 13, color: 'var(--text-tertiary)', fontWeight: 500 }}>/100</span></span>
                    </div>

                    {/* Semi-gauge stays centered */}
                    <SemiGauge score={total} size={180} />

                    {/* Factor rows */}
                    <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 14 }}>
                        {breakdown.map(function(f) {
                            if (f.isPenalty) {
                                // Personal Minimums penalty item — show penalty badge + risk bar
                                var penaltyPct = f.penaltyAmount > 0 ? Math.min(100, Math.round((f.penaltyAmount / 50) * 100)) : 0;
                                var penaltyLabel = f.penaltyAmount === 0 ? 'Clear' : '−' + f.penaltyAmount + ' pts';
                                return (
                                    <div key={f.label} style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                                        <div style={{ width: 30, height: 30, borderRadius: 8, background: f.color + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: '1px solid ' + f.color + '44' }}>
                                            <MdIcon name={f.icon} style={{ fontSize: 15, color: f.color }} />
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
                                                <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>{f.label}</span>
                                                <span style={{ fontSize: 11, fontWeight: 700, color: f.color, background: f.color + '22', border: '1px solid ' + f.color + '55', borderRadius: 6, padding: '2px 7px', letterSpacing: '0.3px' }}>
                                                    {penaltyLabel}
                                                </span>
                                            </div>
                                            <div className="score-seg-track">
                                                <div className="score-seg-fill" style={{ width: penaltyPct + '%', background: f.color }} />
                                            </div>
                                            {f.detail && <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 3, lineHeight: 1.4 }}>{f.detail}</div>}
                                        </div>
                                    </div>
                                );
                            }
                            var pct = Math.round((f.score / f.max) * 100);
                            return (
                                <div key={f.label} style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                                    <div style={{ width: 30, height: 30, borderRadius: 8, background: f.color + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: '1px solid ' + f.color + '44' }}>
                                        <MdIcon name={f.icon} style={{ fontSize: 15, color: f.color }} />
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
                                            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>{f.label}</span>
                                            <span className="font-mono" style={{ fontSize: 13, fontWeight: 800, color: f.color }}>
                                                {f.score}<span style={{ fontSize: 10, fontWeight: 400, color: 'var(--text-tertiary)' }}>/{f.max}</span>
                                            </span>
                                        </div>
                                        <div className="score-seg-track">
                                            <div className="score-seg-fill" style={{ width: pct + '%', background: f.color }} />
                                        </div>
                                        {f.detail && <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 3, lineHeight: 1.4 }}>{f.detail}</div>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        /* =========================================
           LIVE PIREPS (from AviationWeather.gov)
        ========================================= */
        function LivePireps({ dep, arr }) {
            var [pireps, setPireps] = useState(null);
            var [loading, setLoading] = useState(true);
            useEffect(() => {
                setLoading(true); setPireps(null);
                var depApt = getAirport(dep), arrApt = getAirport(arr);
                if (!depApt) { setLoading(false); return; }
                var lat = depApt.lat, lon = depApt.lon;
                if (arrApt) { lat = (depApt.lat + arrApt.lat) / 2; lon = (depApt.lon + arrApt.lon) / 2; }
                fetchLivePireps(lat, lon, 200).then(function(data) {
                    setPireps(data); setLoading(false);
                }).catch(function() { setLoading(false); });
            }, [dep, arr]);

            if (loading) return (
                <div style={{ padding:'24px', textAlign:'center', color:'var(--text-secondary)' }}>
                    <MdIcon name="sync" style={{ animation:'spin 1s linear infinite', fontSize:24 }} />
                    <div style={{ marginTop:8, fontSize:13 }}>Fetching live PIREPs…</div>
                </div>
            );
            if (!pireps || pireps.length === 0) {
                return (
                    <div style={{ padding:'16px', textAlign:'center', color:'var(--text-secondary)', fontSize:13 }}>
                        <MdIcon name="check_circle" style={{ fontSize:20, color:'var(--go)', display:'block', margin:'0 auto 6px' }} />
                        No PIREPs within 200 NM — AviationWeather.gov
                    </div>
                );
            }
            return (
                <div>
                    <div style={{ fontSize:12, color:'var(--go)', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>
                        <MdIcon name="verified" style={{ fontSize:14 }} />
                        Live PIREPs — AviationWeather.gov ({pireps.length} report{pireps.length !== 1 ? 's' : ''} within 200 NM)
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                    {pireps.slice(0, 8).map(function(p, i) {
                        var raw = p.rawOb || p.rawPirep || '';
                        var type = (p.reportType === 'PIREP' || !p.reportType) ? 'UA' : 'UUA';
                        var fallback = [p.acId, p.altitudeFtMsl ? ('FL' + Math.round(p.altitudeFtMsl / 100)) : null, p.turbIntensity ? ('TB ' + p.turbIntensity) : null, p.icingIntensity ? ('IC ' + p.icingIntensity) : null].filter(Boolean).join(' ');
                        return (
                            <div key={i} className="font-mono" style={{ background:'var(--card-high)', borderRadius:10, padding:12, borderLeft:'3px solid var(--accent)', fontSize:12, color:'var(--text-primary)', lineHeight:1.6 }}>
                                <span style={{ color:'var(--accent)', fontWeight:700, marginRight:8 }}>{type}</span>
                                {raw || fallback || 'No detail available'}
                            </div>
                        );
                    })}
                    </div>
                </div>
            );
        }

        // ── HazardAdvisories component ───────────────────────────────────────────
        // Shows active SIGMETs, G-AIRMETs, and CWAs along the route corridor
        function HazardAdvisories({ sigmets, gairmets, cwas, loading, onAskAI }) {
            if (loading) return (
                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:'var(--card-mid)', border:'1px solid var(--card-border-soft)', borderRadius:12, marginBottom:12, fontSize:13, color:'var(--text-secondary)' }}>
                    <MdIcon name="sync" style={{ fontSize:16, animation:'spin 1s linear infinite', flexShrink:0 }} />
                    <span>Fetching SIGMETs, AIRMETs, CWAs…</span>
                </div>
            );
            var items = [];
            sigmets.forEach(function(f) {
                var p = f.properties || {};
                var hz = (p.hazard || '').toUpperCase();
                var icon = hz === 'CONVECTIVE' ? 'thunderstorm' : hz === 'TURB' ? 'air' : hz === 'ICE' ? 'ac_unit' : 'warning';
                var color = hz === 'CONVECTIVE' ? 'var(--nogo)' : hz === 'ICE' ? 'var(--mvfr)' : 'var(--caution)';
                var label = 'SIGMET';
                var isConv = hz === 'CONVECTIVE';
                items.push({ icon, color, label: isConv ? 'CONVECTIVE SIGMET' : ('SIGMET · ' + hz), text: p.rawAirSigmet || ('Hazard: ' + hz + (p.severity ? ' SEV:'+p.severity : '')), isConv });
            });
            gairmets.forEach(function(g) {
                var hz = (g.hazard || '').toUpperCase();
                var icon = hz.includes('TURB') ? 'air' : hz.includes('ICE') ? 'ac_unit' : hz.includes('IFR') || hz.includes('MTN') ? 'cloud' : hz.includes('LLWS') ? 'swap_vert' : 'warning';
                var color = hz.includes('TURB') ? 'var(--caution)' : hz.includes('ICE') ? 'var(--mvfr)' : 'var(--text-secondary)';
                var sev = g.severity ? (' · ' + g.severity) : '';
                var alt = (g.base != null && g.top != null) ? (' · ' + (g.base*100) + '-' + (g.top*100) + 'ft') : '';
                items.push({ icon, color, label: 'AIRMET ' + (g.tag||'') + ' · ' + hz + sev, text: 'Valid: ' + (g.validTime||'') + alt });
            });
            cwas.forEach(function(c) {
                var hz = (c.hazard || '').toUpperCase();
                var icon = hz === 'TS' ? 'thunderstorm' : hz === 'TURB' ? 'air' : hz === 'ICE' ? 'ac_unit' : hz === 'IFR' ? 'cloud' : 'warning';
                var color = hz === 'TS' ? 'var(--nogo)' : 'var(--caution)';
                var top = c.top ? (' · Top ' + c.top + 'ft') : '';
                items.push({ icon, color, label: 'CWA · ' + (c.cwsuId||'') + ' · ' + hz + (c.qualifier ? ' ' + c.qualifier : ''), text: (c.rawCWA || ('Hazard: ' + hz)) + top });
            });
            if (items.length === 0) return null;
            return (
                <div style={{ background:'var(--card-mid)', border:'1px solid var(--card-border-soft)', borderRadius:16, padding:16, marginBottom:16 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                        <MdIcon name="notifications_active" style={{ color:'var(--nogo)', fontSize:18 }} />
                        <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--nogo)', flex:1 }}>
                            Active Hazard Advisories ({items.length})
                        </span>
                        {onAskAI && (
                            <MdButton variant="text" icon="psychology" style={{ padding:'2px 8px', marginRight:-8 }}
                                onClick={() => onAskAI('Explain the pilot impact and required precautions for these active hazard advisories:\n\n' + items.map(function(it) { return '[' + it.label + '] ' + it.text; }).join('\n'))}>
                                Ask AI
                            </MdButton>
                        )}
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                        {items.map(function(item, i) {
                            return (
                                <div key={i} style={{ background: item.isConv ? 'var(--nogo-bg)' : 'var(--card-high)', borderRadius:10, padding:'10px 12px', borderLeft:'3px solid '+item.color }}>
                                    <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:4 }}>
                                        <MdIcon name={item.icon} style={{ fontSize:15, color:item.color, flexShrink:0 }} />
                                        <span style={{ fontSize:12, fontWeight:700, color:item.color, textTransform:'uppercase', letterSpacing:'0.4px' }}>{item.label}</span>
                                    </div>
                                    <div className="font-mono" style={{ fontSize:12, color:'var(--text-primary)', lineHeight:1.5, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{item.text}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── WindsAloftCard component ─────────────────────────────────────────────
        // Shows FD winds & temps aloft at cruise altitude for each route waypoint
        function WindsAloftCard({ allRoutePts, stations, cruiseAlt }) {
            if (!stations || stations.length === 0) return null;
            var alt = cruiseAlt || 6000;
            var rows = allRoutePts.map(function(icao) {
                var apt = getAirport(icao);
                if (!apt) return null;
                var stn = closestWindStation(stations, apt.lat, apt.lon);
                var w = stn ? getWindAtAlt(stn, alt) : null;
                return { icao, apt, w, stnId: stn ? (stn.icaoId || stn.stn || '') : '' };
            }).filter(Boolean);
            if (rows.every(function(r) { return !r.w; })) return null;
            return (
                <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, padding:16, marginBottom:16 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                        <MdIcon name="air" style={{ color:'var(--md-sys-color-secondary)', fontSize:18 }} />
                        <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--text-secondary)' }}>Winds Aloft</span>
                        <span style={{ fontSize:12, fontWeight:700, background:'var(--card-high)', color:'var(--text-primary)', borderRadius:6, padding:'2px 8px', letterSpacing:'0.5px' }}>
                            {(alt/1000).toFixed(0)}K FT · FD WINDS
                        </span>
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                        {rows.map(function(r) {
                            return (
                                <div key={r.icao} style={{ display:'grid', gridTemplateColumns:'50px 1fr', gap:'6px 12px', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--card-border-soft)' }}>
                                    <span className="font-mono" style={{ fontWeight:700, fontSize:13 }}>{r.icao}</span>
                                    {r.w ? (
                                        <div className="font-mono" style={{ fontSize:12, color:'var(--text-primary)' }}>
                                            {r.w.lv ? 'LGT & VRB' : (r.w.wdir + '° @ ' + r.w.wspd + 'kt')}
                                            {r.w.temp != null && <span style={{ marginLeft:10, color:'var(--text-secondary)' }}>{r.w.temp > 0 ? '+' : ''}{r.w.temp}°C</span>}
                                            <span style={{ marginLeft:8, fontSize:12, color:'var(--text-tertiary)' }}>(via {r.stnId})</span>
                                        </div>
                                    ) : (
                                        <span style={{ fontSize:12, color:'var(--text-secondary)' }}>No FD data</span>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div style={{ fontSize:12, color:'var(--text-secondary)', marginTop:8, lineHeight:1.5 }}>
                        Nearest FD reporting station used per waypoint. Source: AviationWeather.gov /api/data/windtemp.
                    </div>
                </div>
            );

        function CatBadge({ cat, large }) {
            var lc = (cat || '').toLowerCase();
            /* WCAG AA: icon communicates flight category independent of color */
            var catIcon = { VFR: 'check_circle', MVFR: 'warning', IFR: 'cancel', LIFR: 'dangerous' }[cat] || 'help';
            return (
                <span className={'cat-badge cat-' + lc} aria-label={cat + ' conditions'}
                    style={{ fontSize: large ? 13 : 11, padding: large ? '4px 14px' : '3px 10px' }}>
                    <MdIcon name={catIcon} style={{ fontSize: large ? 14 : 11 }} aria-hidden="true" />
                    {cat}
                </span>
            );
        }

        // Density Altitude badge — shows DA next to temperature data.
        // Highlights yellow when DA is 2000+ ft above field elevation.
        function DensityAltBadge({ tempC, altimeterInHg, elevationFt }) {
            if (tempC == null) return null;
            var da = calculateDensityAltitude(tempC, altimeterInHg, elevationFt);
            var diff = da - (elevationFt || 0);
            var warn = diff >= 2000;
            return (
                <span className="font-mono" style={{
                    display: 'inline-flex', alignItems: 'center', gap: 4, padding: '2px 8px', borderRadius: '10px',
                    fontSize: '11px', fontWeight: '600',
                    background: warn ? 'rgba(255,204,0,0.15)' : 'var(--card-high)',
                    color: warn ? '#FFCC00' : 'var(--text-secondary)',
                    border: warn ? '1px solid rgba(255,204,0,0.30)' : '1px solid transparent'
                }} title={'Density Altitude: ' + da.toLocaleString() + ' ft (' + (diff >= 0 ? '+' : '') + diff + ' ft vs field)'}>
                    <MdIcon name={warn ? 'warning' : 'thermostat'} style={{ fontSize: 12 }} aria-hidden="true" />
                    DA {da.toLocaleString()}ft
                </span>
            );
        }

        /* =========================================
           APP COMPONENTS
        ========================================= */

        function GoScoreRing({ score, size }) {
            size = size || 100;
            var strokeW = size >= 80 ? 7 : 5;
            var r = (size - strokeW * 2) / 2;
            var circ = 2 * Math.PI * r;
            var col = getGoColor(score);
            // Glow color mapped from the CSS var to an rgba for filter
            var glowMap = {
                'var(--go)':      '52,199,89',
                'var(--caution)': '255,149,0',
                'var(--nogo)':    '255,59,48'
            };
            var glowRgb = glowMap[col] || '10,132,255';
            return (
                <div style={{ position: "relative", width: size, height: size, animation: 'scorePop 0.45s cubic-bezier(0.34,1.56,0.64,1) both' }}>
                    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
                        {/* Track */}
                        <circle cx={size/2} cy={size/2} r={r} fill="none"
                            stroke="var(--card-high)" strokeWidth={strokeW} />
                        {/* Progress arc */}
                        <circle cx={size/2} cy={size/2} r={r} fill="none"
                            stroke={col} strokeWidth={strokeW}
                            strokeDasharray={circ}
                            strokeDashoffset={circ * (1 - Math.min(score,100) / 100)}
                            strokeLinecap="round"
                            style={{
                                transition: 'stroke-dashoffset 0.9s ease-out',
                                filter: `drop-shadow(0 0 ${size * 0.07}px rgba(${glowRgb},0.55))`
                            }} />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        <div className="font-mono" style={{ fontSize: size * 0.28, fontWeight: 800, color: col, lineHeight: 1, letterSpacing: '-0.02em' }}>{score}</div>
                        {size >= 70 && (
                            <div style={{ fontSize: size * 0.095, color: "var(--text-tertiary)", fontWeight: 600, letterSpacing: "0.08em", marginTop: 2, textTransform: 'uppercase' }}>Score</div>
                        )}
                    </div>
                </div>
            );
        }

        // CartoDB tile URLs — dark and light variants match app themes
        var TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        var TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        var TILE_ATTR  = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

        function RouteMap({ dep, arr, wps }) {
            const { useRef, useEffect, useState } = React;
            const mapContainerRef = useRef(null);
            const leafletMapRef   = useRef(null);
            const tileLayerRef    = useRef(null);
            const overlaysRef     = useRef([]);

            const [isDark, setIsDark] = useState(!document.body.classList.contains('light-theme'));

            var allCodes = [dep].concat(wps || []).concat([arr]).filter(function(c){ return c && c.trim().length === 4; });
            var allPts   = allCodes.map(function(c){ return getAirport(c); }).filter(Boolean);

            var totalDist = 0, heading = 0;
            if (allPts.length >= 2) {
                for (var di = 0; di < allPts.length - 1; di++)
                    totalDist += calcDist(allPts[di].lat, allPts[di].lon, allPts[di+1].lat, allPts[di+1].lon);
                heading = calcBearing(allPts[0].lat, allPts[0].lon, allPts[allPts.length-1].lat, allPts[allPts.length-1].lon);
            }

            // Track light/dark theme changes
            useEffect(function() {
                var obs = new MutationObserver(function(){
                    setIsDark(!document.body.classList.contains('light-theme'));
                });
                obs.observe(document.body, { attributes: true, attributeFilter: ['class'] });
                return function(){ obs.disconnect(); };
            }, []);

            // Swap tile layer when theme changes
            useEffect(function() {
                var L = window.L;
                if (!L || !leafletMapRef.current) return;
                if (tileLayerRef.current) leafletMapRef.current.removeLayer(tileLayerRef.current);
                tileLayerRef.current = L.tileLayer(isDark ? TILE_DARK : TILE_LIGHT,
                    { attribution: TILE_ATTR, subdomains: 'abcd', maxZoom: 19 }
                ).addTo(leafletMapRef.current);
            }, [isDark]);

            // Build map and route overlay
            useEffect(function() {
                var L = window.L;
                if (!L || !mapContainerRef.current) return;

                if (!leafletMapRef.current) {
                    leafletMapRef.current = L.map(mapContainerRef.current, { zoomControl: true });
                    tileLayerRef.current  = L.tileLayer(isDark ? TILE_DARK : TILE_LIGHT,
                        { attribution: TILE_ATTR, subdomains: 'abcd', maxZoom: 19 }
                    ).addTo(leafletMapRef.current);
                }

                var map = leafletMapRef.current;
                overlaysRef.current.forEach(function(l){ map.removeLayer(l); });
                overlaysRef.current = [];

                if (allPts.length < 2) return;

                var latLngs = allPts.map(function(p){ return [p.lat, p.lon]; });

                // Glow halo + solid route line — darker blue on light tiles for contrast
                var lineColor = isDark ? '#0A84FF' : '#0055CC';
                var glow = L.polyline(latLngs, { color: lineColor, weight: 16, opacity: isDark ? 0.18 : 0.35 });
                var line = L.polyline(latLngs, { color: lineColor, weight: 4,  opacity: 0.95 });
                glow.addTo(map); overlaysRef.current.push(glow);
                line.addTo(map); overlaysRef.current.push(line);

                // Markers — aviation-standard colours matching app theme vars
                var _catColors  = { VFR: '#34C759', MVFR: '#0A84FF', IFR: '#FF3B30', LIFR: '#BF5AF2' };
                var _freqLabels = { atis: 'ATIS', twr: 'Tower', gnd: 'Ground', app: 'Approach', dep: 'Departure', clnc: 'Clearance' };
                allPts.forEach(function(p, i) {
                    var isDep = i === 0, isArr = i === allPts.length - 1;
                    var color = isDep ? '#34C759' : isArr ? '#FF3B30' : '#0A84FF';
                    var marker = L.circleMarker([p.lat, p.lon], {
                        radius: isDep || isArr ? 9 : 7,
                        fillColor: color, color: isDark ? '#000' : '#fff',
                        weight: 2, fillOpacity: 1,
                    });
                    marker.addTo(map);
                    marker.bindTooltip(allCodes[i], {
                        permanent: true, direction: 'top', offset: [0, -10],
                        className: 'route-icao-label',
                    });

                    // ── Contextual popup on click ────────────────────────────
                    var icao      = allCodes[i];
                    var roleLabel = isDep ? 'DEPARTURE' : isArr ? 'ARRIVAL' : ('WAYPOINT ' + i);
                    var wxSpanId  = 'rmap-wx-' + icao;
                    var freqRows  = Object.keys(_freqLabels)
                        .filter(function(k) { return p.freq && p.freq[k]; })
                        .map(function(k) {
                            return '<tr>'
                                + '<td style="color:var(--text-secondary);font-size:11px;padding:2px 14px 2px 0;white-space:nowrap;">' + _freqLabels[k] + '</td>'
                                + '<td style="font-size:12px;font-weight:700;font-family:var(--font-mono);white-space:nowrap;">' + p.freq[k] + '</td>'
                                + '</tr>';
                        }).join('');
                    var popupContent =
                        '<div style="padding:14px 16px 12px;min-width:195px;">'
                        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'
                        + '<span style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-secondary);">' + roleLabel + '</span>'
                        + '<span id="' + wxSpanId + '" style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:#555;color:#fff;min-width:36px;text-align:center;">WX\u2026</span>'
                        + '</div>'
                        + '<div style="font-size:18px;font-weight:800;font-family:var(--font-mono);margin-bottom:3px;">' + icao + '</div>'
                        + '<div style="font-size:13px;font-weight:600;margin-bottom:2px;">' + (p.name || '') + '</div>'
                        + '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:' + (freqRows ? '12px' : '2px') + ';">' + (p.city || '') + (p.state ? ', ' + p.state : '') + '</div>'
                        + (freqRows ? '<table style="width:100%;border-collapse:collapse;">' + freqRows + '</table>' : '')
                        + '</div>';
                    marker.bindPopup(
                        L.popup({ maxWidth: 280, minWidth: 200, className: 'route-apt-popup' })
                         .setContent(popupContent)
                    );
                    marker.on('popupopen', function() {
                        fetchLiveMetar(icao).then(function(metar) {
                            var span = document.getElementById(wxSpanId);
                            if (!span) return;
                            var cat = metar ? metar.cat : null;
                            span.textContent = cat || 'N/A';
                            span.style.background = _catColors[cat] || '#666';
                        }).catch(function() {});
                    });

                    overlaysRef.current.push(marker);
                });

                map.fitBounds(latLngs, { padding: [50, 50] });
            }, [dep, arr, JSON.stringify(wps), allPts.length]);

            // Update marker ring stroke when theme changes — polylines are skipped
            // (setStyle on all layers was previously turning polylines white in light mode)
            useEffect(function() {
                overlaysRef.current.forEach(function(l) {
                    if (typeof l.getRadius === 'function') {
                        l.setStyle({ color: isDark ? '#000' : '#fff' });
                    }
                });
            }, [isDark]);

            // Cleanup on unmount
            useEffect(function() {
                return function() {
                    if (leafletMapRef.current) {
                        leafletMapRef.current.remove();
                        leafletMapRef.current = null;
                    }
                };
            }, []);

            var overlayStyle = {
                background: isDark ? 'rgba(10,10,15,0.75)' : 'rgba(255,255,255,0.85)',
                backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
                borderRadius: 10, padding: '6px 12px',
                color: 'var(--text-primary)', border: '1px solid var(--card-border)',
            };

            if (allPts.length < 2) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 360, color: 'var(--text-tertiary)', fontSize: 14 }}>
                        Enter a valid route to view map
                    </div>
                );
            }
            return (
                <div style={{ position: 'relative' }}>
                    <div ref={mapContainerRef} style={{ width: '100%', height: 400 }} />
                    <div className="font-mono" style={{ position: 'absolute', bottom: 40, left: 12, zIndex: 1000, display: 'flex', gap: 8, fontSize: 12, pointerEvents: 'none' }}>
                        <div style={overlayStyle}><span style={{ color: 'var(--text-tertiary)' }}>DIST </span><strong>{Math.round(totalDist)} NM</strong></div>
                        <div style={overlayStyle}><span style={{ color: 'var(--text-tertiary)' }}>HDG </span><strong>{String(Math.round(heading)).padStart(3, '0')}&deg;</strong></div>
                    </div>
                </div>
            );
        }

        // Error Boundary for weather-panel components.
        //
        // React Error Boundaries must be class components.  This one catches render
        // errors thrown by BriefingPanel or ForecastStrip (e.g. when the AWC API
        // returns unexpected JSON that causes a null-dereference or bad array access
        // during rendering) and shows a graceful fallback instead of crashing the
        // whole app.
        //
        // Props:
        //   label   – human-readable name shown in the fallback ("Flight Briefing")
        //   compact – true for inline/strip fallbacks; false (default) for full-card
        //
        // The "Retry" / "Try again" button resets state.error → children re-mount
        // fresh, triggering new API fetches in their useEffect hooks.
        class WxErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { error: null };
            }

            static getDerivedStateFromError(error) {
                return { error };
            }

            componentDidCatch(error, info) {
                console.error('[WxErrorBoundary]', this.props.label,
                              error.message, info.componentStack);
            }

            render() {
                const { error } = this.state;
                if (!error) return this.props.children;

                const { label = 'Weather data', compact = false } = this.props;
                const msg = error.message
                    ? error.message.slice(0, 140)
                    : 'Unexpected data structure';
                const retry = () => this.setState({ error: null });

                if (compact) {
                    return (
                        <div style={{
                            display: 'flex', alignItems: 'center', gap: 10,
                            padding: '10px 16px', borderRadius: 12,
                            background: 'var(--md-sys-color-error-container)',
                            color: 'var(--md-sys-color-on-error-container)',
                            fontSize: 13,
                        }}>
                            <MdIcon name="warning" style={{ fontSize: 18, flexShrink: 0 }} />
                            <span style={{ flex: 1 }}>
                                <strong>{label}</strong> — AWC returned unexpected data.
                            </span>
                            <button onClick={retry} style={{
                                background: 'none',
                                border: '1px solid currentColor',
                                color: 'inherit', cursor: 'pointer',
                                fontSize: 12, fontWeight: 500,
                                padding: '4px 12px', borderRadius: 20,
                                fontFamily: 'inherit',
                            }}>Retry</button>
                        </div>
                    );
                }

                return (
                    <MdCard style={{
                        background: 'var(--md-sys-color-error-container)',
                        color: 'var(--md-sys-color-on-error-container)',
                        padding: '24px',
                    }}>
                        <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
                            <MdIcon name="warning" style={{ fontSize: 32, flexShrink: 0, marginTop: 2 }} />
                            <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>
                                    {label} failed to render
                                </div>
                                <div style={{ fontSize: 14, opacity: 0.85, marginBottom: 16 }}>
                                    The AWC API returned an unexpected JSON structure.
                                    Retry to reload live weather, or the app will fall back
                                    to simulated data.
                                </div>
                                <code style={{
                                    display: 'block',
                                    fontFamily: 'Roboto Mono, monospace', fontSize: 12,
                                    background: 'rgba(0,0,0,0.12)',
                                    padding: '8px 12px', borderRadius: 8, marginBottom: 16,
                                    wordBreak: 'break-all',
                                }}>{msg}</code>
                                <button onClick={retry} style={{
                                    display: 'inline-flex', alignItems: 'center', gap: 8,
                                    background: 'var(--md-sys-color-on-error-container)',
                                    color: 'var(--md-sys-color-error-container)',
                                    border: 'none', cursor: 'pointer',
                                    fontSize: 14, fontWeight: 500,
                                    padding: '10px 24px', borderRadius: 9999,
                                    fontFamily: 'inherit',
                                }}>
                                    <MdIcon name="refresh" style={{ fontSize: 18 }} />
                                    Try again
                                </button>
                            </div>
                        </div>
                    </MdCard>
                );
            }
        }

        function ForecastStrip({ icao, selectedDay, onSelect }) {
            const [forecasts, setForecasts] = useState(null);
            const [isLive, setIsLive] = useState(false);

            useEffect(() => {
                setForecasts(null);
                setIsLive(false);
                var apt = getAirport(icao);
                if (apt) {
                    fetchNwsForecast(apt.lat, apt.lon).then(data => {
                        setForecasts(data || []);
                        if (data) setIsLive(true);
                    }).catch(() => setForecasts([]));
                } else {
                    fetchAirportInfo(icao).then(a => {
                        if (a) {
                            fetchNwsForecast(a.lat, a.lon).then(data => {
                                setForecasts(data || []);
                                if (data) setIsLive(true);
                            }).catch(() => setForecasts([]));
                        } else {
                            setForecasts([]);
                        }
                    }).catch(() => setForecasts([]));
                }
            }, [icao]);

            if (forecasts === null) return (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', color: 'var(--md-sys-color-on-surface-variant)', fontSize: 12 }}>
                    <MdIcon name="sync" style={{ animation: 'spin 1s linear infinite', fontSize: 14 }} />
                    Loading 7-day forecast…
                </div>
            );

            if (forecasts.length === 0) return (
                <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', padding: '8px 0' }}>
                    7-day forecast unavailable for {icao}
                </div>
            );

            return (
                <div>
                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginBottom: 6, display: "flex", alignItems: "center", gap: 4, flexWrap: 'wrap' }}>
                        <MdIcon name="calendar_month" style={{ fontSize: 13 }} />
                        7-Day Forecast
                        <span style={{ color: "var(--md-sys-color-primary)", fontWeight: 700, fontSize: 12, background: "var(--md-sys-color-primary-container)", borderRadius: 4, padding: "1px 5px", marginLeft: 4 }}>NWS LIVE</span>
                        <span style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginLeft: 2 }}>· General area outlook · Trip-specific analysis in Brief tab</span>
                    </div>
                    <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "4px 0", WebkitOverflowScrolling: "touch" }}>
                        {forecasts.map((f, i) => {
                            var selected = selectedDay === i;
                            var lc = f.cat.toLowerCase();
                            return (
                                <button key={i} onClick={() => onSelect(i)} style={{
                                    flex: "0 0 auto", minWidth: 72, padding: "12px 8px", borderRadius: "12px",
                                    border: selected ? `2px solid var(--cat-${lc}-color)` : "2px solid transparent",
                                    background: selected ? `var(--cat-${lc}-bg)` : "var(--md-sys-color-surface-container-high)",
                                    cursor: "pointer", textAlign: "center", transition: "all 0.2s"
                                }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, color: selected ? `var(--cat-${lc}-color)` : "var(--md-sys-color-on-surface)", marginBottom: 2 }}>{f.dayName}</div>
                                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginBottom: 8 }}>{f.dateStr}</div>
                                    <CatBadge cat={f.cat} />
                                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface)", marginTop: 8, fontWeight: 500 }}>{f.hi}&deg; <span style={{color: "var(--md-sys-color-on-surface-variant)"}}>{f.lo}&deg;</span></div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function WindyMap({ dep, arr, wps }) {
            var allPts = useMemo(() => [dep, ...(wps || []), arr].map(getAirport).filter(Boolean), [dep, arr, JSON.stringify(wps)]);
            if (allPts.length < 2) return null;
            var midLat = allPts.reduce((s, p) => s + p.lat, 0) / allPts.length;
            var midLon = allPts.reduce((s, p) => s + p.lon, 0) / allPts.length;
            var src = `https://embed.windy.com/embed2.html?lat=${midLat.toFixed(2)}&lon=${midLon.toFixed(2)}&detailLat=${midLat.toFixed(2)}&detailLon=${midLon.toFixed(2)}&zoom=6&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=kt&metricTemp=%C2%B0F&radarRange=-1`;
            return (
                <div style={{ marginTop: 24 }}>
                    <h2 style={{ fontSize: 16, fontWeight: 500, margin: "0 0 12px", color: "var(--md-sys-color-on-surface)", display: "flex", alignItems: "center", gap: 8 }}>
                        <MdIcon name="storm" style={{ color: "var(--md-sys-color-primary)" }} />
                        Live Wind &amp; Weather Radar
                    </h2>
                    <div style={{ borderRadius: "16px", overflow: "hidden", border: "1px solid var(--md-sys-color-outline-variant)" }}>
                        <iframe src={src} style={{ width: "100%", height: "450px", border: "none" }} allowFullScreen title="Windy Weather Radar" />
                    </div>
                </div>
            );
        }

        // Returns the best runway and crosswind component given a metar and airport.
        // Picks the runway end with the smallest crosswind component.
        function getRunwayRecommendation(metar, apt) {
            if (!metar || !apt || !apt.rwy || apt.rwy.length === 0) return null;
            if (metar.wdir == null || !metar.wspd || metar.wspd < 3) return null;
            var windDir = metar.wdir;
            var windSpd = metar.wspd;
            var best = null;
            var bestCross = Infinity;
            apt.rwy.forEach(function(rwyPair) {
                rwyPair.split("/").forEach(function(rwyEnd) {
                    var m = rwyEnd.match(/^(\d+)/);
                    if (!m) return;
                    var rwyHdg = parseInt(m[1]) * 10;
                    var angle = ((windDir - rwyHdg) % 360 + 360) % 360;
                    if (angle > 180) angle -= 360;
                    var rad = angle * Math.PI / 180;
                    var cross = Math.abs(windSpd * Math.sin(rad));
                    var head = windSpd * Math.cos(rad);
                    if (cross < bestCross) {
                        bestCross = cross;
                        best = { rwy: rwyEnd, crosswind: Math.round(cross), headwind: Math.round(head) };
                    }
                });
            });
            return best;
        }

        // ── METAR human-readable decoder helpers ────────────────────────────────
        function _metarCompassDir(deg) {
            var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
            return dirs[Math.round(deg / 22.5) % 16];
        }
        function _decodeMetarWind(metar) {
            if (!metar.wind) return 'N/A';
            var m = metar.wind.match(/^(VRB|\d{3})(\d{2,3})(G(\d{2,3}))?KT$/);
            if (!m) return metar.wind;
            var dir = m[1], spd = parseInt(m[2]), gst = m[4] ? parseInt(m[4]) : null;
            var dirStr = dir === 'VRB' ? 'Variable' : _metarCompassDir(parseInt(dir)) + ' (' + parseInt(dir) + '\u00b0)';
            return dirStr + ' at ' + spd + ' kts' + (gst ? ', gusting ' + gst + ' kts' : '');
        }
        function _decodeMetarVis(vis) {
            if (!vis) return 'N/A';
            if (vis === 'P6SM') return 'Greater than 6 miles';
            var m = vis.match(/^([\d\/ ]+)SM$/);
            if (m) { var v = m[1].trim(); return v + ' statute mile' + (v === '1' ? '' : 's'); }
            return vis;
        }
        function _decodeMetarSkyLayer(layer) {
            var codes = { CLR:'Clear', SKC:'Sky Clear', FEW:'Few Clouds', SCT:'Scattered Clouds', BKN:'Broken Clouds', OVC:'Overcast', VV:'Vertical Visibility' };
            var m = layer.match(/^(CLR|SKC|FEW|SCT|BKN|OVC|VV)(\d{3})?$/);
            if (!m) return layer;
            var name = codes[m[1]] || m[1];
            if (m[2]) { var ft = parseInt(m[2]) * 100; return name + ' at ' + ft.toLocaleString() + ' ft'; }
            return name;
        }
        function _decodeMetarSky(sky) {
            if (!sky) return 'N/A';
            return sky.split(' ').map(_decodeMetarSkyLayer).join(', ');
        }
        function _decodeMetarTemp(temp) {
            if (!temp) return 'N/A';
            var parts = temp.split('/');
            function parseC(s) { var neg = s.startsWith('M'); return neg ? -parseInt(s.slice(1)) : parseInt(s); }
            var tc = parseC(parts[0]), dc = parseC(parts[1] || '0');
            var tf = Math.round(tc * 9 / 5 + 32), df = Math.round(dc * 9 / 5 + 32);
            return tc + '\u00b0C (' + tf + '\u00b0F)\u2002\u00b7\u2002Dewpt ' + dc + '\u00b0C (' + df + '\u00b0F)';
        }
        function _decodeMetarAlt(alt) {
            if (!alt) return 'N/A';
            var m = alt.match(/^A(\d{4})$/);
            if (!m) return alt;
            return (parseInt(m[1]) / 100).toFixed(2) + ' inHg';
        }

                                    <div>

                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                                            <span style={{ fontWeight: 600 }}>{_decodeMetarTemp(metar.temp)}</span>
                                            {(() => {
                                                var tParts = metar.temp ? metar.temp.split('/') : [];
                                                var tC = tParts[0] ? (tParts[0].startsWith('M') ? -parseInt(tParts[0].slice(1)) : parseInt(tParts[0])) : null;
                                                var aM = metar.alt ? metar.alt.match(/^A(\d{4})$/) : null;

        function NotamsPanel({ icao }) {
            var [notams, setNotams] = useState(null);
            var [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                setNotams(null);
                fetchLiveNotams(icao)
                    .then(function(data) { setNotams(data); setLoading(false); })
                    .catch(function() { setNotams([]); setLoading(false); });
            }, [icao]);

            var sevColors = {
                warning: "var(--caution)",
                tertiary: "var(--text-secondary)",
                error: "var(--nogo)"
            };

            // Format a UTC ms timestamp as "Mar 3, 10:46 AM UTC (Active)" / "(in 29 days)"
            function fmtNotamDate(ms, isEnd) {
                if (!ms) return null;
                var d = new Date(ms);
                var now = Date.now();
                var diffMs = ms - now;
                var diffDays = Math.round(Math.abs(diffMs) / 86400000);
                var rel = diffMs < 0
                    ? (diffDays === 0 ? 'Active' : diffDays + ' days ago')
                    : (diffDays === 0 ? 'today' : 'in ' + diffDays + ' days');
                var dateStr = d.toLocaleString('en-US', {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                    timeZone: 'UTC', timeZoneName: 'short'
                });
                return dateStr + ' (' + rel + ')';
            }

            // Highlight critical phrases in NOTAM text
            function highlightText(text) {
                var pattern = /(OUT OF SERVICE|CLOSED|UNSERVICEABLE|NOT AVAILABLE|UNUSABLE)/g;
                var parts = text.split(pattern);
                return parts.map(function(part, i) {
                    return pattern.test(part)
                        ? React.createElement('span', { key: i, style: { color: 'var(--md-sys-color-error)', fontWeight: 700 } }, part)
                        : part;
                });
            }

            if (loading) return (
                <div style={{ padding: '24px', textAlign: 'center', color: 'var(--md-sys-color-on-surface-variant)' }}>
                    <MdIcon name="sync" style={{ animation: 'spin 1s linear infinite', fontSize: 24 }} />

                    <MdIcon name="check_circle" style={{ fontSize: 20, color: 'var(--cat-vfr-color)', display: 'block', margin: '0 auto 6px' }} />
                    No active NOTAMs — AviationWeather.gov
                </div>
            );

            // Group by how recently the NOTAM became effective
            var now = Date.now();
            var DAY = 86400000;
            var groups = [
                { label: 'Last 7 Days',  items: notams.filter(n => n.startMs && (now - n.startMs) <= 7 * DAY) },
                { label: 'Last 30 Days', items: notams.filter(n => n.startMs && (now - n.startMs) > 7 * DAY && (now - n.startMs) <= 30 * DAY) },

            function NotamCard({ n }) {

                return (

                        background: 'var(--md-sys-color-surface-container)',

                            <span className="font-mono" style={{ fontSize: 12, fontWeight: 700, color }}>{n.type}</span>
                            {n.notamNum && <span className="font-mono" style={{ fontSize: 11, color: 'var(--md-sys-color-on-surface-variant)' }}>{n.notamNum}</span>}
                        </div>
                        <div className="font-mono" style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface)', lineHeight: 1.5 }}>{highlightText(n.text)}</div>

                                {n.endMs   && <div style={{ fontSize: 11, color: 'var(--md-sys-color-on-surface-variant)' }}>Expires&nbsp;&nbsp;&nbsp;&nbsp;{fmtNotamDate(n.endMs, true)}</div>}
                            </div>

                        return (

                                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--md-sys-color-on-surface-variant)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: 8 }}>{g.label}</div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                    {g.items.map(function(n, i) { return React.createElement(NotamCard, { key: i, n }); })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

        // Windy.com embedded forecast widget centered on an airport
        function WindyEmbed({ icao, tripTargetUtc }) {
