                                                        <button onClick={function(){ setFratSkipped(true); setFratExpanded(false); }} style={{ padding:'10px 14px', background:'none', color:'var(--md-sys-color-on-surface-variant)', border:'1px solid var(--card-border)', borderRadius:10, fontSize:12, cursor:'pointer' }}>
                                                            Dismiss (keep −20)
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })()}

                            {/* Active Hazard Advisories (SIGMETs / AIRMETs / CWAs) */}
                            <HazardAdvisories sigmets={sigmets} gairmets={gairmets} cwas={cwas} loading={loadingAdvisory}
                                onAskAI={function(prompt) {
                                    setShowAI(true);
                                    setChatInput(prompt);
                                    setTimeout(function() {
                                        if (chatInputRef.current) {
                                            chatInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                            chatInputRef.current.focus();
                                        }
                                    }, 200);
                                }} />

                            {/* Winds Aloft card */}
                            <WindsAloftCard allRoutePts={allRoutePts} stations={windsAloft} cruiseAlt={ac.alt || 6000} />

                            {/* Go/No-Go banner — uses finalVerdict (may be overridden by convective SIGMET) */}
                            {(function() {
                                var _now = new Date();
                                var _ts = String(_now.getUTCHours()).padStart(2,'0') + String(_now.getUTCMinutes()).padStart(2,'0') + 'Z';
                                var _dt = _now.getUTCFullYear() + '-' + String(_now.getUTCMonth()+1).padStart(2,'0') + '-' + String(_now.getUTCDate()).padStart(2,'0');
                                return (
                                    <div style={{ background: finalVerdict.verdictBg, borderRadius: 16, padding: '20px 24px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 16 }} role="status" aria-live="polite">
                                        <MdIcon name={finalVerdict.verdictIcon} style={{ fontSize: 44, color: finalVerdict.verdictColor, flexShrink: 0 }} aria-hidden="true" />
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', color: finalVerdict.verdictColor, opacity: 0.75, marginBottom: 2 }}>Go/No-Go Assessment</div>
                                            <div style={{ fontSize: 30, fontWeight: 800, color: finalVerdict.verdictColor, fontFamily: 'monospace', lineHeight: 1 }}>{finalVerdict.verdict}</div>
                                            <div style={{ fontSize: 13, color: finalVerdict.verdictColor, opacity: 0.85, marginTop: 4, lineHeight: 1.4 }}>{finalVerdict.verdictDesc}</div>
                                        </div>
                                        {/* Timestamp — allows responder to screenshot and share with flight crew */}
                                        <div style={{ flexShrink: 0, textAlign: 'right', borderLeft: '1px solid ' + finalVerdict.verdictColor + '44', paddingLeft: 16 }} title="Score calculated at this UTC time">
                                            <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.8px', color: finalVerdict.verdictColor, opacity: 0.6, marginBottom: 3 }}>Assessed</div>
                                            <div className="font-mono" style={{ fontSize: 15, fontWeight: 800, color: finalVerdict.verdictColor, lineHeight: 1 }} aria-label={'Assessment time: ' + _ts}>{_ts}</div>
                                            <div className="font-mono" style={{ fontSize: 11, color: finalVerdict.verdictColor, opacity: 0.7, marginTop: 3 }}>{_dt}</div>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* ---- Data-source context banner — makes live vs forecast explicit ---- */}
                            {(() => {
                                var isLive = !finalVerdict.isFutureFlight;
                                var isTaf = finalVerdict.anyTaf;
                                var isNws = finalVerdict.anyNws && !isTaf;
                                var depStr = tripTargetUtc
                                    ? `${String(tripTargetUtc.getUTCHours()).padStart(2,'0')}${String(tripTargetUtc.getUTCMinutes()).padStart(2,'0')}Z · ${trip.date}`
                                    : trip.date || '';
                                var icon = isLive ? 'sensors' : isTaf ? 'event_available' : isNws ? 'calendar_month' : 'warning_amber';
                                var color = isLive ? 'var(--md-sys-color-primary)' : isTaf ? 'var(--md-sys-color-secondary)' : isNws ? 'var(--md-sys-color-tertiary)' : 'var(--md-sys-color-error)';
                                var bgColor = isLive ? 'var(--md-sys-color-primary-container)' : isTaf ? 'var(--md-sys-color-secondary-container)' : isNws ? 'var(--md-sys-color-tertiary-container)' : 'var(--md-sys-color-error-container)';
                                var onBgColor = isLive ? 'var(--md-sys-color-on-primary-container)' : isTaf ? 'var(--md-sys-color-on-secondary-container)' : isNws ? 'var(--md-sys-color-on-tertiary-container)' : 'var(--md-sys-color-on-error-container)';
                                var label = isLive ? 'Live Data — Current Conditions' : isTaf ? 'TAF Forecast — Trip Departure Time' : isNws ? 'NWS 7-Day Forecast — Trip Date' : 'No Forecast Available';
                                var desc = isLive
                                    ? 'Weather below reflects live METAR observations right now. Your trip departs soon — these are your actual departure conditions.'
                                    : isTaf
                                            ? `TAF forecast periods extracted for your ${depStr} departure — each airport shows the period valid at your scheduled time.`
                                            : isNws
                                                ? `NWS 7-day forecast for your ${depStr} departure — trip is >30h out, beyond TAF and METAR range.`
                                                : `No forecast available for this date — route weather shows current METAR as a reference only.`;
                                return (
                                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 16px', borderRadius: 12, background: bgColor, marginBottom: 12 }}>
                                        <MdIcon name={icon} style={{ fontSize: 20, color: color, flexShrink: 0, marginTop: 2 }} />
                                        <div>
                                            <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.5px', color: color, marginBottom: 3 }}>{label}</div>
                                            <div style={{ fontSize: 12, color: onBgColor, lineHeight: 1.55 }}>{desc}</div>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* Route weather table */}
                            <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: '16px', marginBottom: 16 }}>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <MdIcon name="routine" style={{ color: 'var(--md-sys-color-secondary)', fontSize: 18 }} />
                                        <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--md-sys-color-secondary)' }}>Route Weather Summary</span>
                                    </div>
                                    {finalVerdict && finalVerdict.isFutureFlight && (
                                        <span style={{ fontSize: 12, fontWeight: 700,
                                            color: finalVerdict.anyNws ? 'var(--md-sys-color-on-tertiary-container)' : 'var(--md-sys-color-on-secondary-container)',
                                            background: finalVerdict.anyNws ? 'var(--md-sys-color-tertiary-container)' : 'var(--md-sys-color-secondary-container)',
                                            borderRadius: 4, padding: '2px 6px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>
                                            {finalVerdict.anyTaf ? 'TAF FORECAST' : finalVerdict.anyNws ? 'NWS FORECAST' : 'FUTURE TRIP'}
                                        </span>
                                    )}
                                </div>
                                {effectiveWxData.map((e, idx) => {
                                    var roleLabel = idx === 0 ? 'DEP' : idx === effectiveWxData.length - 1 ? 'ARR' : 'WPT';
                                    var apt = getAirport(e.icao);
                                    var wx = e.effectiveWx;
                                    var rwyRec = wx ? getRunwayRecommendation(wx, apt) : null;
                                    return (
                                        <div key={e.icao} style={{ display: 'grid', gridTemplateColumns: '40px 1fr auto', gap: '6px 12px', padding: '10px 0', borderBottom: idx < effectiveWxData.length - 1 ? '1px solid var(--md-sys-color-outline-variant)' : 'none', alignItems: 'center' }}>
                                            <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--md-sys-color-on-surface-variant)', textTransform: 'uppercase', background: 'var(--md-sys-color-surface-container-high)', borderRadius: 4, padding: '2px 4px', textAlign: 'center', letterSpacing: '0.5px' }}>{roleLabel}</span>
                                            <div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2, flexWrap: 'wrap' }}>
                                                    <span className="font-mono" style={{ fontWeight: 700, fontSize: 14 }}>{e.icao}</span>
                                                    {wx && (
                                                        <span style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize: 12, fontWeight: 700, color: catColor(wx.cat) }} aria-label={wx.cat + ' conditions'}>
                                                            <MdIcon name={{ VFR:'check_circle', MVFR:'warning', IFR:'cancel', LIFR:'dangerous' }[wx.cat]||'help'} style={{ fontSize:13, color:catColor(wx.cat) }} aria-hidden="true" />
                                                            {wx.cat}
                                                        </span>
                                                    )}
                                                    {!wx && <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)' }}>No data</span>}
                                                    <span style={{ fontSize: 12, fontWeight: 600,
                                                        color: e.source === 'mos' ? 'var(--md-sys-color-on-tertiary-container)' : e.source === 'taf' ? 'var(--md-sys-color-primary)' : 'var(--md-sys-color-on-surface-variant)',
                                                        background: e.source === 'mos' ? 'var(--md-sys-color-tertiary-container)' : e.source === 'taf' ? 'var(--md-sys-color-primary-container)' : 'var(--md-sys-color-surface-container-high)',
                                                        borderRadius: 3, padding: '1px 5px', letterSpacing: '0.3px', textTransform: 'uppercase' }}>{e.sourceLabel}</span>
                                                </div>
                                                {wx && (
                                                    <div className="font-mono" style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', lineHeight: 1.5 }}>
                                                        {wx.wind} &middot; {wx.vis} &middot; {wx.sky}
                                                        {rwyRec && <span> &middot; Rwy <span style={{ color: 'var(--md-sys-color-primary)', fontWeight: 600 }}>{rwyRec.rwy}</span> xwind <span style={{ color: rwyRec.crosswind > 15 ? 'var(--md-sys-color-error)' : rwyRec.crosswind > 10 ? 'var(--cat-mvfr-color)' : 'var(--md-sys-color-primary)', fontWeight: 600 }}>{rwyRec.crosswind}kt</span></span>}
                                                    </div>
                                                )}
                                            </div>
                                            {wx && <CatBadge cat={wx.cat} />}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Key concerns — always shown; positive message when conditions are clear */}
                            <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: 16, marginBottom: 16 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                                    <MdIcon name={finalVerdict.concerns.length > 0 ? 'warning' : 'check_circle'}
                                        style={{ color: finalVerdict.concerns.length > 0 ? 'var(--md-sys-color-error)' : 'var(--cat-vfr-color)', fontSize: 18 }} />
                                    <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px',
                                        color: finalVerdict.concerns.length > 0 ? 'var(--md-sys-color-error)' : 'var(--cat-vfr-color)' }}>Key Concerns</span>
                                </div>
                                {finalVerdict.concerns.length === 0 ? (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <MdIcon name="check_circle" style={{ fontSize: 17, color: 'var(--cat-vfr-color)', flexShrink: 0 }} />
                                        <span style={{ fontSize: 13, color: 'var(--md-sys-color-on-surface)', lineHeight: 1.45 }}>
                                            No flight concerns identified — conditions look good across all route airports.
                                        </span>
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                                        {finalVerdict.concerns.map((c, i) => (
                                            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                                                <MdIcon name={c.icon} style={{ fontSize: 17, color: levelColor[c.level] || 'var(--md-sys-color-on-surface-variant)', flexShrink: 0, marginTop: 1 }} />
                                                <span style={{ fontSize: 13, color: 'var(--md-sys-color-on-surface)', lineHeight: 1.45 }}>{c.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* ---- Windy.com visual forecast (shown for NWS 7-day trips >30h) ---- */}
                            {finalVerdict.anyNws && (
                                <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: '16px', marginBottom: 16 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
                                        <MdIcon name="air" style={{ color: 'var(--md-sys-color-tertiary)', fontSize: 18 }} />
                                        <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--md-sys-color-tertiary)' }}>Visual Forecast</span>
                                        <span style={{ fontSize: 12, fontWeight: 700, background: 'var(--md-sys-color-tertiary-container)', color: 'var(--md-sys-color-on-tertiary-container)', borderRadius: 4, padding: '2px 7px', letterSpacing: '0.5px' }}>WINDY.COM · ECMWF</span>
                                        <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', marginLeft: 'auto' }}>Centered on {effectiveWxData[0].icao} (dep)</span>
                                    </div>
                                    <WindyEmbed icao={effectiveWxData[0].icao} tripTargetUtc={tripTargetUtc} />
                                    <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', marginTop: 10, lineHeight: 1.5 }}>
                                        Use the timeline slider in the map to navigate to your departure date/time. Wind barbs show direction and speed in knots.
                                    </div>
                                </div>
                            )}

                            {/* Recommendations */}
                            <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: 16, marginBottom: 16 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                                    <MdIcon name="checklist" style={{ color: 'var(--md-sys-color-tertiary)', fontSize: 18 }} />
                                    <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--md-sys-color-tertiary)' }}>Pilot Recommendations</span>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                                    {finalVerdict.recs.map((r, i) => (
                                        <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                                            <MdIcon name={r.startsWith('⚠') ? 'warning' : 'arrow_right'} style={{ fontSize: 17, color: r.startsWith('⚠') ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-tertiary)', flexShrink: 0, marginTop: 1 }} />
                                            <span style={{ fontSize: 13, color: r.startsWith('⚠') ? 'var(--md-sys-color-on-surface)' : 'var(--md-sys-color-on-surface)', lineHeight: 1.45, fontWeight: r.startsWith('⚠') ? 600 : 400 }}>{r.replace(/^⚠ /, '')}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* En Route PIREPs */}
                            <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: 16, marginBottom: 16 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                                    <MdIcon name="speaker_notes" style={{ color: 'var(--md-sys-color-primary)', fontSize: 18 }} />
                                    <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--md-sys-color-primary)' }}>En Route PIREPs</span>
                                    <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', background: 'var(--md-sys-color-surface-container-high)', borderRadius: 4, padding: '1px 6px', marginLeft: 2 }}>Live · AviationWeather.gov</span>
                                </div>
                                <LivePireps dep={trip.dep} arr={trip.arr} />
                            </div>

                            {/* Route Map — at the bottom of the briefing */}
                            <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, marginBottom:16, overflow:'hidden' }}>
                                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'14px 16px', borderBottom:'1px solid var(--card-border)' }}>
                                    <MdIcon name="map" style={{ color:'var(--md-sys-color-tertiary)', fontSize:18 }} />
                                    <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-tertiary)' }}>Route Map</span>
                                </div>
                                <RouteMap dep={trip.dep} arr={trip.arr} wps={trip.wps||[]} />
                            </div>

                            <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', textAlign: 'center', padding: '4px 16px 20px', lineHeight: 1.5 }}>
                                {finalVerdict.anyNws
                                    ? <>NWS 7-day forecast from <strong>AviationWeather.gov</strong> · visual from <strong>Windy.com</strong>. Trip is beyond TAF range — <strong>re-check with TAF and METAR within 30h of departure</strong>.</>
                                    : finalVerdict.isFutureFlight
                                    ? <>TAF forecast from <strong>AviationWeather.gov</strong> for trip date/time. Conditions may change — <strong>re-check closer to departure</strong>.</>
                                    : <>Live weather from <strong>AviationWeather.gov</strong>. For situational awareness only.</>
                                } Always obtain an official briefing at <strong>1800wxbrief.com</strong> before flight.
                            </div>
                        </>
                    )}

                    {/* ---- Enhanced AI Analysis (collapsible) ---- */}
                    <div style={{ borderTop: '1px solid var(--md-sys-color-outline-variant)', paddingTop: 16 }}>
                        <button onClick={() => setShowAI(!showAI)} style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0 12px', color: 'var(--md-sys-color-on-surface)' }}>
                            <MdIcon name="auto_awesome" style={{ color: 'var(--md-sys-color-primary)', fontSize: 20 }} />
                            <span style={{ fontWeight: 600, fontSize: 14, flex: 1, textAlign: 'left' }}>Enhanced AI Analysis</span>
                            <MdIcon name={showAI ? 'expand_less' : 'expand_more'} style={{ fontSize: 20, color: 'var(--md-sys-color-on-surface-variant)' }} />
                        </button>

                        {showAI && (
                            <>
                                <div style={{ marginBottom: 8, fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 6 }}>
                                    <MdIcon name="lock" style={{ fontSize: 13, marginTop: 1, flexShrink: 0 }} />
                                    Key is sent directly from your browser to Anthropic. Use a key with a spending limit set — never your primary production key.
                                </div>
                                <div style={{ marginBottom: 12 }}>
                                    <MdInput label="Anthropic API Key" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." type="password" />
                                </div>
                                <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
                                    <MdButton
                                        variant={aiLoading ? "tonal" : "sparkle"}
                                        onClick={runAiBriefing}
                                        disabled={aiLoading || !apiKey || loadingWx}
                                        icon="auto_awesome"
                                        style={{ flex: 1, padding: '14px', fontSize: '15px' }}
                                    >
                                        {aiLoading ? "Analyzing with Claude…" : "Generate AI Briefing"}
                                    </MdButton>
                                    {window.speechSynthesis && (aiResult || analysis) && (
                                        <MdButton variant="tonal" icon={speaking ? 'stop_circle' : 'volume_up'} onClick={speakBriefing} title={speaking ? 'Stop reading' : 'Read briefing aloud'} style={{ padding: '14px 16px' }}>
                                            {speaking ? 'Stop' : 'Read'}
                                        </MdButton>
                                    )}
                                </div>

                                {aiError && <MdCard style={{ background: 'var(--md-sys-color-error-container)', color: 'var(--md-sys-color-on-error-container)', marginBottom: 16 }}><MdIcon name="error" style={{ marginRight: 8 }} />{aiError}</MdCard>}

                                {aiSections.map((s, i) => {
                                    var meta = sectionMeta[s.title] || { icon: 'info', color: 'var(--md-sys-color-primary)' };
                                    return (
                                        <div key={i} style={{ background: meta.bg || 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: 20, marginBottom: 16, color: meta.onBg || 'var(--md-sys-color-on-surface)' }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                                                <MdIcon name={meta.icon} style={{ color: meta.color, fontSize: 24 }} />
                                                <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: meta.color, letterSpacing: '0.5px' }}>{s.title}</h3>
                                            </div>
                                            <div style={{ fontSize: 14, lineHeight: 1.6, whiteSpace: 'pre-wrap', color: meta.onBg || 'var(--md-sys-color-on-surface-variant)' }}>
                                                {s.body.trim().replace(/-/g, '\u2022')}
                                            </div>
                                        </div>
                                    );
                                })}

                                {/* AI Feedback */}
                                {aiResult && !aiLoading && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0 16px', borderBottom: '1px solid var(--md-sys-color-outline-variant)' }}>
                                        <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)' }}>Was this briefing helpful?</span>
                                        <button aria-label="Thumbs up — briefing was helpful" onClick={() => setAiFeedback('up')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'inline-flex' }}>
                                            <MdIcon name="thumb_up" style={{ fontSize: 20, color: aiFeedback === 'up' ? 'var(--cat-vfr-color)' : 'var(--md-sys-color-outline)' }} aria-hidden="true" />
                                        </button>
                                        <button aria-label="Thumbs down — briefing was not helpful" onClick={() => setAiFeedback('down')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'inline-flex' }}>
                                            <MdIcon name="thumb_down" style={{ fontSize: 20, color: aiFeedback === 'down' ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-outline)' }} aria-hidden="true" />
                                        </button>
                                        {aiFeedback && <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)' }}>{aiFeedback === 'up' ? 'Thanks! Feedback helps improve AI responses.' : 'Thanks for the feedback.'}</span>}
                                    </div>
                                )}

                                {!aiResult && !aiLoading && (
                                    <div style={{ textAlign: 'center', padding: '24px', color: 'var(--md-sys-color-on-surface-variant)', fontSize: 13 }}>
                                        Claude will analyze live weather + the safety score above to generate a detailed narrative briefing with quantitative risk thresholds.
                                    </div>
                                )}

                                {/* Conversational AI Chat */}
                                {apiKey && (
                                    <div style={{ marginTop: 16, border: '1px solid var(--md-sys-color-outline-variant)', borderRadius: 16, overflow: 'hidden' }}>
                                        <div style={{ padding: '10px 14px', background: 'var(--md-sys-color-surface-container)', borderBottom: chatMessages.length ? '1px solid var(--md-sys-color-outline-variant)' : 'none', display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <MdIcon name="chat" style={{ fontSize: 16, color: 'var(--md-sys-color-primary)' }} />
                                            <span style={{ fontWeight: 600, fontSize: 13, color: 'var(--md-sys-color-on-surface)', flex: 1 }}>Ask AI about this flight</span>
                                            {chatMessages.length > 0 && (
                                                <button onClick={() => setChatMessages([])} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', padding: '2px 6px' }}>Clear</button>
                                            )}
                                        </div>
                                        {chatMessages.length > 0 && (
                                            <div style={{ maxHeight: 300, overflowY: 'auto', padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8, background: 'var(--md-sys-color-background)' }}>
                                                {chatMessages.map((m, i) => (
                                                    <div key={i} className={m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}>{m.content}</div>
                                                ))}
                                                {chatLoading && <div className="chat-bubble-ai" style={{ color: 'var(--md-sys-color-on-surface-variant)', fontStyle: 'italic' }}>Thinking…</div>}
                                                <div ref={chatEndRef} />
                                            </div>
                                        )}
                                        <div style={{ display: 'flex', gap: 8, padding: '10px 14px', borderTop: chatMessages.length ? '1px solid var(--md-sys-color-outline-variant)' : 'none', alignItems: 'flex-end', background: 'var(--md-sys-color-surface-container)' }}>
                                            <textarea
                                                ref={chatInputRef}
                                                aria-label="Ask AI about this flight"
                                                value={chatInput}
                                                onChange={e => setChatInput(e.target.value)}
                                                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
                                                placeholder={'Ask about this flight — e.g. "What if I leave at noon?" or "Suggest alternates if ' + (trip.arr || 'destination') + ' goes IFR"'}
                                                rows={2}
                                                style={{ flex: 1, background: 'var(--md-sys-color-background)', border: '1px solid var(--md-sys-color-outline-variant)', borderRadius: 12, padding: '8px 12px', fontSize: 13, color: 'var(--md-sys-color-on-surface)', resize: 'none', fontFamily: 'inherit', outline: 'none' }}
                                            />
                                            <MdButton variant="tonal" icon="send" onClick={sendChat} disabled={!chatInput.trim() || chatLoading} style={{ padding: '10px 14px', flexShrink: 0 }} />
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        /* =========================================================
           SETTINGS MODAL
           Allows the user to:
             • View and override the OpenAIP API key (stored in
               localStorage — never in the source file).
             • Check OurAirports database cache status and force refresh.
             • See real-time API status for both data sources.
           For production deployments, the OpenAIP key should be proxied
           via a Cloudflare Worker so it is not visible in the browser.
        ========================================================= */
        function SettingsModal({ onClose }) {
            var [apiKey,     setApiKey]     = useState(getOpenAIPKey);

        /* =========================================
           EXPORT / IMPORT MODAL
        ========================================= */
        function DataModal({ trips, onImport, onClose }) {
            var [toast, setToast] = useState('');
            var importRef = React.useRef();

            function showToast(msg) {
                setToast(msg);
                setTimeout(() => setToast(''), 2500);
            }

            // Shared helper: create a Blob URL, fire a link click, then revoke.
            // opts.download  → set the download filename (same-tab save)
            // opts.newTab    → open in a new tab instead (for print pages)
            // opts.revokeMs  → ms before revoking (default 0 = immediate)
            function triggerBlobLink(blob, opts) {
                opts = opts || {};
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                if (opts.download) a.download = opts.download;
                if (opts.newTab)   { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                // Immediate revoke is safe — the browser has already queued the
                // navigation/download, and a newly-opened tab retains the reference.
                var delay = opts.revokeMs != null ? opts.revokeMs : 0;
                if (delay > 0) { setTimeout(function() { URL.revokeObjectURL(url); }, delay); }
                else { URL.revokeObjectURL(url); }
            }

            function handleExport() {
                var blob = new Blob([JSON.stringify(trips, null, 2)], { type: 'application/json' });
                triggerBlobLink(blob, { download: 'flightscore-trips-' + new Date().toISOString().slice(0, 10) + '.json' });
                showToast('Trips exported!');
            }

            function handleImportFile(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = ev => {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (!Array.isArray(data)) throw new Error();
                        onImport(data);
                        showToast(data.length + ' trip(s) imported!');
                        setTimeout(onClose, 1500);
                    } catch(ex) {
                        showToast('Invalid file — could not import.');
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            }

            return (
                <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
                    style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                    <div style={{ background:'var(--md-sys-color-surface)', borderRadius:28, padding:32, width:'min(420px,100%)', boxShadow:'0 8px 32px rgba(0,0,0,0.3)' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                            <div style={{ fontSize:20, fontWeight:500 }}>My Trip Data</div>
                            <MdButton variant="text" icon="close" onClick={onClose} style={{ padding:8 }} />
                        </div>

                        {toast && (
                            <div style={{ background:'var(--md-sys-color-primary-container)', color:'var(--md-sys-color-on-primary-container)', borderRadius:12, padding:'10px 16px', marginBottom:16, fontSize:14, textAlign:'center' }}>{toast}</div>
                        )}

                        <div style={{ fontSize:13, color:'var(--md-sys-color-on-surface-variant)', marginBottom:20, lineHeight:1.6 }}>
                            Trips are automatically saved in this browser. Use export/import to move trips between devices, or to keep a backup.
                        </div>

                        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                            <MdButton variant="tonal" icon="download" onClick={handleExport}>
                                Export trips as JSON ({trips.length} trip{trips.length !== 1 ? 's' : ''})
                            </MdButton>
                            <input ref={importRef} type="file" accept=".json,application/json" style={{ display:'none' }} onChange={handleImportFile} />
                            <MdButton variant="outlined" icon="upload" onClick={() => importRef.current && importRef.current.click()}>
                                Import trips from JSON
                            </MdButton>
                        </div>

                        <div style={{ marginTop:20, padding:'14px 16px', background:'var(--md-sys-color-surface-container)', borderRadius:12, fontSize:12, color:'var(--md-sys-color-on-surface-variant)', lineHeight:1.7 }}>
                            <b>Tip:</b> To sync across devices, export on one device and import on another. To share a single trip, use the <MdIcon name="share" style={{ fontSize:14, verticalAlign:'middle' }} /> link button on the trip card.
                        </div>
                    </div>
                </div>
            );
        }

            // ── Friendly error messages for common Firebase auth codes ──────
            function friendlyError(e) {
                switch(e.code) {
                    case 'auth/user-not-found':
                    case 'auth/invalid-credential':   return 'Invalid email or password.';
                    case 'auth/wrong-password':        return 'Incorrect password.';
                    case 'auth/email-already-in-use':  return 'An account with this email already exists.';
                    case 'auth/invalid-email':         return 'Please enter a valid email address.';
                    case 'auth/weak-password':         return 'Password must be at least 6 characters.';
                    case 'auth/too-many-requests':     return 'Too many attempts. Please try again later.';
                    default: return e.message || 'Authentication failed.';

                e.preventDefault();
                if (!email.trim() || !password) { setError('Please fill in all fields.'); return; }

        /* =========================================
           NATURAL-LANGUAGE TRIP PARSER
        ========================================= */
        async function parseTripWithAi(inputText, apiKey) {
            var now   = new Date();
            var pad2  = function(n) { return String(n).padStart(2, '0'); };
            var today = now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate());
            var acList = AIRCRAFT.map(function(a) { return '"' + a.id + '" (' + a.name + ')'; }).join(', ');

            var system = [
                'You are an aviation flight parser. Today\'s date is ' + today + ' (YYYY-MM-DD). Current UTC time: ' + pad2(now.getUTCHours()) + ':' + pad2(now.getUTCMinutes()) + 'Z.',
                'Extract flight details from the user input and respond with ONLY a single raw JSON object — no markdown fences, no backticks, no explanation, no extra text.',
                'Required JSON fields:',
                '  "dep"      — 4-letter ICAO departure code (prepend K for US airports given without the K, e.g. JFK → KJFK)',
                '  "arr"      — 4-letter ICAO arrival code (same K-prefix rule)',
                '  "wps"      — array of intermediate ICAO waypoint codes (empty array [] if none mentioned)',
                '  "aircraft" — one of these exact IDs: ' + acList + '. Pick closest match; default "c172".',
                '  "date"     — departure date as YYYY-MM-DD. Resolve relative words: "today"=' + today + ', "tomorrow"=next calendar day.',
                '  "time"     — departure local time as HH:MM (24-hour). Default "09:00" if not stated.',
                '  "name"     — concise human-readable trip label, e.g. "New York to Chicago".',
                'Output ONLY the JSON object. No other text.'
            ].join('\n');

            var data = await callAnthropicApi({
                system,
                messages: [{ role: 'user', content: inputText }],
                max_tokens: 300,
                apiKey
            });
            var raw = (data.content && data.content[0] && data.content[0].text) || '';
            if (!raw.trim()) throw new Error('Empty response from Claude');
            // Strip any accidental markdown fences
            var cleaned = raw.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
            var parsed = JSON.parse(cleaned);
            if (!parsed.dep || !parsed.arr) throw new Error('Could not identify departure or arrival airport — please be more specific');
            parsed.dep = parsed.dep.toUpperCase();
            parsed.arr = parsed.arr.toUpperCase();
            parsed.wps = (parsed.wps || []).map(function(w) { return w.toUpperCase(); });
            return parsed;
        }

        /* =========================================
           MAIN APPLICATION COMPONENT

        function App() {

                // route or departure date/time changes.  Updating goScore itself does
                // NOT change the signature, so the setTrips call below does not
                // retrigger scoring — avoiding a self-reinforcing render cascade.
                if (!tripsLoaded) return;
                trips.forEach(t => {
                    var sig = [t.dep, t.arr, (t.wps || []).join(','), t.date, t.time].join('|');
                    var id  = String(t.id);
                    if (scoredTripSigs.current.get(id) === sig) return;
                    scoredTripSigs.current.set(id, sig);

                    var allPts = [t.dep].concat(t.wps || []).concat([t.arr]).filter(Boolean);
                    var dist = 0;
                    for (var i = 0; i < allPts.length - 1; i++) {
                        var p1 = getAirport(allPts[i]), p2 = getAirport(allPts[i + 1]);
                        if (p1 && p2) dist += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                    }
                    var routeDist = Math.round(dist);
                    fetchEffectiveWxForTrip(t, allPts).then(wxData => {
                        if (wxData.length > 0) {
                            var ds = calcDetailedScore(wxData, routeDist);
                            var weatherScore = ds.total;
                            // Mirror BriefingPanel combinedScore logic:
                            // — FRAT complete → 70/30 blend; otherwise → weather − 20 penalty
                            var savedAnswers = (function() {
                                try {
                                    var s = JSON.parse(localStorage.getItem('flightscore_frat_' + t.id) || 'null');
                                    if (s && s.answers) return s.answers;
                                } catch(e) {}
                                return t.fratAnswers || {};
                            })();
                            var fratDone = FRAT_QUESTIONS.filter(function(q){ return savedAnswers[q.id] !== undefined; }).length === FRAT_TOTAL;
                            var score;
                            if (fratDone) {
                                var fratScore = calcFratGoScore(savedAnswers);
                                score = Math.max(0, Math.min(100, Math.round(weatherScore * 0.70 + fratScore * 0.30)));
                            } else {
                                score = Math.max(0, weatherScore - 20);
                            }
                            if (ds.scoreCap !== null && ds.scoreCap !== undefined) {
                                score = Math.min(ds.scoreCap, score);
                            }

            }, [trips, tripsLoaded]);

            function createTrip() {

                    } : t));

                            if (wxData.length > 0) setTrips(prev => prev.map(t => t.id === id ? { ...t, goScore: calcDetailedScore(wxData, dist).total } : t));
                        }).catch(() => {});

                            if (wxData.length > 0) setTrips(prev => prev.map(x => x.id === tripObj.id ? { ...x, goScore: calcDetailedScore(wxData, dist).total } : x));
                        }).catch(() => {});

            var tabList = [
