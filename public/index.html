        /* =========================================
           VOICE INPUT BUTTON (Web Speech API)
        ========================================= */
        function VoiceInputButton({ onResult, style }) {
            var [listening, setListening] = useState(false);
            var canListen = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
            if (!canListen) return null;
            var PHONETIC = { ALPHA:'A',BRAVO:'B',CHARLIE:'C',DELTA:'D',ECHO:'E',FOXTROT:'F',GOLF:'G',HOTEL:'H',INDIA:'I',JULIET:'J',KILO:'K',LIMA:'L',MIKE:'M',NOVEMBER:'N',OSCAR:'O',PAPA:'P',QUEBEC:'Q',ROMEO:'R',SIERRA:'S',TANGO:'T',UNIFORM:'U',VICTOR:'V',WHISKEY:'W',XRAY:'X',YANKEE:'Y',ZULU:'Z' };
            function start() {
                var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                var rec = new SR();
                rec.lang = 'en-US'; rec.continuous = false; rec.interimResults = false;
                rec.onresult = function(e) {
                    var t = e.results[0][0].transcript.trim().toUpperCase();
                    var direct = t.replace(/\s+/g, '');
                    if (/^[A-Z]{4}$/.test(direct)) { onResult(direct); setListening(false); return; }
                    var words = t.split(/\s+/);
                    var conv = words.map(function(w) { return PHONETIC[w] || (w.length === 1 ? w : null); }).filter(Boolean).join('');
                    if (/^[A-Z]{4}$/.test(conv)) { onResult(conv); setListening(false); return; }
                    var match = Object.entries(AIRPORTS).find(function([, a]) {
                        return a.city.toUpperCase() === t || a.name.toUpperCase().includes(t);
                    });
                    if (match) onResult(match[0]);
                    setListening(false);
                };
                rec.onerror = function() { setListening(false); };
                rec.onend = function() { setListening(false); };
                rec.start(); setListening(true);
            }
            return (
                <button onClick={start} title={listening ? 'Listening…' : 'Voice input'} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px', display:'inline-flex', alignItems:'center', ...(style || {}) }}>
                    <MdIcon name={listening ? 'mic' : 'mic_none'} style={{ fontSize:20, color: listening ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-outline)', transition:'color 0.2s' }} />
                </button>
            );
        }

        /* =========================================
           AIRPORT INPUT WITH AUTOCOMPLETE
        ========================================= */
        // AirportInput — ICAO text field with dropdown autocomplete.
        // Searches three sources in priority order:
        //   1. AIRPORTS constant (21 hardcoded entries with frequencies/ARTCC)
        //   2. OurAirports database (~12,000 entries, loaded async from CSV)
        //   3. Shows a "loading…" hint while OurAirports is still being fetched
        // Selecting a result from OurAirports seeds AIRPORTS with minimal data
        // so that getAirport() works immediately without another lookup.
        function AirportInput({ label, value, onChange, placeholder, containerStyle }) {
            var [open, setOpen] = useState(false);
            var [suggestions, setSuggestions] = useState([]);
            var [isLoadingOA, setIsLoadingOA] = useState(_oaLoading);

            // Re-compute suggestions whenever the typed value changes
            useEffect(() => {
                var q = (value || '').trim().toUpperCase();
                if (q.length < 2) { setSuggestions([]); return; }

                // 1. Hardcoded AIRPORTS — always instant
                var staticHits = Object.entries(AIRPORTS)
                    .filter(function([k, a]) {
                        return k.startsWith(q) ||
                               (a.city  && a.city.toUpperCase().startsWith(q)) ||
                               (a.name  && a.name.toUpperCase().includes(q));
                    })
                    .slice(0, 5)
                    .map(function([k, a]) {
                        return { icao: k, name: a.name, city: a.city, state: a.state, src: 'built-in' };
                    });

                // 2. OurAirports — synchronous once loaded
                var oaHits = searchOurAirports(q, 8 - staticHits.length);

                var seen = new Set(staticHits.map(function(s) { return s.icao; }));
                var merged = staticHits.slice();
                oaHits.forEach(function(m) {
                    if (!seen.has(m.icao)) {
                        merged.push({ icao: m.icao, name: m.name, city: m.city,
                                      state: m.state, country: m.country, src: 'OurAirports' });
                        seen.add(m.icao);
                    }
                });

                setSuggestions(merged.slice(0, 8));
                setIsLoadingOA(_oaLoading);
            }, [value]);

            function pick(icao, row) {
                // Seed AIRPORTS so getAirport()/calcDist() work without an extra fetch
                if (row && row.src === 'OurAirports' && !AIRPORTS[icao]) {
                    AIRPORTS[icao] = {
                        name: row.name, city: row.city || icao,
                        state: row.state || row.country || 'US',
                        lat: row.lat || 0, lon: row.lon || 0, elev: row.elev || 0,
                        rwy: [], artcc: 'Center', facility: null,
                        freq: { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' }
                    };
                    // Background-enrich with OpenAIP (frequencies etc) — fire & forget
                    enrichAirportFromOpenAIP(icao);
                }
                onChange(icao);
                setSuggestions([]);
                setOpen(false);
            }

            var showDrop = open && (suggestions.length > 0 || isLoadingOA);
            return (
                <div style={{ position:'relative', flex:1, ...(containerStyle || {}) }}>
                    <div style={{ display:'flex', alignItems:'center', gap:0 }}>
                        <MdInput
                            label={label} value={value} placeholder={placeholder} maxLength={4}
                            containerStyle={{ flex:1 }}
                            onChange={function(e) { onChange(e.target.value.trim().toUpperCase()); setOpen(true); }}
                            onFocus={function() { setOpen(true); }}
                            onBlur={function() { setTimeout(function() { setOpen(false); }, 160); }}
                        />
                        <VoiceInputButton onResult={function(v) { onChange(v); setSuggestions([]); }} style={{ marginLeft:4 }} />
                    </div>
                    {showDrop && (
                        <div className="apt-suggest-drop">
                            {suggestions.map(function(s) {
                                return (
                                    <div key={s.icao} className="apt-suggest-item" onMouseDown={function() { pick(s.icao, s); }}>
                                        <span className="font-mono" style={{ fontWeight:700, fontSize:14, color:'var(--md-sys-color-primary)', minWidth:46 }}>{s.icao}</span>
                                        <div style={{ flex:1, minWidth:0 }}>
                                            <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface)', lineHeight:1.3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.name}</div>
                                            <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)' }}>
                                                {[s.city, s.state, s.country && s.country !== 'US' ? s.country : null].filter(Boolean).join(', ')}
                                            </div>
                                        </div>
                                        {s.src === 'OurAirports' && (
                                            <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', background:'var(--md-sys-color-surface-container-high)', borderRadius:3, padding:'1px 4px', flexShrink:0, alignSelf:'center' }}>OA</span>
                                        )}
                                    </div>
                                );
                            })}
                            {isLoadingOA && suggestions.length < 3 && (
                                <div style={{ padding:'8px 14px', fontSize:12, color:'var(--md-sys-color-on-surface-variant)', display:'flex', alignItems:'center', gap:6 }}>
                                    <MdIcon name="sync" style={{ fontSize:14, animation:'spin 1s linear infinite' }} />
                                    Loading airport database…
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        /* =========================================
           SEMICIRCLE SAFETY GAUGE (SVG)
        ========================================= */
        function SemiGauge({ score, size }) {
            size = size || 180;
            var cx = size / 2, cy = size * 0.58, r = size * 0.40;
            var arcLen = Math.PI * r;
            var col = score >= 75 ? 'var(--cat-vfr-color)' : score >= 50 ? 'var(--cat-mvfr-color)' : 'var(--cat-ifr-color)';
            var pathD = 'M ' + (cx - r).toFixed(1) + ' ' + cy.toFixed(1) + ' A ' + r.toFixed(1) + ' ' + r.toFixed(1) + ' 0 0 1 ' + (cx + r).toFixed(1) + ' ' + cy.toFixed(1);
            return (
                <div style={{ position:'relative', width:size, margin:'0 auto' }}>
                    <svg width={size} height={Math.round(cy + 20)} viewBox={'0 0 ' + size + ' ' + Math.round(cy + 20)} style={{ display:'block' }}>
                        <path d={pathD} fill="none" stroke="var(--md-sys-color-surface-container-highest)" strokeWidth="10" strokeLinecap="round" />
                        <path d={pathD} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round"
                            strokeDasharray={arcLen.toFixed(1)} strokeDashoffset={(arcLen * (1 - score / 100)).toFixed(1)}
                            style={{ transition:'stroke-dashoffset 0.9s ease-out' }} />
                        <text x={cx - r - 2} y={cy + 16} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif">0</text>
                        <text x={cx + r + 2} y={cy + 16} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif">100</text>
                        <text x={cx} y={cy - r * 0.1} textAnchor="middle" fontSize={Math.round(size * 0.18)} fontWeight="800" fill={col} fontFamily="monospace">{score}</text>
                        <text x={cx} y={cy + 8} textAnchor="middle" fontSize="12" fill="var(--md-sys-color-on-surface-variant)" fontFamily="sans-serif" letterSpacing="1">SAFETY SCORE</text>
                    </svg>
                </div>
            );
        }

        /* =========================================

        /* =========================================
           LIVE PIREPS (from AviationWeather.gov)
        ========================================= */
        function LivePireps({ dep, arr }) {
            var [pireps, setPireps] = useState(null);
            var [loading, setLoading] = useState(true);
            useEffect(() => {
                setLoading(true); setPireps(null);
                var depApt = getAirport(dep), arrApt = getAirport(arr);
                if (!depApt) { setLoading(false); return; }
                var lat = depApt.lat, lon = depApt.lon;
                if (arrApt) { lat = (depApt.lat + arrApt.lat) / 2; lon = (depApt.lon + arrApt.lon) / 2; }
                fetchLivePireps(lat, lon, 200).then(function(data) {
                    setPireps(data); setLoading(false);
                }).catch(function() { setLoading(false); });
            }, [dep, arr]);

            if (loading) return (
                <div style={{ padding:'24px', textAlign:'center', color:'var(--md-sys-color-on-surface-variant)' }}>
                    <MdIcon name="sync" style={{ animation:'spin 1s linear infinite', fontSize:24 }} />
                    <div style={{ marginTop:8, fontSize:13 }}>Fetching live PIREPs…</div>
                </div>
            );
            if (!pireps || pireps.length === 0) {
                return (
                    <MdCard style={{ padding:16 }}>
                        <div style={{ textAlign:'center', color:'var(--md-sys-color-on-surface-variant)', fontSize:13 }}>
                            <MdIcon name="check_circle" style={{ fontSize:20, color:'var(--cat-vfr-color)', display:'block', margin:'0 auto 6px' }} />
                            No PIREPs within 200 NM — AviationWeather.gov
                        </div>
                    </MdCard>
                );
            }
            return (
                <MdCard style={{ padding:12 }}>
                    <div style={{ fontSize:12, color:'var(--cat-vfr-color)', marginBottom:8, display:'flex', alignItems:'center', gap:6 }}>
                        <MdIcon name="verified" style={{ fontSize:14 }} />
                        Live PIREPs — AviationWeather.gov ({pireps.length} report{pireps.length !== 1 ? 's' : ''} within 200 NM)
                    </div>
                    {pireps.slice(0, 8).map(function(p, i) {
                        var raw = p.rawOb || p.rawPirep || '';
                        var type = (p.reportType === 'PIREP' || !p.reportType) ? 'UA' : 'UUA';
                        var fallback = [p.acId, p.altitudeFtMsl ? ('FL' + Math.round(p.altitudeFtMsl / 100)) : null, p.turbIntensity ? ('TB ' + p.turbIntensity) : null, p.icingIntensity ? ('IC ' + p.icingIntensity) : null].filter(Boolean).join(' ');
                        return (
                            <div key={i} className="font-mono" style={{ background:'var(--md-sys-color-surface-container-highest)', borderRadius:8, padding:12, marginBottom:i<Math.min(pireps.length,8)-1?8:0, borderLeft:'4px solid var(--md-sys-color-primary)', fontSize:12, color:'var(--md-sys-color-on-surface)', lineHeight:1.6 }}>
                                <span style={{ color:'var(--md-sys-color-primary)', fontWeight:700, marginRight:8 }}>{type}</span>
                                {raw || fallback || 'No detail available'}
                            </div>
                        );
                    })}
                </MdCard>
            );
        }

        // ── HazardAdvisories component ───────────────────────────────────────────
        // Shows active SIGMETs, G-AIRMETs, and CWAs along the route corridor
        function HazardAdvisories({ sigmets, gairmets, cwas, loading, onAskAI }) {
            if (loading) return (
                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:'var(--md-sys-color-surface-container)', borderRadius:12, marginBottom:12, fontSize:13, color:'var(--md-sys-color-on-surface-variant)' }}>
                    <MdIcon name="sync" style={{ fontSize:16, animation:'spin 1s linear infinite', flexShrink:0 }} />
                    <span>Fetching SIGMETs, AIRMETs, CWAs…</span>
                </div>
            );
            var items = [];
            sigmets.forEach(function(f) {
                var p = f.properties || {};
                var hz = (p.hazard || '').toUpperCase();
                var icon = hz === 'CONVECTIVE' ? 'thunderstorm' : hz === 'TURB' ? 'air' : hz === 'ICE' ? 'ac_unit' : 'warning';
                var color = hz === 'CONVECTIVE' ? 'var(--md-sys-color-error)' : hz === 'ICE' ? 'var(--cat-mvfr-color)' : 'var(--md-sys-color-warning)';
                var label = 'SIGMET';
                var isConv = hz === 'CONVECTIVE';
                items.push({ icon, color, label: isConv ? 'CONVECTIVE SIGMET' : ('SIGMET · ' + hz), text: p.rawAirSigmet || ('Hazard: ' + hz + (p.severity ? ' SEV:'+p.severity : '')), isConv });
            });
            gairmets.forEach(function(g) {
                var hz = (g.hazard || '').toUpperCase();
                var icon = hz.includes('TURB') ? 'air' : hz.includes('ICE') ? 'ac_unit' : hz.includes('IFR') || hz.includes('MTN') ? 'cloud' : hz.includes('LLWS') ? 'swap_vert' : 'warning';
                var color = hz.includes('TURB') ? 'var(--md-sys-color-warning)' : hz.includes('ICE') ? 'var(--cat-mvfr-color)' : 'var(--md-sys-color-on-surface-variant)';
                var sev = g.severity ? (' · ' + g.severity) : '';
                var alt = (g.base != null && g.top != null) ? (' · ' + (g.base*100) + '-' + (g.top*100) + 'ft') : '';
                items.push({ icon, color, label: 'AIRMET ' + (g.tag||'') + ' · ' + hz + sev, text: 'Valid: ' + (g.validTime||'') + alt });
            });
            cwas.forEach(function(c) {
                var hz = (c.hazard || '').toUpperCase();
                var icon = hz === 'TS' ? 'thunderstorm' : hz === 'TURB' ? 'air' : hz === 'ICE' ? 'ac_unit' : hz === 'IFR' ? 'cloud' : 'warning';
                var color = hz === 'TS' ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-warning)';
                var top = c.top ? (' · Top ' + c.top + 'ft') : '';
                items.push({ icon, color, label: 'CWA · ' + (c.cwsuId||'') + ' · ' + hz + (c.qualifier ? ' ' + c.qualifier : ''), text: (c.rawCWA || ('Hazard: ' + hz)) + top });
            });
            if (items.length === 0) return null;
            return (
                <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, padding:16, marginBottom:16 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                        <MdIcon name="notifications_active" style={{ color:'var(--md-sys-color-error)', fontSize:18 }} />
                        <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-error)', flex:1 }}>
                            Active Hazard Advisories ({items.length})
                        </span>
                        {onAskAI && (
                            <MdButton variant="text" icon="psychology" style={{ padding:'2px 8px', marginRight:-8 }}
                                onClick={() => onAskAI('Explain the pilot impact and required precautions for these active hazard advisories:\n\n' + items.map(function(it) { return '[' + it.label + '] ' + it.text; }).join('\n'))}>
                                Ask AI
                            </MdButton>
                        )}
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                        {items.map(function(item, i) {
                            return (
                                <div key={i} style={{ background: item.isConv ? 'var(--md-sys-color-error-container)' : 'var(--md-sys-color-surface-container-high)', borderRadius:10, padding:'10px 12px', borderLeft:'3px solid '+item.color }}>
                                    <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:4 }}>
                                        <MdIcon name={item.icon} style={{ fontSize:15, color:item.color, flexShrink:0 }} />
                                        <span style={{ fontSize:12, fontWeight:700, color:item.color, textTransform:'uppercase', letterSpacing:'0.4px' }}>{item.label}</span>
                                    </div>
                                    <div className="font-mono" style={{ fontSize:12, color:'var(--md-sys-color-on-surface)', lineHeight:1.5, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{item.text}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── WindsAloftCard component ─────────────────────────────────────────────
        // Shows FD winds & temps aloft at cruise altitude for each route waypoint
        function WindsAloftCard({ allRoutePts, stations, cruiseAlt }) {
            if (!stations || stations.length === 0) return null;
            var alt = cruiseAlt || 6000;
            var rows = allRoutePts.map(function(icao) {
                var apt = getAirport(icao);
                if (!apt) return null;
                var stn = closestWindStation(stations, apt.lat, apt.lon);
                var w = stn ? getWindAtAlt(stn, alt) : null;
                return { icao, apt, w, stnId: stn ? (stn.icaoId || stn.stn || '') : '' };
            }).filter(Boolean);
            if (rows.every(function(r) { return !r.w; })) return null;
            return (
                <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, padding:16, marginBottom:16 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                        <MdIcon name="air" style={{ color:'var(--md-sys-color-secondary)', fontSize:18 }} />
                        <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-secondary)' }}>Winds Aloft</span>
                        <span style={{ fontSize:12, fontWeight:700, background:'var(--md-sys-color-secondary-container)', color:'var(--md-sys-color-on-secondary-container)', borderRadius:4, padding:'2px 6px', letterSpacing:'0.5px' }}>
                            {(alt/1000).toFixed(0)}K FT · FD WINDS
                        </span>
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                        {rows.map(function(r) {
                            return (
                                <div key={r.icao} style={{ display:'grid', gridTemplateColumns:'50px 1fr', gap:'6px 12px', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--md-sys-color-outline-variant)' }}>
                                    <span className="font-mono" style={{ fontWeight:700, fontSize:13 }}>{r.icao}</span>
                                    {r.w ? (
                                        <div className="font-mono" style={{ fontSize:12, color:'var(--md-sys-color-on-surface)' }}>
                                            {r.w.lv ? 'LGT & VRB' : (r.w.wdir + '° @ ' + r.w.wspd + 'kt')}
                                            {r.w.temp != null && <span style={{ marginLeft:10, color:'var(--md-sys-color-on-surface-variant)' }}>{r.w.temp > 0 ? '+' : ''}{r.w.temp}°C</span>}
                                            <span style={{ marginLeft:8, fontSize:12, color:'var(--md-sys-color-on-surface-variant)' }}>(via {r.stnId})</span>
                                        </div>
                                    ) : (
                                        <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)' }}>No FD data</span>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', marginTop:8, lineHeight:1.5 }}>
                        Nearest FD reporting station used per waypoint. Source: AviationWeather.gov /api/data/windtemp.
                    </div>
                </div>
            );
        }

        function CatBadge({ cat }) {
            const lc = cat.toLowerCase();
            /* WCAG AA: icon communicates flight category independent of color */
            const catIcon = { VFR: 'check_circle', MVFR: 'warning', IFR: 'cancel', LIFR: 'dangerous' }[cat] || 'help';
            return (
                <span className="font-mono" style={{
                    display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 10px", borderRadius: "12px",
                    fontSize: "11px", fontWeight: "700",
                    background: `var(--cat-${lc}-bg)`, color: `var(--cat-${lc}-color)`
                }} aria-label={cat + ' conditions'}>
                    <MdIcon name={catIcon} style={{ fontSize: 12, color: `var(--cat-${lc}-color)` }} aria-hidden="true" />
                    {cat}
                </span>
            );
        }

        /* =========================================
           APP COMPONENTS
        ========================================= */

        function GoScoreRing({ score, size = 100 }) {
            var r = (size - 10) / 2;
            var circ = 2 * Math.PI * r;
            var col = getGoColor(score);
            return (
                <div style={{ position: "relative", width: size, height: size }}>
                    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
                        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--md-sys-color-surface-container-highest)" strokeWidth="6" />
                        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={col} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ * (1 - score / 100)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.8s ease-out" }} />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ fontSize: size * 0.3, fontWeight: 700, color: col, lineHeight: 1 }}>{score}</div>
                        <div className="font-mono" style={{ fontSize: size * 0.1, color: "var(--md-sys-color-on-surface-variant)", fontWeight: 600, letterSpacing: "0.05em", marginTop: 2 }}>SCORE</div>
                    </div>
                </div>
            );
        }

        // CartoDB tile URLs — dark and light variants match app themes
        var TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        var TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        var TILE_ATTR  = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

        function RouteMap({ dep, arr, wps }) {
            const { useRef, useEffect, useState } = React;
            const mapContainerRef = useRef(null);
            const leafletMapRef   = useRef(null);
            const tileLayerRef    = useRef(null);
            const overlaysRef     = useRef([]);

            const [isDark, setIsDark] = useState(!document.body.classList.contains('light-theme'));

            var allCodes = [dep].concat(wps || []).concat([arr]).filter(function(c){ return c && c.trim().length === 4; });
            var allPts   = allCodes.map(function(c){ return getAirport(c); }).filter(Boolean);

            var totalDist = 0, heading = 0;
            if (allPts.length >= 2) {
                for (var di = 0; di < allPts.length - 1; di++)
                    totalDist += calcDist(allPts[di].lat, allPts[di].lon, allPts[di+1].lat, allPts[di+1].lon);
                heading = calcBearing(allPts[0].lat, allPts[0].lon, allPts[allPts.length-1].lat, allPts[allPts.length-1].lon);
            }

            // Track light/dark theme changes
            useEffect(function() {
                var obs = new MutationObserver(function(){
                    setIsDark(!document.body.classList.contains('light-theme'));
                });
                obs.observe(document.body, { attributes: true, attributeFilter: ['class'] });
                return function(){ obs.disconnect(); };
            }, []);

            // Swap tile layer when theme changes
            useEffect(function() {
                var L = window.L;
                if (!L || !leafletMapRef.current) return;
                if (tileLayerRef.current) leafletMapRef.current.removeLayer(tileLayerRef.current);
                tileLayerRef.current = L.tileLayer(isDark ? TILE_DARK : TILE_LIGHT,
                    { attribution: TILE_ATTR, subdomains: 'abcd', maxZoom: 19 }
                ).addTo(leafletMapRef.current);
            }, [isDark]);

            // Build map and route overlay
            useEffect(function() {
                var L = window.L;
                if (!L || !mapContainerRef.current) return;

                if (!leafletMapRef.current) {
                    leafletMapRef.current = L.map(mapContainerRef.current, { zoomControl: true });
                    tileLayerRef.current  = L.tileLayer(isDark ? TILE_DARK : TILE_LIGHT,
                        { attribution: TILE_ATTR, subdomains: 'abcd', maxZoom: 19 }
                    ).addTo(leafletMapRef.current);
                }

                var map = leafletMapRef.current;
                overlaysRef.current.forEach(function(l){ map.removeLayer(l); });
                overlaysRef.current = [];

                if (allPts.length < 2) return;

                var latLngs = allPts.map(function(p){ return [p.lat, p.lon]; });

                // Glow halo + solid route line — darker blue on light tiles for contrast
                var lineColor = isDark ? '#0A84FF' : '#0055CC';
                var glow = L.polyline(latLngs, { color: lineColor, weight: 16, opacity: isDark ? 0.18 : 0.35 });
                var line = L.polyline(latLngs, { color: lineColor, weight: 4,  opacity: 0.95 });
                glow.addTo(map); overlaysRef.current.push(glow);
                line.addTo(map); overlaysRef.current.push(line);

                // Markers — aviation-standard colours matching app theme vars
                var _catColors  = { VFR: '#34C759', MVFR: '#0A84FF', IFR: '#FF3B30', LIFR: '#BF5AF2' };
                var _freqLabels = { atis: 'ATIS', twr: 'Tower', gnd: 'Ground', app: 'Approach', dep: 'Departure', clnc: 'Clearance' };
                allPts.forEach(function(p, i) {
                    var isDep = i === 0, isArr = i === allPts.length - 1;
                    var color = isDep ? '#34C759' : isArr ? '#FF3B30' : '#0A84FF';
                    var marker = L.circleMarker([p.lat, p.lon], {
                        radius: isDep || isArr ? 9 : 7,
                        fillColor: color, color: isDark ? '#000' : '#fff',
                        weight: 2, fillOpacity: 1,
                    });
                    marker.addTo(map);
                    marker.bindTooltip(allCodes[i], {
                        permanent: true, direction: 'top', offset: [0, -10],
                        className: 'route-icao-label',
                    });

                    // ── Contextual popup on click ────────────────────────────
                    var icao      = allCodes[i];
                    var roleLabel = isDep ? 'DEPARTURE' : isArr ? 'ARRIVAL' : ('WAYPOINT ' + i);
                    var wxSpanId  = 'rmap-wx-' + icao;
                    var freqRows  = Object.keys(_freqLabels)
                        .filter(function(k) { return p.freq && p.freq[k]; })
                        .map(function(k) {
                            return '<tr>'
                                + '<td style="color:var(--text-secondary);font-size:11px;padding:2px 14px 2px 0;white-space:nowrap;">' + _freqLabels[k] + '</td>'
                                + '<td style="font-size:12px;font-weight:700;font-family:var(--font-mono);white-space:nowrap;">' + p.freq[k] + '</td>'
                                + '</tr>';
                        }).join('');
                    var popupContent =
                        '<div style="padding:14px 16px 12px;min-width:195px;">'
                        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'
                        + '<span style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-secondary);">' + roleLabel + '</span>'
                        + '<span id="' + wxSpanId + '" style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:#555;color:#fff;min-width:36px;text-align:center;">WX\u2026</span>'
                        + '</div>'
                        + '<div style="font-size:18px;font-weight:800;font-family:var(--font-mono);margin-bottom:3px;">' + icao + '</div>'
                        + '<div style="font-size:13px;font-weight:600;margin-bottom:2px;">' + (p.name || '') + '</div>'
                        + '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:' + (freqRows ? '12px' : '2px') + ';">' + (p.city || '') + (p.state ? ', ' + p.state : '') + '</div>'
                        + (freqRows ? '<table style="width:100%;border-collapse:collapse;">' + freqRows + '</table>' : '')
                        + '</div>';
                    marker.bindPopup(
                        L.popup({ maxWidth: 280, minWidth: 200, className: 'route-apt-popup' })
                         .setContent(popupContent)
                    );
                    marker.on('popupopen', function() {
                        fetchLiveMetar(icao).then(function(metar) {
                            var span = document.getElementById(wxSpanId);
                            if (!span) return;
                            var cat = metar ? metar.cat : null;
                            span.textContent = cat || 'N/A';
                            span.style.background = _catColors[cat] || '#666';
                        }).catch(function() {});
                    });

                    overlaysRef.current.push(marker);
                });

                map.fitBounds(latLngs, { padding: [50, 50] });
            }, [dep, arr, JSON.stringify(wps), allPts.length]);

            // Update marker ring stroke when theme changes — polylines are skipped
            // (setStyle on all layers was previously turning polylines white in light mode)
            useEffect(function() {
                overlaysRef.current.forEach(function(l) {
                    if (typeof l.getRadius === 'function') {
                        l.setStyle({ color: isDark ? '#000' : '#fff' });
                    }
                });
            }, [isDark]);

            // Cleanup on unmount
            useEffect(function() {
                return function() {
                    if (leafletMapRef.current) {
                        leafletMapRef.current.remove();
                        leafletMapRef.current = null;
                    }
                };
            }, []);

            var overlayStyle = {
                background: isDark ? 'rgba(10,10,15,0.75)' : 'rgba(255,255,255,0.85)',
                backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
                borderRadius: 10, padding: '6px 12px',
                color: 'var(--text-primary)', border: '1px solid var(--card-border)',
            };

            if (allPts.length < 2) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 360, color: 'var(--text-tertiary)', fontSize: 14 }}>
                        Enter a valid route to view map
                    </div>
                );
            }
            return (
                <div style={{ position: 'relative' }}>
                    <div ref={mapContainerRef} style={{ width: '100%', height: 400 }} />
                    <div className="font-mono" style={{ position: 'absolute', bottom: 40, left: 12, zIndex: 1000, display: 'flex', gap: 8, fontSize: 12, pointerEvents: 'none' }}>
                        <div style={overlayStyle}><span style={{ color: 'var(--text-tertiary)' }}>DIST </span><strong>{Math.round(totalDist)} NM</strong></div>
                        <div style={overlayStyle}><span style={{ color: 'var(--text-tertiary)' }}>HDG </span><strong>{String(Math.round(heading)).padStart(3, '0')}&deg;</strong></div>
                    </div>
                </div>
            );
        }

        // Error Boundary for weather-panel components.
        //
        // React Error Boundaries must be class components.  This one catches render
        // errors thrown by BriefingPanel or ForecastStrip (e.g. when the AWC API
        // returns unexpected JSON that causes a null-dereference or bad array access
        // during rendering) and shows a graceful fallback instead of crashing the
        // whole app.
        //
        // Props:
        //   label   – human-readable name shown in the fallback ("Flight Briefing")
        //   compact – true for inline/strip fallbacks; false (default) for full-card
        //
        // The "Retry" / "Try again" button resets state.error → children re-mount
        // fresh, triggering new API fetches in their useEffect hooks.
        class WxErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { error: null };
            }

            static getDerivedStateFromError(error) {
                return { error };
            }

            componentDidCatch(error, info) {
                console.error('[WxErrorBoundary]', this.props.label,
                              error.message, info.componentStack);
            }

            render() {
                const { error } = this.state;
                if (!error) return this.props.children;

                const { label = 'Weather data', compact = false } = this.props;
                const msg = error.message
                    ? error.message.slice(0, 140)
                    : 'Unexpected data structure';
                const retry = () => this.setState({ error: null });

                if (compact) {
                    return (
                        <div style={{
                            display: 'flex', alignItems: 'center', gap: 10,
                            padding: '10px 16px', borderRadius: 12,
                            background: 'var(--md-sys-color-error-container)',
                            color: 'var(--md-sys-color-on-error-container)',
                            fontSize: 13,
                        }}>
                            <MdIcon name="warning" style={{ fontSize: 18, flexShrink: 0 }} />
                            <span style={{ flex: 1 }}>
                                <strong>{label}</strong> — AWC returned unexpected data.
                            </span>
                            <button onClick={retry} style={{
                                background: 'none',
                                border: '1px solid currentColor',
                                color: 'inherit', cursor: 'pointer',
                                fontSize: 12, fontWeight: 500,
                                padding: '4px 12px', borderRadius: 20,
                                fontFamily: 'inherit',
                            }}>Retry</button>
                        </div>
                    );
                }

                return (
                    <MdCard style={{
                        background: 'var(--md-sys-color-error-container)',
                        color: 'var(--md-sys-color-on-error-container)',
                        padding: '24px',
                    }}>
                        <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
                            <MdIcon name="warning" style={{ fontSize: 32, flexShrink: 0, marginTop: 2 }} />
                            <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>
                                    {label} failed to render
                                </div>
                                <div style={{ fontSize: 14, opacity: 0.85, marginBottom: 16 }}>
                                    The AWC API returned an unexpected JSON structure.
                                    Retry to reload live weather, or the app will fall back
                                    to simulated data.
                                </div>
                                <code style={{
                                    display: 'block',
                                    fontFamily: 'Roboto Mono, monospace', fontSize: 12,
                                    background: 'rgba(0,0,0,0.12)',
                                    padding: '8px 12px', borderRadius: 8, marginBottom: 16,
                                    wordBreak: 'break-all',
                                }}>{msg}</code>
                                <button onClick={retry} style={{
                                    display: 'inline-flex', alignItems: 'center', gap: 8,
                                    background: 'var(--md-sys-color-on-error-container)',
                                    color: 'var(--md-sys-color-error-container)',
                                    border: 'none', cursor: 'pointer',
                                    fontSize: 14, fontWeight: 500,
                                    padding: '10px 24px', borderRadius: 9999,
                                    fontFamily: 'inherit',
                                }}>
                                    <MdIcon name="refresh" style={{ fontSize: 18 }} />
                                    Try again
                                </button>
                            </div>
                        </div>
                    </MdCard>
                );
            }
        }

        function ForecastStrip({ icao, selectedDay, onSelect }) {
            const [forecasts, setForecasts] = useState(null);
            const [isLive, setIsLive] = useState(false);

            useEffect(() => {
                setForecasts(null);
                setIsLive(false);
                var apt = getAirport(icao);
                if (apt) {
                    fetchNwsForecast(apt.lat, apt.lon).then(data => {
                        setForecasts(data || []);
                        if (data) setIsLive(true);
                    }).catch(() => setForecasts([]));
                } else {
                    fetchAirportInfo(icao).then(a => {
                        if (a) {
                            fetchNwsForecast(a.lat, a.lon).then(data => {
                                setForecasts(data || []);
                                if (data) setIsLive(true);
                            }).catch(() => setForecasts([]));
                        } else {
                            setForecasts([]);
                        }
                    }).catch(() => setForecasts([]));
                }
            }, [icao]);

            if (forecasts === null) return (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', color: 'var(--md-sys-color-on-surface-variant)', fontSize: 12 }}>
                    <MdIcon name="sync" style={{ animation: 'spin 1s linear infinite', fontSize: 14 }} />
                    Loading 7-day forecast…
                </div>
            );

            if (forecasts.length === 0) return (
                <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', padding: '8px 0' }}>
                    7-day forecast unavailable for {icao}
                </div>
            );

            return (
                <div>
                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginBottom: 6, display: "flex", alignItems: "center", gap: 4, flexWrap: 'wrap' }}>
                        <MdIcon name="calendar_month" style={{ fontSize: 13 }} />
                        7-Day Forecast
                        <span style={{ color: "var(--md-sys-color-primary)", fontWeight: 700, fontSize: 12, background: "var(--md-sys-color-primary-container)", borderRadius: 4, padding: "1px 5px", marginLeft: 4 }}>NWS LIVE</span>
                        <span style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginLeft: 2 }}>· General area outlook · Trip-specific analysis in Brief tab</span>
                    </div>
                    <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "4px 0", WebkitOverflowScrolling: "touch" }}>
                        {forecasts.map((f, i) => {
                            var selected = selectedDay === i;
                            var lc = f.cat.toLowerCase();
                            return (
                                <button key={i} onClick={() => onSelect(i)} style={{
                                    flex: "0 0 auto", minWidth: 72, padding: "12px 8px", borderRadius: "12px",
                                    border: selected ? `2px solid var(--cat-${lc}-color)` : "2px solid transparent",
                                    background: selected ? `var(--cat-${lc}-bg)` : "var(--md-sys-color-surface-container-high)",
                                    cursor: "pointer", textAlign: "center", transition: "all 0.2s"
                                }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, color: selected ? `var(--cat-${lc}-color)` : "var(--md-sys-color-on-surface)", marginBottom: 2 }}>{f.dayName}</div>
                                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginBottom: 8 }}>{f.dateStr}</div>
                                    <CatBadge cat={f.cat} />
                                    <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface)", marginTop: 8, fontWeight: 500 }}>{f.hi}&deg; <span style={{color: "var(--md-sys-color-on-surface-variant)"}}>{f.lo}&deg;</span></div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function WindyMap({ dep, arr, wps }) {
            var allPts = useMemo(() => [dep, ...(wps || []), arr].map(getAirport).filter(Boolean), [dep, arr, JSON.stringify(wps)]);
            if (allPts.length < 2) return null;
            var midLat = allPts.reduce((s, p) => s + p.lat, 0) / allPts.length;
            var midLon = allPts.reduce((s, p) => s + p.lon, 0) / allPts.length;
            var src = `https://embed.windy.com/embed2.html?lat=${midLat.toFixed(2)}&lon=${midLon.toFixed(2)}&detailLat=${midLat.toFixed(2)}&detailLon=${midLon.toFixed(2)}&zoom=6&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=kt&metricTemp=%C2%B0F&radarRange=-1`;
            return (
                <div style={{ marginTop: 24 }}>
                    <h2 style={{ fontSize: 16, fontWeight: 500, margin: "0 0 12px", color: "var(--md-sys-color-on-surface)", display: "flex", alignItems: "center", gap: 8 }}>
                        <MdIcon name="storm" style={{ color: "var(--md-sys-color-primary)" }} />
                        Live Wind &amp; Weather Radar
                    </h2>
                    <div style={{ borderRadius: "16px", overflow: "hidden", border: "1px solid var(--md-sys-color-outline-variant)" }}>
                        <iframe src={src} style={{ width: "100%", height: "450px", border: "none" }} allowFullScreen title="Windy Weather Radar" />
                    </div>
                </div>
            );
        }

        // Returns the best runway and crosswind component given a metar and airport.
        // Picks the runway end with the smallest crosswind component.
        function getRunwayRecommendation(metar, apt) {
            if (!metar || !apt || !apt.rwy || apt.rwy.length === 0) return null;
            if (metar.wdir == null || !metar.wspd || metar.wspd < 3) return null;
            var windDir = metar.wdir;
            var windSpd = metar.wspd;
            var best = null;
            var bestCross = Infinity;
            apt.rwy.forEach(function(rwyPair) {
                rwyPair.split("/").forEach(function(rwyEnd) {
                    var m = rwyEnd.match(/^(\d+)/);
                    if (!m) return;
                    var rwyHdg = parseInt(m[1]) * 10;
                    var angle = ((windDir - rwyHdg) % 360 + 360) % 360;
                    if (angle > 180) angle -= 360;
                    var rad = angle * Math.PI / 180;
                    var cross = Math.abs(windSpd * Math.sin(rad));
                    var head = windSpd * Math.cos(rad);
                    if (cross < bestCross) {
                        bestCross = cross;
                        best = { rwy: rwyEnd, crosswind: Math.round(cross), headwind: Math.round(head) };
                    }
                });
            });
            return best;
        }

        // ── METAR human-readable decoder helpers ────────────────────────────────
        function _metarCompassDir(deg) {
            var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
            return dirs[Math.round(deg / 22.5) % 16];
        }
        function _decodeMetarWind(metar) {
            if (!metar.wind) return 'N/A';
            var m = metar.wind.match(/^(VRB|\d{3})(\d{2,3})(G(\d{2,3}))?KT$/);
            if (!m) return metar.wind;
            var dir = m[1], spd = parseInt(m[2]), gst = m[4] ? parseInt(m[4]) : null;
            var dirStr = dir === 'VRB' ? 'Variable' : _metarCompassDir(parseInt(dir)) + ' (' + parseInt(dir) + '\u00b0)';
            return dirStr + ' at ' + spd + ' kts' + (gst ? ', gusting ' + gst + ' kts' : '');
        }
        function _decodeMetarVis(vis) {
            if (!vis) return 'N/A';
            if (vis === 'P6SM') return 'Greater than 6 miles';
            var m = vis.match(/^([\d\/ ]+)SM$/);
            if (m) { var v = m[1].trim(); return v + ' statute mile' + (v === '1' ? '' : 's'); }
            return vis;
        }
        function _decodeMetarSkyLayer(layer) {
            var codes = { CLR:'Clear', SKC:'Sky Clear', FEW:'Few Clouds', SCT:'Scattered Clouds', BKN:'Broken Clouds', OVC:'Overcast', VV:'Vertical Visibility' };
            var m = layer.match(/^(CLR|SKC|FEW|SCT|BKN|OVC|VV)(\d{3})?$/);
            if (!m) return layer;
            var name = codes[m[1]] || m[1];
            if (m[2]) { var ft = parseInt(m[2]) * 100; return name + ' at ' + ft.toLocaleString() + ' ft'; }
            return name;
        }
        function _decodeMetarSky(sky) {
            if (!sky) return 'N/A';
            return sky.split(' ').map(_decodeMetarSkyLayer).join(', ');
        }
        function _decodeMetarTemp(temp) {
            if (!temp) return 'N/A';
            var parts = temp.split('/');
            function parseC(s) { var neg = s.startsWith('M'); return neg ? -parseInt(s.slice(1)) : parseInt(s); }
            var tc = parseC(parts[0]), dc = parseC(parts[1] || '0');
            var tf = Math.round(tc * 9 / 5 + 32), df = Math.round(dc * 9 / 5 + 32);
            return tc + '\u00b0C (' + tf + '\u00b0F)\u2002\u00b7\u2002Dewpt ' + dc + '\u00b0C (' + df + '\u00b0F)';
        }
        function _decodeMetarAlt(alt) {
            if (!alt) return 'N/A';
            var m = alt.match(/^A(\d{4})$/);
            if (!m) return alt;
            return (parseInt(m[1]) / 100).toFixed(2) + ' inHg';
        }

                            <MdIcon name="cell_tower" style={{ color: 'var(--md-sys-color-primary)' }} />
                            <span className="font-mono" style={{ fontSize: 18, fontWeight: 700 }}>{icao}</span>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--md-sys-color-on-surface)" }}>{apt.facility || apt.artcc}</div>
                            {apt.facility && <div style={{ fontSize: 12, color: "var(--md-sys-color-on-surface-variant)", marginTop: 1 }}>En Route: {apt.artcc}</div>}
                        </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 24px" }}>
                        {Object.entries(apt.freq).map(([key, val]) => (
                            <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: 'center', borderBottom: '1px solid var(--md-sys-color-outline-variant)', paddingBottom: 4 }}>
                                <span style={{ color: "var(--md-sys-color-on-surface-variant)", fontSize: 13 }}>{labels[key] || key}</span>
                                <span className="font-mono" style={{ color: "var(--md-sys-color-primary)", fontWeight: 600, fontSize: 15 }}>{val}</span>
                            </div>
                        ))}
                    </div>
                </MdCard>
            );
        }

        // Windy.com embedded forecast widget centered on an airport
        function WindyEmbed({ icao, tripTargetUtc }) {
            var apt = getAirport(icao);
            if (!apt) return null;
            var lat = apt.lat.toFixed(3), lon = apt.lon.toFixed(3);
            var windyUrl = [
                `https://embed.windy.com/embed2.html`,
                `?lat=${lat}&lon=${lon}`,
                `&detailLat=${lat}&detailLon=${lon}`,
                `&width=650&height=340&pview=0`,
                `&level=surface&overlay=wind&product=ecmwf`,
                `&menu=&message=true&marker=true&calendar=now`,
                `&type=map&location=coordinates&detail=true`,
                `&metricWind=kt&metricTemp=%C2%B0C&radarRange=-1`
            ].join('');
            var windyFullUrl = `https://www.windy.com/?wind,surface,${lat},${lon},8`;
            return (
                <div>
                    <iframe
                        src={windyUrl}
                        title="Windy.com forecast"
                        style={{ width: '100%', height: 340, border: 'none', borderRadius: 10, display: 'block' }}
                        allow="geolocation"
                        loading="lazy"
                    />
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, flexWrap: 'wrap', gap: 6 }}>
                        <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)' }}>
                            ECMWF model · wind/clouds overlay · centered on <strong>{icao}</strong>
                        </span>
                        <a href={windyFullUrl} target="_blank" rel="noopener noreferrer"
                            style={{ fontSize: 12, fontWeight: 600, color: 'var(--md-sys-color-primary)', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 4 }}>
                            <MdIcon name="open_in_new" style={{ fontSize: 13 }} />
                            Open Windy.com
                        </a>
                    </div>
                </div>
            );
        }

        // Module-level helper — creates a Blob URL and fires a link click.
        // Used by BriefingPanel (print) and DataModal (JSON export/import).
        // opts.download  → download filename (same-tab save)
        // opts.newTab    → open in a new browser tab
        // opts.revokeMs  → ms before revoking (default 0 = immediate after click)
        function triggerBlobLink(blob, opts) {
            opts = opts || {};
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            if (opts.download) a.download = opts.download;
            if (opts.newTab)   { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            var delay = opts.revokeMs != null ? opts.revokeMs : 0;
            if (delay > 0) { setTimeout(function() { URL.revokeObjectURL(url); }, delay); }
            else { URL.revokeObjectURL(url); }
        }

        function BriefingPanel({ trip, onScoreUpdate, onFratUpdate, tab, pendingAiPrompt, onClearPendingPrompt, user }) {
            // --- Auto-briefing state ---
            var [wxData, setWxData] = useState(null);
            var [loadingWx, setLoadingWx] = useState(true);
            // Extended forecast from GFS MOS (>30h trips)
            var [mosData, setMosData] = useState({});   // { ICAO: mosObj }
            var [loadingMos, setLoadingMos] = useState(false);
            // NWS 7-day forecast — fallback for 2-30h trips when the TAF doesn't
            // reach all the way to the departure time (e.g. departure is 22h out
            // but the current TAF was issued ~4h ago and expires in 20h).
            var [nwsData, setNwsData] = useState({});   // { ICAO: nwsDays[] }

            // --- FRAT state ---
            // Each trip's FRAT is saved directly to its own localStorage key so it
            // survives refreshes without depending on the callback/setTrips chain.
            var fratKey = 'flightscore_frat_' + trip.id;
            var [fratAnswers, setFratAnswers] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(fratKey) || 'null');
                    if (s && s.answers) return s.answers;
                } catch(e) {}
                return trip.fratAnswers || {};
            });
            var [fratAutoFilled, setFratAutoFilled] = useState({});   // { V1: pts, V2: pts, V3: pts }
            var [fratSkipped, setFratSkipped] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(fratKey) || 'null');
                    if (s && s.skipped != null) return s.skipped;
                } catch(e) {}
                return trip.fratSkipped || false;
            });
            var [fratExpanded, setFratExpanded]   = useState(false);  // panel open/closed
            var [isIfrRated, setIsIfrRated]        = useState(false);  // IFR-rated pilot toggle

            // Sync FRAT answers + skipped flag to Firestore (Step 1.3)
            // Writes to users/{uid}/frat/{tripId} so FRAT data is available on any device.
            useEffect(function() {
                if (!user) return; // guest mode — localStorage-only is fine
                var { doc: fbDoc, setDoc } = _fbFns();
                var db = _fbDb();
                if (!db) return;
                setDoc(fbDoc(db, 'users', user.uid, 'frat', String(trip.id)), {
                    answers: fratAnswers,
                    skipped: fratSkipped,
                    updatedAt: Date.now()
                }).catch(function(e) { console.warn('[FlightScore] FRAT Firestore write failed:', e); });
            }, [fratAnswers, fratSkipped, user]);

            // --- AI Enhanced section state ---
            var [aiResult, setAiResult] = useState(null);
            var [aiLoading, setAiLoading] = useState(false);
            var [aiError, setAiError] = useState(null);
            var [apiKey, setApiKey] = useState("");
            var [showAI, setShowAI] = useState(false);
            var [aiFeedback, setAiFeedback] = useState(null); // 'up' | 'down'

            // --- Conversational AI Chat ---
            var [chatMessages, setChatMessages] = useState([]);
            var [chatInput, setChatInput] = useState('');
            var [chatLoading, setChatLoading] = useState(false);
            var chatEndRef   = React.useRef(null);
            var chatInputRef = React.useRef(null);

            // Inject a pre-loaded prompt from an external "Ask AI" button
            // (e.g. from WeatherDetail or HazardAdvisories on a different tab)
            React.useEffect(function() {
                if (!pendingAiPrompt) return;
                setShowAI(true);
                setChatInput(pendingAiPrompt);
                if (onClearPendingPrompt) onClearPendingPrompt();
                setTimeout(function() {
                    if (chatInputRef.current) {
                        chatInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        chatInputRef.current.focus();
                    }
                }, 200);
            }, [pendingAiPrompt]);

            // --- Voice output ---
            var [speaking, setSpeaking] = useState(false);

            // --- Advisory data (SIGMETs, G-AIRMETs, CWAs, Winds Aloft) ---
            var [sigmets, setSigmets] = useState([]);
            var [gairmets, setGairmets] = useState([]);
            var [cwas, setCwas] = useState([]);
            var [windsAloft, setWindsAloft] = useState([]);
            var [loadingAdvisory, setLoadingAdvisory] = useState(true);

            var ac = AIRCRAFT.find(a => a.id === trip.aircraft) || AIRCRAFT[0];
            var allRoutePts = useMemo(() =>
                [trip.dep].concat(trip.wps || []).concat([trip.arr]),
                [trip.dep, trip.arr, JSON.stringify(trip.wps)]
            );

            // Trip departure time in UTC, DST-aware via IANA timezone
            var tripTargetUtc = useMemo(() => {
                var apt = getAirport(trip.dep);
                return getTripTargetUtc(trip, apt ? (apt.tz || lonToIanaTz(apt.lon)) : 'America/New_York');
            }, [trip.dep, trip.date, trip.time]);

            // Route distance and ETE (used in trip details card)
            var routeDist = useMemo(() => {
                var d = 0;
                for (var i = 0; i < allRoutePts.length - 1; i++) {
                    var p1 = getAirport(allRoutePts[i]);
                    var p2 = getAirport(allRoutePts[i + 1]);
                    if (p1 && p2) d += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                }
                return Math.round(d);
            }, [allRoutePts]);

            var eteStr = useMemo(() => {
                if (!routeDist || !ac || !ac.kts) return '--';
                var h = routeDist / ac.kts;
                return Math.floor(h) + 'h ' + Math.round((h % 1) * 60) + 'm';
            }, [routeDist, ac]);

            // Hours from now until departure (negative = past/now)
            var hoursUntilTrip = useMemo(() => {
                if (!tripTargetUtc) return null;
                return (tripTargetUtc.getTime() - Date.now()) / 3600000;
            }, [tripTargetUtc]);

            // Auto-fetch weather for all waypoints on mount
            useEffect(() => {
                setLoadingWx(true);
                setWxData(null);
                Promise.all(allRoutePts.map(async icao => {
                    var [m, t] = await Promise.all([fetchLiveMetar(icao), fetchLiveTaf(icao)]).catch(() => [null, null]);
                    // If no live METAR (airport has no ASOS/AWOS), fall back to simulated weather
                    // so the briefing panel has something to display and analyze
                    var metarLive = !!m;
                    var metar = m || makeMetar(icao);
                    return { icao, metar, taf: t, metarLive };
                })).then(data => { setWxData(data); setLoadingWx(false); })
                  .catch(() => setLoadingWx(false));
            }, [allRoutePts.join(',')]);

            // MOS fetch disabled — within 30h TAF/METAR is used; beyond 30h NWS 7-day is used.
            useEffect(() => { setMosData({}); setLoadingMos(false); }, []);

            // Fetch NWS 7-day forecast — used as fallback when the TAF doesn't
            // cover the departure time, mirroring fetchEffectiveWxForTrip's logic.
            useEffect(() => {
                setNwsData({});
                Promise.all(allRoutePts.map(async icao => {
                    var a = await resolveAptCoords(icao).catch(() => null);
                    if (!a) return [icao, null];
                    var nws = await fetchNwsForecast(a.lat, a.lon).catch(() => null);
                    return [icao, nws];
                })).then(entries => {
                    var result = {};
                    entries.forEach(([icao, nws]) => { if (nws) result[icao] = nws; });
                    setNwsData(result);
                }).catch(() => setNwsData({}));
            }, [allRoutePts.join(',')]);

            // Fetch SIGMETs, G-AIRMETs, CWAs, and Winds Aloft once on mount
            useEffect(() => {
                setLoadingAdvisory(true);
                var aptPts = allRoutePts.map(getAirport).filter(Boolean);
                var bb = aptPts.length ? routeBboxFromPts(aptPts, 3) : null;
                // Pick wind region from midpoint longitude
                var midLon = aptPts.length ? aptPts.reduce(function(s,a){return s+a.lon;},0)/aptPts.length : -90;
                var region = windRegionForLon(midLon);
                Promise.all([fetchSigmets(), fetchGairmets(), fetchCwas(), fetchWindsAloft(region)])
                    .then(function(results) {
                        var rawSig = results[0], rawG = results[1], rawC = results[2], rawW = results[3];
                        if (bb) {
                            setSigmets(rawSig.filter(function(f) {
                                return f.geometry && geojsonPolyInBbox(f.geometry.coordinates, bb);
                            }));
                            setGairmets(rawG.filter(function(g) { return latLonPolyInBbox(g.area, bb); }));
                            setCwas(rawC.filter(function(c) { return cwaPolyInBbox(c.polygon, bb); }));
                        } else {
                            setSigmets(rawSig);
                            setGairmets(rawG);
                            setCwas(rawC);
                        }
                        setWindsAloft(rawW);
                        setLoadingAdvisory(false);
                    }).catch(function() { setLoadingAdvisory(false); });
            }, [allRoutePts.join(',')]);

            // Effective weather per station resolved to the trip departure time:
            //   • METAR  — trip is now/within 2 h, or within 30 h with no TAF available
            //   • TAF    — trip is 2–30 h away; extract the forecast period at departure
            //   • NWS    — trip is >30 h away; use NWS 7-day forecast for the trip date
            var effectiveWxData = useMemo(() => {
                if (!wxData) return null;
                var hh = tripTargetUtc ? String(tripTargetUtc.getUTCHours()).padStart(2, '0') : '';
                var mm = tripTargetUtc ? String(tripTargetUtc.getUTCMinutes()).padStart(2, '0') : '';
                return wxData.map(w => {
                    var simSuffix = w.metarLive ? '' : ' (sim)';
                    if (hoursUntilTrip !== null && hoursUntilTrip > 2 && tripTargetUtc) {
                        if (hoursUntilTrip > 30) {
                            // Extended range (>30 h) — NWS 7-day forecast; METAR fallback.
                            var nwsFb = nwsData[w.icao];
                            if (nwsFb) {
                                var nwsFbWx = nwsDayToEffectiveWx(pickNwsDay(nwsFb, tripTargetUtc), w.icao);
                                if (nwsFbWx) return { ...w, effectiveWx: nwsFbWx, source: 'nws', sourceLabel: 'NWS 7-Day' };
                            }
                            return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR (no fcst)' + simSuffix };
                        }
                        // 2–30 h: TAF at departure time; METAR fallback.
                        if (w.taf) {
                            var tafWx = parseTafForTime(w.taf, tripTargetUtc);
                            if (tafWx) {
                                var tafLbl = w.taf._nearbyStation
                                    ? `TAF ${w.taf._nearbyStation} ${hh}${mm}Z`
                                    : `TAF ${hh}${mm}Z`;
                                return { ...w, effectiveWx: tafWx, source: 'taf', sourceLabel: tafLbl };
                            }
                        }
                        return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR (no TAF)' + simSuffix };
                    }
                    // Trip is current/imminent — live METAR is the best data
                    return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR' + simSuffix };
                });
            }, [wxData, nwsData, tripTargetUtc, hoursUntilTrip]);

            // --- Helpers ---
            function parseCeiling(sky) {
                if (!sky) return null;
                var min = Infinity;
                sky.split(' ').forEach(p => {
                    var m = p.match(/^(BKN|OVC)(\d{3})/);
                    if (m) min = Math.min(min, parseInt(m[2]) * 100);
                });
                return min === Infinity ? null : min;
            }
            function parseGust(windStr) {
                var m = windStr ? windStr.match(/G(\d+)KT/) : null;
                return m ? parseInt(m[1]) : null;
            }
            function parseTempC(tempStr) {
                if (!tempStr) return null;
                var m = tempStr.match(/^(M?)(\d+)\//);
                if (!m) return null;
                return m[1] === 'M' ? -parseInt(m[2]) : parseInt(m[2]);
            }
            function catColor(cat) {
                return { VFR: 'var(--cat-vfr-color)', MVFR: 'var(--cat-mvfr-color)', IFR: 'var(--cat-ifr-color)', LIFR: 'var(--cat-lifr-color)' }[cat] || 'var(--md-sys-color-on-surface-variant)';
            }

            // --- Auto analysis (time-aware: METAR/TAF ≤30h, NWS 7-day >30h) ---
            var analysis = useMemo(() => {
                if (!effectiveWxData) return null;

                var isFutureFlight = hoursUntilTrip !== null && hoursUntilTrip > 2;
                var anyTaf = effectiveWxData.some(e => e.source === 'taf');
                var anyMos = false; // MOS removed — TAF/METAR used within 30h, NWS beyond
                var anyNws = effectiveWxData.some(e => e.source === 'nws');
                var allMos  = false;
                var anySim  = effectiveWxData.some(e => !e.metarLive);
                var depUtcLabel = tripTargetUtc
                    ? `${String(tripTargetUtc.getUTCHours()).padStart(2,'0')}${String(tripTargetUtc.getUTCMinutes()).padStart(2,'0')}Z ${trip.date}`
                    : trip.date;

                // Build a human-readable description of the data sources used
                var dataContext = anyTaf   ? `TAF forecast · ${depUtcLabel}`
                    : anyNws   ? `NWS 7-day forecast · ${depUtcLabel}`
                    : isFutureFlight ? `current METAR (no forecast available · ${depUtcLabel})`
                    : anySim ? 'current METAR (⚠ some stations simulated — no live ASOS/AWOS)'
                    : 'current METAR';

                var cats = effectiveWxData.filter(e => e.effectiveWx).map(e => e.effectiveWx.cat);
                var hasLIFR = cats.some(c => c === 'LIFR');
                var hasIFR  = cats.some(c => c === 'IFR');
                var hasMVFR = cats.some(c => c === 'MVFR');

                // Source qualifier for verdict text
                var srcQual = anyTaf ? 'TAF forecasts'
                    : anyNws ? 'NWS forecast shows'
                    : isFutureFlight ? 'METAR shows'
                    : 'METAR reports';

                var verdict, verdictColor, verdictBg, verdictIcon, verdictDesc;
                if (hasLIFR) {
                    verdict = 'NO-GO'; verdictColor = 'var(--nogo)'; verdictBg = 'var(--nogo-bg)';
                    verdictIcon = 'cancel';
                    verdictDesc = `${srcQual} LIFR at one or more stations (${dataContext}) — flight not recommended.`;
                } else if (hasIFR) {
                    verdict = 'NO-GO'; verdictColor = 'var(--nogo)'; verdictBg = 'var(--nogo-bg)';
                    verdictIcon = 'cancel';
                    verdictDesc = `${srcQual} IFR conditions en route (${dataContext}) — instrument currency required.`;
                } else if (hasMVFR) {
                    verdict = 'CAUTION'; verdictColor = 'var(--caution)'; verdictBg = 'var(--caution-bg)';
                    verdictIcon = 'warning';
                    verdictDesc = `${srcQual} Marginal VFR along the route (${dataContext}) — monitor closely before departure.`;
                } else {
                    verdict = 'GO'; verdictColor = 'var(--go)'; verdictBg = 'var(--go-bg)';
                    verdictIcon = 'check_circle';
                    verdictDesc = `${srcQual} VFR at all stations (${dataContext}) — conditions appear favorable.`;
                }

                var concerns = [];

                // ── MOS/NWS/forecast coverage warnings ──────────────────────────────
                if (isFutureFlight) {
                    effectiveWxData.forEach(e => {
                        if (e.source === 'metar' && hoursUntilTrip > 30) {
                            concerns.push({ level: 'medium', icon: 'update', text: `${e.icao}: No forecast model available — showing current METAR only. Flight category may not reflect actual departure-day conditions.` });
                        }
                        // "No TAF" is already shown in the weather source label — omit from Key Concerns
                    });
                }
                // ── NWS 7-day accuracy disclaimer (shown whenever NWS drives any station) ──
                if (anyNws) {
                    concerns.push({ level: 'medium', icon: 'calendar_today', text: `Note: Flight category is based on the NWS 7-day forecast (trip is >30h out). This is a general area outlook — no ceiling or visibility detail is available at this range. Re-assess with TAF and METAR within 24–30 h of departure for an accurate flight score.` });
                }

                // ── Simulated-data warning (no ASOS/AWOS at airport) ────────────────
                effectiveWxData.forEach(e => {
                    if (!e.metarLive) {
                        concerns.push({ level: 'medium', icon: 'sensors_off', text: `${e.icao}: No live weather station — conditions are estimated. Call FSS or check 1800wxbrief.com before departure.` });
                    }
                });

                // ── Per-station weather concerns ─────────────────────────────────────
                effectiveWxData.forEach(e => {
                    var src = e.source === 'mos' ? 'GFS' : e.source === 'taf' ? 'TAF' : e.source === 'nws' ? 'NWS' : 'METAR';
                    if (!e.effectiveWx) {
                        concerns.push({ level: 'medium', icon: 'cloud_off', text: `${e.icao}: No weather data available — verify conditions before flight` });
                        return;
                    }
                    var m = e.effectiveWx;

                    // NWS 7-day specific concerns — use shortForecast text for context
                    if (e.source === 'nws' && m.shortForecast) {
                        var sfx = m.shortForecast;
                        if (/thunder|storm/i.test(sfx)) {
                            concerns.push({ level: 'high', icon: 'thunderstorm', text: `${e.icao}: NWS forecast: "${sfx}" — thunderstorm activity possible. Check convective SIGMETs before departure.` });
                        } else if (/fog|freezing/i.test(sfx)) {
                            concerns.push({ level: 'high', icon: 'visibility_off', text: `${e.icao}: NWS forecast: "${sfx}" — fog or freezing precipitation possible. Verify conditions 2–4 h before departure.` });
                        } else if (/rain|snow|shower|drizzle/i.test(sfx)) {
                            concerns.push({ level: 'medium', icon: 'water_drop', text: `${e.icao}: NWS forecast: "${sfx}" — expect precipitation at or near departure time.` });
                        } else if (/cloud|overcast/i.test(sfx)) {
                            concerns.push({ level: 'medium', icon: 'cloud', text: `${e.icao}: NWS forecast: "${sfx}" — overcast or cloudy conditions expected.` });
                        }
                    }

                    // MOS-specific probabilistic concerns
                    if (e.source === 'mos') {
                        var t06 = m.t06 || 0, p06 = m.p06 || 0;
                        if (t06 >= 20) concerns.push({ level: t06 >= 40 ? 'high' : 'medium', icon: 'thunderstorm', text: `${e.icao}: GFS model shows ${t06}% thunderstorm probability at departure time` });
                        if (p06 >= 40) concerns.push({ level: p06 >= 70 ? 'high' : 'medium', icon: 'water_drop', text: `${e.icao}: GFS model shows ${p06}% precipitation probability at departure time` });
                        var obvLabels = { F: 'fog', PF: 'patchy fog', BS: 'blowing snow', BD: 'blowing dust', HZ: 'haze', K: 'smoke' };
                        if (m.obv && m.obv !== 'N' && obvLabels[m.obv]) {
                            concerns.push({ level: 'medium', icon: 'visibility', text: `${e.icao}: GFS model forecasts ${obvLabels[m.obv]} (${m.obv}) — expect reduced visibility` });
                        }
                    }

                    // TS/CB (METAR and TAF)
                    if (e.source !== 'mos' && ((m.raw || '').includes(' TS') || m.sky.includes('CB') || (e.taf && (e.taf.rawTAF || '').includes(' TS')))) {
                        concerns.push({ level: 'high', icon: 'thunderstorm', text: `${e.icao}: ${src} indicates thunderstorm activity — check convective SIGMETs` });
                    }

                    // Ceiling
                    var ceiling = parseCeiling(m.sky);
                    if (ceiling !== null && ceiling < 1000) {
                        concerns.push({ level: 'high', icon: 'cloud', text: `${e.icao}: ${src} ceiling ${ceiling}ft — IFR conditions forecast (${m.sky})` });
                    } else if (ceiling !== null && ceiling < 3000) {
                        concerns.push({ level: 'medium', icon: 'cloud', text: `${e.icao}: ${src} ceiling ${ceiling}ft — MVFR, monitor for deterioration` });
                    }

                    // Visibility
                    if (!m.vis.includes('P6') && !m.vis.startsWith('10')) {
                        var visNum = parseFloat(m.vis) || 10;
                        if (visNum < 1) concerns.push({ level: 'high', icon: 'visibility_off', text: `${e.icao}: ${src} visibility ${m.vis} — very low, LIFR/IFR conditions` });
                        else if (visNum < 3) concerns.push({ level: 'medium', icon: 'visibility', text: `${e.icao}: ${src} visibility ${m.vis} — reduced` });
                    }

                    // Wind
                    var gust = parseGust(m.wind);
                    if (m.wspd > 20 || (gust && gust > 25)) {
                        concerns.push({ level: 'high', icon: 'air', text: `${e.icao}: ${src} strong winds ${m.wind}` });
                    } else if (m.wspd > 15 || (gust && gust > 20)) {
                        concerns.push({ level: 'medium', icon: 'air', text: `${e.icao}: ${src} gusty conditions ${m.wind}` });
                    }
