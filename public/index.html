        // Module-level helper — creates a Blob URL and fires a link click.
        // Used by BriefingPanel (print) and DataModal (JSON export/import).
        // opts.download  → download filename (same-tab save)
        // opts.newTab    → open in a new browser tab
        // opts.revokeMs  → ms before revoking (default 0 = immediate after click)
        function triggerBlobLink(blob, opts) {
            opts = opts || {};
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            if (opts.download) a.download = opts.download;
            if (opts.newTab)   { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            var delay = opts.revokeMs != null ? opts.revokeMs : 0;
            if (delay > 0) { setTimeout(function() { URL.revokeObjectURL(url); }, delay); }
            else { URL.revokeObjectURL(url); }
        }

        function BriefingPanel({ trip, onScoreUpdate, onFratUpdate, tab, pendingAiPrompt, onClearPendingPrompt, user, personalMinimums }) {
            // --- Auto-briefing state ---
            var [wxData, setWxData] = useState(null);
            var [loadingWx, setLoadingWx] = useState(true);
            // Extended forecast from GFS MOS (>30h trips)
            var [mosData, setMosData] = useState({});   // { ICAO: mosObj }
            var [loadingMos, setLoadingMos] = useState(false);
            // NWS 7-day forecast — fallback for 2-30h trips when the TAF doesn't
            // reach all the way to the departure time (e.g. departure is 22h out
            // but the current TAF was issued ~4h ago and expires in 20h).
            var [nwsData, setNwsData] = useState({});   // { ICAO: nwsDays[] }

            // --- FRAT state ---
            // Each trip's FRAT is saved directly to its own localStorage key so it
            // survives refreshes without depending on the callback/setTrips chain.
            var fratKey = 'flightscore_frat_' + trip.id;
            var [fratAnswers, setFratAnswers] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(fratKey) || 'null');
                    if (s && s.answers) return s.answers;
                } catch(e) {}
                return trip.fratAnswers || {};
            });
            var [fratAutoFilled, setFratAutoFilled] = useState({});   // { V1: pts, V2: pts, V3: pts }
            var [fratSkipped, setFratSkipped] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(fratKey) || 'null');
                    if (s && s.skipped != null) return s.skipped;
                } catch(e) {}
                return trip.fratSkipped || false;
            });
            var [fratExpanded, setFratExpanded]   = useState(false);  // panel open/closed
            var [isIfrRated, setIsIfrRated]        = useState(false);  // IFR-rated pilot toggle

            // Sync FRAT answers + skipped flag to Firestore (Step 1.3)
            // Writes to users/{uid}/frat/{tripId} so FRAT data is available on any device.
            useEffect(function() {
                if (!user) return; // guest mode — localStorage-only is fine
                var { doc: fbDoc, setDoc } = _fbFns();
                var db = _fbDb();
                if (!db) return;
                setDoc(fbDoc(db, 'users', user.uid, 'frat', String(trip.id)), {
                    answers: fratAnswers,
                    skipped: fratSkipped,
                    updatedAt: Date.now()
                }).catch(function(e) { console.warn('[FlightScore] FRAT Firestore write failed:', e); });
            }, [fratAnswers, fratSkipped, user]);

            // --- AI Enhanced section state ---
            var briefingKey = 'skyview_ai_briefing_' + trip.id;
            var [aiResult, setAiResult] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(briefingKey) || 'null');
                    return s && s.result ? s.result : null;
                } catch(e) { return null; }
            });
            var [aiSavedAt, setAiSavedAt] = useState(function() {
                try {
                    var s = JSON.parse(localStorage.getItem(briefingKey) || 'null');
                    return s && s.savedAt ? s.savedAt : null;
                } catch(e) { return null; }
            });
            var [aiLoading, setAiLoading] = useState(false);
            var [aiError, setAiError] = useState(null);
            var [showAI, setShowAI] = useState(true);
            var [aiFeedback, setAiFeedback] = useState(null); // 'up' | 'down'

            // --- Conversational AI Chat ---
            var [chatMessages, setChatMessages] = useState([]);
            var [chatInput, setChatInput] = useState('');
            var [chatLoading, setChatLoading] = useState(false);
            var chatEndRef   = React.useRef(null);
            var chatInputRef = React.useRef(null);

            // Inject a pre-loaded prompt from an external "Ask AI" button
            // (e.g. from WeatherDetail or HazardAdvisories on a different tab)
            React.useEffect(function() {
                if (!pendingAiPrompt) return;
                setShowAI(true);
                setChatInput(pendingAiPrompt);
                if (onClearPendingPrompt) onClearPendingPrompt();
                setTimeout(function() {
                    if (chatInputRef.current) {
                        chatInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        chatInputRef.current.focus();
                    }
                }, 200);
            }, [pendingAiPrompt]);

            // Persist AI briefing to localStorage whenever it's updated
            useEffect(function() {
                if (!aiResult) return;
                var savedAt = Date.now();
                try {
                    localStorage.setItem(briefingKey, JSON.stringify({ result: aiResult, savedAt: savedAt }));
                    setAiSavedAt(savedAt);
                } catch(e) {}
            }, [aiResult]);

            // Reload AI briefing from localStorage when switching trips
            useEffect(function() {
                try {
                    var s = JSON.parse(localStorage.getItem('skyview_ai_briefing_' + trip.id) || 'null');
                    setAiResult(s && s.result ? s.result : null);
                    setAiSavedAt(s && s.savedAt ? s.savedAt : null);
                } catch(e) {
                    setAiResult(null);
                    setAiSavedAt(null);
                }
                setAiError(null);
                setAiFeedback(null);
            }, [trip.id]);

            // --- Voice output ---
            var [speaking, setSpeaking] = useState(false);

            // --- Advisory data (SIGMETs, G-AIRMETs, CWAs, Winds Aloft) ---
            var [sigmets, setSigmets] = useState([]);
            var [gairmets, setGairmets] = useState([]);
            var [cwas, setCwas] = useState([]);
            var [windsAloft, setWindsAloft] = useState([]);
            var [loadingAdvisory, setLoadingAdvisory] = useState(true);

            // NOTAMs per airport — fetched for all route airports on mount/trip change.
            // Available in the export tab for the NOTAMs & TFRs section.
            var [notamsByAirport, setNotamsByAirport] = useState({});
            var [notamsLoaded, setNotamsLoaded] = useState(false);
            useEffect(function() {
                setNotamsLoaded(false);
                var pts = [trip.dep].concat(trip.wps || []).concat([trip.arr]).filter(Boolean);
                Promise.all(pts.map(function(icao) {
                    return fetchLiveNotams(icao)
                        .then(function(data) { return { icao: icao, data: data || [] }; })
                        .catch(function() { return { icao: icao, data: [] }; });
                })).then(function(results) {
                    var byApt = {};
                    results.forEach(function(r) { byApt[r.icao] = r.data; });
                    setNotamsByAirport(byApt);
                    setNotamsLoaded(true);
                });
            }, [trip.id]);

            var ac = AIRCRAFT.find(a => a.id === trip.aircraft) || AIRCRAFT[0];
            var allRoutePts = useMemo(() =>
                [trip.dep].concat(trip.wps || []).concat([trip.arr]),
                [trip.dep, trip.arr, JSON.stringify(trip.wps)]
            );

            // Trip departure time in UTC, DST-aware via IANA timezone
            var tripTargetUtc = useMemo(() => {
                var apt = getAirport(trip.dep);
                return getTripTargetUtc(trip, apt ? (apt.tz || lonToIanaTz(apt.lon)) : 'America/New_York');
            }, [trip.dep, trip.date, trip.time]);

            // Route distance and ETE (used in trip details card)
            var routeDist = useMemo(() => {
                var d = 0;
                for (var i = 0; i < allRoutePts.length - 1; i++) {
                    var p1 = getAirport(allRoutePts[i]);
                    var p2 = getAirport(allRoutePts[i + 1]);
                    if (p1 && p2) d += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                }
                return Math.round(d);
            }, [allRoutePts]);

            var eteStr = useMemo(() => {
                if (!routeDist || !ac || !ac.kts) return '--';
                var h = routeDist / ac.kts;
                return Math.floor(h) + 'h ' + Math.round((h % 1) * 60) + 'm';
            }, [routeDist, ac]);

            // Hours from now until departure (negative = past/now)
            var hoursUntilTrip = useMemo(() => {
                if (!tripTargetUtc) return null;
                return (tripTargetUtc.getTime() - Date.now()) / 3600000;
            }, [tripTargetUtc]);

            // Auto-fetch weather for all waypoints on mount
            useEffect(() => {
                setLoadingWx(true);
                setWxData(null);
                Promise.all(allRoutePts.map(async icao => {
                    var [m, t] = await Promise.all([fetchLiveMetar(icao), fetchLiveTaf(icao)]).catch(() => [null, null]);
                    // If no live METAR (airport has no ASOS/AWOS), fall back to simulated weather
                    // so the briefing panel has something to display and analyze
                    var metarLive = !!m;
                    var metar = m || makeMetar(icao);
                    return { icao, metar, taf: t, metarLive };
                })).then(data => { setWxData(data); setLoadingWx(false); })
                  .catch(() => setLoadingWx(false));
            }, [allRoutePts.join(',')]);

            // MOS fetch disabled — within 30h TAF/METAR is used; beyond 30h NWS 7-day is used.
            useEffect(() => { setMosData({}); setLoadingMos(false); }, []);

            // Fetch NWS 7-day forecast — used as fallback when the TAF doesn't
            // cover the departure time, mirroring fetchEffectiveWxForTrip's logic.
            useEffect(() => {
                setNwsData({});
                Promise.all(allRoutePts.map(async icao => {
                    var a = await resolveAptCoords(icao).catch(() => null);
                    if (!a) return [icao, null];
                    var nws = await fetchNwsForecast(a.lat, a.lon).catch(() => null);
                    return [icao, nws];
                })).then(entries => {
                    var result = {};
                    entries.forEach(([icao, nws]) => { if (nws) result[icao] = nws; });
                    setNwsData(result);
                }).catch(() => setNwsData({}));
            }, [allRoutePts.join(',')]);

            // Fetch SIGMETs, G-AIRMETs, CWAs, and Winds Aloft once on mount
            useEffect(() => {
                setLoadingAdvisory(true);
                var aptPts = allRoutePts.map(getAirport).filter(Boolean);
                var bb = aptPts.length ? routeBboxFromPts(aptPts, 3) : null;
                // Pick wind region from midpoint longitude
                var midLon = aptPts.length ? aptPts.reduce(function(s,a){return s+a.lon;},0)/aptPts.length : -90;
                var region = windRegionForLon(midLon);
                Promise.all([fetchSigmets(), fetchGairmets(), fetchCwas(), fetchWindsAloft(region)])
                    .then(function(results) {
                        var rawSig = results[0], rawG = results[1], rawC = results[2], rawW = results[3];
                        if (bb) {
                            setSigmets(rawSig.filter(function(f) {
                                return f.geometry && geojsonPolyInBbox(f.geometry.coordinates, bb);
                            }));
                            setGairmets(rawG.filter(function(g) { return latLonPolyInBbox(g.area, bb); }));
                            setCwas(rawC.filter(function(c) { return cwaPolyInBbox(c.polygon, bb); }));
                        } else {
                            setSigmets(rawSig);
                            setGairmets(rawG);
                            setCwas(rawC);
                        }
                        setWindsAloft(rawW);
                        setLoadingAdvisory(false);
                    }).catch(function() { setLoadingAdvisory(false); });
            }, [allRoutePts.join(',')]);

            // Effective weather per station resolved to the trip departure time:
            //   • METAR  — trip is now/within 2 h, or within 30 h with no TAF available
            //   • TAF    — trip is 2–30 h away; extract the forecast period at departure
            //   • NWS    — trip is >30 h away; use NWS 7-day forecast for the trip date
            var effectiveWxData = useMemo(() => {
                if (!wxData) return null;
                var hh = tripTargetUtc ? String(tripTargetUtc.getUTCHours()).padStart(2, '0') : '';
                var mm = tripTargetUtc ? String(tripTargetUtc.getUTCMinutes()).padStart(2, '0') : '';
                return wxData.map(w => {
                    var simSuffix = w.metarLive ? '' : ' (sim)';
                    if (hoursUntilTrip !== null && hoursUntilTrip > 2 && tripTargetUtc) {
                        if (hoursUntilTrip > 30) {
                            // Extended range (>30 h) — NWS 7-day forecast; METAR fallback.
                            var nwsFb = nwsData[w.icao];
                            if (nwsFb) {
                                var nwsFbWx = nwsDayToEffectiveWx(pickNwsDay(nwsFb, tripTargetUtc), w.icao);
                                if (nwsFbWx) return { ...w, effectiveWx: nwsFbWx, source: 'nws', sourceLabel: 'NWS 7-Day' };
                            }
                            return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR (no fcst)' + simSuffix };
                        }
                        // 2–30 h: TAF at departure time; NWS Grid fallback; METAR last resort.
                        if (w.taf) {
                            var tafWx = parseTafForTime(w.taf, tripTargetUtc);
                            if (tafWx) {
                                var tafLbl = w.taf._nearbyStation
                                    ? `TAF ${w.taf._nearbyStation} ${hh}${mm}Z`
                                    : `TAF ${hh}${mm}Z`;
                                return { ...w, effectiveWx: tafWx, source: 'taf', sourceLabel: tafLbl };
                            }
                        }
                        var nwsNear = nwsData[w.icao];
                        if (nwsNear) {
                            var nwsNearWx = nwsDayToEffectiveWx(pickNwsDay(nwsNear, tripTargetUtc), w.icao);
                            if (nwsNearWx) return { ...w, effectiveWx: nwsNearWx, source: 'nws', sourceLabel: 'NWS Grid' };
                        }
                        return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR (no TAF)' + simSuffix };
                    }
                    // Trip is current/imminent — live METAR is the best data
                    return { ...w, effectiveWx: w.metar, source: 'metar', sourceLabel: 'METAR' + simSuffix };
                });
            }, [wxData, nwsData, tripTargetUtc, hoursUntilTrip]);

            // --- Helpers ---
            function parseCeiling(sky) {
                if (!sky) return null;
                var min = Infinity;
                sky.split(' ').forEach(p => {
                    var m = p.match(/^(BKN|OVC)(\d{3})/);
                    if (m) min = Math.min(min, parseInt(m[2]) * 100);
                });
                return min === Infinity ? null : min;
            }
            function parseGust(windStr) {
                var m = windStr ? windStr.match(/G(\d+)KT/) : null;
                return m ? parseInt(m[1]) : null;
            }
            function parseTempC(tempStr) {
                if (!tempStr) return null;
                var m = tempStr.match(/^(M?)(\d+)\//);
                if (!m) return null;
                return m[1] === 'M' ? -parseInt(m[2]) : parseInt(m[2]);
            }
            function catColor(cat) {
                return { VFR: 'var(--cat-vfr-color)', MVFR: 'var(--cat-mvfr-color)', IFR: 'var(--cat-ifr-color)', LIFR: 'var(--cat-lifr-color)' }[cat] || 'var(--md-sys-color-on-surface-variant)';
            }

            // --- Auto analysis (time-aware: METAR/TAF ≤30h, NWS 7-day >30h) ---
            var analysis = useMemo(() => {
                if (!effectiveWxData) return null;

                var isFutureFlight = hoursUntilTrip !== null && hoursUntilTrip > 2;
                var anyTaf = effectiveWxData.some(e => e.source === 'taf');
                var anyMos = false; // MOS removed — TAF/METAR used within 30h, NWS beyond
                var anyNws = effectiveWxData.some(e => e.source === 'nws');
                var allMos  = false;
                var anySim  = effectiveWxData.some(e => !e.metarLive);
                var depUtcLabel = tripTargetUtc
                    ? `${String(tripTargetUtc.getUTCHours()).padStart(2,'0')}${String(tripTargetUtc.getUTCMinutes()).padStart(2,'0')}Z ${trip.date}`
                    : trip.date;

                // Build a human-readable description of the data sources used
                var dataContext = anyTaf   ? `TAF forecast · ${depUtcLabel}`
                    : anyNws   ? `NWS 7-day forecast · ${depUtcLabel}`
                    : isFutureFlight ? `current METAR (no forecast available · ${depUtcLabel})`
                    : anySim ? 'current METAR (⚠ some stations simulated — no live ASOS/AWOS)'
                    : 'current METAR';

                var cats = effectiveWxData.filter(e => e.effectiveWx).map(e => e.effectiveWx.cat);
                var hasLIFR = cats.some(c => c === 'LIFR');
                var hasIFR  = cats.some(c => c === 'IFR');
                var hasMVFR = cats.some(c => c === 'MVFR');

                // Source qualifier for verdict text
                var srcQual = anyTaf ? 'TAF forecasts'
                    : anyNws ? 'NWS forecast shows'
                    : isFutureFlight ? 'METAR shows'
                    : 'METAR reports';

                var verdict, verdictColor, verdictBg, verdictIcon, verdictDesc;
                if (hasLIFR) {
                    verdict = 'NO-GO'; verdictColor = 'var(--nogo)'; verdictBg = 'var(--nogo-bg)';
                    verdictIcon = 'cancel';
                    verdictDesc = `${srcQual} LIFR at one or more stations (${dataContext}) — flight not recommended.`;
                } else if (hasIFR) {
                    verdict = 'NO-GO'; verdictColor = 'var(--nogo)'; verdictBg = 'var(--nogo-bg)';
                    verdictIcon = 'cancel';
                    verdictDesc = `${srcQual} IFR conditions en route (${dataContext}) — instrument currency required.`;
                } else if (hasMVFR) {
                    verdict = 'CAUTION'; verdictColor = 'var(--caution)'; verdictBg = 'var(--caution-bg)';
                    verdictIcon = 'warning';
                    verdictDesc = `${srcQual} Marginal VFR along the route (${dataContext}) — monitor closely before departure.`;
                } else {
                    verdict = 'GO'; verdictColor = 'var(--go)'; verdictBg = 'var(--go-bg)';
                    verdictIcon = 'check_circle';
                    verdictDesc = `${srcQual} VFR at all stations (${dataContext}) — conditions appear favorable.`;
                }

                var concerns = [];

                // ── MOS/NWS/forecast coverage warnings ──────────────────────────────
                if (isFutureFlight) {
                    effectiveWxData.forEach(e => {
                        if (e.source === 'metar' && hoursUntilTrip > 30) {
                            concerns.push({ level: 'medium', icon: 'update', text: `${e.icao}: No forecast model available — showing current METAR only. Flight category may not reflect actual departure-day conditions.` });
                        }
                        // "No TAF" is already shown in the weather source label — omit from Key Concerns
                    });
                }
                // ── NWS 7-day accuracy disclaimer (shown whenever NWS drives any station) ──
                if (anyNws) {
                    concerns.push({ level: 'medium', icon: 'calendar_today', text: `Note: Flight category is based on the NWS 7-day forecast (trip is >30h out). This is a general area outlook — no ceiling or visibility detail is available at this range. Re-assess with TAF and METAR within 24–30 h of departure for an accurate flight score.` });
                }

                // ── Simulated-data warning (no ASOS/AWOS at airport) ────────────────
                effectiveWxData.forEach(e => {
                    if (!e.metarLive) {
                        concerns.push({ level: 'medium', icon: 'sensors_off', text: `${e.icao}: No live weather station — conditions are estimated. Call FSS or check 1800wxbrief.com before departure.` });
                    }
                });

                // ── Per-station weather concerns ─────────────────────────────────────
                effectiveWxData.forEach(e => {
                    var src = e.source === 'mos' ? 'GFS' : e.source === 'taf' ? 'TAF' : e.source === 'nws' ? 'NWS' : 'METAR';
                    if (!e.effectiveWx) {
                        concerns.push({ level: 'medium', icon: 'cloud_off', text: `${e.icao}: No weather data available — verify conditions before flight` });
                        return;
                    }
                    var m = e.effectiveWx;

                    // NWS 7-day specific concerns — use shortForecast text for context
                    if (e.source === 'nws' && m.shortForecast) {
                        var sfx = m.shortForecast;
                        if (/thunder|storm/i.test(sfx)) {
                            concerns.push({ level: 'high', icon: 'thunderstorm', text: `${e.icao}: NWS forecast: "${sfx}" — thunderstorm activity possible. Check convective SIGMETs before departure.` });
                        } else if (/fog|freezing/i.test(sfx)) {
                            concerns.push({ level: 'high', icon: 'visibility_off', text: `${e.icao}: NWS forecast: "${sfx}" — fog or freezing precipitation possible. Verify conditions 2–4 h before departure.` });
                        } else if (/rain|snow|shower|drizzle/i.test(sfx)) {
                            concerns.push({ level: 'medium', icon: 'water_drop', text: `${e.icao}: NWS forecast: "${sfx}" — expect precipitation at or near departure time.` });
                        } else if (/cloud|overcast/i.test(sfx)) {
                            concerns.push({ level: 'medium', icon: 'cloud', text: `${e.icao}: NWS forecast: "${sfx}" — overcast or cloudy conditions expected.` });
                        }
                    }

                    // MOS-specific probabilistic concerns
                    if (e.source === 'mos') {
                        var t06 = m.t06 || 0, p06 = m.p06 || 0;
                        if (t06 >= 20) concerns.push({ level: t06 >= 40 ? 'high' : 'medium', icon: 'thunderstorm', text: `${e.icao}: GFS model shows ${t06}% thunderstorm probability at departure time` });
                        if (p06 >= 40) concerns.push({ level: p06 >= 70 ? 'high' : 'medium', icon: 'water_drop', text: `${e.icao}: GFS model shows ${p06}% precipitation probability at departure time` });
                        var obvLabels = { F: 'fog', PF: 'patchy fog', BS: 'blowing snow', BD: 'blowing dust', HZ: 'haze', K: 'smoke' };
                        if (m.obv && m.obv !== 'N' && obvLabels[m.obv]) {
                            concerns.push({ level: 'medium', icon: 'visibility', text: `${e.icao}: GFS model forecasts ${obvLabels[m.obv]} (${m.obv}) — expect reduced visibility` });
                        }
                    }

                    // TS/CB (METAR and TAF)
                    if (e.source !== 'mos' && ((m.raw || '').includes(' TS') || m.sky.includes('CB') || (e.taf && (e.taf.rawTAF || '').includes(' TS')))) {
                        concerns.push({ level: 'high', icon: 'thunderstorm', text: `${e.icao}: ${src} indicates thunderstorm activity — check convective SIGMETs` });
                    }

                    // Ceiling
                    var ceiling = parseCeiling(m.sky);
                    if (ceiling !== null && ceiling < 1000) {
                        concerns.push({ level: 'high', icon: 'cloud', text: `${e.icao}: ${src} ceiling ${ceiling}ft — IFR conditions forecast (${m.sky})` });
                    } else if (ceiling !== null && ceiling < 3000) {
                        concerns.push({ level: 'medium', icon: 'cloud', text: `${e.icao}: ${src} ceiling ${ceiling}ft — MVFR, monitor for deterioration` });
                    }

                    // Visibility
                    if (!m.vis.includes('P6') && !m.vis.startsWith('10')) {
                        var visNum = parseFloat(m.vis) || 10;
                        if (visNum < 1) concerns.push({ level: 'high', icon: 'visibility_off', text: `${e.icao}: ${src} visibility ${m.vis} — very low, LIFR/IFR conditions` });
                        else if (visNum < 3) concerns.push({ level: 'medium', icon: 'visibility', text: `${e.icao}: ${src} visibility ${m.vis} — reduced` });
                    }

                    // Wind
                    var gust = parseGust(m.wind);
                    if (m.wspd > 20 || (gust && gust > 25)) {
                        concerns.push({ level: 'high', icon: 'air', text: `${e.icao}: ${src} strong winds ${m.wind}` });
                    } else if (m.wspd > 15 || (gust && gust > 20)) {
                        concerns.push({ level: 'medium', icon: 'air', text: `${e.icao}: ${src} gusty conditions ${m.wind}` });
                    }

                    // Crosswind (not available for MOS — wind direction is less precise)
                    if (e.source !== 'mos') {
                        var apt = getAirport(e.icao);
                        var rwyRec = getRunwayRecommendation(m, apt);
                        if (rwyRec && rwyRec.crosswind > 15) {
                            concerns.push({ level: 'high', icon: 'flight_takeoff', text: `${e.icao}: ${src} high crosswind ${rwyRec.crosswind}kt on Rwy ${rwyRec.rwy}` });
                        } else if (rwyRec && rwyRec.crosswind > 10) {
                            concerns.push({ level: 'medium', icon: 'flight_takeoff', text: `${e.icao}: ${src} crosswind ${rwyRec.crosswind}kt on Rwy ${rwyRec.rwy}` });
                        }
                    }

                    // Freezing temps (METAR only)
                    if (e.source === 'metar' && e.metar) {
                        var tempC = parseTempC(e.metar.temp);
                        if (tempC !== null && tempC <= 2) {
                            concerns.push({ level: 'medium', icon: 'ac_unit', text: `${e.icao}: Current temp near/below freezing — ${e.metar.temp}` });
                        }
                    }
                });
                concerns.sort((a, b) => (a.level === 'high' ? 0 : 1) - (b.level === 'high' ? 0 : 1));

                var recs = [];
                // Forecast source disclaimer (highest priority for long-range)
                if (anyNws) {
                    recs.push(`⚠ Flight category based on NWS 7-day forecast (${depUtcLabel}) — general area outlook only. No ceiling/visibility detail available at this range. Re-evaluate using TAF and METAR data within 30h of departure.`);
                } else if (isFutureFlight && anyTaf) {
                    recs.push(`Assessment based on TAF forecast for ${depUtcLabel} — conditions may change. Re-check closer to departure.`);
                }
                if (hasIFR || hasLIFR) recs.push('IFR rating and current instrument currency required for this flight.');
                if (hasMVFR && !hasIFR && !hasLIFR) recs.push('Consider filing IFR or delaying departure until conditions improve to VFR.');
                if (concerns.some(c => c.icon === 'thunderstorm')) recs.push('Check convective SIGMETs and avoid areas with reported thunderstorm activity.');
                if (concerns.some(c => c.icon === 'water_drop')) recs.push('Precipitation forecast — review AIRMETs for IFR/turbulence and check PIREPs.');
                if (concerns.some(c => c.icon === 'ac_unit')) recs.push('Check PIREPs for airframe icing; confirm aircraft icing certification if applicable.');
                if (concerns.some(c => c.level === 'high' && c.icon === 'air')) recs.push('Verify crosswind does not exceed aircraft published limits; identify an alternate airport.');
                if (anySim) recs.push('⚠ One or more airports have no automated weather station. Contact FSS (1-800-WX-BRIEF) or check notam.faa.gov for current conditions at those fields.');
                if (recs.filter(r => !r.startsWith('⚠')).length === 0) recs.push('Conditions appear favorable — complete standard preflight checks and file a flight plan.');
                recs.push('Always obtain an official briefing at 1800wxbrief.com before departure.');

                return { verdict, verdictColor, verdictBg, verdictIcon, verdictDesc, concerns, recs, dataContext, isFutureFlight, anyTaf, anyMos, anyNws, allMos };
            }, [effectiveWxData, hoursUntilTrip, tripTargetUtc]);

            // --- Composite Safety Score breakdown ---
            var detailedScore = useMemo(function() {
                if (!effectiveWxData) return null;
                return calcDetailedScore(effectiveWxData, routeDist, isIfrRated);
            }, [effectiveWxData, routeDist, isIfrRated]);

            // --- FRAT auto-populate V1/V2/V3 from live weather data ---
            useEffect(function() {
                if (!effectiveWxData || effectiveWxData.length === 0) return;
                var dep = effectiveWxData[0];
                var arr = effectiveWxData[effectiveWxData.length - 1];
                var depCat = (dep.effectiveWx && dep.effectiveWx.cat) || 'VFR';
                var arrCat = (arr.effectiveWx && arr.effectiveWx.cat) || 'VFR';
                // V1: departure weather → directly from dep cat
                var v1Pts = { VFR:0, MVFR:2, IFR:5, LIFR:9 }[depCat] || 0;
                // V2: en route — worst of SIGMETs/AIRMETs or en-route flight cats
                var hasConvSigmet = sigmets.some(function(s) { return ((s.properties||{}).hazard||'').toUpperCase()==='CONVECTIVE'; });
                var hasHazAirmet  = gairmets.some(function(a) { var h=(a.hazard||'').toUpperCase(); return h.includes('ICE')||h.includes('TURB'); });
                var enRouteCats   = effectiveWxData.map(function(e){ return (e.effectiveWx&&e.effectiveWx.cat)||'VFR'; });
                var hasRouteIFR   = enRouteCats.some(function(c){ return c==='IFR'||c==='LIFR'; });
                var hasRouteMVFR  = enRouteCats.some(function(c){ return c==='MVFR'; });
                var v2Pts = hasConvSigmet ? 10 : hasHazAirmet ? 7 : hasRouteIFR ? 7 : hasRouteMVFR ? 2 : 0;
                // V3: destination weather → directly from arr cat
                var v3Pts = { VFR:0, MVFR:2, IFR:4, LIFR:8 }[arrCat] || 0;
                var autoFills = { V1:v1Pts, V2:v2Pts, V3:v3Pts };
                setFratAutoFilled(autoFills);
                setFratAnswers(function(prev) {
                    var next = Object.assign({}, prev);
                    ['V1','V2','V3'].forEach(function(k) {
                        // Only overwrite if the question is still showing its auto value
                        // (user hasn't manually picked a different option)
                        if (prev[k] === undefined || prev[k] === fratAutoFilled[k]) next[k] = autoFills[k];
                    });
                    return next;
                });
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [effectiveWxData, sigmets.length, gairmets.length]);

            // --- Combined GO score: base weather score blended with FRAT ---
            var fratAnsweredCount = FRAT_QUESTIONS.filter(function(q){ return fratAnswers[q.id] !== undefined; }).length;
            var fratComplete      = fratAnsweredCount === FRAT_TOTAL;
            var combinedScore = useMemo(function() {
                if (!detailedScore) return null;
                var base = detailedScore.total;
                var raw;
                if (fratComplete) {
                    var fratScore = calcFratGoScore(fratAnswers);
                    raw = Math.max(0, Math.min(100, Math.round(base * 0.70 + fratScore * 0.30)));
                } else {
                    raw = Math.max(0, base - 20); // penalty when FRAT skipped/incomplete
                }
                // Hard veto cap: FRAT cannot override a weather-driven score ceiling
                if (detailedScore.scoreCap !== null && detailedScore.scoreCap !== undefined) {
                    return Math.min(detailedScore.scoreCap, raw);
                }
                return raw;
            }, [detailedScore, fratComplete, fratAnswers, fratSkipped]);

            // ── Personal Minimums evaluation ─────────────────────────────────────
            var minimumsCheck = useMemo(function() {
                if (!effectiveWxData) return null;
                return checkPersonalMinimums(effectiveWxData, personalMinimums, tripTargetUtc);
            }, [effectiveWxData, personalMinimums, tripTargetUtc]);

            // Final displayed score = combinedScore minus minimums penalty, floored at 0
            var finalDisplayScore = useMemo(function() {
                if (combinedScore == null) return null;
                if (!minimumsCheck) return combinedScore;
                var cap = detailedScore && detailedScore.scoreCap != null ? detailedScore.scoreCap : 100;
                return Math.max(0, Math.min(cap, combinedScore - minimumsCheck.penalty));
            }, [combinedScore, minimumsCheck, detailedScore]);

            // Store callbacks in refs so effects never capture a stale closure when
            // the parent re-creates these functions on each render.
            var onScoreUpdateRef = useRef(onScoreUpdate);
            var onFratUpdateRef  = useRef(onFratUpdate);
            useEffect(function() { onScoreUpdateRef.current = onScoreUpdate; }, [onScoreUpdate]);
            useEffect(function() { onFratUpdateRef.current  = onFratUpdate;  }, [onFratUpdate]);

            // Propagate the authoritative score up to the trip header ring
            useEffect(function() {
                if (combinedScore !== null && onScoreUpdateRef.current) onScoreUpdateRef.current(combinedScore);
            }, [combinedScore]);

            // Persist FRAT directly to localStorage (per-trip key) on every change.
            // This is the source of truth — no dependency on the callback chain.
            useEffect(function() {
                try {
                    localStorage.setItem(fratKey, JSON.stringify({ answers: fratAnswers, skipped: fratSkipped }));
                } catch(e) {}
                // Also notify parent so the trip object and score ring stay in sync
                if (onFratUpdateRef.current) onFratUpdateRef.current(fratAnswers, fratSkipped);
            }, [fratAnswers, fratSkipped]);

            // finalVerdict: convective SIGMET or CWA thunderstorm overrides weather-based verdict
            var finalVerdict = useMemo(function() {
                if (!analysis) return null;
                var hasConvSigmet = sigmets.some(function(f) {
                    var h = ((f.properties || {}).hazard || '').toUpperCase();
                    return h === 'CONVECTIVE';
                });
                var hasCwaTstorm = cwas.some(function(c) {
                    return (c.hazard || '').toUpperCase() === 'TS';
                });
                if (hasConvSigmet || hasCwaTstorm) {
                    return {
                        verdict: 'NO-GO',
                        verdictColor: 'var(--nogo)',
                        verdictBg: 'var(--nogo-bg)',
                        verdictIcon: 'thunderstorm',
                        verdictDesc: hasConvSigmet
                            ? 'Active Convective SIGMET along route — VFR flight strongly discouraged. Obtain official briefing.'
                            : 'Active Center Weather Advisory for thunderstorms along route — conditions hazardous.',
                        concerns: analysis.concerns,
                        recs: ['⚠ Active convective hazard advisory detected. Do not depart VFR into areas of reported convective activity.'].concat(analysis.recs),
                        dataContext: analysis.dataContext,
                        isFutureFlight: analysis.isFutureFlight,
                        anyTaf: analysis.anyTaf,
                        anyNws: analysis.anyNws,
                        anyMos: false,
                        allMos: false
                    };
                }
                return analysis;
            }, [analysis, sigmets, cwas]);

            // Auto-scroll chat to bottom on new messages
            useEffect(function() {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages]);

            // --- AI Enhanced briefing ---
            var runAiBriefing = useCallback(async function() {
                if (!trip.dep || !trip.arr || !wxData) return;
                setAiLoading(true); setAiError(null);

                var distance = 0;
                for (var i = 0; i < allRoutePts.length - 1; i++) {
                    var p1 = getAirport(allRoutePts[i]);
                    var p2 = getAirport(allRoutePts[i+1]);
                    if (p1 && p2) distance += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                }
                var ete = distance / ac.kts;

                var wxLines = wxData.map(w => {
                    var lines = [];
                    if (w.metar) lines.push(`METAR ${w.icao}: ${w.metar.raw}`);
                    if (w.taf && w.taf.rawTAF) lines.push(`TAF ${w.icao}: ${w.taf.rawTAF}`);
                    return lines.join("\n");
                }).join("\n");

                var scoreCtx = detailedScore
                    ? ('Automated Safety Score: ' + detailedScore.total + '/100 — ' + detailedScore.breakdown.map(function(f) { return f.label + ' ' + f.score + '/' + f.max; }).join(', ') + '\n')
                    : '';

                // Build advisory context for AI prompt
                var advisoryCtx = '';
                if (sigmets.length) {
                    advisoryCtx += '\n=== ACTIVE SIGMETS (' + sigmets.length + ') ===\n';
                    sigmets.forEach(function(f) {
                        var p = f.properties || {};
                        advisoryCtx += (p.rawAirSigmet || ('SIGMET · ' + (p.hazard||'') + (p.severity?' SEV:'+p.severity:''))) + '\n';
                    });
                }
                if (gairmets.length) {
                    advisoryCtx += '\n=== ACTIVE AIRMETS (' + gairmets.length + ') ===\n';
                    gairmets.forEach(function(g) {
                        advisoryCtx += 'AIRMET ' + (g.tag||'') + ' · ' + (g.hazard||'') + (g.severity?' '+g.severity:'') + ' Valid:' + (g.validTime||'') + '\n';
                    });
                }
                if (cwas.length) {
                    advisoryCtx += '\n=== ACTIVE CWAs (' + cwas.length + ') ===\n';
                    cwas.forEach(function(c) {
                        advisoryCtx += (c.rawCWA || ('CWA · ' + (c.cwsuId||'') + ' · ' + (c.hazard||''))) + '\n';
                    });
                }
                if (windsAloft.length) {
                    var aptPtsAi = allRoutePts.map(getAirport).filter(Boolean);
                    var altFt = ac.alt || 6000;
                    var windLines = aptPtsAi.map(function(apt) {
                        var stn = closestWindStation(windsAloft, apt.lat, apt.lon);
                        var w = stn ? getWindAtAlt(stn, altFt) : null;
                        if (!w) return null;
                        return apt.icao + ' @ ' + (altFt/1000).toFixed(0) + 'kft: ' + (w.lv ? 'LGT&VRB' : w.wdir+'°@'+w.wspd+'kt') + (w.temp!=null?' '+w.temp+'°C':'');
                    }).filter(Boolean);
                    if (windLines.length) advisoryCtx += '\n=== WINDS ALOFT ===\n' + windLines.join('\n') + '\n';
                }

                var routeStr = allRoutePts.map(function(code) {
                    var apt = getAirport(code);
                    return apt ? code + ' (' + apt.name + ', ' + apt.city + ' ' + apt.state + ')' : code;
                }).join(' -> ');

                var prompt = `TRIP: ${ac.name} (${ac.cat}) cruise ${ac.kts}kt\n` +
                    `DEPARTURE: ${trip.date} at ${trip.time} Local Time\n` +
                    `ROUTE: ${routeStr}\n` +
                    `Distance: ${Math.round(distance)}nm  ETE: ${Math.floor(ete)}h${Math.round((ete % 1) * 60)}m\n` +
                    scoreCtx +
                    `\n=== LIVE WEATHER DATA ===\n${wxLines || "No live weather available."}` +
                    advisoryCtx;

                const BRIEFING_SYSTEM = [
                    "You are a veteran aviation meteorologist with 30+ years of experience supporting both general aviation and commercial flight operations.",
                    "You have deep expertise in synoptic and mesoscale meteorology, SIGMETS/AIRMETS, TAFs, METARs, PIREPs, prog charts, and all standard aviation weather products.",
                    "You communicate with the precision of a professional briefer but can translate complex weather into plain language when needed.",
                    "",
                    "Your role is to provide a thorough preflight weather briefing for the flight route provided. Use the weather data supplied in the user message as your primary data source.",
                    "",
                    "Structure your response using EXACTLY these section headers (with ** markers on their own line):",
                    "**ROUTE OVERVIEW**",
                    "**SYNOPTIC OVERVIEW**",
                    "**DEPARTURE CONDITIONS**",
                    "**EN ROUTE CONDITIONS**",
                    "**DESTINATION CONDITIONS**",
                    "**WINDS ALOFT**",
                    "**HAZARDS SUMMARY**",
                    "**GO/NO-GO ASSESSMENT**",
                    "**RECOMMENDED ACTIONS / CONTINGENCIES**",
                    "",
                    "Section guidance:",
                    "ROUTE OVERVIEW: Summarize the proposed route, altitude(s), estimated departure time, and flight duration from the data provided.",
                    "SYNOPTIC OVERVIEW: Describe the big-picture weather pattern — pressure systems, frontal boundaries, jet stream position, and how they affect the route.",
                    "DEPARTURE CONDITIONS: Assess ceiling, visibility, winds (surface and aloft), temperature/dewpoint spread, and any significant phenomena at the departure airport. Reference the METAR/TAF by name.",
                    "EN ROUTE CONDITIONS: Cover conditions along the full route, including turbulence (CAT and convective), icing levels and types, mountain wave activity if applicable, convective activity, and any relevant AIRMETs/SIGMETs.",
                    "DESTINATION CONDITIONS: Assess forecast conditions at the destination, including TAF breakdown, alternate airport requirements, and any deteriorating trends.",
                    "WINDS ALOFT: Provide winds and temperatures aloft at relevant flight levels along the route. Flag any significant wind shear or jet stream encounters.",
                    "HAZARDS SUMMARY: Bullet the top weather hazards in order of severity: convection, icing, turbulence, low IFR, wind shear, etc. Be direct — do not sugarcoat hazards.",
                    "GO/NO-GO ASSESSMENT: Give a direct professional recommendation — GO, GO WITH CAUTION, or NO-GO — with a clear rationale. If 'GO WITH CAUTION,' specify what conditions to monitor and at what point the flight should be aborted or diverted.",
                    "RECOMMENDED ACTIONS / CONTINGENCIES: Suggest altitude adjustments, route deviations, departure time changes, alternate airports, or other mitigations to improve safety margins.",
                    "",
                    "Standards:",
                    "- Use standard aviation weather terminology: LIFR, IFR, MVFR, VFR; light/moderate/severe turbulence; trace/light/moderate/heavy icing.",
                    "- Reference real weather products by name (TAF, METAR, SIGMET, G-AIRMET, PIREP, FA, etc.) and explain what they indicate.",
                    "- Be specific with numbers — cite actual observed values and thresholds (e.g., 'ceiling 1200ft OVC = MVFR', 'winds 18G25KT = moderate crosswind risk').",
                    "- If conditions are dangerous, say so clearly and explain why.",
                    "- When weather is marginal, explain the specific thresholds being approached (VFR minimums, icing certification limits, turbulence intensity scales).",
                    "- For high-elevation airports, estimate density altitude (DA ≈ Elevation + 120 × (OAT_°C − ISA_°C))."
                ].join("\n");

                // Cache key: trip signature + wx fingerprint so navigating away and
                // back doesn't refire the expensive API call (Step 2.2)
                var briefingCacheKey = [trip.id, trip.dep, trip.arr, trip.date, trip.time,
                    wxData.map(function(w) { return w.icao + ':' + (w.metar ? w.metar.cat : 'X'); }).join(',')
                ].join('|');
                if (runAiBriefing._cache && runAiBriefing._cache.key === briefingCacheKey) {
                    setAiResult(runAiBriefing._cache.result);
                    setAiLoading(false);
                    return;
                }

                // Use streaming when a direct key is present — text appears token-by-token
                // rather than all at once, dramatically improving perceived responsiveness.
                // Fall back to non-streaming proxy call when only the server key is available.
                const callWithRetry = async (retries = 3) => {
                    const delays = [1000, 2000, 4000];
                    for (let i = 0; i <= retries; i++) {
                        try {
                            var text;
                            {
                                // Non-streaming proxy path (key is server-side)
                                const data = await callAnthropicApi({
                                    system: BRIEFING_SYSTEM,
                                    messages: [{ role: "user", content: prompt }],
                                    max_tokens: 4000,
                                    apiKey: null
                                });
                                text = data.content?.[0]?.text;
                            }
                            if (!text) throw new Error("Empty response from Claude");
                            return text;
                        } catch (err) {
                            if (i === retries) throw err;
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                };

                try {
                    const result = await callWithRetry();
                    runAiBriefing._cache = { key: briefingCacheKey, result }; // Step 2.2 cache
                    setAiResult(result);
                } catch (e) {
                    setAiError("Briefing failed: " + (e.message || "Please check your API key and try again."));
                } finally {
                    setAiLoading(false);
                }
            // detailedScore intentionally excluded — score updates should not re-trigger
            // an expensive briefing API call (Step 2.3).
            }, [trip, wxData]);


            // --- Conversational AI Chat ---
            var sendChat = useCallback(async function() {
                if (!chatInput.trim() || chatLoading) return;
                var userMsg = chatInput.trim();
                setChatInput('');
                var updated = [...chatMessages, { role: 'user', content: userMsg }];
                setChatMessages(updated);
                setChatLoading(true);
                var wxSummary = effectiveWxData ? effectiveWxData.map(function(e) {
                    var wx = e.effectiveWx;
                    return wx ? (e.icao + ': ' + wx.cat + ' wind=' + wx.wind + ' vis=' + wx.vis + ' sky=' + wx.sky) : (e.icao + ': no data');
                }).join('; ') : 'No weather data';
                var systemCtx = 'You are an aviation weather analyst assistant for a specific flight. ' +
                    'Flight: ' + ac.name + ' (' + ac.cat + ') ' + allRoutePts.join('→') + ' on ' + trip.date + ' at ' + trip.time + '. ' +
                    'Safety score: ' + (detailedScore ? detailedScore.total + '/100' : 'N/A') + '. ' +
                    'Current weather: ' + wxSummary + '. ' +
                    'Answer concisely and specifically about this flight. Always recommend consulting official sources before flight.';
                try {
                    var chatData = await callAnthropicApi({
                        system: systemCtx,
                        messages: updated.map(function(m) { return { role:m.role, content:m.content }; }),
                        max_tokens: 1200,
                        apiKey: null
                    });
                    var reply = chatData.content?.[0]?.text || 'No response.';
                    setChatMessages(function(prev) { return [...prev, { role:'assistant', content:reply }]; });
                } catch(e) {
                    setChatMessages(function(prev) { return [...prev, { role:'assistant', content:'Error: ' + e.message }]; });
                } finally { setChatLoading(false); }
            }, [chatInput, chatMessages, effectiveWxData, trip, allRoutePts, ac, chatLoading, detailedScore]);

            // --- Voice output (Text-to-Speech) ---
            function speakBriefing() {
                if (!window.speechSynthesis) return;
                if (speaking) { window.speechSynthesis.cancel(); setSpeaking(false); return; }
                var text = aiResult ? aiResult.replace(/\*\*/g, '').replace(/\*/g, '') : (analysis ? (analysis.verdict + '. ' + analysis.verdictDesc + '. ' + analysis.recs.join('. ')) : 'No briefing available.');
                var utt = new SpeechSynthesisUtterance(text);
                utt.rate = 0.95; utt.pitch = 1; utt.volume = 1;
                utt.onend = function() { setSpeaking(false); };
                utt.onerror = function() { setSpeaking(false); };
                setSpeaking(true);
                window.speechSynthesis.speak(utt);
            }

            var aiSections = useMemo(() => {
                if (!aiResult) return [];
                var out = []; var current = null;
                var validHeaders = [
                    "ROUTE OVERVIEW", "SYNOPTIC OVERVIEW", "DEPARTURE CONDITIONS",
                    "EN ROUTE CONDITIONS", "DESTINATION CONDITIONS", "WINDS ALOFT",
                    "HAZARDS SUMMARY", "GO/NO-GO ASSESSMENT", "RECOMMENDED ACTIONS / CONTINGENCIES"
                ];
                aiResult.split("\n").forEach(line => {
                    var cleanLine = line.replace(/\*/g, "").trim();
                    if (validHeaders.includes(cleanLine)) {
                        if (current) out.push(current);
                        current = { title: cleanLine, body: "" };
                    } else if (current) {
                        current.body += line + "\n";

            }, [aiResult]);

            var sectionMeta = {

                "SYNOPTIC OVERVIEW": { icon: "public",          color: "var(--md-sys-color-secondary)" },
                "DEPARTURE CONDITIONS":  { icon: "flight_takeoff", color: "var(--md-sys-color-primary)" },
                "EN ROUTE CONDITIONS":   { icon: "linear_scale",   color: "var(--md-sys-color-secondary)" },
                "DESTINATION CONDITIONS":{ icon: "flight_land",    color: "var(--md-sys-color-tertiary)" },
                "WINDS ALOFT":       { icon: "air",             color: "var(--md-sys-color-secondary)" },

                "GO/NO-GO ASSESSMENT": { icon: "check_circle",  color: "var(--md-sys-color-primary)", bg: "var(--md-sys-color-primary-container)", onBg: "var(--md-sys-color-on-primary-container)" },

            };

            var levelColor = { high: 'var(--md-sys-color-error)', medium: 'var(--cat-mvfr-color)' };

            // ── Export / Print tab — FAA FAR 91.103 compliant preflight brief ──────────
            // All state (effectiveWxData, finalVerdict, windsAloft, notamsByAirport,

            if (tab === "export") {
                var now = new Date();
                var nowUtcStr = `${String(now.getUTCHours()).padStart(2,'0')}${String(now.getUTCMinutes()).padStart(2,'0')}Z ${now.getUTCFullYear()}-${String(now.getUTCMonth()+1).padStart(2,'0')}-${String(now.getUTCDate()).padStart(2,'0')}`;
                var depUtcStr = tripTargetUtc
                    ? `${String(tripTargetUtc.getUTCHours()).padStart(2,'0')}${String(tripTargetUtc.getUTCMinutes()).padStart(2,'0')}Z`
                    : '--';
                var altFt = ac.alt || 6000;

                function catClr(c) { return ({VFR:'#1a7a34',MVFR:'#0066cc',IFR:'#cc2200',LIFR:'#7B2D8B'})[c]||'#555'; }
                function catBg(c)  { return ({VFR:'#d6f5de',MVFR:'#daeeff',IFR:'#fde4e0',LIFR:'#f0e0f7'})[c]||'#eee'; }
                function scoreClr(pct) { return pct >= 0.80 ? '#1a7a34' : pct >= 0.60 ? '#c4650a' : '#cc2200'; }

                // Parse "M04" or "22" into a signed integer Celsius value
                function parseCelsius(s) {
                    if (s == null || s === '' || s === '—') return null;
                    var neg = String(s).startsWith('M');
                    var val = parseFloat(String(s).replace('M',''));
                    return isNaN(val) ? null : (neg ? -val : val);
                }
                // Split "22/14" or "M04/M08" into { t, dp } Celsius numbers
                function parseTempDp(tempStr) {
                    if (!tempStr || !tempStr.includes('/')) return { t: null, dp: null };
                    var parts = tempStr.split('/');
                    return { t: parseCelsius(parts[0]), dp: parseCelsius(parts[1]) };
                }
                // Parse "A2992" → 29.92 inHg
                function parseAltInHg(altStr) {
                    if (!altStr || !String(altStr).startsWith('A')) return null;
                    var v = parseFloat(String(altStr).slice(1)) / 100;
                    return isNaN(v) ? null : v;

                // Wind rows at cruise altitude (for NavLog column)
                var windRows = allRoutePts.map(icao => {
                    var apt = getAirport(icao);
                    if (!apt) return { icao, w: null, stn: null };
                    var stn = closestWindStation(windsAloft, apt.lat, apt.lon);
                    return { icao, stn, w: stn ? getWindAtAlt(stn, altFt) : null };
                });

                // Multi-altitude wind levels for the Winds Aloft table
                var windLevels = [3000, 6000, 9000, 12000, 18000];

                var advisoryCount = sigmets.length + gairmets.length + cwas.length;

                // NavLog rows — leg distance, cumulative, ETE, ETA, full wx fields
                // (must be computed here, before fuel calcs that use navRows)
                var cumNm = 0;
                var navRows = allRoutePts.map((icao, idx) => {
                    var apt = getAirport(icao);
                    var prev = idx > 0 ? getAirport(allRoutePts[idx-1]) : null;
                    var legNm = prev && apt ? Math.round(calcDist(prev.lat, prev.lon, apt.lat, apt.lon)) : 0;
                    if (idx > 0) cumNm += legNm;
                    var legMin = legNm > 0 ? Math.round(legNm / ac.kts * 60) : 0;
                    var eta = null;
                    if (tripTargetUtc && idx > 0) {
                        var cumMin = allRoutePts.slice(0, idx+1).reduce((sum, c, i) => {
                            if (i === 0) return sum;
                            var a1 = getAirport(allRoutePts[i-1]), a2 = getAirport(c);
                            return a1 && a2 ? sum + Math.round(calcDist(a1.lat,a1.lon,a2.lat,a2.lon)/ac.kts*60) : sum;
                        }, 0);
                        var etaDate = new Date(tripTargetUtc.getTime() + cumMin * 60000);
                        eta = String(etaDate.getUTCHours()).padStart(2,'0') + String(etaDate.getUTCMinutes()).padStart(2,'0') + 'Z';
                    }
                    var wx = effectiveWxData ? effectiveWxData.find(e => e.icao === icao) : null;
                    var wr = windRows.find(r => r.icao === icao);
                    var windStr = wr && wr.w ? (wr.w.lv ? 'LT&VRB' : `${String(wr.w.wdir).padStart(3,'0')}/${wr.w.wspd}`) : '—';
                    var m = wx ? wx.effectiveWx : null;
                    var tdp = parseTempDp(m ? m.temp : null);
                    var altInHg = parseAltInHg(m ? m.alt : null);
                    return { icao, apt, legNm, cumNm, legMin, eta, wx, windStr, m, tdp, altInHg };
                });

                // ── Fuel / endurance calculations (FAR 91.151 VFR day) ──
                var totalEteMin = navRows.reduce(function(s, r) { return s + (r.legMin || 0); }, 0);
                var tripFuelGal  = ac.gph ? parseFloat(((totalEteMin / 60) * ac.gph).toFixed(1)) : null;
                var reserveGal   = ac.gph ? parseFloat((0.5 * ac.gph).toFixed(1)) : null;   // 30 min FAR 91.151
                var taxiGal      = ac.gph ? parseFloat(((12/60) * ac.gph).toFixed(1)) : null; // 12-min taxi
                var totalReqGal  = (tripFuelGal != null) ? parseFloat((tripFuelGal + reserveGal + taxiGal).toFixed(1)) : null;
                var fuelRemainingGal = (ac.fuel && totalReqGal != null) ? parseFloat((ac.fuel - totalReqGal).toFixed(1)) : null;
                var totalEnduranceMin = ac.gph && ac.fuel ? Math.round((ac.fuel / ac.gph) * 60) : null;
                var remainingEnduranceMin = (totalEnduranceMin && totalEteMin) ? totalEnduranceMin - totalEteMin - 42 : null; // subtract ETE + 30+12 min

                // ── Density altitude at dep and arr airports ──
                var depAptData = getAirport(trip.dep);
                var arrAptData = getAirport(trip.arr);
                var depWxEntry = effectiveWxData ? effectiveWxData.find(e => e.icao === trip.dep) : null;
                var arrWxEntry = effectiveWxData ? effectiveWxData.find(e => e.icao === trip.arr) : null;
                var depM = depWxEntry ? depWxEntry.effectiveWx : null;
                var arrM = arrWxEntry ? arrWxEntry.effectiveWx : null;
                var depTempDp = parseTempDp(depM ? depM.temp : null);
                var arrTempDp = parseTempDp(arrM ? arrM.temp : null);
                var depAltInHg = parseAltInHg(depM ? depM.alt : null);
                var arrAltInHg = parseAltInHg(arrM ? arrM.alt : null);
                var depElev = depAptData ? (depAptData.elev || 0) : 0;
                var arrElev = arrAptData ? (arrAptData.elev || 0) : 0;
                var depDA = (depTempDp.t != null) ? calculateDensityAltitude(depTempDp.t, depAltInHg || 29.92, depElev) : depElev;
                var arrDA = (arrTempDp.t != null) ? calculateDensityAltitude(arrTempDp.t, arrAltInHg || 29.92, arrElev) : arrElev;
                // Adjust TO/LDG distances for density altitude (10% per 1000 ft DA above SL)
                var depFactor = ac.toRoll ? Math.max(1, 1 + (depDA / 1000) * 0.1) : null;
                var arrFactor = ac.ldgRoll ? Math.max(1, 1 + (arrDA / 1000) * 0.05) : null;
                var adjToRoll   = depFactor && ac.toRoll   ? Math.round(ac.toRoll   * depFactor) : null;
                var adjToOver50 = depFactor && ac.toOver50 ? Math.round(ac.toOver50 * depFactor) : null;
                var adjLdgRoll   = arrFactor && ac.ldgRoll   ? Math.round(ac.ldgRoll   * arrFactor) : null;
                var adjLdgOver50 = arrFactor && ac.ldgOver50 ? Math.round(ac.ldgOver50 * arrFactor) : null;

                // ── Runway data ──
                function getMaxRwy(icao) { return AIRPORT_MAX_RWY[icao] || null; }
                var depMaxRwy = getMaxRwy(trip.dep);
                var arrMaxRwy = getMaxRwy(trip.arr);

                // Dense styles — tighter than the app UI to match ForeFlight print density
                var sh  = { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', color: '#0b57d0', borderBottom: '2px solid #0b57d0', paddingBottom: 4, marginBottom: 8, marginTop: 0 };
                var shR = { ...sh, color: '#b71c1c', borderBottomColor: '#b71c1c' };
                var shY = { ...sh, color: '#b45309', borderBottomColor: '#b45309' };
                var shG = { ...sh, color: '#1b5e20', borderBottomColor: '#1b5e20' };
                var cell   = { fontSize: 11, padding: '4px 7px', borderBottom: '1px solid #e8e8e8', verticalAlign: 'top' };
                var cellHd = { ...cell, fontSize: 10, fontWeight: 700, color: '#444', background: '#f0f4f8', textTransform: 'uppercase', letterSpacing: '0.5px', padding: '4px 7px' };
                var mono   = { fontFamily: '"JetBrains Mono","Roboto Mono",monospace' };
                function catChip(cat) {
                    if (!cat || cat === '—') return <span style={{color:'#555'}}>—</span>;
                    return <span style={{background:catBg(cat),color:catClr(cat),borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:800,whiteSpace:'nowrap',...mono,border:`1px solid ${catClr(cat)}55`,letterSpacing:'0.3px'}}>{cat}</span>;
                }
                function windArrow(windStr) {
                    if (!windStr) return null;
                    var m = windStr.match(/^(\d{3})@(\d+)/);
                    if (!m) return null;
                    var deg = parseInt(m[1]);
                    return <span style={{display:'inline-block',transform:`rotate(${deg}deg)`,fontSize:13,lineHeight:1,marginRight:2}}>↑</span>;
                }
                // Opens the printable brief in a standalone tab so that
                // window.print() never runs inside the SPA.  On iOS Safari,
                // calling print() in-page blanks the SPA and leaves no back
                // button; opening a new tab means closing it always returns
                // the user to the briefing panel cleanly.
                function handlePrint() {
                    var el = document.getElementById('export-printable');
                    if (!el) return;
                    // hover:none reliably identifies touch-only devices without
                    // false-positives from touchscreen laptops/desktops.
                    var isMobile = window.matchMedia('(hover: none)').matches;
                    var html = '<!DOCTYPE html><html><head>' +
                        '<meta charset="UTF-8">' +
                        '<meta name="viewport" content="width=device-width,initial-scale=1">' +
                        '<title>Flight Brief — ' + allRoutePts.join(' › ') + '</title>' +
                        '<link rel="preconnect" href="https://fonts.googleapis.com">' +
                        '<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap">' +
                        '<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">' +
                        '<style>' +
                        'body{margin:0;padding:12px 16px;background:#f0f4f8;font-family:Inter,system-ui,sans-serif;}' +
                        '.material-symbols-outlined{font-family:"Material Symbols Outlined";font-weight:normal;font-style:normal;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;direction:ltr;}' +
                        '.fm{font-family:"JetBrains Mono","Roboto Mono",monospace;}' +
                        'details>summary{cursor:pointer;list-style:none;user-select:none;}details>summary::marker,details>summary::-webkit-details-marker{display:none;}' +
                        // Prevent cards from splitting across print pages
                        '.bs{break-inside:avoid;page-break-inside:avoid;}' +
                        '@media print{' +
                        'body{padding:0;background:#fff;font-size:11px;}' +
                        '@page{margin:1cm;size:Letter portrait;}' +
                        '*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}' +
                        '.bs{break-inside:avoid!important;page-break-inside:avoid!important;}' +
                        'details{display:block!important;}details>*{display:block!important;}' +
                        '}' +
                        '</style>' +
                        '</head><body>' +
                        el.outerHTML +
                        (isMobile ? '' : '<scr' + 'ipt>window.addEventListener("load",function(){setTimeout(function(){window.print();},400);});<\/scr' + 'ipt>') +
                        '</body></html>';
                    try {
                        var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                        triggerBlobLink(blob, { newTab: true });
                    } catch(e) {
                        window.print();
                    }
                }

                return (
                    <div>
                        {/* ── Toolbar (screen-only) ── */}
                        <div style={{ display:'flex', alignItems:'center', gap:16, paddingBottom:16, flexWrap:'wrap' }}>
                            <button onClick={handlePrint} style={{ display:'flex', alignItems:'center', gap:8, background:'#0b57d0', color:'#fff', border:'none', borderRadius:20, padding:'10px 24px', fontSize:14, fontWeight:600, cursor:'pointer', boxShadow:'0 2px 8px rgba(11,87,208,0.3)' }}>
                                <MdIcon name="print" style={{ fontSize:18 }} /> Print / Save as PDF
                            </button>
                            <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', lineHeight:1.5 }}>
                                Opens a standalone page. On desktop choose <strong>Save as PDF</strong>; on mobile use <strong>Share → Print</strong>.
                            </span>
                        </div>

                        {/* ══════════════════════════════════════════════════
                             PRINTABLE REGION — FAR 91.103 preflight brief,
                             every section fully expanded for print/PDF.
                            ══════════════════════════════════════════════════ */}
                        <div id="export-printable" style={{ background:'#fff', color:'#1a1a1a', fontFamily:'Inter, system-ui, sans-serif', border:'1px solid #dde3ee', borderRadius:12, overflow:'hidden', boxShadow:'0 4px 28px rgba(0,0,0,0.10)' }}>

                            {/* ══ 1. HEADER ══════════════════════════════════ */}
                            <div className="brief-header bs" style={{ background:'linear-gradient(135deg,#0b57d0 0%,#1a73e8 100%)', color:'#fff', padding:'14px 20px' }}>
                                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12 }}>
                                    <div>
                                        <div style={{ fontSize:10, fontWeight:700, letterSpacing:'2px', textTransform:'uppercase', opacity:0.7 }}>SkyView · Preflight Brief · FAR 91.103 Compliant · For Reference Only</div>
                                        <div style={{ fontSize:24, fontWeight:900, letterSpacing:'0.5px', lineHeight:1, ...mono, marginTop:2 }}>
                                            {allRoutePts.join(' → ')}
                                        </div>
                                        {trip.name && <div style={{ fontSize:11, opacity:0.8, marginTop:2 }}>{trip.name}</div>}
                                    </div>
                                    {detailedScore && verd && (function() {
                                        var sc = combinedScore ?? detailedScore.total;
                                        var r = 38, cx = 50, cy = 50;
                                        var circ = 2 * Math.PI * r;
                                        var filled = Math.min(sc / 100, 1) * circ;
                                        var gap = circ - filled;
                                        var sClr = sc >= 80 ? '#34C759' : sc >= 60 ? '#FF9500' : '#FF3B30';
                                        var sBg = sc >= 80 ? 'rgba(52,199,89,0.18)' : sc >= 60 ? 'rgba(255,149,0,0.18)' : 'rgba(255,59,48,0.18)';
                                        return (
                                            <div style={{ display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>

                                                    <circle cx={cx} cy={cy} r={r} fill={sBg} />
                                                    <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.20)" strokeWidth="8"/>
                                                    <circle cx={cx} cy={cy} r={r} fill="none" stroke={sClr} strokeWidth="8"
                                                        strokeLinecap="round"
                                                        strokeDasharray={`${filled} ${gap}`}
                                                        transform={`rotate(-90 ${cx} ${cy})`}/>
                                                    <text x={cx} y={cy-2} dominantBaseline="middle" textAnchor="middle" fontSize="22" fontWeight="900" fill="#fff" fontFamily="JetBrains Mono,Roboto Mono,monospace">{sc}</text>
                                                    <text x={cx} y={cy+14} textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.65)" fontFamily="JetBrains Mono,Roboto Mono,monospace">/ 100</text>
                                                </svg>
                                                <div style={{ background:'rgba(255,255,255,0.18)', backdropFilter:'blur(4px)', color:'#fff', borderRadius:10, padding:'8px 14px', textAlign:'center', minWidth:64, border:`1.5px solid ${sClr}66` }}>
                                                    <MdIcon name={verd.verdictIcon} style={{ fontSize:20, display:'block', margin:'0 auto 3px', color:sClr }} />
                                                    <div style={{ fontSize:13, fontWeight:900, letterSpacing:'1.5px', color:sClr }}>{verd.verdict}</div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'repeat(7,auto)', gap:'0 18px', marginTop:10, paddingTop:10, borderTop:'1px solid rgba(255,255,255,0.25)' }}>
                                    {[
                                        ['Aircraft',  ac.name],
                                        ['Category',  ac.cat],
                                        ['Date',      trip.date],
                                        ['Departs',   `${trip.time} · ${depUtcStr}`],
                                        ['ETE',       eteStr],
                                        ['Distance',  `${routeDist} NM`],
                                        ['Cruise',    `${(altFt/1000).toFixed(1)}k ft MSL`],
                                    ].map(([lbl, val]) => (
                                        <div key={lbl}>
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', opacity:0.65 }}>{lbl}</div>
                                            <div style={{ fontSize:11, fontWeight:600, ...mono, marginTop:1 }}>{val}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* ══ 2. ADVERSE CONDITIONS — mandatory FAR 91.103 ══
                                 Always shown. "NONE ACTIVE" when sky is clear.  */}
                            <div className="bs" style={{ background: advisoryCount > 0 ? '#fff3f3' : '#f0fdf4', borderBottom: `2px solid ${advisoryCount > 0 ? '#b71c1c' : '#1b5e20'}`, padding:'10px 20px' }}>
                                <div style={{ ...( advisoryCount > 0 ? shR : shG ), marginBottom: advisoryCount > 0 ? 8 : 0 }}>
                                    {advisoryCount > 0
                                        ? `⚠ Adverse Conditions — ${advisoryCount} Active (FAR 91.103)`
                                        : '✓ Adverse Conditions — None Active (FAR 91.103)'}
                                </div>
                                {advisoryCount === 0 && (
                                    <div style={{ fontSize:11, color:'#1b5e20', lineHeight:1.5 }}>
                                        No active SIGMETs, AIRMETs, or Center Weather Advisories found along the route at time of briefing ({nowUtcStr}).
                                        Verify at <span style={{...mono}}>aviationweather.gov/sigmet</span> within 1 hour of departure.
                                    </div>
                                )}
                                {advisoryCount > 0 && (
                                    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                                        {sigmets.map((s, i) => (
                                            <div key={i} style={{ display:'flex', gap:8, fontSize:11, color:'#b71c1c', lineHeight:1.45 }}>
                                                <span style={{ fontWeight:800, flexShrink:0, minWidth:60 }}>SIGMET</span>
                                                <span style={{ ...mono, wordBreak:'break-all' }}>{s.rawAirSigmet || s.airSigmetId || `SIGMET ${i+1} — convective/severe weather active`}</span>
                                            </div>
                                        ))}
                                        {cwas.map((c, i) => (
                                            <div key={i} style={{ display:'flex', gap:8, fontSize:11, color:'#b71c1c', lineHeight:1.45 }}>
                                                <span style={{ fontWeight:800, flexShrink:0, minWidth:60 }}>CWA</span>
                                                <span style={{ ...mono, wordBreak:'break-all' }}>{c.cwaText || c.cwaSeries || `CWA ${i+1} — center weather advisory active`}</span>
                                            </div>
                                        ))}
                                        {gairmets.filter(g => (g.hazard||'').includes('ICE') || (g.hazardType||'').includes('ICE')).map((g, i) => (
                                            <div key={'ice'+i} style={{ display:'flex', gap:8, fontSize:11, color:'#1565c0', lineHeight:1.45 }}>
                                                <span style={{ fontWeight:800, flexShrink:0, minWidth:60 }}>AIRMET S</span>
                                                <span style={{ ...mono, wordBreak:'break-all' }}>{g.hazard || 'Icing — Sierra AIRMET active along route'}</span>
                                            </div>
                                        ))}
                                        {gairmets.filter(g => (g.hazard||'').includes('TURB') || (g.hazardType||'').includes('TURB')).map((g, i) => (
                                            <div key={'turb'+i} style={{ display:'flex', gap:8, fontSize:11, color:'#b45309', lineHeight:1.45 }}>
                                                <span style={{ fontWeight:800, flexShrink:0, minWidth:60 }}>AIRMET T</span>
                                                <span style={{ ...mono, wordBreak:'break-all' }}>{g.hazard || 'Turbulence — Tango AIRMET active along route'}</span>
                                            </div>
                                        ))}
                                        {gairmets.filter(g => !(g.hazard||'').includes('ICE') && !(g.hazard||'').includes('TURB')).map((g, i) => (
                                            <div key={'ga'+i} style={{ display:'flex', gap:8, fontSize:11, color:'#b45309', lineHeight:1.45 }}>
                                                <span style={{ fontWeight:800, flexShrink:0, minWidth:60 }}>G-AIRMET</span>
                                                <span style={{ ...mono, wordBreak:'break-all' }}>{g.hazard || g.severity || `G-AIRMET ${i+1} — review for IFR/turbulence/icing`}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* ══ 3. NOTAMs & TFRs ══════════════════════════ */}
                            <div className="bs" style={{ background:'#fffbf0', borderBottom:'2px solid #b45309', padding:'10px 20px' }}>
                                <div style={{ ...shY, marginBottom:6 }}>NOTAMs &amp; TFRs — Departure / En Route / Destination</div>
                                {!notamsLoaded ? (
                                    <div style={{ fontSize:11, color:'#b45309', fontStyle:'italic' }}>Loading NOTAMs… view in the NOTAMs tab for live data.</div>
                                ) : (
                                    allRoutePts.map(icao => {
                                        var aNotams = notamsByAirport[icao] || [];
                                        var apt = getAirport(icao);
                                        var role = icao === trip.dep ? 'Departure' : icao === trip.arr ? 'Destination' : 'En Route';
                                        var tfrs  = aNotams.filter(n => n.type === 'TFR' || n.type === 'SECURITY');
                                        var rwyNtm = aNotams.filter(n => n.type === 'RWY' || n.type === 'TWY');
