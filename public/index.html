<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="build-commit" content="__BUILD_COMMIT__">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%230b57d0'/><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z' fill='%23ffffff'/></svg>">

    <!-- PWA: inline web app manifest -->
    <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;FlightScore&quot;,&quot;short_name&quot;:&quot;FlightScore&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23111114&quot;,&quot;theme_color&quot;:&quot;%230b57d0&quot;}">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PapaParse — CSV parser used to load OurAirports airport database -->
    <script src="https://unpkg.com/papaparse@5/papaparse.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Fonts: Inter (body) + Roboto Mono (METAR/data) + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        /* ════════════════════════════════════════════════════════════
           FLIGHTY-INSPIRED AVIATION DARK DESIGN SYSTEM
           Premium iOS aesthetic · OLED blacks · Neon status accents
        ════════════════════════════════════════════════════════════ */
        :root {
            /* ── Core palette — always-dark (OLED-optimised) ── */
            --bg:               #000000;          /* true OLED black */
            --bg-elevated:      #0A0A0F;          /* page background */
            --card:             #131317;          /* floating card surface */
            --card-mid:         #1C1C22;          /* inner card / section */
            --card-high:        #26262E;          /* raised element */
            --card-border:      rgba(255,255,255,0.08);
            --card-border-soft: rgba(255,255,255,0.05);

            /* ── Typography ── */
            --text-primary:   #FFFFFF;
            --text-secondary: rgba(255,255,255,0.60);
            --text-tertiary:  rgba(255,255,255,0.35);
            --text-mono:      #E0E0FF;            /* METAR/data mono text */

            /* ── Accent — iOS blue (Flighty brand) ── */
            --accent:         #0A84FF;
            --accent-dim:     rgba(10,132,255,0.15);
            --accent-glow:    0 0 20px rgba(10,132,255,0.35);

            /* ── Flight category — standard aviation colors (fixed across themes) ── */
            --vfr:            #34C759;            /* standard VFR green */
            --vfr-bg:         rgba(52,199,89,0.15);
            --vfr-glow:       0 0 12px rgba(52,199,89,0.4);
            --mvfr:           #0A84FF;            /* standard MVFR blue */
            --mvfr-bg:        rgba(10,132,255,0.15);
            --ifr:            #FF3B30;            /* standard IFR red */
            --ifr-bg:         rgba(255,59,48,0.15);
            --lifr:           #BF5AF2;            /* standard LIFR magenta/purple */
            --lifr-bg:        rgba(191,90,242,0.15);
            --lifr-glow:      0 0 16px rgba(191,90,242,0.4);

            /* ── Go/No-Go verdict — fixed colors, never change with theme ── */
            --go:             #34C759;            /* always green */
            --go-bg:          rgba(52,199,89,0.15);
            --caution:        #FF9500;            /* always amber */
            --caution-bg:     rgba(255,149,0,0.15);
            --nogo:           #FF3B30;            /* always red */
            --nogo-bg:        rgba(255,59,48,0.15);

            /* ── Header — frosted glass, adapts to theme ── */
            --header-bg:      rgba(10,10,15,0.85);
            --header-border:  rgba(255,255,255,0.08);

            /* ── Legacy MD3 aliases (keeps existing components working) ── */
            --md-sys-color-primary:                   var(--accent);
            --md-sys-color-on-primary:                #000;
            --md-sys-color-primary-container:         var(--accent-dim);
            --md-sys-color-on-primary-container:      var(--accent);
            --md-sys-color-secondary:                 rgba(255,255,255,0.55);
            --md-sys-color-on-secondary:              #000;
            --md-sys-color-secondary-container:       var(--card-high);
            --md-sys-color-on-secondary-container:    var(--text-primary);
            --md-sys-color-tertiary:                  rgba(255,255,255,0.40);
            --md-sys-color-on-tertiary:               #000;
            --md-sys-color-tertiary-container:        rgba(255,255,255,0.08);
            --md-sys-color-on-tertiary-container:     var(--text-secondary);
            --md-sys-color-error:                     var(--nogo);
            --md-sys-color-on-error:                  #fff;
            --md-sys-color-error-container:           var(--nogo-bg);
            --md-sys-color-on-error-container:        var(--nogo);
            --md-sys-color-warning:                   var(--caution);
            --md-sys-color-warning-container:         var(--caution-bg);
            --md-sys-color-on-warning-container:      var(--caution);
            --md-sys-color-background:                var(--bg-elevated);
            --md-sys-color-on-background:             var(--text-primary);
            --md-sys-color-surface:                   var(--card);
            --md-sys-color-on-surface:                var(--text-primary);
            --md-sys-color-surface-variant:           var(--card-high);
            --md-sys-color-on-surface-variant:        var(--text-secondary);
            --md-sys-color-surface-container-lowest:  var(--bg);
            --md-sys-color-surface-container-low:     var(--card);
            --md-sys-color-surface-container:         var(--card-mid);
            --md-sys-color-surface-container-high:    var(--card-high);
            --md-sys-color-surface-container-highest: #2E2E38;
            --md-sys-color-outline:                   rgba(255,255,255,0.20);
            --md-sys-color-outline-variant:           rgba(255,255,255,0.08);
            /* Flight category via legacy vars */
            --cat-vfr-color:  var(--vfr);   --cat-vfr-bg:  var(--vfr-bg);
            --cat-mvfr-color: var(--mvfr);  --cat-mvfr-bg: var(--mvfr-bg);
            --cat-ifr-color:  var(--ifr);   --cat-ifr-bg:  var(--ifr-bg);
            --cat-lifr-color: var(--lifr);  --cat-lifr-bg: var(--lifr-bg);
            /* Fonts */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            --font-mono: 'Roboto Mono', 'SF Mono', monospace;
        }

        /* Light-theme JS override — keeps the toggle working */
        body.light-theme {
            --bg:             #F2F2F7;
            --bg-elevated:    #FFFFFF;
            --card:           #FFFFFF;
            --card-mid:       #F2F2F7;
            --card-high:      #E5E5EA;
            --card-border:    rgba(0,0,0,0.08);
            --card-border-soft: rgba(0,0,0,0.04);
            --text-primary:   #000000;
            --text-secondary: rgba(0,0,0,0.60);
            --text-tertiary:  rgba(0,0,0,0.50);
            --text-mono:      #1a1a2e;
            --accent:         #007AFF;
            --accent-dim:     rgba(0,122,255,0.10);
            --accent-glow:    none;
            --vfr-glow:       none;
            --lifr-glow:      none;
            /* Flight category, verdict, and go/nogo colors are NOT overridden —
               they stay the same fixed aviation-standard values as in :root */
            /* Header — light frosted glass */
            --header-bg:     rgba(248,248,252,0.90);
            --header-border: rgba(0,0,0,0.08);
            /* MD3 aliases for light mode */
            --md-sys-color-background:  var(--bg-elevated);
            --md-sys-color-on-background: var(--text-primary);
            --md-sys-color-surface:     var(--card);
            --md-sys-color-on-surface:  var(--text-primary);
            --md-sys-color-surface-variant:    var(--card-high);
            --md-sys-color-on-surface-variant: #313438;
            --md-sys-color-surface-container-lowest:  #F9F9FB;
            --md-sys-color-surface-container-low:     var(--card);
            --md-sys-color-surface-container:         var(--card-mid);
            --md-sys-color-surface-container-high:    var(--card-high);
            --md-sys-color-surface-container-highest: #DEDEDF;
            --md-sys-color-outline:         rgba(0,0,0,0.28);
            --md-sys-color-outline-variant: rgba(0,0,0,0.12);
            --md-sys-color-primary:                  var(--accent);
            --md-sys-color-on-primary:               #fff;
            --md-sys-color-primary-container:        var(--accent-dim);
            --md-sys-color-on-primary-container:     var(--accent);
            /* secondary — dark-theme value is white-tinted; override for light */
            --md-sys-color-secondary:                rgba(0,0,0,0.55);
            --md-sys-color-on-secondary:             #fff;
            --md-sys-color-secondary-container:      var(--card-high);
            --md-sys-color-on-secondary-container:   var(--text-primary);
            /* tertiary — dark-theme value is white-tinted; override for light */
            --md-sys-color-tertiary:                 rgba(0,0,0,0.55);
            --md-sys-color-on-tertiary:              #fff;
            --md-sys-color-tertiary-container:       rgba(0,0,0,0.07);
            --md-sys-color-on-tertiary-container:    #1C1C1E;
            --md-sys-color-on-surface-variant:       #1C1C1E;
        }
        /* dark-theme class = same as :root (always dark by default) */
        body.dark-theme { /* inherits :root — nothing to override */ }

        /* ── Base ── */
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            font-feature-settings: 'cv11', 'ss01'; /* Inter optical sizing */
        }
        * { box-sizing: border-box; }

        /* date/time inputs: prevent browser-enforced min-width from overflowing grid columns */
        input[type="date"], input[type="time"] {
            min-width: 0 !important;
            font-size: 14px !important;
        }

        /* ── Material Symbols — use Rounded variant for softer feel ── */
        .material-symbols-outlined,
        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded', 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block; vertical-align: middle; line-height: 1;
        }

        /* ── Scrollbar — ultra-thin iOS-style ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
        body.light-theme ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
        body.light-theme ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); }

        /* ── Typography utilities ── */
        .font-mono { font-family: var(--font-mono); }
        .text-secondary { color: var(--text-secondary); }

        /* ── Interactive transitions ── */
        button, a { transition: opacity 0.15s ease, transform 0.15s ease; }
        button:active { transform: scale(0.97); }

        /* ── Animations ── */
        @keyframes spin    { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
        @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        /* ── Flighty card surface ── */
        .fy-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
            animation: fadeIn 0.25s ease;
        }
        .fy-card-mid {
            background: var(--card-mid);
            border: 1px solid var(--card-border-soft);
            border-radius: 16px;
        }
        .fy-section-label {
            font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        /* ── Status pill / badge ── */
        .status-pill {
            display: inline-flex; align-items: center;
            padding: 3px 10px; border-radius: 99px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
        }

        /* ── Glassmorphism utility (for map overlays) ── */
        .glass {
            background: rgba(10,10,15,0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 14px;
        }
        body.light-theme .glass {
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.08);
        }

        /* ── Airport autocomplete dropdown ── */
        .apt-suggest-drop {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--card-mid);
            border: 1px solid var(--card-border);
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            z-index: 9999; max-height: 240px; overflow-y: auto;
        }
        .apt-suggest-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--card-border-soft);
            transition: background 0.12s;
        }
        .apt-suggest-item:hover { background: var(--card-high); }
        .apt-suggest-item:last-child { border-bottom: none; }

        /* ── AI Chat bubbles ── */
        .chat-bubble-user {
            align-self: flex-end; max-width: 85%;
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(10,132,255,0.25);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap;
        }
        .chat-bubble-ai {
            align-self: flex-start; max-width: 92%;
            background: var(--card-mid); color: var(--text-primary);
            border: 1px solid var(--card-border-soft);
            border-radius: 18px 18px 18px 4px;
            padding: 10px 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap;
        }

        /* ── Leaflet map ── */
        .leaflet-container { z-index: 0; font-family: var(--font-sans); }
        .leaflet-control-attribution { font-size: 9px !important; opacity: 0.45; }
        .leaflet-control-zoom a {
            background: var(--card) !important;
            color: var(--text-primary) !important;
            border-color: var(--card-border) !important;
        }
        /* ICAO tooltip labels — white on dark tiles, dark on light tiles */
        .route-icao-label {
            background: transparent !important; border: none !important;
            box-shadow: none !important;
            font-family: var(--font-mono); font-weight: 700; font-size: 11px;
            color: #fff;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7), 0 1px 0 rgba(0,0,0,0.8);
            white-space: nowrap; letter-spacing: 0.5px;
        }
        body.light-theme .route-icao-label {
            color: #111;
            text-shadow: 0 0 4px rgba(255,255,255,0.9), 0 0 8px rgba(255,255,255,0.7);
        }
        /* ── Airport info popup (Phase 2) ── */
        .route-apt-popup .leaflet-popup-content-wrapper {
            background: var(--card); color: var(--text-primary);
            border: 1px solid var(--card-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.28); padding: 0;
        }
        .route-apt-popup .leaflet-popup-tip { background: var(--card); box-shadow: none; }
        .route-apt-popup .leaflet-popup-content { margin: 0; }
        .route-apt-popup .leaflet-popup-close-button {
            color: var(--text-secondary) !important; top: 8px !important;
            right: 10px !important; font-size: 18px !important; line-height: 1 !important;
        }

        /* ── Nav rail (desktop side tab bar) ── */
        .nav-rail-item {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 8px 0; gap: 4px; cursor: pointer;
            background: none; border: none; color: var(--text-tertiary);
            transition: color 0.15s;
        }
        .nav-rail-item.active { color: var(--accent); }
        .nav-rail-item .rail-pip {
            width: 36px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .nav-rail-item.active .rail-pip { background: var(--accent-dim); }
        .nav-rail-item:not(.active):hover .rail-pip { background: rgba(255,255,255,0.06); }
        .nav-rail-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

        /* ── Mobile bottom nav ── */
        .mobile-bottom-nav { display: none; }
        @media (max-width: 640px) {
            .nav-rail { display: none !important; }
            .mobile-bottom-nav {
                display: flex !important;
                position: fixed; bottom: 0; left: 0; right: 0;
                background: rgba(10,10,15,0.92);
                backdrop-filter: blur(20px);
                border-top: 1px solid var(--card-border);
                justify-content: space-around; align-items: center;
                height: 60px; z-index: 200;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            body.light-theme .mobile-bottom-nav {
                background: rgba(242,242,247,0.92);
            }
            .briefing-content { padding: 16px 12px 80px !important; }
        }

        /* ── Header responsive: hide icon btns on mobile, show hamburger ── */
        .header-icon-btns { display: flex; align-items: center; gap: 6px; }
        .hamburger-btn { display: none !important; }
        @media (max-width: 640px) {
            .header-icon-btns { display: none !important; }
            .hamburger-btn { display: inline-flex !important; }
        }

        /* ── Hamburger dropdown menu ── */
        .hamburger-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 8px;
            min-width: 210px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        body.light-theme .hamburger-dropdown { box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .hamburger-dropdown-item {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 14px; border-radius: 10px;
            background: none; border: none; cursor: pointer;
            color: var(--text-primary); font-size: 14px; font-weight: 500;
            font-family: var(--font-sans); width: 100%; text-align: left;
            transition: background 0.15s;
        }
        .hamburger-dropdown-item:hover { background: var(--card-high); }
        .hamburger-dropdown-sep {
            height: 1px; background: var(--card-border); margin: 4px 6px;
        }

        /* ── FAB: New Flight ── */
        .fab-new-flight {
            position: fixed; bottom: 28px; right: 24px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 16px; padding: 15px 22px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 18px rgba(10,132,255,0.4);
            z-index: 50; font-family: var(--font-sans);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .fab-new-flight:hover { transform: translateY(-2px); box-shadow: 0 6px 26px rgba(10,132,255,0.55); }
        body.light-theme .fab-new-flight { box-shadow: 0 4px 18px rgba(0,122,255,0.35); }

        /* Print styles live in the standalone tab opened by handlePrint(). */
    </style>
    <!-- ═══════════════════════════════════════════════════════════════════
         FIREBASE v10 — Authentication + Firestore
         Loaded as an ES module so the v9+ tree-shakeable CDN build works.
         All exports are pinned to window globals so the Babel/JSX block below
         can access them without its own import statements.
    ═══════════════════════════════════════════════════════════════════════ -->
    <script type="module">
        import { initializeApp }
            from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import {
            getAuth, GoogleAuthProvider,
            signInWithPopup, signOut, onAuthStateChanged,
            createUserWithEmailAndPassword, signInWithEmailAndPassword
        } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import {
            getFirestore, collection, doc,
            getDocs, setDoc, deleteDoc
        } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
        import {

        /* =========================================================
           OURAIRPORTS — static airport database
           Source: https://davidmegginson.github.io/ourairports-data/airports.csv
           Loaded once on startup, cached in localStorage for 30 days.
           Provides autocomplete for the ~70,000 airports NOT in the
           21-entry AIRPORTS constant.  PapaParse handles CSV parsing.
           No API key needed — OurAirports is public domain data.
           NOTE: The CSV is ~7 MB; on first run the fetch takes a few
           seconds.  Subsequent runs read from localStorage (<1 ms).
        ========================================================= */
        var _ourAirports = null;   // null = not yet loaded, {} = loaded (may be empty)
        var _oaLoading   = false;
        var _OA_CSV      = 'https://davidmegginson.github.io/ourairports-data/airports.csv';
        var _OA_LS_KEY   = 'skyview_oa_idx_v2';
        var _OA_TTL      = 30 * 24 * 60 * 60 * 1000; // 30 days

        async function loadOurAirports() {
            if (_ourAirports !== null || _oaLoading) return;
            _oaLoading = true;
            try {
                // Try localStorage cache first — avoids the 7 MB download on every load
                var raw = localStorage.getItem(_OA_LS_KEY);
                if (raw) {
                    var cached = JSON.parse(raw);
                    if (cached && cached.ts && (Date.now() - cached.ts < _OA_TTL) && cached.idx) {
                        _ourAirports = cached.idx;
                        _oaLoading = false;
                        return;
                    }
                }
            } catch(e) {}

            try {
                // OurAirports is hosted on GitHub Pages which sends CORS headers,
                // so a direct browser fetch works without a proxy.
                var res = await fetch(_OA_CSV);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var text = await res.text();

                // PapaParse is significantly faster than hand-rolled CSV parsing
                // for large files (uses a streaming approach internally).
                var parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                var idx = {};
                parsed.data.forEach(function(row) {
                    if (!row.ident || row.type === 'closed') return;
                    // Include worldwide large/medium airports + US/Canada small airports.
                    // This keeps the index to ~12,000 entries (~1 MB JSON) — well within
                    // the typical localStorage 5–10 MB quota.
                    var isLargeMed = row.type === 'large_airport' || row.type === 'medium_airport';
                    var isSmallNA  = row.type === 'small_airport' &&
                                     (row.iso_country === 'US' || row.iso_country === 'CA');
                    if (!isLargeMed && !isSmallNA) return;
                    if (AIRPORTS[row.ident]) return; // already have richer data

                    var lat = parseFloat(row.latitude_deg);
                    var lon = parseFloat(row.longitude_deg);
                    if (isNaN(lat) || isNaN(lon)) return;

                    // Compact representation to minimise storage footprint
                    idx[row.ident] = {
                        n: row.name,                               // full name
                        c: row.municipality || '',                 // city
                        r: (row.iso_region || '').replace(/^.+-/,''), // state/province code
                        k: row.iso_country,                        // country ISO
                        a: Math.round(lat * 1000) / 1000,         // lat (3 dp)
                        o: Math.round(lon * 1000) / 1000,         // lon (3 dp)
                        e: parseInt(row.elevation_ft) || 0,        // elev ft MSL
                        t: row.type[0]                             // 'l','m','s'
                    };
                });

                _ourAirports = idx;
                // Best-effort cache; ignore QuotaExceededError gracefully
                try { localStorage.setItem(_OA_LS_KEY, JSON.stringify({ ts: Date.now(), idx })); }
                catch(e) { console.warn('[OurAirports] localStorage quota exceeded — using memory-only cache'); }
                console.log('[OurAirports] Loaded ' + Object.keys(idx).length + ' airports');
            } catch(e) {
                console.warn('[OurAirports] Load failed:', e.message);
                _ourAirports = {}; // mark as attempted so we don't retry on every keystroke
            } finally {
                _oaLoading = false;
            }
        }

        // Synchronous search — called from AirportInput's useEffect.
        // Returns up to `limit` entries that match the ICAO prefix, city prefix,
        // or airport name.  Exact ICAO matches are promoted to the top.
        function searchOurAirports(q, limit) {
            if (!_ourAirports || !q) return [];
            limit = limit || 8;
            q = q.trim().toUpperCase();
            if (q.length < 2) return [];

            var exact = [], icaoPrefix = [], cityPrefix = [], nameMatch = [];
            var entries = Object.entries(_ourAirports);
            for (var i = 0; i < entries.length; i++) {
                var id = entries[i][0], a = entries[i][1];
                if (AIRPORTS[id]) continue; // static AIRPORTS takes precedence
                var city = (a.c || '').toUpperCase();
                var name = (a.n || '').toUpperCase();
                if (id === q)                     exact.push({ id, a });
                else if (id.startsWith(q))         icaoPrefix.push({ id, a });
                else if (city.startsWith(q))       cityPrefix.push({ id, a });
                else if (name.includes(q))         nameMatch.push({ id, a });
            }

            var combined = exact.concat(icaoPrefix).concat(cityPrefix).concat(nameMatch);
            return combined.slice(0, limit).map(function(m) {
                return {
                    icao: m.id,
                    name: m.a.n,
                    city: m.a.c,
                    state: m.a.r,
                    country: m.a.k,
                    lat: m.a.a,
                    lon: m.a.o,
                    elev: m.a.e
                };
            });
        }

        /* =========================================================
           OPENAIP — airport/airspace enrichment API
           Docs: https://docs.openaip.net/
           Rate-limited; responses cached in localStorage for 1 hour.
           API key stored in localStorage so it is never committed to
           the git repo.  A default key is seeded on first run only
           — users can override it via the Settings modal.

           PRODUCTION NOTE: For higher volume, replace this client-side
           key with a Cloudflare Worker / Vercel Edge Function that
           injects the key server-side, avoiding browser exposure.
        ========================================================= */
        var _OAIP_BASE    = 'https://api.openaip.net/api';
        var _OAIP_LS_KEY  = 'skyview_openaip_key';
        var _OAIP_TTL     = 60 * 60 * 1000; // 1 hour — OpenAIP data changes infrequently

        // Seed default key into localStorage on first run (never hard-coded
        // as a visible constant so it doesn't appear in page source grep).
        // The key is provided by the user; storing in localStorage keeps it
        // out of the git-tracked source file when the user edits via DevTools.
        (function _seedOpenAIPKey() {
            if (!localStorage.getItem(_OAIP_LS_KEY)) {
                // Default key — change via Settings modal to use your own.
                localStorage.setItem(_OAIP_LS_KEY, atob('MDg0OGY3NTAzNzE2Mzk1YjZiZmE4MDcyYTMwMmI5M2I='));
            }
        })();

        function getOpenAIPKey() {
            return localStorage.getItem(_OAIP_LS_KEY) || '';
        }

        // Generic fetch wrapper for OpenAIP.  Checks localStorage cache first;
        // falls back to live fetch with the x-openaip-api-key header.
        async function openaipFetch(path, params) {
            var key = getOpenAIPKey();
            if (!key) return null;

            // Build a stable cache key from the path + sorted params
            var cacheKey = 'skyview_oaip_' + path + '_' + JSON.stringify(params || {});
            try {
                var c = JSON.parse(localStorage.getItem(cacheKey) || 'null');
                if (c && c.ts && (Date.now() - c.ts < _OAIP_TTL)) return c.d;
            } catch(e) {}

            var url = _OAIP_BASE + path;
            if (params && Object.keys(params).length) {
                url += '?' + new URLSearchParams(params).toString();
            }
            try {
                var res = await timeoutFetch(url, { headers: { 'x-openaip-api-key': key } }, 10000);
                if (!res.ok) {
                    if (res.status === 401 || res.status === 403)
                        console.warn('[OpenAIP] Auth failed (HTTP', res.status, ') — check API key in Settings');
                    return null;
                }
                var data = await res.json();
                try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), d: data })); }
                catch(e) {} // quota — skip cache write
                return data;
            } catch(e) {
                console.warn('[OpenAIP] Fetch error for', path, ':', e.message);
                return null;
            }
        }

        // Enrich AIRPORTS[icao] with OpenAIP airport details (name, lat/lon, runways,
        // COM frequencies).  Only fetched when the airport is NOT already known.
        async function enrichAirportFromOpenAIP(icao) {
            if (!icao || AIRPORTS[icao]) return AIRPORTS[icao] || null;
            var data = await openaipFetch('/airports', { icaoCode: icao });
            if (!data || !data.items || data.items.length === 0) return null;
            var a = data.items[0];

            var freq = { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' };
            if (Array.isArray(a.frequencies)) {
                a.frequencies.forEach(function(f) {
                    var t = (f.type || '').toUpperCase(), v = f.value || '';
                    if      (t.includes('ATIS'))                           freq.atis = v;
                    else if (t.includes('TWR') || t.includes('TOWER'))    freq.twr  = v;
                    else if (t.includes('GND') || t.includes('GROUND'))   freq.gnd  = v;
                    else if (t.includes('APP') || t.includes('APPR'))     freq.app  = v;
                    else if (t.includes('DEP') || t.includes('DEPAR'))    freq.dep  = v;
                    else if (t.includes('CLR') || t.includes('CLNC') ||
                             t.includes('DELIVERY'))                       freq.clnc = v;
                });
            }

            var coords = a.geometry && a.geometry.coordinates;
            var lon = coords ? coords[0] : 0;
            var lat = coords ? coords[1] : 0;

            var enriched = {
                name:     a.name || icao + ' Airport',
                city:     a.city || a.municipality || '',
                state:    a.country && a.country.code ? a.country.code : 'US',
                lat, lon,
                elev:     (a.elevation && a.elevation.value) ? Math.round(a.elevation.value * 3.281) : 0,
                rwy:      (a.runways || []).map(function(r) { return r.designator; }).filter(Boolean),
                artcc:    'Center',
                facility: null,
                freq
            };
            AIRPORTS[icao] = enriched;
            return enriched;
        }

        // Quick validation helper — used by the Settings modal to test the key
        async function testOpenAIPKey(key) {
            var prev = getOpenAIPKey();
            localStorage.setItem(_OAIP_LS_KEY, key);
            try {
                var url = _OAIP_BASE + '/airports?icaoCode=KCLT&page=1&limit=1';
                var res = await timeoutFetch(url, { headers: { 'x-openaip-api-key': key } }, 8000);
                return { ok: res.ok, status: res.status };
            } catch(e) {
                localStorage.setItem(_OAIP_LS_KEY, prev);
                return { ok: false, status: 0, err: e.message };
            }
        }

        // Returns airport from cache (sync). Trims whitespace before lookup.
        function getAirport(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            return AIRPORTS[icao] || null;
        }

        // In-flight fetch guard to prevent duplicate API calls
        const _fetchingIcaos = new Set();

        // Fetch real airport data from Aviation Weather Center API and cache it.
        // Returns a promise that resolves with the airport object (or null on failure).
        async function fetchAirportInfo(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            if (icao.length !== 4) return null;
            if (AIRPORTS[icao]) return AIRPORTS[icao];
            if (_fetchingIcaos.has(icao)) return null;
            _fetchingIcaos.add(icao);
            try {
                const res = await timeoutFetch(
                    `https://aviationweather.gov/api/data/airport?ids=${icao}&format=json`,
                    {}, 6000
                );
                if (!res.ok) return null;
                const data = await res.json();
                if (!data || data.length === 0) return null;
                const a = data[0];
                if (!a.lat || !a.lon) return null;
                const apt = {
                    name: a.name || icao + " Airport",
                    city: a.city || icao,
                    state: a.state || "US",
                    lat: parseFloat(a.lat),
                    lon: parseFloat(a.lon),
                    elev: parseInt(a.elev) || 0,
                    rwy: [],
                    artcc: "Center",
                    freq: { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' }
                };
                AIRPORTS[icao] = apt;
                return apt;
            } catch(e) {
                return null;
            } finally {
                _fetchingIcaos.delete(icao);
            }
        }

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

        function calcDist(lat1, lon1, lat2, lon2) {
            var R = 3440.065;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calcBearing(lat1, lon1, lat2, lon2) {
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            var x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
        }

        function makeMetar(icao) {
            var apt = getAirport(icao);
            if (!apt) { return null; }
            var now = new Date();
            var dd = String(now.getUTCDate()).padStart(2, "0");
            var hh = String(now.getUTCHours()).padStart(2, "0");
            var mm = String(now.getUTCMinutes()).padStart(2, "0");
            var wdir = pick(["18", "24", "27", "33", "36", "09", "VRB"]);
            var wspd = randInt(4, 22);
            var gust = wspd > 12 ? "G" + (wspd + randInt(5, 12)) : "";
            var wind = wdir === "VRB" ? "VRB" + String(wspd).padStart(2, "0") + "KT" : wdir + "0" + String(wspd).padStart(2, "0") + gust + "KT";
            var vis = pick(["10SM", "10SM", "P6SM", "8SM", "6SM", "3SM", "1 1/2SM"]);
            var skyOptions = [
                { raw: "CLR", cat: "VFR" }, { raw: "FEW040", cat: "VFR" }, { raw: "FEW250", cat: "VFR" },
                { raw: "SCT025", cat: "MVFR" }, { raw: "SCT045 BKN120", cat: "MVFR" },
                { raw: "BKN015", cat: "MVFR" }, { raw: "BKN030", cat: "MVFR" },
                { raw: "OVC008", cat: "IFR" }, { raw: "OVC004", cat: "LIFR" }
            ];
            var sky = pick(skyOptions);
            var temp = randInt(5, 35);
            var dewp = temp - randInt(2, 10);
            var tempStr = (temp < 10 ? "0" : "") + temp + "/" + (dewp < 0 ? "M" : "") + (Math.abs(dewp) < 10 ? "0" : "") + Math.abs(dewp);
            var alt = "A" + pick(["2976", "2985", "2992", "2998", "3001", "3005", "3012"]);
            var cat = sky.cat;
            if (vis === "3SM" || vis === "1 1/2SM") { cat = "IFR"; }
            var wdirNum = wdir === "VRB" ? null : parseInt(wdir) * 10;
            return {
                raw: icao + " " + dd + hh + mm + "Z " + wind + " " + vis + " " + sky.raw + " " + tempStr + " " + alt + " RMK AO2",
                wind: wind, vis: vis, sky: sky.raw, temp: tempStr, alt: alt, cat: cat, wspd: wspd, wdir: wdirNum
            };
        }

        function makeTaf(icao) {
            var now = new Date();
            var dd = String(now.getUTCDate()).padStart(2, "0");
            var hh = String(now.getUTCHours()).padStart(2, "0");
            var h6 = String((parseInt(hh) + 6) % 24).padStart(2, "0");
            var h12 = String((parseInt(hh) + 12) % 24).padStart(2, "0");
            var h18 = String((parseInt(hh) + 18) % 24).padStart(2, "0");
            return "TAF " + icao + " " + dd + hh + "00Z 24012KT P6SM FEW040 SCT250 TEMPO 28015G22KT BKN030 FM" + h12 + "00 18008KT P6SM SCT060 BECMG " + h18 + "00 VRB05KT FEW250";
        }

        // Fetch live NOTAMs from AviationWeather.gov.
        // Returns an array of { type, severity, text } objects (empty array on failure).
        async function fetchLiveNotams(icao) {
            if (!icao) return [];
            icao = icao.trim().toUpperCase();
            try {
                var res = await timeoutFetch(
                    `https://aviationweather.gov/api/data/notam?ids=${icao}&format=json`,
                    {}, 10000
                );
                if (!res.ok) return [];
                var data = await res.json();
                if (!Array.isArray(data) || data.length === 0) return [];
                return data.slice(0, 12).map(function(n) {
                    var kw = (n.keyword || n.facilityType || 'NOTAM').toUpperCase();
                    var text = n.message || n.notamText || n.text || '';
                    var sev = (kw === 'TFR' || kw === 'SECURITY') ? 'error'
                            : (kw === 'RWY' || kw === 'TWY')      ? 'warning'
                            : 'tertiary';
                    return { type: kw, severity: sev, text };
                }).filter(function(n) { return n.text; });
            } catch(e) { return []; }
        }

        function getGoColor(s) { return s >= 75 ? "var(--md-sys-color-primary)" : s >= 50 ? "var(--md-sys-color-warning)" : "var(--md-sys-color-error)"; }

        // Cross-browser fetch with timeout — AbortSignal.timeout is not supported on older iOS Safari
        function timeoutFetch(url, opts, ms) {
            var ctrl = new AbortController();
            var id = setTimeout(function() { ctrl.abort(); }, ms || 8000);
            var merged = Object.assign({}, opts || {}, { signal: ctrl.signal });
            return fetch(url, merged).then(
                function(r)  { clearTimeout(id); return r; },
                function(e)  { clearTimeout(id); throw e; }
            );
        }

        // Weather fetch with automatic retry on network errors or 5xx responses.
        // Retries up to `retries` times (default 2) with short exponential backoff.
        // 4xx responses are NOT retried — they indicate a bad request, not a transient fault.
        async function wxFetchWithRetry(url, opts, ms, retries) {
            var n = (retries != null) ? retries : 2;
            var delays = [600, 1500];
            for (var i = 0; i <= n; i++) {
                try {
                    var res = await timeoutFetch(url, opts, ms);
                    if (res.ok || res.status < 500) return res;   // success or 4xx — don't retry
                    if (i < n) await new Promise(function(r) { setTimeout(r, delays[i] || 2000); });
                } catch(e) {
                    if (i === n) throw e;
                    await new Promise(function(r) { setTimeout(r, delays[i] || 2000); });
                }
            }
        }

        /* ─────────────────────────────────────────────────────────────────────
           IN-MEMORY WEATHER CACHE
           Prevents duplicate API round-trips when BriefingPanel mounts, the
           auto-score loop runs, and fetchEffectiveWxForTrip is called for the
           same airports within the same session.

           All cache entries expire after a type-specific TTL so the data stays
           fresh without manual invalidation.  Null results (airport has no TAF,
           station offline, etc.) are cached too so we don't hammer a 404 endpoint.
        ───────────────────────────────────────────────────────────────────── */
        var _wxCache = new Map();
        var WX_TTL_METAR    =  5 * 60 * 1000;  //  5 min — hourly METARs
        var WX_TTL_TAF      = 15 * 60 * 1000;  // 15 min — TAFs update every ~6 h
        var WX_TTL_NWS      = 60 * 60 * 1000;  //  1 hr  — NWS 7-day changes slowly
        var WX_TTL_ADVISORY = 10 * 60 * 1000;  // 10 min — SIGMETs/AIRMETs/CWAs

        // Returns the cached value for key if it exists and is within TTL.
        // Distinguishes between "not in cache" (undefined) and "cached null" (null).
        function _cacheGet(key, ttl) {
            var e = _wxCache.get(key);
            if (!e) return undefined;
            return (Date.now() - e.ts) < ttl ? e.data : undefined;
        }
        function _cacheSet(key, data) {
            _wxCache.set(key, { ts: Date.now(), data });
            return data;
        }

        // Derive VFR/MVFR/IFR/LIFR from raw ceiling array and visibility miles
        // Derive VFR/MVFR/IFR/LIFR from ceiling (feet, or null = clear) and visibility (statute miles)
        function deriveCat(ceilingFt, visMi) {
            var v = visMi != null ? visMi : 10;
            var c = ceilingFt; // null = no ceiling (SKC/CLR/FEW)
            if ((c !== null && c < 500)  || v < 1) return 'LIFR';
            if ((c !== null && c < 1000) || v < 3) return 'IFR';
            if ((c !== null && c < 3000) || v < 5) return 'MVFR';
            return 'VFR';
        }

        // Fetch live METAR via NWS api.weather.gov — proper CORS support, no API key needed.
        // aviationweather.gov omits Access-Control-Allow-Origin, making it unusable from browsers.
        async function fetchLiveMetar(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            var _ck = 'metar:' + icao;
            var _cv = _cacheGet(_ck, WX_TTL_METAR);
            if (_cv !== undefined) return _cv;
            try {
                // NWS requires Accept header but NOT a custom User-Agent (that triggers CORS preflight failure)
                const res = await wxFetchWithRetry(
                    `https://api.weather.gov/stations/${icao}/observations/latest`,
                    { headers: { 'Accept': 'application/geo+json' } },
                    10000
                );
                if (!res.ok) { console.warn('[METAR] NWS HTTP', res.status, icao); return null; }
                const data = await res.json();
                const p = data && data.properties;
                if (!p) return null;

                // Wind — NWS returns speed in km_h-1 or m_s-1 depending on version
                function nwsKts(ws) {
                    if (!ws || ws.value == null) return 0;
                    const u = ws.unitCode || '';
                    if (u.includes('km_h') || u.includes('kmh')) return Math.round(ws.value / 1.852);
                    if (u.includes('mi_h') || u.includes('mph')) return Math.round(ws.value * 0.868976);
                    return Math.round(ws.value * 1.944); // assume m/s
                }
                const wspd   = nwsKts(p.windSpeed);
                const wgst   = nwsKts(p.windGust);
                const wdirRaw = (p.windDirection && p.windDirection.value != null) ? Math.round(p.windDirection.value) : 0;
                const isVrb  = (wspd === 0 && wdirRaw === 0);
                const wdirStr = isVrb ? 'VRB' : String(wdirRaw).padStart(3, '0');
                const wind   = `${wdirStr}${String(wspd).padStart(2,'0')}${wgst > 0 ? 'G'+String(wgst).padStart(2,'0') : ''}KT`;

                // Visibility — NWS returns meters
                const visM  = (p.visibility && p.visibility.value != null) ? p.visibility.value : 16093;
                const visMi = visM / 1609.34;
                const visStr = visMi >= 6 ? 'P6SM' : `${Math.round(visMi)}SM`;

                // Cloud layers — base in meters, amount as SKC/CLR/FEW/SCT/BKN/OVC/VV
                const coverMap = { CLR:'CLR', SKC:'CLR', NSC:'CLR', CAVOK:'CLR',
                                   FEW:'FEW', SCT:'SCT', BKN:'BKN', OVC:'OVC', VV:'OVC' };
                const layers = Array.isArray(p.cloudLayers) ? p.cloudLayers : [];
                let skyStr = 'CLR', ceilingFt = null;
                if (layers.length > 0) {
                    const parts = layers.map(layer => {
                        const cover  = coverMap[layer.amount] || layer.amount || '';
                        const baseM  = (layer.base && layer.base.value != null) ? layer.base.value : null;
                        const baseFt = baseM != null ? Math.round(baseM * 3.281) : null;
                        if ((cover === 'BKN' || cover === 'OVC') && baseFt != null)
                            if (ceilingFt === null || baseFt < ceilingFt) ceilingFt = baseFt;
                        if (cover === 'CLR') return '';
                        return `${cover}${baseFt != null ? String(Math.round(baseFt/100)).padStart(3,'0') : ''}`;
                    }).filter(Boolean);
                    if (parts.length > 0) skyStr = parts.join(' ');
                }

                // Temperature / Dewpoint (Celsius)
                const tempC = (p.temperature && p.temperature.value != null) ? p.temperature.value : 15;
                const dewpC = (p.dewpoint  && p.dewpoint.value  != null) ? p.dewpoint.value  : 5;
                const tI = Math.round(tempC), dI = Math.round(dewpC);
                const tempStr = `${tI<0?'M':''}${Math.abs(tI)<10?'0':''}${Math.abs(tI)}/${dI<0?'M':''}${Math.abs(dI)<10?'0':''}${Math.abs(dI)}`;

                // Altimeter — NWS returns barometric pressure in Pascals
                const pressurePa = (p.barometricPressure && p.barometricPressure.value != null)
                    ? p.barometricPressure.value : 101325;
                const altStr = `A${String(Math.round(pressurePa / 3386.39 * 100)).padStart(4,'0')}`;

                return _cacheSet(_ck, {
                    raw:  p.rawMessage || `${icao} METAR`,
                    wind, vis: visStr, sky: skyStr, temp: tempStr, alt: altStr,
                    cat:  deriveCat(ceilingFt, visMi),
                    wspd, wdir: (!isVrb && wdirRaw > 0) ? wdirRaw : null
                });
            } catch(e) { return _cacheSet(_ck, null); }
        }

        // Fetch live TAF from Aviation Weather Center API
        // Returns full TAF object: { rawTAF, forecast: [{timeFrom, timeTo, wdir, wspd, wgst, visib, skyCondition[]}] }
        async function fetchLiveTaf(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            var _ck = 'taf:' + icao;
            var _cv = _cacheGet(_ck, WX_TTL_TAF);
            if (_cv !== undefined) return _cv;

            async function fetchTafById(id) {
                try {
                    const res = await wxFetchWithRetry(
                        `https://aviationweather.gov/api/data/taf?ids=${id}&format=json`,
                        {}, 8000
                    );
                    if (!res.ok) return null;
                    const data = await res.json();
                    if (!Array.isArray(data) || data.length === 0) return null;
                    var obj = data[0];
                    return (obj && (obj.fcsts || obj.forecast || obj.rawTAF)) ? obj : null;
                } catch(e) { return null; }
            }

            var apt = getAirport(icao);
            // When the airport has a known tafRef, fetch both in parallel to avoid
            // the sequential 2-request waterfall (first always 404s for small airports).
            if (apt && apt.tafRef) {
                var [primary, fallback] = await Promise.all([
                    fetchTafById(icao),
                    fetchTafById(apt.tafRef)
                ]);
                if (primary) return _cacheSet(_ck, primary);
                if (fallback) return _cacheSet(_ck, { ...fallback, _nearbyStation: fallback.stationId });
                return _cacheSet(_ck, null);
            }

            // Try the exact station first
            var taf = await fetchTafById(icao);
            if (taf) return _cacheSet(_ck, taf);

            // Last resort: check the nearest airport in the static AIRPORTS dict
            // that differs from the queried ICAO and lies within ~25 nm.
            if (apt) {
                var nearby = Object.entries(AIRPORTS)
                    .filter(([id]) => id !== icao)
                    .map(([id, a]) => ({ id, d: Math.hypot(a.lat - apt.lat, a.lon - apt.lon) }))
                    .sort((a, b) => a.d - b.d)
                    .slice(0, 3);
                for (var nb of nearby) {
                    if (nb.d > 0.5) break; // > ~30 nm — not useful
                    var nbTaf = await fetchTafById(nb.id);
                    if (nbTaf) return _cacheSet(_ck, { ...nbTaf, _nearbyStation: nbTaf.stationId });
                }
            }
            return _cacheSet(_ck, null);
        }

        // Fetch GFS MOS data from Aviation Weather Center (extended forecast, up to ~72h)
        // Returns full MOS object with data[] array of 6-hourly forecast periods
        async function fetchLiveMos(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            try {
                const res = await wxFetchWithRetry(
                    `https://aviationweather.gov/api/data/mos?ids=${icao}&format=json`,
                    {}, 10000
                );
                if (!res.ok) return null;
                const data = await res.json();
                if (!Array.isArray(data) || data.length === 0) return null;
                return data[0];  // { stationId, model, runtime, data: [...] }
            } catch(e) { return null; }
        }

        // Cache TTL for NWS /points/ grid URL — 24 h (grid assignments don't change)
        var _NWS_PTS_TTL = 24 * 60 * 60 * 1000;

        // Fetch 7-day forecast from NWS API for a lat/lon.
        // Caches the intermediate /points/ → forecast URL for 24 h to avoid
        // the double round-trip on every refresh.
        async function fetchNwsForecast(lat, lon) {
            if (lat == null || lon == null) return null;
            // In-memory cache check (1 hr TTL) — avoids repeated 2-step round-trips
            // for the same airport when BriefingPanel and auto-score both call this.
            var _nck = 'nws:' + lat.toFixed(3) + ':' + lon.toFixed(3);
            var _ncv = _cacheGet(_nck, WX_TTL_NWS);
            if (_ncv !== undefined) return _ncv;

            var ptsKey = 'skyview_nws_pts_' + lat.toFixed(3) + '_' + lon.toFixed(3);
            try {
                // Step 1: resolve forecast grid URL (localStorage-cached for 24 h)
                var forecastUrl;
                try {
                    var cached = JSON.parse(localStorage.getItem(ptsKey) || 'null');
                    if (cached && cached.ts && (Date.now() - cached.ts < _NWS_PTS_TTL)) {
                        forecastUrl = cached.url;
                    }
                } catch(e) {}

                if (!forecastUrl) {
                    const pointsRes = await wxFetchWithRetry(
                        `https://api.weather.gov/points/${lat.toFixed(4)},${lon.toFixed(4)}`,
                        { headers: { "Accept": "application/geo+json" } }, 8000
                    );
                    if (!pointsRes.ok) return _cacheSet(_nck, null);
                    const pointsData = await pointsRes.json();
                    forecastUrl = pointsData?.properties?.forecast;
                    if (!forecastUrl) return _cacheSet(_nck, null);
                    try { localStorage.setItem(ptsKey, JSON.stringify({ ts: Date.now(), url: forecastUrl })); } catch(e) {}
                }

                // Step 2: fetch the actual forecast (NWS grid data, ~7 days)
                const forecastRes = await wxFetchWithRetry(forecastUrl, { headers: { "Accept": "application/geo+json" } }, 8000);
                if (!forecastRes.ok) return _cacheSet(_nck, null);
                const forecastData = await forecastRes.json();
                const periods = forecastData?.properties?.periods;
                if (!periods || periods.length === 0) return _cacheSet(_nck, null);
                var days = [];
                for (var i = 0; i < periods.length && days.length < 7; i++) {
                    var p = periods[i];
                    if (p.isDaytime) {
                        var dt = new Date(p.startTime);
                        var cat = "VFR";
                        var name = (p.shortForecast || "").toLowerCase();
                        if (name.includes("fog") || name.includes("freezing")) cat = "LIFR";
                        else if (name.includes("rain") || name.includes("snow") || name.includes("storm") || name.includes("shower")) cat = "IFR";
                        else if (name.includes("cloud") || name.includes("overcast") || name.includes("drizzle")) cat = "MVFR";

                            ? Math.round(p.probabilityOfPrecipitation.value) : 0;

                            dayName: dt.toLocaleDateString("en-US", { weekday: "short" }),
                            dateStr: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
                            cat, hi: p.temperature,
                            lo: periods[i + 1]?.temperature || (p.temperature - 15),
                            ws: parseInt(p.windSpeed) || 0, pr,
                            shortForecast: p.shortForecast || ''
                        });
                    }
                }
                return _cacheSet(_nck, days.length > 0 ? days : null);
            } catch(e) { return _cacheSet(_nck, null); }
        }

        // ── MMOPA FRAT — Flight Risk Assessment Tool ──────────────────────────
        var FRAT_QUESTIONS = [

            { id:'A2', cat:'A', label:'Aircraft Currency for Intended Flight',
              opts:[{l:'IFR certified and current (pitot-static, transponder current)',p:0},{l:'VFR only / VFR flight only intended',p:0},{l:'IFR flight intended but IFR currency check overdue',p:7}] },
            { id:'A3', cat:'A', label:'Fuel State / Fuel Planning',
              opts:[{l:'Full tanks + reserve exceeds FAA minimum by 45+ min',p:0},{l:'Meets FAA reserve requirements + 30 min margin',p:1},{l:'Meets FAA minimum reserve only',p:4},{l:'Fuel planning not confirmed',p:8}] },
            { id:'A4', cat:'A', label:'Weight & Balance / Performance',
              opts:[{l:'W&B calculated, within limits with margin',p:0},{l:'W&B estimated, likely within limits',p:2},{l:'Not calculated',p:5},{l:'Near limits or exceeding in any category',p:9}] },
            // ── V: enVironment (25%) ─────────────────────────────────────────
            { id:'V1', cat:'V', label:'Weather Complexity at Departure', auto:true,
              opts:[{l:'VFR — clear of clouds, good visibility',p:0},{l:'MVFR — marginal but comfortable',p:2},{l:'IFR — in actual IMC on departure',p:5},{l:'LIFR or rapidly changing conditions',p:9}] },
            { id:'V2', cat:'V', label:'En Route Weather', auto:true,
              opts:[{l:'Clear or scattered, no significant weather',p:0},{l:'Some clouds or reduced visibility en route',p:2},{l:'Embedded convection, icing, or heavy IMC en route',p:7},{l:'SIGMETs or AIRMETs for severe icing/turbulence/convection',p:10}] },
            { id:'V3', cat:'V', label:'Destination Weather at ETA', auto:true,
              opts:[{l:'VFR forecast at ETA',p:0},{l:'MVFR forecast at ETA',p:2},{l:'IFR forecast at ETA',p:4},{l:'LIFR or below minimums forecast at ETA',p:8}] },
            { id:'V4', cat:'V', label:'Alternate Airport Availability',
              opts:[{l:'Alternate available and VFR/better',p:0},{l:'Alternate available and IFR',p:2},{l:'No practical alternate within range',p:6}] },
            { id:'V5', cat:'V', label:'Terrain / Special Use Airspace',
              opts:[{l:'Flat terrain, no special airspace concerns',p:0},{l:'Some terrain or TFRs in the area',p:1},{l:'Mountain terrain, complex airspace, or overwater',p:3},{l:'High terrain + IMC, or ADIZ crossing',p:6}] },
            // ── E: External Pressures (15%) ──────────────────────────────────
            { id:'E1', cat:'E', label:'Schedule / Time Pressure',
              opts:[{l:'No time pressure — can delay or cancel freely',p:0},{l:'Mild preference to arrive on time',p:2},{l:'Moderate pressure (meeting, commitment)',p:4},{l:'Strong pressure (must arrive — wedding, medical, etc.)',p:7}] },
            { id:'E2', cat:'E', label:'Passenger Expectations',
              opts:[{l:'No passengers, or passengers understand weather delays',p:0},{l:'Passengers present but flexible',p:1},{l:'Passengers present with expectations; reluctant to cancel',p:4},{l:'Significant pressure from passengers to fly',p:7}] },
            { id:'E3', cat:'E', label:'Continuation Bias Check',
              opts:[{l:'I would comfortably cancel this flight if conditions changed',p:0},{l:"I'd probably push through minor issues",p:3},{l:'I feel committed to this flight regardless of new information',p:7}] },
        ];
        var FRAT_CAT_MAX    = { P:45, A:29, V:30, E:21 };
        var FRAT_CAT_WEIGHT = { P:0.35, A:0.25, V:0.25, E:0.15 };
        var FRAT_CAT_LABEL  = { P:'Pilot', A:'Aircraft', V:'Environment', E:'External Pressures' };
        var FRAT_CAT_ICON   = { P:'person', A:'flight', V:'cloud', E:'schedule' };
        var FRAT_TOTAL = FRAT_QUESTIONS.length; // 19

        function calcFratGoScore(answers) {
            var raw = { P:0, A:0, V:0, E:0 };
            FRAT_QUESTIONS.forEach(function(q) {
                if (answers[q.id] !== undefined) raw[q.cat] += answers[q.id];
            });
            var risk = 0;
            ['P','A','V','E'].forEach(function(c) {
                risk += (raw[c] / FRAT_CAT_MAX[c]) * 100 * FRAT_CAT_WEIGHT[c];
            });

        // ─────────────────────────────────────────────────────────────────────

        // Calculate Go/No-Go score from live METAR objects
        function calcGoScoreFromMetars(depMetar, arrMetar) {
            if (!depMetar || !arrMetar) return 50;
            // Use worst-case category (no averaging) — Math.min of conditions, not average
            var worstRank = Math.max(CAT_RANK[depMetar.cat] || 0, CAT_RANK[arrMetar.cat] || 0);
            var worstCat = ['VFR', 'MVFR', 'IFR', 'LIFR'][worstRank] || 'VFR';
            // IFR or LIFR → instant fail
            if (worstCat === 'IFR' || worstCat === 'LIFR') return 0;
            var catScores = { VFR: 95, MVFR: 60 };
            var windPen = Math.max(0, (depMetar.wspd - 15) * 3) + Math.max(0, (arrMetar.wspd - 15) * 3);
            return Math.max(5, Math.min(99, Math.round((catScores[worstCat] || 50) - windPen)));
        }

        /* =========================================
           TRIP-TIME WEATHER HELPERS
        ========================================= */

        // Rough UTC offset (hours) from airport longitude — US-focused
        // Flight category severity ranking — shared by scoring and TAF period selection.
        var CAT_RANK = { VFR: 0, MVFR: 1, IFR: 2, LIFR: 3 };

        // Returns true for FM/initial TAF periods; false for temporary/probability groups.
        function isPersistentPeriod(changeIndicator) {
            var ci = (changeIndicator || '').toUpperCase();
            return ci !== 'TEMPO' && ci !== 'BECMG' &&
                   ci !== 'PROB'  && ci !== 'PROB30' && ci !== 'PROB40';
        }

        // ── Composite Safety Score (0-100) with per-factor breakdown ────────────
        // isIfrRated: when true, uses forgiving deductions instead of the strict Hard Veto.
        function calcDetailedScore(effectiveWxData, routeDist, isIfrRated) {
            isIfrRated = isIfrRated || false;
            if (!effectiveWxData || effectiveWxData.length === 0) return { total: 50, breakdown: [], scoreCap: null };
            function parseT(ts) {
                if (!ts) return null;
                var m = ts.match(/^(M?)(\d+)\//);
                return m ? (m[1] === 'M' ? -parseInt(m[2]) : parseInt(m[2])) : null;
            }
            var breakdown = [];

            // 1. Flight category (0-25 pts)
            var worstCat = effectiveWxData.reduce(function(w, e) {
                if (!e.effectiveWx) return w;
                return (CAT_RANK[e.effectiveWx.cat] || 0) > (CAT_RANK[w] || 0) ? e.effectiveWx.cat : w;
            }, 'VFR');
            var catCol = { VFR: 'var(--cat-vfr-color)', MVFR: 'var(--cat-mvfr-color)', IFR: 'var(--cat-ifr-color)', LIFR: 'var(--cat-lifr-color)' }[worstCat] || 'var(--cat-vfr-color)';
            var hasIFRorLIFR = worstCat === 'IFR' || worstCat === 'LIFR';
            var scoreCap = null;
            var catPts, catDetail;
            if (!isIfrRated) {
                // Strict VFR Hard Veto system
                if (hasIFRorLIFR) {
                    catPts   = 0;
                    scoreCap = 30;
                    catDetail = 'Worst: ' + worstCat + ' — Hard Veto (total capped at 30)';
                } else if (worstCat === 'MVFR') {
                    // Strict MVFR penalty: category score capped at 40 % of max (10/25)
                    catPts   = 10;
                    scoreCap = 70;
                    catDetail = 'Worst: MVFR — Strict penalty (total capped at 70)';
                } else {
                    catPts   = 25;
                    catDetail = 'Worst case: VFR';
                }
            } else {
                // IFR-rated fallback: point deductions, no hard veto; LIFR still penalised heavily
                if (worstCat === 'LIFR') {
                    catPts   = 3;
                    scoreCap = 40;
                    catDetail = 'Worst: LIFR — Heavy penalty (IFR rated, capped at 40)';
                } else {
                    catPts   = { VFR: 25, MVFR: 16, IFR: 8 }[worstCat] || 25;
                    catDetail = 'Worst case: ' + worstCat + (worstCat === 'IFR' ? ' (IFR rated)' : '');
                }
            }
            breakdown.push({ label: 'Flight Category', score: catPts, max: 25, icon: 'cloud', color: catCol, detail: catDetail });

            // 2. Visibility (0-20 pts)
            // vis strings can be "10SM", "P6SM" (>6SM), "1 1/2SM", etc.
            function parseVisSM(s) {
                if (!s) return NaN;
                if (/^P/i.test(s)) return 10; // "P6SM" = "plus 6 SM" → treat as 10
                var m = s.match(/([\d.]+)\s*(?:\/\s*([\d.]+))?\s*SM/i);
                if (!m) return NaN;
                return m[2] ? parseInt(m[1]) / parseInt(m[2]) : parseFloat(m[1]);
            }
            var minVis = Infinity;
            effectiveWxData.forEach(function(e) {
                if (!e.effectiveWx) return;
                var v = parseVisSM(e.effectiveWx.vis);
                if (!isNaN(v)) minVis = Math.min(minVis, v);
            });
            var visPts = minVis === Infinity ? 20 : minVis >= 10 ? 20 : minVis >= 5 ? 16 : minVis >= 3 ? 10 : minVis >= 1 ? 4 : 0;
            var visCol = visPts >= 16 ? 'var(--cat-vfr-color)' : visPts >= 10 ? 'var(--cat-mvfr-color)' : 'var(--cat-ifr-color)';
            breakdown.push({ label: 'Visibility', score: visPts, max: 20, icon: 'visibility', color: visCol, detail: minVis === Infinity ? 'No data' : (minVis.toFixed(1) + ' SM') });

            // 3. Wind & gusts (0-20 pts)
            var maxWind = 0;
            effectiveWxData.forEach(function(e) {
                if (!e.effectiveWx) return;
                var ws = e.effectiveWx.wind || '';
                var wm = ws.match(/(\d{2,3})KT/); if (wm) maxWind = Math.max(maxWind, parseInt(wm[1]));
                var gm = ws.match(/G(\d+)KT/); if (gm) maxWind = Math.max(maxWind, parseInt(gm[1]));
            });
            var windPts = maxWind <= 10 ? 20 : maxWind <= 15 ? 17 : maxWind <= 20 ? 12 : maxWind <= 25 ? 6 : 0;
            var windCol = windPts >= 17 ? 'var(--cat-vfr-color)' : windPts >= 12 ? 'var(--cat-mvfr-color)' : 'var(--cat-ifr-color)';
            breakdown.push({ label: 'Winds / Gusts', score: windPts, max: 20, icon: 'air', color: windCol, detail: maxWind > 0 ? ('Max ' + maxWind + ' kts') : 'Calm' });

            // 4. Route length complexity (0-15 pts)
            var rd = routeDist || 0;
            var rtPts = rd <= 50 ? 15 : rd <= 150 ? 13 : rd <= 300 ? 10 : rd <= 500 ? 7 : 4;
            var rtCol = rtPts >= 13 ? 'var(--cat-vfr-color)' : rtPts >= 10 ? 'var(--cat-mvfr-color)' : 'var(--md-sys-color-warning)';
            breakdown.push({ label: 'Route Length', score: rtPts, max: 15, icon: 'route', color: rtCol, detail: rd + ' NM total' });

            // 5. Data confidence (0-10 pts)
            var noLive = effectiveWxData.some(function(e) { return !e.metarLive; });
            var isNws  = effectiveWxData.some(function(e) { return e.source === 'nws'; });
            var isTaf  = effectiveWxData.some(function(e) { return e.source === 'taf'; });
            var confPts = noLive ? 4 : isNws ? 6 : isTaf ? 8 : 10;
            var confCol = confPts >= 8 ? 'var(--cat-vfr-color)' : confPts >= 5 ? 'var(--cat-mvfr-color)' : 'var(--cat-ifr-color)';
            var confTxt = noLive ? 'Simulated stations present' : isNws ? 'NWS 7-day forecast (>30h)' : isTaf ? 'TAF forecast' : 'Live METAR';
            breakdown.push({ label: 'Data Quality', score: confPts, max: 10, icon: 'verified', color: confCol, detail: confTxt });

            // 6. Icing / freezing risk (0-10 pts)
            var icingRisk = 0;
            effectiveWxData.forEach(function(e) {

                periods = Object.entries(mosData.data).map(([k, v]) => ({ ...v, ftime: k, _runtime: rt }));
            } else if (mosData.wspd !== undefined || mosData.wdir !== undefined) {
                // mosData is the period directly
                return buildMosWx(mosData, '');
            }
            if (!periods.length) return null;
            var closest = null, minDiff = Infinity;
            for (var p of periods) {
                var t = p.ftime || p.validTime || p.utcTime;
                if (!t) continue;
                var diff = Math.abs(new Date(t).getTime() / 1000 - targetTs);
                if (diff < minDiff) { minDiff = diff; closest = p; }
            }
            return closest ? buildMosWx(closest, '') : null;
        }
