<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="build-commit" content="__BUILD_COMMIT__">
    <meta name="build-timestamp" content="__BUILD_TIMESTAMP__">
    <title>FlightScore</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%230b57d0'/><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z' fill='%23ffffff'/></svg>">
    <!-- PWA: iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FlightScore">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- PWA: iOS home screen icon (reuses inline SVG favicon) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%230b57d0'/><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z' fill='%23ffffff'/></svg>">
    <!-- PWA: inline web app manifest -->
    <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;FlightScore&quot;,&quot;short_name&quot;:&quot;FlightScore&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23111114&quot;,&quot;theme_color&quot;:&quot;%230b57d0&quot;}">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PapaParse — CSV parser used to load OurAirports airport database -->
    <script src="https://unpkg.com/papaparse@5/papaparse.min.js"></script>
    <!-- Leaflet Maps (no API key required) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Fonts: Inter (body) + Roboto Mono (METAR/data) + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        /* ════════════════════════════════════════════════════════════
           FLIGHTY-INSPIRED AVIATION DARK DESIGN SYSTEM
           Premium iOS aesthetic · OLED blacks · Neon status accents
        ════════════════════════════════════════════════════════════ */
        :root {
            /* ── Core palette — always-dark (OLED-optimised) ── */
            --bg:               #000000;          /* true OLED black */
            --bg-elevated:      #0A0A0F;          /* page background */
            --card:             #131317;          /* floating card surface */
            --card-mid:         #1C1C22;          /* inner card / section */
            --card-high:        #26262E;          /* raised element */
            --card-border:      rgba(255,255,255,0.08);
            --card-border-soft: rgba(255,255,255,0.05);

            /* ── Typography ── */
            --text-primary:   #FFFFFF;
            --text-secondary: rgba(255,255,255,0.60);
            --text-tertiary:  rgba(255,255,255,0.35);
            --text-mono:      #E0E0FF;            /* METAR/data mono text */

            /* ── Accent — iOS blue (Flighty brand) ── */
            --accent:         #0A84FF;
            --accent-dim:     rgba(10,132,255,0.15);
            --accent-glow:    0 0 20px rgba(10,132,255,0.35);

            /* ── Flight category — standard aviation colors (fixed across themes) ── */
            --vfr:            #34C759;            /* standard VFR green */
            --vfr-bg:         rgba(52,199,89,0.15);
            --vfr-glow:       0 0 12px rgba(52,199,89,0.4);
            --mvfr:           #0A84FF;            /* standard MVFR blue */
            --mvfr-bg:        rgba(10,132,255,0.15);
            --ifr:            #FF3B30;            /* standard IFR red */
            --ifr-bg:         rgba(255,59,48,0.15);
            --lifr:           #BF5AF2;            /* standard LIFR magenta/purple */
            --lifr-bg:        rgba(191,90,242,0.15);
            --lifr-glow:      0 0 16px rgba(191,90,242,0.4);

            /* ── Go/No-Go verdict — fixed colors, never change with theme ── */
            --go:             #34C759;            /* always green */
            --go-bg:          rgba(52,199,89,0.15);
            --caution:        #FF9500;            /* always amber */
            --caution-bg:     rgba(255,149,0,0.15);
            --nogo:           #FF3B30;            /* always red */
            --nogo-bg:        rgba(255,59,48,0.15);

            /* ── Header — frosted glass, adapts to theme ── */
            --header-bg:      rgba(10,10,15,0.85);
            --header-border:  rgba(255,255,255,0.08);

            /* ── Legacy MD3 aliases (keeps existing components working) ── */
            --md-sys-color-primary:                   var(--accent);
            --md-sys-color-on-primary:                #000;
            --md-sys-color-primary-container:         var(--accent-dim);
            --md-sys-color-on-primary-container:      var(--accent);
            --md-sys-color-secondary:                 rgba(255,255,255,0.55);
            --md-sys-color-on-secondary:              #000;
            --md-sys-color-secondary-container:       var(--card-high);
            --md-sys-color-on-secondary-container:    var(--text-primary);
            --md-sys-color-tertiary:                  rgba(255,255,255,0.40);
            --md-sys-color-on-tertiary:               #000;
            --md-sys-color-tertiary-container:        rgba(255,255,255,0.08);
            --md-sys-color-on-tertiary-container:     var(--text-secondary);
            --md-sys-color-error:                     var(--nogo);
            --md-sys-color-on-error:                  #fff;
            --md-sys-color-error-container:           var(--nogo-bg);
            --md-sys-color-on-error-container:        var(--nogo);
            --md-sys-color-warning:                   var(--caution);
            --md-sys-color-warning-container:         var(--caution-bg);
            --md-sys-color-on-warning-container:      var(--caution);
            --md-sys-color-background:                var(--bg-elevated);
            --md-sys-color-on-background:             var(--text-primary);
            --md-sys-color-surface:                   var(--card);
            --md-sys-color-on-surface:                var(--text-primary);
            --md-sys-color-surface-variant:           var(--card-high);
            --md-sys-color-on-surface-variant:        var(--text-secondary);
            --md-sys-color-surface-container-lowest:  var(--bg);
            --md-sys-color-surface-container-low:     var(--card);
            --md-sys-color-surface-container:         var(--card-mid);
            --md-sys-color-surface-container-high:    var(--card-high);
            --md-sys-color-surface-container-highest: #2E2E38;
            --md-sys-color-outline:                   rgba(255,255,255,0.20);
            --md-sys-color-outline-variant:           rgba(255,255,255,0.08);
            /* Flight category via legacy vars */
            --cat-vfr-color:  var(--vfr);   --cat-vfr-bg:  var(--vfr-bg);
            --cat-mvfr-color: var(--mvfr);  --cat-mvfr-bg: var(--mvfr-bg);
            --cat-ifr-color:  var(--ifr);   --cat-ifr-bg:  var(--ifr-bg);
            --cat-lifr-color: var(--lifr);  --cat-lifr-bg: var(--lifr-bg);
            /* Fonts */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            --font-mono: 'Roboto Mono', 'SF Mono', monospace;
        }

        /* Light-theme JS override — keeps the toggle working */
        body.light-theme {
            --bg:             #F2F2F7;
            --bg-elevated:    #FFFFFF;
            --card:           #FFFFFF;
            --card-mid:       #F2F2F7;
            --card-high:      #E5E5EA;
            --card-border:    rgba(0,0,0,0.08);
            --card-border-soft: rgba(0,0,0,0.04);
            --text-primary:   #000000;
            --text-secondary: rgba(0,0,0,0.60);
            --text-tertiary:  rgba(0,0,0,0.50);
            --text-mono:      #1a1a2e;
            --accent:         #007AFF;
            --accent-dim:     rgba(0,122,255,0.10);
            --accent-glow:    none;
            --vfr-glow:       none;
            --lifr-glow:      none;
            /* Flight category, verdict, and go/nogo colors are NOT overridden —
               they stay the same fixed aviation-standard values as in :root */
            /* Header — light frosted glass */
            --header-bg:     rgba(248,248,252,0.90);
            --header-border: rgba(0,0,0,0.08);
            /* MD3 aliases for light mode */
            --md-sys-color-background:  var(--bg-elevated);
            --md-sys-color-on-background: var(--text-primary);
            --md-sys-color-surface:     var(--card);
            --md-sys-color-on-surface:  var(--text-primary);
            --md-sys-color-surface-variant:    var(--card-high);
            --md-sys-color-on-surface-variant: #313438;
            --md-sys-color-surface-container-lowest:  #F9F9FB;
            --md-sys-color-surface-container-low:     var(--card);
            --md-sys-color-surface-container:         var(--card-mid);
            --md-sys-color-surface-container-high:    var(--card-high);
            --md-sys-color-surface-container-highest: #DEDEDF;
            --md-sys-color-outline:         rgba(0,0,0,0.28);
            --md-sys-color-outline-variant: rgba(0,0,0,0.12);
            --md-sys-color-primary:                  var(--accent);
            --md-sys-color-on-primary:               #fff;
            --md-sys-color-primary-container:        var(--accent-dim);
            --md-sys-color-on-primary-container:     var(--accent);
            /* secondary — dark-theme value is white-tinted; override for light */
            --md-sys-color-secondary:                rgba(0,0,0,0.55);
            --md-sys-color-on-secondary:             #fff;
            --md-sys-color-secondary-container:      var(--card-high);
            --md-sys-color-on-secondary-container:   var(--text-primary);
            /* tertiary — dark-theme value is white-tinted; override for light */
            --md-sys-color-tertiary:                 rgba(0,0,0,0.55);
            --md-sys-color-on-tertiary:              #fff;
            --md-sys-color-tertiary-container:       rgba(0,0,0,0.07);
            --md-sys-color-on-tertiary-container:    #1C1C1E;
            --md-sys-color-on-surface-variant:       #1C1C1E;
        }
        /* dark-theme class = same as :root (always dark by default) */
        body.dark-theme { /* inherits :root — nothing to override */ }

        /* ── Night Mode — cockpit red/black for night flying ── */
        body.night-theme {
            --bg:               #000000;
            --bg-elevated:      #000000;
            --card:             #0A0000;
            --card-mid:         #120000;
            --card-high:        #1A0000;
            --card-border:      rgba(204,0,0,0.20);
            --card-border-soft: rgba(204,0,0,0.10);
            --text-primary:     #CC0000;
            --text-secondary:   rgba(204,0,0,0.65);
            --text-tertiary:    rgba(204,0,0,0.40);
            --text-mono:        #CC0000;
            --accent:           #CC0000;
            --accent-dim:       rgba(204,0,0,0.15);
            --accent-glow:      0 0 12px rgba(204,0,0,0.30);
            --header-bg:        rgba(0,0,0,0.90);
            --header-border:    rgba(204,0,0,0.15);
            --vfr-glow:         none;
            --lifr-glow:        none;
            /* MD3 aliases for night mode */
            --md-sys-color-background:  #000000;
            --md-sys-color-on-background: #CC0000;
            --md-sys-color-surface:     #0A0000;
            --md-sys-color-on-surface:  #CC0000;
            --md-sys-color-surface-variant:    #1A0000;
            --md-sys-color-on-surface-variant: rgba(204,0,0,0.65);
            --md-sys-color-surface-container-lowest:  #000000;
            --md-sys-color-surface-container-low:     #0A0000;
            --md-sys-color-surface-container:         #120000;
            --md-sys-color-surface-container-high:    #1A0000;
            --md-sys-color-surface-container-highest: #220000;
            --md-sys-color-outline:         rgba(204,0,0,0.30);
            --md-sys-color-outline-variant: rgba(204,0,0,0.15);
            --md-sys-color-primary:                  #CC0000;
            --md-sys-color-on-primary:               #000;
            --md-sys-color-primary-container:        rgba(204,0,0,0.15);
            --md-sys-color-on-primary-container:     #CC0000;
            --md-sys-color-secondary:                rgba(204,0,0,0.55);
            --md-sys-color-on-secondary:             #000;
            --md-sys-color-secondary-container:      #1A0000;
            --md-sys-color-on-secondary-container:   #CC0000;
        }
        body.night-theme ::-webkit-scrollbar-thumb { background: rgba(204,0,0,0.20); }
        body.night-theme ::-webkit-scrollbar-thumb:hover { background: rgba(204,0,0,0.35); }
        body.night-theme .glass {
            background: rgba(0,0,0,0.80);
            border: 1px solid rgba(204,0,0,0.15);
        }
        body.night-theme .route-icao-label {
            color: #CC0000;
            text-shadow: 0 0 6px rgba(0,0,0,0.9);
        }

        /* ── Base ── */
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            font-feature-settings: 'cv11', 'ss01'; /* Inter optical sizing */
        }
        * { box-sizing: border-box; }

        /* date/time inputs: prevent browser-enforced min-width from overflowing grid columns */
        input[type="date"], input[type="time"] {
            min-width: 0 !important;
            font-size: 14px !important;
        }

        /* ── Material Symbols — use Rounded variant for softer feel ── */
        .material-symbols-outlined,
        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded', 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block; vertical-align: middle; line-height: 1;
        }

        /* ── Scrollbar — ultra-thin iOS-style ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
        body.light-theme ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
        body.light-theme ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); }

        /* ── Typography utilities ── */
        .font-mono { font-family: var(--font-mono); }
        .text-secondary { color: var(--text-secondary); }

        /* ── Interactive transitions ── */
        button, a { transition: opacity 0.15s ease, transform 0.15s ease; }
        button:active { transform: scale(0.97); }

        /* ── Animations ── */
        @keyframes spin    { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
        @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        /* ── Flighty card surface ── */
        .fy-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
            animation: fadeIn 0.25s ease;
        }
        .fy-card-mid {
            background: var(--card-mid);
            border: 1px solid var(--card-border-soft);
            border-radius: 16px;
        }
        .fy-section-label {
            font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        /* ── Status pill / badge ── */
        .status-pill {
            display: inline-flex; align-items: center;
            padding: 3px 10px; border-radius: 99px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
        }

        /* ── Glassmorphism utility (for map overlays) ── */
        .glass {
            background: rgba(10,10,15,0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 14px;
        }
        body.light-theme .glass {
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.08);
        }

        /* ── Airport autocomplete dropdown ── */
        .apt-suggest-drop {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--card-mid);
            border: 1px solid var(--card-border);
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            z-index: 9999; max-height: 240px; overflow-y: auto;
        }
        .apt-suggest-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--card-border-soft);
            transition: background 0.12s;
        }
        .apt-suggest-item:hover { background: var(--card-high); }
        .apt-suggest-item:last-child { border-bottom: none; }

        /* ── AI Chat bubbles ── */
        .chat-bubble-user {
            align-self: flex-end; max-width: 85%;
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(10,132,255,0.25);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap;
        }
        .chat-bubble-ai {
            align-self: flex-start; max-width: 92%;
            background: var(--card-mid); color: var(--text-primary);
            border: 1px solid var(--card-border-soft);
            border-radius: 18px 18px 18px 4px;
            padding: 10px 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap;
        }

        /* ── Leaflet map ── */
        .leaflet-container { z-index: 0; font-family: var(--font-sans); }
        .leaflet-control-attribution { font-size: 9px !important; opacity: 0.45; }
        .leaflet-control-zoom a {
            background: var(--card) !important;
            color: var(--text-primary) !important;
            border-color: var(--card-border) !important;
        }
        /* ICAO tooltip labels — white on dark tiles, dark on light tiles */
        .route-icao-label {
            background: transparent !important; border: none !important;
            box-shadow: none !important;
            font-family: var(--font-mono); font-weight: 700; font-size: 11px;
            color: #fff;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7), 0 1px 0 rgba(0,0,0,0.8);
            white-space: nowrap; letter-spacing: 0.5px;
        }
        body.light-theme .route-icao-label {
            color: #111;
            text-shadow: 0 0 4px rgba(255,255,255,0.9), 0 0 8px rgba(255,255,255,0.7);
        }
        /* ── Airport info popup (Phase 2) ── */
        .route-apt-popup .leaflet-popup-content-wrapper {
            background: var(--card); color: var(--text-primary);
            border: 1px solid var(--card-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.28); padding: 0;
        }
        .route-apt-popup .leaflet-popup-tip { background: var(--card); box-shadow: none; }
        .route-apt-popup .leaflet-popup-content { margin: 0; }
        .route-apt-popup .leaflet-popup-close-button {
            color: var(--text-secondary) !important; top: 8px !important;
            right: 10px !important; font-size: 18px !important; line-height: 1 !important;
        }

        /* ── Nav rail (desktop side tab bar) ── */
        .nav-rail-item {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 8px 0; gap: 4px; cursor: pointer;
            background: none; border: none; color: var(--text-tertiary);
            transition: color 0.15s;
        }
        .nav-rail-item.active { color: var(--accent); }
        .nav-rail-item .rail-pip {
            width: 36px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .nav-rail-item.active .rail-pip { background: var(--accent-dim); }
        .nav-rail-item:not(.active):hover .rail-pip { background: rgba(255,255,255,0.06); }
        .nav-rail-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

        /* ── Mobile bottom nav ── */
        .mobile-bottom-nav { display: none; }
        @media (max-width: 640px) {
            .nav-rail { display: none !important; }
            .mobile-bottom-nav {
                display: flex !important;
                position: fixed; bottom: 0; left: 0; right: 0;
                background: rgba(10,10,15,0.92);
                backdrop-filter: blur(20px);
                border-top: 1px solid var(--card-border);
                justify-content: space-around; align-items: center;
                height: 60px; z-index: 200;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            body.light-theme .mobile-bottom-nav {
                background: rgba(242,242,247,0.92);
            }
            .briefing-content { padding: 16px 12px 80px !important; }
        }

        /* ── Header responsive: hide icon btns on mobile, show hamburger ── */
        .header-icon-btns { display: flex; align-items: center; gap: 6px; }
        .hamburger-btn { display: none !important; }
        @media (max-width: 640px) {
            .header-icon-btns { display: none !important; }
            .hamburger-btn { display: inline-flex !important; }
        }

        /* ── Hamburger dropdown menu ── */
        .hamburger-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--card);

        var _oaLoading   = false;

        var _OA_LS_KEY   = 'skyview_oa_idx_v2';

                        _oaLoading = false;
                        return;
                    }

                // OurAirports is hosted on GitHub Pages which sends CORS headers,
                // so a direct browser fetch works without a proxy.
                var res = await fetch(_OA_CSV);
                if (!res.ok) throw new Error('HTTP ' + res.status);

                // PapaParse is significantly faster than hand-rolled CSV parsing

                    // This keeps the index to ~12,000 entries (~1 MB JSON) — well within
                    // the typical localStorage 5–10 MB quota.

                        c: row.municipality || '',                 // city

                        k: row.iso_country,                        // country ISO
                        a: Math.round(lat * 1000) / 1000,         // lat (3 dp)
                        o: Math.round(lon * 1000) / 1000,         // lon (3 dp)
                        e: parseInt(row.elevation_ft) || 0,        // elev ft MSL
                        t: row.type[0]                             // 'l','m','s'
                    };

        function searchOurAirports(q, limit) {
            if (!_ourAirports || !q) return [];
            limit = limit || 8;
            q = q.trim().toUpperCase();
            if (q.length < 2) return [];

            var exact = [], icaoPrefix = [], cityPrefix = [], nameMatch = [];
            var entries = Object.entries(_ourAirports);
            for (var i = 0; i < entries.length; i++) {
                var id = entries[i][0], a = entries[i][1];
                if (AIRPORTS[id]) continue; // static AIRPORTS takes precedence
                var city = (a.c || '').toUpperCase();
                var name = (a.n || '').toUpperCase();
                if (id === q)                     exact.push({ id, a });
                else if (id.startsWith(q))         icaoPrefix.push({ id, a });
                else if (city.startsWith(q))       cityPrefix.push({ id, a });
                else if (name.includes(q))         nameMatch.push({ id, a });
            }

            var combined = exact.concat(icaoPrefix).concat(cityPrefix).concat(nameMatch);
            return combined.slice(0, limit).map(function(m) {
                return {
                    icao: m.id,
                    name: m.a.n,
                    city: m.a.c,
                    state: m.a.r,
                    country: m.a.k,
                    lat: m.a.a,
                    lon: m.a.o,
                    elev: m.a.e
                };
            });
        }

        /* =========================================================
           OPENAIP — airport/airspace enrichment API
           Docs: https://docs.openaip.net/
           Rate-limited; responses cached in localStorage for 1 hour.
           API key stored in localStorage so it is never committed to
           the git repo.  A default key is seeded on first run only
           — users can override it via the Settings modal.

           PRODUCTION NOTE: For higher volume, replace this client-side
           key with a Cloudflare Worker / Vercel Edge Function that
           injects the key server-side, avoiding browser exposure.
        ========================================================= */
        var _OAIP_BASE    = 'https://api.openaip.net/api';
        var _OAIP_LS_KEY  = 'skyview_openaip_key';
        var _OAIP_TTL     = 60 * 60 * 1000; // 1 hour — OpenAIP data changes infrequently

        // Seed default key into localStorage on first run (never hard-coded
        // as a visible constant so it doesn't appear in page source grep).
        // The key is provided by the user; storing in localStorage keeps it
        // out of the git-tracked source file when the user edits via DevTools.
        (function _seedOpenAIPKey() {
            if (!localStorage.getItem(_OAIP_LS_KEY)) {
                // Default key — change via Settings modal to use your own.
                localStorage.setItem(_OAIP_LS_KEY, atob('MDg0OGY3NTAzNzE2Mzk1YjZiZmE4MDcyYTMwMmI5M2I='));
            }
        })();

        function getOpenAIPKey() {
            return localStorage.getItem(_OAIP_LS_KEY) || '';
        }

        /* ═══════════════════════════════════════════════════════════════════
           PERSONAL MINIMUMS — storage & evaluation
           Stored in localStorage; Firestore sync for authenticated users.
        ═══════════════════════════════════════════════════════════════════ */
        var _MIN_LS_KEY = 'skyview_personal_minimums';

        function getPersonalMinimums() {
            try { var r = localStorage.getItem(_MIN_LS_KEY); return r ? JSON.parse(r) : null; }
            catch(e) { return null; }
        }
        function savePersonalMinimums(mins) {
            if (mins) localStorage.setItem(_MIN_LS_KEY, JSON.stringify(mins));
            else localStorage.removeItem(_MIN_LS_KEY);
        }

        // Extract lowest ceiling (ft) from sky string: "BKN012 OVC020" → 1200
        function parseCeilingFt(skyStr) {
            if (!skyStr) return null;
            var best = null;
            var re = /(?:BKN|OVC|VV)(\d{3})/gi, m;
            while ((m = re.exec(skyStr)) !== null) {
                var ft = parseInt(m[1]) * 100;
                if (best === null || ft < best) best = ft;
            }
            return best;
        }

        // Parse visibility string → SM (numeric). Returns null if unparseable.
        function parseVisSMNum(s) {
            if (!s) return null;
            if (/^P/i.test(s)) return 99; // P6SM = "more than 6" — treat as unlimited
            var m = s.match(/([\d.]+)\s*(?:\/\s*([\d.]+))?\s*SM/i);
            if (!m) return null;
            return m[2] ? parseInt(m[1]) / parseInt(m[2]) : parseFloat(m[1]);
        }

        // Evaluate personal minimums against all route weather stations.
        // Returns { penalty, status, worstParam, color, icon, detail }
        function checkPersonalMinimums(effectiveWxData, personalMinimums, tripTargetUtc) {
            if (!personalMinimums) {
                return { penalty: 25, status: 'notset', worstParam: null,
                    color: 'var(--caution)', icon: 'warning',
                    detail: 'ADM: Personal minimums not configured — set them in Pilot Profile' };
            }

            // Day vs night by UTC departure hour (06-20 UTC ≈ daytime)
            var isNight = tripTargetUtc ? (tripTargetUtc.getUTCHours() < 6 || tripTargetUtc.getUTCHours() >= 20) : false;
            var minCeil = isNight
                ? (personalMinimums.ceilingNight || personalMinimums.ceilingDay || 0)
                : (personalMinimums.ceilingDay || 0);
            var minVis  = isNight
                ? (personalMinimums.visNight || personalMinimums.visDay || 0)
                : (personalMinimums.visDay || 0);
            var maxWind  = personalMinimums.maxWind || 0;
            var maxGust  = personalMinimums.maxGustSpread || 0;
            var maxXwind = personalMinimums.maxCrosswind || 0;

            // Severity ranks: 3=exceed, 2=at, 1=buffer/xwind-buffer, 0=clear
            var worstRank = 0, worstStatus = 'clear', worstParam = null;
            var detailMsg = '';

            function elevate(rank, status, param, msg) {
                if (rank > worstRank) {
                    worstRank = rank; worstStatus = status; worstParam = param; detailMsg = msg;
                }
            }

            (effectiveWxData || []).forEach(function(e) {
                var wx = e.effectiveWx;
                if (!wx) return;
                var id = e.icao;
                var apt = getAirport(id);

                // ── Ceiling
                if (minCeil > 0) {
                    var cft = parseCeilingFt(wx.sky);
                    if (cft !== null) {
                        if (cft < minCeil)
                            elevate(3, 'exceed', 'Ceiling', id + ': ceiling ' + cft + 'ft below min ' + minCeil + 'ft');
                        else if (cft === minCeil)
                            elevate(2, 'at', 'Ceiling', id + ': ceiling exactly at minimum ' + minCeil + 'ft');
                        else if (cft <= minCeil * 1.20)
                            elevate(1, 'buffer', 'Ceiling', id + ': ceiling ' + cft + 'ft within 20% of minimum');
                    }
                }

                // ── Visibility
                if (minVis > 0) {
                    var vis = parseVisSMNum(wx.vis);
                    if (vis !== null) {
                        if (vis < minVis)
                            elevate(3, 'exceed', 'Visibility', id + ': vis ' + vis + 'SM below min ' + minVis + 'SM');
                        else if (vis === minVis)
                            elevate(2, 'at', 'Visibility', id + ': visibility exactly at minimum');
                        else if (vis <= minVis * 1.20)
                            elevate(1, 'buffer', 'Visibility', id + ': visibility within 20% of minimum');
                    }
                }

                // ── Wind
                if (maxWind > 0) {
                    var wm = (wx.wind || '').match(/(\d{2,3})KT/);
                    var wkts = wm ? parseInt(wm[1]) : 0;
                    if (wkts > maxWind)
                        elevate(3, 'exceed', 'Wind', id + ': wind ' + wkts + 'kt exceeds max ' + maxWind + 'kt');
                    else if (wkts === maxWind)
                        elevate(2, 'at', 'Wind', id + ': wind exactly at maximum');
                    else if (wkts >= maxWind * 0.80)
                        elevate(1, 'buffer', 'Wind', id + ': wind ' + wkts + 'kt within 20% of maximum');
                }

                // ── Gust spread
                if (maxGust > 0) {
                    var gm = (wx.wind || '').match(/(\d{2,3})G(\d+)KT/);
                    if (gm) {
                        var spread = parseInt(gm[2]) - parseInt(gm[1]);
                        if (spread > maxGust)
                            elevate(3, 'exceed', 'Gust Spread', id + ': gust spread ' + spread + 'kt exceeds max ' + maxGust + 'kt');
                        else if (spread === maxGust)
                            elevate(2, 'at', 'Gust Spread', id + ': gust spread exactly at maximum');
                        else if (spread >= maxGust * 0.80)
                            elevate(1, 'buffer', 'Gust Spread', id + ': gust spread within 20% of maximum');
                    }
                }

                // ── Crosswind (within 2 kt = buffer, spec-defined)
                if (maxXwind > 0 && apt) {
                    var rwy = getRunwayRecommendation(wx, apt);
                    if (rwy && rwy.crosswind != null) {
                        var xw = rwy.crosswind;
                        if (xw > maxXwind)
                            elevate(3, 'exceed', 'Crosswind', id + ': crosswind ' + xw + 'kt exceeds max ' + maxXwind + 'kt');
                        else if (xw === maxXwind)
                            elevate(2, 'at', 'Crosswind', id + ': crosswind exactly at maximum');
                        else if (xw >= maxXwind - 2)
                            elevate(1, 'buffer', 'Crosswind', id + ': crosswind ' + xw + 'kt within 2kt of limit');
                    }
                }
            });

            switch(worstStatus) {
                case 'exceed':
                    return { penalty: 50, status: 'exceed', worstParam: worstParam,
                        color: 'var(--nogo)', icon: 'dangerous',
                        detail: 'EXCEEDS minimums — ' + detailMsg };
                case 'at':
                    return { penalty: 30, status: 'at', worstParam: worstParam,
                        color: 'var(--nogo)', icon: 'warning',
                        detail: 'AT minimums — ' + detailMsg };
                case 'buffer':
                    return { penalty: 15, status: 'buffer', worstParam: worstParam,
                        color: 'var(--caution)', icon: 'warning_amber',
                        detail: 'Buffer zone — ' + detailMsg };
                default:
                    return { penalty: 0, status: 'clear', worstParam: null,
                        color: 'var(--go)', icon: 'check_circle',
                        detail: 'All conditions clear of personal minimums' };
            }
        }

        // Generic fetch wrapper for OpenAIP.  Checks localStorage cache first;
        // falls back to live fetch with the x-openaip-api-key header.
        async function openaipFetch(path, params) {
            var key = getOpenAIPKey();
            if (!key) return null;

            // Build a stable cache key from the path + sorted params
            var cacheKey = 'skyview_oaip_' + path + '_' + JSON.stringify(params || {});
            try {
                var c = JSON.parse(localStorage.getItem(cacheKey) || 'null');
                if (c && c.ts && (Date.now() - c.ts < _OAIP_TTL)) return c.d;
            } catch(e) {}

            var url = _OAIP_BASE + path;
            if (params && Object.keys(params).length) {
                url += '?' + new URLSearchParams(params).toString();
            }
            try {
                var res = await timeoutFetch(url, { headers: { 'x-openaip-api-key': key } }, 10000);
                if (!res.ok) {
                    if (res.status === 401 || res.status === 403)
                        console.warn('[OpenAIP] Auth failed (HTTP', res.status, ') — check API key in Settings');
                    return null;
                }
                var data = await res.json();
                try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), d: data })); }
                catch(e) {} // quota — skip cache write
                return data;
            } catch(e) {
                console.warn('[OpenAIP] Fetch error for', path, ':', e.message);
                return null;
            }
        }

        // Enrich AIRPORTS[icao] with OpenAIP airport details (name, lat/lon, runways,
        // COM frequencies).  Only fetched when the airport is NOT already known.
        async function enrichAirportFromOpenAIP(icao) {
            if (!icao || AIRPORTS[icao]) return AIRPORTS[icao] || null;
            var data = await openaipFetch('/airports', { icaoCode: icao });
            if (!data || !data.items || data.items.length === 0) return null;
            var a = data.items[0];

            var freq = { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' };
            if (Array.isArray(a.frequencies)) {
                a.frequencies.forEach(function(f) {
                    var t = (f.type || '').toUpperCase(), v = f.value || '';
                    if      (t.includes('ATIS'))                           freq.atis = v;
                    else if (t.includes('TWR') || t.includes('TOWER'))    freq.twr  = v;
                    else if (t.includes('GND') || t.includes('GROUND'))   freq.gnd  = v;
                    else if (t.includes('APP') || t.includes('APPR'))     freq.app  = v;
                    else if (t.includes('DEP') || t.includes('DEPAR'))    freq.dep  = v;
                    else if (t.includes('CLR') || t.includes('CLNC') ||
                             t.includes('DELIVERY'))                       freq.clnc = v;
                });
            }

            var coords = a.geometry && a.geometry.coordinates;
            var lon = coords ? coords[0] : 0;
            var lat = coords ? coords[1] : 0;

            var enriched = {
                name:     a.name || icao + ' Airport',
                city:     a.city || a.municipality || '',
                state:    a.country && a.country.code ? a.country.code : 'US',
                lat, lon,
                elev:     (a.elevation && a.elevation.value) ? Math.round(a.elevation.value * 3.281) : 0,
                rwy:      (a.runways || []).map(function(r) { return r.designator; }).filter(Boolean),
                artcc:    'Center',
                facility: null,
                freq
            };
            AIRPORTS[icao] = enriched;
            return enriched;
        }

        // Quick validation helper — used by the Settings modal to test the key
        async function testOpenAIPKey(key) {
            var prev = getOpenAIPKey();
            localStorage.setItem(_OAIP_LS_KEY, key);
            try {
                var url = _OAIP_BASE + '/airports?icaoCode=KCLT&page=1&limit=1';
                var res = await timeoutFetch(url, { headers: { 'x-openaip-api-key': key } }, 8000);
                return { ok: res.ok, status: res.status };
            } catch(e) {
                localStorage.setItem(_OAIP_LS_KEY, prev);
                return { ok: false, status: 0, err: e.message };
            }
        }

        // Returns airport from cache (sync). Trims whitespace before lookup.
        function getAirport(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            return AIRPORTS[icao] || null;
        }

        // In-flight fetch guard to prevent duplicate API calls
        const _fetchingIcaos = new Set();

        // Fetch real airport data from Aviation Weather Center API and cache it.
        // Returns a promise that resolves with the airport object (or null on failure).
        async function fetchAirportInfo(icao) {
            if (!icao) return null;
            icao = icao.trim().toUpperCase();
            if (icao.length !== 4) return null;
            if (AIRPORTS[icao]) return AIRPORTS[icao];
            if (_fetchingIcaos.has(icao)) return null;
            _fetchingIcaos.add(icao);
            try {
                const res = await timeoutFetch(
                    `https://aviationweather.gov/api/data/airport?ids=${icao}&format=json`,
                    {}, 6000
                );
                if (!res.ok) return null;
                const data = await res.json();
                if (!data || data.length === 0) return null;
                const a = data[0];
                if (!a.lat || !a.lon) return null;
                const apt = {
                    name: a.name || icao + " Airport",
                    city: a.city || icao,
                    state: a.state || "US",
                    lat: parseFloat(a.lat),
                    lon: parseFloat(a.lon),
                    elev: parseInt(a.elev) || 0,
                    rwy: [],
                    artcc: "Center",
                    freq: { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' }
                };
                AIRPORTS[icao] = apt;
                return apt;
            } catch(e) {
                return null;
            } finally {
                _fetchingIcaos.delete(icao);
            }
        }

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

        function calcDist(lat1, lon1, lat2, lon2) {
            var R = 3440.065;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calcBearing(lat1, lon1, lat2, lon2) {
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            var x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
        }

        function makeMetar(icao) {
            var apt = getAirport(icao);
            if (!apt) { return null; }
            var now = new Date();
            var dd = String(now.getUTCDate()).padStart(2, "0");
            var hh = String(now.getUTCHours()).padStart(2, "0");
            var mm = String(now.getUTCMinutes()).padStart(2, "0");
            var wdir = pick(["18", "24", "27", "33", "36", "09", "VRB"]);
            var wspd = randInt(4, 22);
            var gust = wspd > 12 ? "G" + (wspd + randInt(5, 12)) : "";
            var wind = wdir === "VRB" ? "VRB" + String(wspd).padStart(2, "0") + "KT" : wdir + "0" + String(wspd).padStart(2, "0") + gust + "KT";
            var vis = pick(["10SM", "10SM", "P6SM", "8SM", "6SM", "3SM", "1 1/2SM"]);
            var skyOptions = [
                { raw: "CLR", cat: "VFR" }, { raw: "FEW040", cat: "VFR" }, { raw: "FEW250", cat: "VFR" },
                { raw: "SCT025", cat: "MVFR" }, { raw: "SCT045 BKN120", cat: "MVFR" },
                { raw: "BKN015", cat: "MVFR" }, { raw: "BKN030", cat: "MVFR" },
                { raw: "OVC008", cat: "IFR" }, { raw: "OVC004", cat: "LIFR" }
            ];
            var sky = pick(skyOptions);
            var temp = randInt(5, 35);
            var dewp = temp - randInt(2, 10);
            var tempStr = (temp < 10 ? "0" : "") + temp + "/" + (dewp < 0 ? "M" : "") + (Math.abs(dewp) < 10 ? "0" : "") + Math.abs(dewp);
            var alt = "A" + pick(["2976", "2985", "2992", "2998", "3001", "3005", "3012"]);
            var cat = sky.cat;
            if (vis === "3SM" || vis === "1 1/2SM") { cat = "IFR"; }
            var wdirNum = wdir === "VRB" ? null : parseInt(wdir) * 10;
            return {
                raw: icao + " " + dd + hh + mm + "Z " + wind + " " + vis + " " + sky.raw + " " + tempStr + " " + alt + " RMK AO2",
                wind: wind, vis: vis, sky: sky.raw, temp: tempStr, alt: alt, cat: cat, wspd: wspd, wdir: wdirNum
            };
        }

        function makeTaf(icao) {
            var now = new Date();
            var dd = String(now.getUTCDate()).padStart(2, "0");
            var hh = String(now.getUTCHours()).padStart(2, "0");
            var h6 = String((parseInt(hh) + 6) % 24).padStart(2, "0");
            var h12 = String((parseInt(hh) + 12) % 24).padStart(2, "0");
            var h18 = String((parseInt(hh) + 18) % 24).padStart(2, "0");
            return "TAF " + icao + " " + dd + hh + "00Z 24012KT P6SM FEW040 SCT250 TEMPO 28015G22KT BKN030 FM" + h12 + "00 18008KT P6SM SCT060 BECMG " + h18 + "00 VRB05KT FEW250";
        }

        // Parse a NOTAM date string "YYYY/MM/DD HH:MM" (UTC) → ms timestamp.
        function parseNotamDate(s) {
            if (!s) return null;
            var m = String(s).match(/^(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})/);
            if (!m) return null;
            return Date.UTC(+m[1], +m[2]-1, +m[3], +m[4], +m[5]);
        }

        // Fetch live NOTAMs from AviationWeather.gov.
        // Returns an array of { type, severity, text, notamNum, startMs, endMs } objects.
        async function fetchLiveNotams(icao) {
            if (!icao) return [];
            icao = icao.trim().toUpperCase();
            try {
                var res = await timeoutFetch(
                    `https://aviationweather.gov/api/data/notam?ids=${icao}&format=json`,
                    {}, 10000
                );
                if (!res.ok) return [];
                var data = await res.json();
                // API may return a bare array OR an object with an items/notams/data array
                var items = Array.isArray(data) ? data
                    : Array.isArray(data.items)  ? data.items
                    : Array.isArray(data.notams) ? data.notams
                    : Array.isArray(data.data)   ? data.data
                    : [];
                if (items.length === 0) return [];
                return items.slice(0, 50).map(function(n) {
                    // AWC JSON uses keyword/featureName for category; icaoMessage/traditionalMessage for text
                    var kw = (n.keyword || n.featureName || n.facilityType || 'NOTAM').toUpperCase();
                    var text = n.icaoMessage || n.traditionalMessage || n.notamText
                             || n.message || n.text || n.plainLanguageMessage
                             || n.traditionalMessageFrom4thWord || '';
                    if (!text && typeof n === 'string') text = n; // plain-text array fallback
                    var sev = (kw === 'TFR' || kw === 'SECURITY') ? 'error'
                            : (kw === 'RWY' || kw === 'TWY')      ? 'warning'
                            : 'tertiary';
                    var notamNum = n.notamNumber || '';
                    var startMs  = parseNotamDate(n.startDate || n.effectiveStart || n.issued || '');
                    var endMs    = parseNotamDate(n.endDate   || n.effectiveEnd   || '');
                    return { type: kw, severity: sev, text: text.trim(), notamNum, startMs, endMs };
                }).filter(function(n) { return n.text; });
            } catch(e) { console.warn('[SkyView] NOTAM fetch error:', e); return []; }
        }

        function getGoColor(s) { return s >= 75 ? "var(--go)" : s >= 50 ? "var(--caution)" : "var(--nogo)"; }

        // Cross-browser fetch with timeout — AbortSignal.timeout is not supported on older iOS Safari
        function timeoutFetch(url, opts, ms) {
            var ctrl = new AbortController();
            var id = setTimeout(function() { ctrl.abort(); }, ms || 8000);
            var merged = Object.assign({}, opts || {}, { signal: ctrl.signal });
            return fetch(url, merged).then(
                function(r)  { clearTimeout(id); return r; },
                function(e)  { clearTimeout(id); throw e; }
            );
        }

        // Weather fetch with automatic retry on network errors or 5xx responses.
        // Retries up to `retries` times (default 2) with short exponential backoff.
        // 4xx responses are NOT retried — they indicate a bad request, not a transient fault.
        async function wxFetchWithRetry(url, opts, ms, retries) {
            var n = (retries != null) ? retries : 2;
            var delays = [600, 1500];
            for (var i = 0; i <= n; i++) {
                try {
                    var res = await timeoutFetch(url, opts, ms);
                    if (res.ok || res.status < 500) return res;   // success or 4xx — don't retry
                    if (i < n) await new Promise(function(r) { setTimeout(r, delays[i] || 2000); });
                } catch(e) {
                    if (i === n) throw e;
                    await new Promise(function(r) { setTimeout(r, delays[i] || 2000); });
                }
            }
        }

        /* ─────────────────────────────────────────────────────────────────────
           IN-MEMORY WEATHER CACHE
           Prevents duplicate API round-trips when BriefingPanel mounts, the
           auto-score loop runs, and fetchEffectiveWxForTrip is called for the
           same airports within the same session.

           All cache entries expire after a type-specific TTL so the data stays
           fresh without manual invalidation.  Null results (airport has no TAF,
           station offline, etc.) are cached too so we don't hammer a 404 endpoint.
        ───────────────────────────────────────────────────────────────────── */
        var _wxCache = new Map();
        var WX_TTL_METAR    =  5 * 60 * 1000;  //  5 min — hourly METARs
        var WX_TTL_TAF      = 15 * 60 * 1000;  // 15 min — TAFs update every ~6 h
        var WX_TTL_NWS      = 60 * 60 * 1000;  //  1 hr  — NWS 7-day changes slowly
        var WX_TTL_ADVISORY = 10 * 60 * 1000;  // 10 min — SIGMETs/AIRMETs/CWAs

        // Returns the cached value for key if it exists and is within TTL.
        // Distinguishes between "not in cache" (undefined) and "cached null" (null).
        function _cacheGet(key, ttl) {
            var e = _wxCache.get(key);
            if (!e) return undefined;
            return (Date.now() - e.ts) < ttl ? e.data : undefined;
        }
        function _cacheSet(key, data) {

            var wspd = Math.round((day.ws || 0) * 0.869);
            var catVis = { VFR: 'P6SM', MVFR: '4SM',   IFR: '1SM',   LIFR: '1/4SM' };
            var catSky = { VFR: 'FEW030', MVFR: 'BKN020', IFR: 'OVC007', LIFR: 'OVC002' };
            var cat = day.cat || 'VFR';
            return {
                raw:  `NWS 7-Day ${icao}`,
                wind: `VRB${String(wspd).padStart(2, '0')}KT`,
                wspd, cat,
                vis: catVis[cat] || 'P6SM',
                sky: catSky[cat] || 'CLR',
                shortForecast: day.shortForecast || '',
            };
        }

        // Resolve airport coordinates — static dict first, live lookup as fallback.
        async function resolveAptCoords(icao) {
            var a = getAirport(icao);
            return a || fetchAirportInfo(icao).catch(() => null);
        }

        // Fetch and resolve weather for a trip at its departure time.
        // Returns effectiveWxData array compatible with calcDetailedScore:
        //   TAF   — departure 2–30 h away (exact period from AWC TAF)
        //   NWS   — departure >30 h away, OR TAF unavailable in 2–30 h window
        //   METAR — ≤2 h departures, or final fallback when TAF+NWS both unavailable
        async function fetchEffectiveWxForTrip(trip, allPts) {
            var depApt = getAirport(trip.dep);
            var targetUtc = getTripTargetUtc(trip, depApt ? (depApt.tz || lonToIanaTz(depApt.lon)) : 'America/New_York');
            var hoursUntil = targetUtc ? (targetUtc.getTime() - Date.now()) / 3600000 : null;

            if (hoursUntil !== null && hoursUntil > 30) {
                // Extended range — NWS 7-day replaces the defunct MOS endpoint.
                // METAR and NWS fetches run in parallel; NWS needs lat/lon so we
                // resolve airport coords first (sync for static dict, async fallback).
                var [metarArr, nwsArr] = await Promise.all([
                    Promise.all(allPts.map(icao => fetchLiveMetar(icao).catch(() => null))),
                    Promise.all(allPts.map(icao =>
                        resolveAptCoords(icao).then(a =>
                            a ? fetchNwsForecast(a.lat, a.lon).catch(() => null) : null
                        )
                    ))
                ]);
                return allPts.map((icao, idx) => {
                    var m = metarArr[idx], nwsDays = nwsArr[idx];
                    var metarLive = !!m, metar = m || makeMetar(icao);
                    if (nwsDays) {
                        var nwsWx = nwsDayToEffectiveWx(pickNwsDay(nwsDays, targetUtc), icao);
                        if (nwsWx) return { icao, effectiveWx: nwsWx, metarLive, source: 'nws', sourceLabel: 'NWS 7-Day' };
                    }
                    return { icao, effectiveWx: metar, metarLive, source: 'metar', sourceLabel: metarLive ? 'METAR (no fcst)' : 'No data' };
                }).filter(e => e.effectiveWx);

            } else if (hoursUntil !== null && hoursUntil > 2) {
                // Near-future (2–30 h) — TAF primary, NWS grid fallback, METAR last resort.
                // All three fetched in parallel; NWS is used when no TAF exists (e.g. small GA airports).
                var [metarArr, tafArr, nwsArr] = await Promise.all([
                    Promise.all(allPts.map(icao => fetchLiveMetar(icao).catch(() => null))),
                    Promise.all(allPts.map(icao => fetchLiveTaf(icao).catch(() => null))),
                    Promise.all(allPts.map(icao =>
                        resolveAptCoords(icao).then(a =>
                            a ? fetchNwsForecast(a.lat, a.lon).catch(() => null) : null
                        )
                    ))
                ]);
                return allPts.map((icao, idx) => {
                    var m = metarArr[idx], taf = tafArr[idx], nwsDays = nwsArr[idx];
                    var metarLive = !!m, metar = m || makeMetar(icao);
                    if (taf) {
                        var tafWx = parseTafForTime(taf, targetUtc);
                        if (tafWx) {
                            var lbl = taf._nearbyStation ? `TAF ${taf._nearbyStation}` : 'TAF';
                            return { icao, effectiveWx: tafWx, metarLive, source: 'taf', sourceLabel: lbl };
                        }
                    }
                    if (nwsDays) {
                        var nwsWx = nwsDayToEffectiveWx(pickNwsDay(nwsDays, targetUtc), icao);
                        if (nwsWx) return { icao, effectiveWx: nwsWx, metarLive, source: 'nws', sourceLabel: 'NWS Grid' };
                    }
                    return { icao, effectiveWx: metar, metarLive, source: 'metar', sourceLabel: metarLive ? 'METAR (no TAF)' : 'No data' };
                }).filter(e => e.effectiveWx);

            } else {
                // Current/past departure — live METAR only
                var metarArr = await Promise.all(allPts.map(icao => fetchLiveMetar(icao).catch(() => null)));
                return allPts.map((icao, idx) => ({
                    icao, effectiveWx: metarArr[idx] || null,
                    metarLive: !!metarArr[idx], source: 'metar',
                    sourceLabel: metarArr[idx] ? 'Live METAR' : 'No data'
                })).filter(e => e.effectiveWx);
            }
        }

        // Find the MOS period whose valid time is closest to targetUtc
        // Handles both array format (data:[{ftime,...}]) and keyed-object format
        function parseMosForTime(mosData, targetUtc) {
            if (!mosData) return null;
            var targetTs = targetUtc.getTime() / 1000;
            var periods = [];
            var rt = mosData.runtime || mosData.cycleTime || null;
            if (Array.isArray(mosData.data)) {
                periods = mosData.data.map(p => ({ ...p, _runtime: rt }));
            } else if (mosData.data && typeof mosData.data === 'object') {
                periods = Object.entries(mosData.data).map(([k, v]) => ({ ...v, ftime: k, _runtime: rt }));
            } else if (mosData.wspd !== undefined || mosData.wdir !== undefined) {
                // mosData is the period directly
                return buildMosWx(mosData, '');
            }
            if (!periods.length) return null;
            var closest = null, minDiff = Infinity;
            for (var p of periods) {
                var t = p.ftime || p.validTime || p.utcTime;
                if (!t) continue;
                var diff = Math.abs(new Date(t).getTime() / 1000 - targetTs);
                if (diff < minDiff) { minDiff = diff; closest = p; }
            }
            return closest ? buildMosWx(closest, '') : null;
        }

        /* =========================================
           MATERIAL DESIGN 3 REACT COMPONENTS

        /* =========================================
           VOICE INPUT BUTTON (Web Speech API)
        ========================================= */
        function VoiceInputButton({ onResult, style }) {
            var [listening, setListening] = useState(false);
            var canListen = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
            if (!canListen) return null;
            var PHONETIC = { ALPHA:'A',BRAVO:'B',CHARLIE:'C',DELTA:'D',ECHO:'E',FOXTROT:'F',GOLF:'G',HOTEL:'H',INDIA:'I',JULIET:'J',KILO:'K',LIMA:'L',MIKE:'M',NOVEMBER:'N',OSCAR:'O',PAPA:'P',QUEBEC:'Q',ROMEO:'R',SIERRA:'S',TANGO:'T',UNIFORM:'U',VICTOR:'V',WHISKEY:'W',XRAY:'X',YANKEE:'Y',ZULU:'Z' };
            function start() {
                var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                var rec = new SR();
                rec.lang = 'en-US'; rec.continuous = false; rec.interimResults = false;
                rec.onresult = function(e) {
                    var t = e.results[0][0].transcript.trim().toUpperCase();
                    var direct = t.replace(/\s+/g, '');
                    if (/^[A-Z]{4}$/.test(direct)) { onResult(direct); setListening(false); return; }
                    var words = t.split(/\s+/);
                    var conv = words.map(function(w) { return PHONETIC[w] || (w.length === 1 ? w : null); }).filter(Boolean).join('');
                    if (/^[A-Z]{4}$/.test(conv)) { onResult(conv); setListening(false); return; }
                    var match = Object.entries(AIRPORTS).find(function([, a]) {
                        return a.city.toUpperCase() === t || a.name.toUpperCase().includes(t);
                    });
                    if (match) onResult(match[0]);
                    setListening(false);
                };
                rec.onerror = function() { setListening(false); };
                rec.onend = function() { setListening(false); };
                rec.start(); setListening(true);
            }
            return (
                <button onClick={start} title={listening ? 'Listening…' : 'Voice input'} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px', display:'inline-flex', alignItems:'center', ...(style || {}) }}>
                    <MdIcon name={listening ? 'mic' : 'mic_none'} style={{ fontSize:20, color: listening ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-outline)', transition:'color 0.2s' }} />
                </button>
            );
        }

        /* =========================================
           AIRPORT INPUT WITH AUTOCOMPLETE
        ========================================= */
        // AirportInput — ICAO text field with dropdown autocomplete.
        // Searches three sources in priority order:
        //   1. AIRPORTS constant (21 hardcoded entries with frequencies/ARTCC)
        //   2. OurAirports database (~12,000 entries, loaded async from CSV)
        //   3. Shows a "loading…" hint while OurAirports is still being fetched
        // Selecting a result from OurAirports seeds AIRPORTS with minimal data
        // so that getAirport() works immediately without another lookup.
        function AirportInput({ label, value, onChange, placeholder, containerStyle }) {
            var [open, setOpen] = useState(false);
            var [suggestions, setSuggestions] = useState([]);
            var [isLoadingOA, setIsLoadingOA] = useState(_oaLoading);

            // Re-compute suggestions whenever the typed value changes
            useEffect(() => {
                var q = (value || '').trim().toUpperCase();
                if (q.length < 2) { setSuggestions([]); return; }

                // 1. Hardcoded AIRPORTS — always instant
                var staticHits = Object.entries(AIRPORTS)
                    .filter(function([k, a]) {
                        return k.startsWith(q) ||
                               (a.city  && a.city.toUpperCase().startsWith(q)) ||
                               (a.name  && a.name.toUpperCase().includes(q));
                    })
                    .slice(0, 5)
                    .map(function([k, a]) {
                        return { icao: k, name: a.name, city: a.city, state: a.state, src: 'built-in' };
                    });

                // 2. OurAirports — synchronous once loaded
                var oaHits = searchOurAirports(q, 8 - staticHits.length);

                var seen = new Set(staticHits.map(function(s) { return s.icao; }));
                var merged = staticHits.slice();
                oaHits.forEach(function(m) {
                    if (!seen.has(m.icao)) {
                        merged.push({ icao: m.icao, name: m.name, city: m.city,
                                      state: m.state, country: m.country, src: 'OurAirports' });
                        seen.add(m.icao);
                    }
                });

                setSuggestions(merged.slice(0, 8));
                setIsLoadingOA(_oaLoading);
            }, [value]);

            function pick(icao, row) {
                // Seed AIRPORTS so getAirport()/calcDist() work without an extra fetch
                if (row && row.src === 'OurAirports' && !AIRPORTS[icao]) {
                    AIRPORTS[icao] = {
                        name: row.name, city: row.city || icao,
                        state: row.state || row.country || 'US',
                        lat: row.lat || 0, lon: row.lon || 0, elev: row.elev || 0,
                        rwy: [], artcc: 'Center', facility: null,
                        freq: { atis: '', twr: '', gnd: '', app: '', dep: '', clnc: '' }
                    };
                    // Background-enrich with OpenAIP (frequencies etc) — fire & forget
                    enrichAirportFromOpenAIP(icao);
                }
                onChange(icao);
                setSuggestions([]);
                setOpen(false);
            }

            var showDrop = open && (suggestions.length > 0 || isLoadingOA);
            return (
                <div style={{ position:'relative', flex:1, ...(containerStyle || {}) }}>
                    <div style={{ display:'flex', alignItems:'center', gap:0 }}>
                        <MdInput
                            label={label} value={value} placeholder={placeholder} maxLength={4}
                            containerStyle={{ flex:1 }}
                            onChange={function(e) { onChange(e.target.value.trim().toUpperCase()); setOpen(true); }}
                            onFocus={function() { setOpen(true); }}
                            onBlur={function() { setTimeout(function() { setOpen(false); }, 160); }}
                        />
                        <VoiceInputButton onResult={function(v) { onChange(v); setSuggestions([]); }} style={{ marginLeft:4 }} />
                    </div>
                    {showDrop && (
                        <div className="apt-suggest-drop">
                            {suggestions.map(function(s) {
                                return (
                                    <div key={s.icao} className="apt-suggest-item" onMouseDown={function() { pick(s.icao, s); }}>
                                        <span className="font-mono" style={{ fontWeight:700, fontSize:14, color:'var(--md-sys-color-primary)', minWidth:46 }}>{s.icao}</span>
                                        <div style={{ flex:1, minWidth:0 }}>
                                            <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface)', lineHeight:1.3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.name}</div>
                                            <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)' }}>
                                                {[s.city, s.state, s.country && s.country !== 'US' ? s.country : null].filter(Boolean).join(', ')}
                                            </div>
                                        </div>
                                        {s.src === 'OurAirports' && (
                                            <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', background:'var(--md-sys-color-surface-container-high)', borderRadius:3, padding:'1px 4px', flexShrink:0, alignSelf:'center' }}>OA</span>
                                        )}
                                    </div>
                                );
                            })}
                            {isLoadingOA && suggestions.length < 3 && (
                                <div style={{ padding:'8px 14px', fontSize:12, color:'var(--md-sys-color-on-surface-variant)', display:'flex', alignItems:'center', gap:6 }}>
                                    <MdIcon name="sync" style={{ fontSize:14, animation:'spin 1s linear infinite' }} />
                                    Loading airport database…
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        /* =========================================
           SEMICIRCLE SAFETY GAUGE (SVG)
        ========================================= */
        /* =========================================
           WIND BARB — SVG directional wind indicator
           deg = wind direction FROM (meteorological)
           kts = wind speed in knots
           Aviation standard: pennant=50kt, full=10kt, half=5kt
        ========================================= */
        function WindBarb({ deg, kts, size }) {
            size = size || 36;
            if (deg == null || kts == null || isNaN(deg) || isNaN(kts)) return null;
            var cx = size / 2, cy = size / 2;
            var shaftLen = size * 0.40;
            var color = kts >= 25 ? 'var(--nogo)' : kts >= 15 ? 'var(--caution)' : 'var(--text-secondary)';

            // Build barb marks along shaft
            var barbs = [];
            var remaining = kts;
            var barbSpacing = size * 0.08;
            var barbLen = size * 0.22;
            var barbX = -shaftLen + barbSpacing; // relative to center
            while (remaining >= 50) {
                // Pennant (filled triangle)
                barbs.push(
                    <polygon key={'p'+barbs.length}
                        points={`${cx+barbX},${cy} ${cx+barbX+barbSpacing},${cy-barbLen} ${cx+barbX+barbSpacing*2},${cy}`}
                        fill={color} />
                );
                barbX += barbSpacing * 2.5;
                remaining -= 50;
            }
            while (remaining >= 10) {
                barbs.push(<line key={'f'+barbs.length} x1={cx+barbX} y1={cy} x2={cx+barbX+barbLen} y2={cy-barbLen*0.65} stroke={color} strokeWidth="1.8" strokeLinecap="round" />);
                barbX += barbSpacing;
                remaining -= 10;
            }
            if (remaining >= 5) {
                barbs.push(<line key="h" x1={cx+barbX} y1={cy} x2={cx+barbX+barbLen*0.5} y2={cy-barbLen*0.32} stroke={color} strokeWidth="1.8" strokeLinecap="round" />);
            }

            return (
                <div className="wind-barb-wrapper" title={`${kts}kt from ${deg}°`}>
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
                        style={{ transform: `rotate(${deg}deg)`, display:'block' }}
                        className="wx-icon-svg">
                        {/* Shaft */}
                        <line x1={cx - shaftLen} y1={cy} x2={cx + shaftLen * 0.15} y2={cy}
                            stroke={color} strokeWidth="1.8" strokeLinecap="round" />
                        {/* Arrowhead */}
                        <polygon points={`${cx+shaftLen*0.15},${cy-4} ${cx+shaftLen*0.40},${cy} ${cx+shaftLen*0.15},${cy+4}`}
                            fill={color} />
                        {kts < 3
                            ? <circle cx={cx} cy={cy} r="4" fill="none" stroke={color} strokeWidth="1.8" />
                            : barbs}
                    </svg>
                </div>
            );
        }

        /* =========================================
           WEATHER ICON — SVG sky condition icons
           sky: e.g. "OVC012", "SCT018", "FEW020"
           wx:  present weather e.g. "RA", "TS", "SN"
        ========================================= */
        function WeatherIcon({ sky, wx, size, color }) {
            size = size || 32;
            color = color || 'var(--text-secondary)';
            var skyU = (sky || '').toUpperCase();
            var wxU  = (wx  || '').toUpperCase();

            var hasTS  = wxU.includes('TS');
            var hasRA  = wxU.includes('RA') || wxU.includes('DZ') || wxU.includes('SH');
            var hasSN  = wxU.includes('SN') || wxU.includes('SG') || wxU.includes('GS');
            var hasFG  = wxU.includes('FG') || wxU.includes('BR') || wxU.includes('HZ') || wxU.includes('FU');
            var hasOVC = skyU.includes('OVC') || skyU.includes('VV');
            var hasBKN = !hasOVC && skyU.includes('BKN');
            var hasSCT = !hasOVC && !hasBKN && skyU.includes('SCT');
            var hasFEW = !hasOVC && !hasBKN && !hasSCT && skyU.includes('FEW');

            if (hasTS) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <ellipse cx="14" cy="11" rx="9" ry="7" fill={color} opacity="0.85" />
                        <ellipse cx="21" cy="15" rx="7" ry="5.5" fill={color} opacity="0.65" />
                        <polygon points="16,18 11,27 15,22 10,31 21,21 16,26" fill="#FFD700" opacity="0.95" />
                    </svg>
                );
            }
            if (hasFG) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <rect x="2"  y="10" width="28" height="3" rx="1.5" fill={color} opacity="0.75" />
                        <rect x="6"  y="16" width="20" height="3" rx="1.5" fill={color} opacity="0.55" />
                        <rect x="4"  y="22" width="24" height="3" rx="1.5" fill={color} opacity="0.40" />
                    </svg>
                );
            }
            if (hasSN) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <ellipse cx="14" cy="12" rx="8" ry="6" fill={color} opacity="0.80" />
                        <ellipse cx="21" cy="15" rx="6" ry="5" fill={color} opacity="0.65" />
                        {[9,16,23].map(function(x,i) {
                            return <text key={i} x={x} y="29" fontSize="9" fill="#aaccff" textAnchor="middle" fontFamily="sans-serif">❄</text>;
                        })}
                    </svg>
                );
            }
            if (hasRA) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <ellipse cx="14" cy="12" rx="8" ry="6" fill={color} opacity="0.80" />
                        <ellipse cx="22" cy="15" rx="6.5" ry="5" fill={color} opacity="0.65" />
                        <line x1="10" y1="22" x2="8"  y2="29" stroke="#4fc3f7" strokeWidth="2" strokeLinecap="round" />
                        <line x1="16" y1="22" x2="14" y2="29" stroke="#4fc3f7" strokeWidth="2" strokeLinecap="round" />
                        <line x1="22" y1="22" x2="20" y2="29" stroke="#4fc3f7" strokeWidth="2" strokeLinecap="round" />
                    </svg>
                );
            }
            if (hasOVC) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <ellipse cx="12" cy="14" rx="9"   ry="7.5" fill={color} opacity="0.90" />
                        <ellipse cx="22" cy="17" rx="8.5" ry="6.5" fill={color} opacity="0.80" />
                        <rect    x="4"  y="19"  width="24" height="6" rx="3" fill={color} opacity="0.75" />
                    </svg>
                );
            }
            if (hasBKN) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <circle  cx="9"  cy="12" r="5.5" fill="#FFD700" opacity="0.75" />
                        <ellipse cx="19" cy="16" rx="9"   ry="7"   fill={color} opacity="0.85" />
                        <ellipse cx="26" cy="19" rx="6"   ry="4.5" fill={color} opacity="0.70" />
                    </svg>
                );
            }
            if (hasSCT) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <circle  cx="9"  cy="11" r="6"   fill="#FFD700" opacity="0.90" />
                        <ellipse cx="20" cy="18" rx="8.5" ry="6"   fill={color} opacity="0.75" />
                        <ellipse cx="26" cy="20" rx="5.5" ry="4"   fill={color} opacity="0.60" />
                    </svg>
                );
            }
            if (hasFEW) {
                return (
                    <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                        <circle  cx="10" cy="11" r="7"   fill="#FFD700" opacity="0.95" />
                        <ellipse cx="21" cy="19" rx="8"   ry="5.5" fill={color} opacity="0.60" />
                    </svg>
                );

            // Clear / SKC / CLR
            return (
                <svg width={size} height={size} viewBox="0 0 32 32" className="wx-icon-svg">
                    <circle cx="16" cy="16" r="8" fill="#FFD700" opacity="0.95" />
                    {[0,45,90,135,180,225,270,315].map(function(a, i) {
                        var rad = (a * Math.PI) / 180;
                        var x1 = (16 + 11 * Math.cos(rad)).toFixed(1);
                        var y1 = (16 + 11 * Math.sin(rad)).toFixed(1);
                        var x2 = (16 + 14 * Math.cos(rad)).toFixed(1);
                        var y2 = (16 + 14 * Math.sin(rad)).toFixed(1);
                        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#FFD700" strokeWidth="2" strokeLinecap="round" />;
