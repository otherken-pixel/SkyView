                    </header>
                    {showDataModal     && <DataModal trips={trips} onImport={importTrips} onClose={() => setShowDataModal(false)} />}
                    {showSettingsModal && <SettingsModal onClose={() => setShowSettingsModal(false)} />}
                    {showLoginModal    && <LoginScreen onClose={() => setShowLoginModal(false)} />}
                    {showProfileModal  && <PilotProfileModal onClose={() => setShowProfileModal(false)} onSave={function(mins){ setPersonalMinimums(mins); }} />}

                    <main style={{ flex: 1, overflowY: "auto", background: "var(--bg-elevated)" }}>
                        
                        {/* ══ TRIPS LIST ══════════════════════════════════════════════════ */}
                        {view === "trips" && (
                            <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 16px 40px" }}>

                                {/* Section label + New Flight button */}
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '1px', textTransform: 'uppercase', color: 'var(--text-tertiary)' }}>My Flights</div>
                                    <button onClick={() => setView("create")} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 10, padding: '8px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>
                                        <MdIcon name="add" style={{ fontSize: 18 }} />
                                        New Flight
                                    </button>
                                </div>

                                {/* ── Natural-Language Quick Add ────────────────────────────── */}
                                <div style={{ marginBottom: 20, background: 'var(--card-mid)', borderRadius: 16, padding: '16px 18px', border: '1px solid var(--card-border)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 12 }}>
                                        <MdIcon name="auto_awesome" style={{ fontSize: 16, color: 'var(--accent)' }} />
                                        <span style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.8px', color: 'var(--text-secondary)' }}>Quick Add with AI</span>
                                    </div>
                                    <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                                        <MdInput
                                            value={nlInput}
                                            placeholder='e.g., Flying from KCLT to KATL tomorrow at 9am in a 172'
                                            onChange={function(e) { setNlInput(e.target.value); setNlError(null); }}
                                            containerStyle={{ flex: 1 }}
                                        />
                                        <MdButton
                                            variant={nlLoading ? 'tonal' : 'sparkle'}
                                            icon={nlLoading ? 'sync' : 'auto_awesome'}
                                            disabled={nlLoading || !nlInput.trim()}
                                            onClick={handleNlGenerate}
                                            style={{ flexShrink: 0, padding: '13px 20px', whiteSpace: 'nowrap' }}
                                        >
                                            {nlLoading ? 'Parsing\u2026' : 'Generate'}
                                        </MdButton>
                                    </div>
                                    {nlError && (
                                        <div style={{ marginTop: 10, padding: '10px 14px', background: 'var(--nogo-bg)', color: 'var(--nogo)', border: '1px solid rgba(255,59,48,0.25)', borderRadius: 10, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <MdIcon name="error_outline" style={{ fontSize: 16, flexShrink: 0 }} />
                                            {nlError}
                                        </div>
                                    )}
                                </div>

                                {/* ── Loading skeleton — shown while Firestore data arrives (Step 3.3) ── */}
                                {!tripsLoaded && (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }} aria-busy="true" aria-label="Loading flights">
                                        {[0,1,2].map(function(i) { return (
                                            <div key={i} className="fy-card" style={{ padding: 0, overflow: 'hidden' }} aria-hidden="true">
                                                <div style={{ height: 3, background: 'var(--card-border)', opacity: 0.6 }} />
                                                <div style={{ display: 'flex', alignItems: 'center', padding: '18px 20px', gap: 20 }}>
                                                    <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--card-high)', flexShrink: 0, animation: 'pulse 1.6s ease-in-out infinite' }} />
                                                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
                                                        <div style={{ height: 22, width: '55%', borderRadius: 6, background: 'var(--card-high)', animation: 'pulse 1.6s ease-in-out infinite' }} />
                                                        <div style={{ height: 13, width: '35%', borderRadius: 6, background: 'var(--card-mid)', animation: 'pulse 1.6s ease-in-out infinite', animationDelay: '0.15s' }} />
                                                        <div style={{ display: 'flex', gap: 6 }}>
                                                            {[40,55,65,50].map(function(w,j) { return (
                                                                <div key={j} style={{ height: 20, width: w, borderRadius: 6, background: 'var(--card-mid)', animation: 'pulse 1.6s ease-in-out infinite', animationDelay: (j * 0.07) + 's' }} />
                                                            ); })}
                                                        </div>
                                                    </div>
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0 }}>
                                                        {[0,1,2,3].map(function(j) { return (
                                                            <div key={j} style={{ width: 38, height: 38, borderRadius: 12, background: 'var(--card-high)', animation: 'pulse 1.6s ease-in-out infinite', animationDelay: (j * 0.07) + 's' }} />
                                                        ); })}
                                                    </div>
                                                </div>
                                            </div>
                                        ); })}
                                    </div>
                                )}

                                {tripsLoaded && <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {trips.slice().sort(function(a, b) {
                                    var aptA = getAirport(a.dep), aptB = getAirport(b.dep);
                                    var tA = (a.date && a.time && aptA) ? getTripTargetUtc(a, aptA.tz || lonToIanaTz(aptA.lon)) : null;
                                    var tB = (b.date && b.time && aptB) ? getTripTargetUtc(b, aptB.tz || lonToIanaTz(aptB.lon)) : null;
                                    var nowMs = Date.now();
                                    var pastA = tA ? tA.getTime() < nowMs : true;
                                    var pastB = tB ? tB.getTime() < nowMs : true;
                                    if (pastA !== pastB) return pastA ? 1 : -1;
                                    if (!tA && !tB) return 0;
                                    if (!tA) return 1;
                                    if (!tB) return -1;
                                    return tA.getTime() - tB.getTime();
                                }).map(trip => {
                                        var ac = AIRCRAFT.find(a => a.id === trip.aircraft) || AIRCRAFT[0];
                                        var fullRoute = [trip.dep].concat(trip.wps || []).concat([trip.arr]).map(r => r ? r.trim().toUpperCase() : r);
                                        var validRoutePts = fullRoute.filter(r => r && getAirport(r));
                                        var d = 0;
                                        for (var i = 0; i < validRoutePts.length - 1; i++) {
                                            var p1 = getAirport(validRoutePts[i]);
                                            var p2 = getAirport(validRoutePts[i+1]);
                                            if (p1 && p2) d += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                                        }
                                        var ete = ac ? d / ac.kts : 0;
                                        var depApt = getAirport(trip.dep);
                                        var tripTarget = (trip.date && trip.time && depApt) ? getTripTargetUtc(trip, depApt.tz || lonToIanaTz(depApt.lon)) : null;
                                        var tripCountdown = null;
                                        if (tripTarget) {
                                            var msUntil = tripTarget.getTime() - Date.now();
                                            var hUntil = msUntil / 3600000;
                                            if (msUntil < 0) {
                                                tripCountdown = { label: 'Outdated', past: true, soon: false };
                                            } else {
                                                var totalMins = Math.round(msUntil / 60000);
                                                var cdLabel;
                                                if (totalMins < 60) { cdLabel = 'In ' + totalMins + 'm'; }
                                                else if (hUntil < 24) { var hh = Math.floor(hUntil), mm = Math.round((hUntil - hh) * 60); cdLabel = 'In ' + hh + 'h' + (mm > 0 ? ' ' + mm + 'm' : ''); }
                                                else if (Math.round(hUntil / 24) === 1) { cdLabel = 'Tomorrow'; }
                                                else if (hUntil < 168) { cdLabel = 'In ' + Math.round(hUntil / 24) + 'd'; }
                                                else { cdLabel = 'In ' + Math.round(hUntil / 168) + 'w'; }
                                                tripCountdown = { label: cdLabel, past: false, soon: hUntil < 2 };
                                            }
                                        }

                                        // Score-based card accent color
                                        var scoreColor = !trip.goScore ? 'var(--text-tertiary)'
                                            : trip.goScore >= 80 ? 'var(--vfr)'
                                            : trip.goScore >= 60 ? 'var(--mvfr)'
                                            : trip.goScore >= 40 ? 'var(--ifr)'
                                            : 'var(--lifr)';

                                        return (
                                            <div key={trip.id} onClick={() => openTrip(trip)}
                                                className="fy-card"
                                                style={{ padding: 0, overflow: 'hidden', cursor: 'pointer', transition: 'transform 0.15s, box-shadow 0.15s' }}
                                                onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 8px 32px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset'; }}
                                                onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}
                                            >
                                                {/* Score bar — 4px top accent */}
                                                <div style={{ height: 3, background: `linear-gradient(90deg, ${scoreColor}, transparent)`, opacity: 0.8 }} />

                                                <div style={{ display: "flex", alignItems: "center", padding: "18px 20px", gap: 20 }}>
                                                    {/* Score ring */}
                                                    <div style={{ flexShrink: 0 }}>
                                                        {trip.goScore ? <GoScoreRing score={trip.goScore} size={60} /> : (
                                                            <div style={{ width: 60, height: 60, borderRadius: '50%', border: '2px dashed var(--card-border)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                                                <MdIcon name="pending" style={{ color: 'var(--text-tertiary)', fontSize: 22 }} />
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Route & info */}
                                                    <div style={{ flex: 1, minWidth: 0 }}>
                                                        {/* ICAO route — large bold */}
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5, flexWrap: 'wrap' }}>
                                                            {fullRoute.map((rt, idx) => (
                                                                <React.Fragment key={idx}>
                                                                    <span className="font-mono" style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.5px', color: idx === 0 ? 'var(--text-primary)' : idx === fullRoute.length - 1 ? 'var(--text-primary)' : 'var(--text-secondary)' }}>{rt}</span>
                                                                    {idx < fullRoute.length - 1 && (
                                                                        <MdIcon name="arrow_forward" style={{ color: 'var(--text-tertiary)', fontSize: 14 }} />
                                                                    )}
                                                                </React.Fragment>
                                                            ))}
                                                        </div>

                                                        {/* City names */}
                                                        <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 8, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                            {fullRoute.map(rt => getAirport(rt)?.city).filter(Boolean).join(' → ')}
                                                        </div>

                                                        {/* Metadata pills row */}
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                                                            {[
                                                                d > 0 && { label: Math.round(d) + ' NM' },
                                                                ete > 0 && { label: Math.floor(ete) + 'h ' + Math.round((ete % 1) * 60) + 'm' },
                                                                { label: ac.name },
                                                                trip.date && { label: trip.date },
                                                            ].filter(Boolean).map((p, i) => (
                                                                <span key={i} style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-tertiary)', background: 'var(--card-high)', borderRadius: 6, padding: '3px 8px' }}>{p.label}</span>
                                                            ))}
                                                            {tripCountdown && (
                                                                <span style={{ fontSize: 12, fontWeight: 700, borderRadius: 6, padding: '3px 8px',
                                                                    background: tripCountdown.past ? 'var(--lifr-bg)' : tripCountdown.soon ? 'var(--ifr-bg)' : 'var(--accent-dim)',
                                                                    color:      tripCountdown.past ? 'var(--lifr)'   : tripCountdown.soon ? 'var(--ifr)'   : 'var(--accent)',
                                                                }}>
                                                                    {tripCountdown.label}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* Action icons */}
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
                                                        <IconBtn icon={copiedTripId === trip.id ? "check" : "share"} title="Copy link" aria-label="Copy shareable link for this trip" onClick={e => copyTripLink(trip, e)} active={copiedTripId === trip.id} />
                                                        <IconBtn icon="content_copy" title="Duplicate" aria-label="Duplicate this trip" onClick={e => duplicateTrip(trip, e)} />
                                                        <IconBtn icon="edit" title="Edit" aria-label="Edit this trip" onClick={e => editTrip(trip, e)} />
                                                        <IconBtn icon="delete" title="Delete" aria-label="Delete this trip" onClick={() => deleteTrip(trip.id)} />
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}

                                    {trips.length === 0 && (
                                        <div style={{ textAlign: 'center', padding: '60px 24px', color: 'var(--text-tertiary)' }}>
                                            <MdIcon name="flight_takeoff" style={{ fontSize: 48, marginBottom: 12, display: 'block', opacity: 0.4 }} />
                                            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6, color: 'var(--text-secondary)' }}>No flights yet</div>
                                            <div style={{ fontSize: 13 }}>Use the <strong style={{ color: 'var(--accent)' }}>New Flight</strong> button above to plan your first flight.</div>
                                        </div>
                                    )}

                                    {/* Aviation dad joke */}
                                    {trips.length > 0 && (
                                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '14px 18px', borderRadius: 14, background: 'var(--card)', border: '1px solid var(--card-border-soft)', color: 'var(--text-tertiary)', fontSize: 12, marginTop: 6 }}>
                                            <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>✈️</span>
                                            <div><span style={{ fontWeight: 600, color: 'var(--text-secondary)' }}>{dadJoke.q}</span>{' '}<span>{dadJoke.a}</span></div>
                                        </div>
                                    )}
                                </div>}
                            </div>
                        )}

                        {/* CREATE TRIP — Step-by-Step Wizard */}
                        {view === "create" && (
                            <div style={{ maxWidth: 600, margin: "0 auto", padding: "32px 16px" }}>
                                <MdButton variant="text" icon="arrow_back" onClick={() => { setEditingTripId(null); setWizardStep(1); setResetConfirm(false); setView("trips"); }} style={{ marginLeft: '-16px', marginBottom: '16px' }}>Back</MdButton>
                                <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 20px", color: "var(--text-primary)", letterSpacing: '-0.02em' }}>{editingTripId ? "Edit Flight" : "Plan a Flight"}</h1>

                                {/* ── Wizard Step Indicator ── */}
                                <div style={{ display: 'flex', alignItems: 'flex-start', marginBottom: 24, userSelect: 'none' }} role="list" aria-label="Wizard steps">
                                    {[{n:1,label:'Route'},{n:2,label:'When & Aircraft'},{n:3,label:'Review'}].map(function(s, i) {
                                        var done   = wizardStep > s.n;
                                        var active = wizardStep === s.n;
                                        return (
                                            <React.Fragment key={s.n}>
                                                {i > 0 && (
                                                    <div style={{ flex: 1, height: 2, background: done ? 'var(--accent)' : 'var(--card-border)', margin: '15px 6px 0', borderRadius: 2 }} />
                                                )}
                                                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }} role="listitem" aria-current={active ? 'step' : undefined}>
                                                    <div style={{
                                                        width: 32, height: 32, borderRadius: '50%',
                                                        background: done ? 'var(--accent)' : active ? 'var(--accent)' : 'var(--card-high)',
                                                        border: '2px solid ' + (done || active ? 'var(--accent)' : 'var(--card-border)'),
                                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                        color: done || active ? 'var(--text-primary)' : 'var(--text-secondary)',
                                                        fontSize: 13, fontWeight: 700, transition: 'all 0.2s'
                                                    }}>
                                                        {done
                                                            ? <MdIcon name="check" style={{ fontSize: 16 }} />
                                                            : s.n}
                                                    </div>
                                                    <span style={{ fontSize: 11, fontWeight: active ? 700 : 400, color: active ? 'var(--accent)' : done ? 'var(--text-secondary)' : 'var(--text-tertiary)', whiteSpace: 'nowrap' }}>{s.label}</span>
                                                </div>
                                            </React.Fragment>
                                        );
                                    })}
                                </div>

                                <div className="fy-card" style={{ padding: 24 }}>

                                    {/* ════ STEP 1: Route ════ */}
                                    {wizardStep === 1 && (
                                        <div>
                                            <div style={{ marginBottom: 20 }}>
                                                <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>Flight Route</div>
                                                <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Enter departure and arrival airports using 4-letter ICAO codes.</div>
                                            </div>

                                            <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 20 }}>
                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                    <div style={{ fontSize: 13, fontWeight: 500, color: "var(--text-secondary)" }}>Up to 5 legs</div>
                                                    {newTrip.route.length < 6 && (
                                                        <MdButton variant="tonal" icon="add" onClick={() => {
                                                            let r = [...newTrip.route];
                                                            r.splice(r.length - 1, 0, "");
                                                            setNewTrip({...newTrip, route: r});
                                                        }} style={{ padding: '6px 12px', fontSize: 12 }}>Add Waypoint</MdButton>
                                                    )}
                                                </div>

                                                {newTrip.route.map((r, i) => {
                                                    let isDep = i === 0;
                                                    let isArr = i === newTrip.route.length - 1;
                                                    let label = isDep ? "Departure ICAO" : isArr ? "Destination ICAO" : `Waypoint ${i} ICAO`;
                                                    let icon  = isDep ? "flight_takeoff" : isArr ? "flight_land" : "location_on";
                                                    return (
                                                        <div key={i} style={{ display: "flex", alignItems: "flex-end", gap: 12 }}>
                                                            <MdIcon name={icon} style={{ color: "var(--text-secondary)", marginBottom: 12, flexShrink: 0 }} aria-hidden="true" />
                                                            <AirportInput
                                                                label={label}
                                                                value={r}
                                                                onChange={function(v) {
                                                                    let newRoute = [...newTrip.route];
                                                                    newRoute[i] = v;
                                                                    setNewTrip({...newTrip, route: newRoute});
                                                                }}
                                                                placeholder={isDep ? "KCLT" : isArr ? "KATL" : "KORD"}
                                                                containerStyle={{ flex: 1 }}
                                                            />
                                                            {(!isDep && !isArr && newTrip.route.length > 2) && (
                                                                <MdButton variant="text" icon="close" onClick={() => {
                                                                    let newRoute = [...newTrip.route];
                                                                    newRoute.splice(i, 1);
                                                                    setNewTrip({...newTrip, route: newRoute});
                                                                }} style={{ padding: '8px', color: "var(--nogo)", marginBottom: 4 }} aria-label={`Remove waypoint ${i}`} />
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* Popular Hubs quick-fill */}
                                            <div style={{ marginBottom: 24 }}>
                                                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-tertiary)", marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.8px' }}>Popular Hubs</div>
                                                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                                    {Object.keys(AIRPORTS).slice(0, 15).map(k => (
                                                        <span key={k} role="button" tabIndex={0}
                                                            onClick={() => {
                                                                let newRoute = [...newTrip.route];
                                                                let emptyIdx = newRoute.findIndex(r => !r || r.length < 4);
                                                                if (emptyIdx !== -1) { newRoute[emptyIdx] = k; }
                                                                else if (newRoute.length < 6) { newRoute.splice(newRoute.length - 1, 0, k); }
                                                                setNewTrip({...newTrip, route: newRoute});
                                                            }}
                                                            onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') e.currentTarget.click(); }}
                                                            className="font-mono"
                                                            style={{ fontSize: 12, color: "var(--text-primary)", background: "var(--card-mid)", padding: "5px 12px", borderRadius: "99px", cursor: "pointer", border: "1px solid var(--card-border-soft)" }}
                                                            aria-label={`Add ${k} to route`}
                                                        >{k}</span>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Step 1 action row */}
                                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginTop: 8 }}>
                                                {/* Reset — protected by two-tap confirmation */}
                                                {newTrip.route.some(r => r.length >= 3)
                                                    ? resetConfirm
                                                        ? <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                              <MdIcon name="warning" style={{ fontSize: 16, color: 'var(--nogo)' }} aria-hidden="true" />
                                                              <span style={{ fontSize: 12, color: 'var(--nogo)', fontWeight: 600 }}>Clear all fields?</span>
                                                              <button onClick={() => { setNewTrip({ route: ["",""], aircraft:"c172", date:"", time:defaultTimeStr, name:"" }); setResetConfirm(false); }}
                                                                  style={{ background: 'var(--nogo)', color: 'var(--text-primary)', border: 'none', borderRadius: 8, padding: '5px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}
                                                                  aria-label="Confirm clear form">
                                                                  Yes, Clear
                                                              </button>
                                                              <button onClick={() => setResetConfirm(false)}
                                                                  style={{ background: 'var(--card-high)', color: 'var(--text-primary)', border: '1px solid var(--card-border)', borderRadius: 8, padding: '5px 12px', fontSize: 12, cursor: 'pointer' }}
                                                                  aria-label="Cancel clear">
                                                                  Cancel
                                                              </button>
                                                          </div>
                                                        : <button onClick={() => setResetConfirm(true)}
                                                              style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: '1px solid var(--card-border)', borderRadius: 8, padding: '7px 12px', fontSize: 12, color: 'var(--text-secondary)', cursor: 'pointer' }}
                                                              aria-label="Reset form (will ask for confirmation)">
                                                              <MdIcon name="restart_alt" style={{ fontSize: 16 }} aria-hidden="true" />
                                                              Reset Form
                                                          </button>
                                                    : <div />
                                                }
                                                <MdButton variant="primary" onClick={() => setWizardStep(2)} disabled={newTrip.route.filter(r => r.length === 4).length < 2} aria-label="Go to next step: When and Aircraft">
                                                    Next
                                                    <MdIcon name="arrow_forward" style={{ fontSize: 16, marginLeft: 4 }} aria-hidden="true" />
                                                </MdButton>
                                            </div>
                                        </div>
                                    )}

                                    {/* ════ STEP 2: When & Aircraft ════ */}
                                    {wizardStep === 2 && (
                                        <div>
                                            <div style={{ marginBottom: 20 }}>
                                                <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>When &amp; Aircraft</div>
                                                <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Set your departure date, time, and aircraft type.</div>
                                            </div>

                                            <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 24 }}>
                                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                                    <MdInput type="date" label="Departure Date" value={newTrip.date} onChange={e => setNewTrip({...newTrip, date: e.target.value})} />
                                                    <MdInput type="time" label="Departure Time" value={newTrip.time} onChange={e => setNewTrip({...newTrip, time: e.target.value})} />
                                                </div>
                                                <MdSelect label="Aircraft Type" value={newTrip.aircraft} onChange={e => setNewTrip({...newTrip, aircraft: e.target.value})} options={AIRCRAFT.map(a => ({value: a.id, label: `${a.name} (${a.cat})`}))} />
                                            </div>

                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginTop: 8 }}>
                                                <MdButton variant="text" icon="arrow_back" onClick={() => setWizardStep(1)}>Back</MdButton>
                                                <MdButton variant="primary" onClick={() => setWizardStep(3)} aria-label="Go to next step: Review">
                                                    Next
                                                    <MdIcon name="arrow_forward" style={{ fontSize: 16, marginLeft: 4 }} aria-hidden="true" />
                                                </MdButton>
                                            </div>
                                        </div>
                                    )}

                                    {/* ════ STEP 3: Review & Submit ════ */}
                                    {wizardStep === 3 && (
                                        <div>
                                            <div style={{ marginBottom: 20 }}>
                                                <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>Review Your Flight</div>
                                                <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Confirm details before creating.</div>
                                            </div>

                                            {(() => {
                                                var validRoutePts = newTrip.route.map(r => r.trim().toUpperCase()).filter(r => r.length === 4);
                                                var knownPts = validRoutePts.filter(r => getAirport(r));
                                                var dist = 0;
                                                for (var i = 0; i < knownPts.length - 1; i++) {
                                                    var p1 = getAirport(knownPts[i]), p2 = getAirport(knownPts[i+1]);
                                                    if (p1 && p2) dist += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                                                }
                                                var ac = AIRCRAFT.find(x => x.id === newTrip.aircraft) || AIRCRAFT[0];
                                                var ete = dist > 0 ? dist / ac.kts : 0;
                                                return (
                                                    <div>
                                                        {/* Route banner */}
                                                        <div className="font-mono" style={{ background: "var(--card-high)", border: '1px solid var(--card-border-soft)', borderRadius: 14, padding: '14px 16px', marginBottom: 12, fontSize: 15, fontWeight: 700, letterSpacing: '0.5px', textAlign: 'center', color: 'var(--accent)' }}>
                                                            {validRoutePts.length >= 2 ? validRoutePts.join(' → ') : '—'}
                                                        </div>

                                                        {/* Stats */}
                                                        <div className="font-mono" style={{ background: "var(--card-high)", border: '1px solid var(--card-border-soft)', borderRadius: 14, padding: '12px 16px', marginBottom: 12, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, fontSize: 12 }}>
                                                            <div style={{ textAlign: 'center' }}>
                                                                <div style={{ color: "var(--text-tertiary)", marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px', fontSize: 10 }}>DIST</div>
                                                                <div style={{ color: "var(--text-primary)", fontWeight: 700 }}>{dist > 0 ? Math.round(dist) + ' NM' : '—'}</div>
                                                            </div>
                                                            <div style={{ textAlign: 'center' }}>
                                                                <div style={{ color: "var(--text-tertiary)", marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px', fontSize: 10 }}>ETE</div>
                                                                <div style={{ color: "var(--text-primary)", fontWeight: 700 }}>{ete > 0 ? Math.floor(ete) + 'h ' + Math.round((ete % 1) * 60) + 'm' : '—'}</div>
                                                            </div>
                                                            <div style={{ textAlign: 'center' }}>
                                                                <div style={{ color: "var(--text-tertiary)", marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px', fontSize: 10 }}>DATE</div>
                                                                <div style={{ color: "var(--text-primary)", fontWeight: 700 }}>{newTrip.date || '—'}</div>
                                                            </div>
                                                            <div style={{ textAlign: 'center' }}>
                                                                <div style={{ color: "var(--text-tertiary)", marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px', fontSize: 10 }}>DEP</div>
                                                                <div style={{ color: "var(--text-primary)", fontWeight: 700 }}>{newTrip.time || '—'}</div>
                                                            </div>
                                                        </div>

                                                        {/* Aircraft */}
                                                        <div style={{ background: "var(--card-high)", border: '1px solid var(--card-border-soft)', borderRadius: 14, padding: '12px 16px', marginBottom: 24, display: 'flex', alignItems: 'center', gap: 10, fontSize: 13 }}>
                                                            <MdIcon name="flight" style={{ color: 'var(--text-secondary)', fontSize: 18 }} aria-hidden="true" />
                                                            <span style={{ color: "var(--text-secondary)" }}>Aircraft:</span>
                                                            <span style={{ fontWeight: 600, color: "var(--text-primary)" }}>{ac.name} <span style={{ color: 'var(--text-secondary)' }}>({ac.cat})</span></span>
                                                        </div>
                                                    </div>
                                                );
                                            })()}

                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginTop: 8 }}>
                                                <MdButton variant="text" icon="arrow_back" onClick={() => setWizardStep(2)}>Back</MdButton>
                                                <div style={{ display: 'flex', gap: 8 }}>
                                                    <MdButton variant="text" onClick={() => { setEditingTripId(null); setWizardStep(1); setResetConfirm(false); setView("trips"); }}>Cancel</MdButton>
                                                    <MdButton variant="primary" onClick={createTrip} disabled={newTrip.route.filter(r => r.length === 4).length < 2}>
                                                        {editingTripId ? "Save Changes" : "Create Trip"}
                                                    </MdButton>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>
                        )}

                        {/* TRIP BRIEFING */}
                        {view === "briefing" && activeTrip && (() => {
                            var ac = AIRCRAFT.find(a => a.id === activeTrip.aircraft) || AIRCRAFT[0];
                            var fullRoute = [activeTrip.dep].concat(activeTrip.wps || []).concat([activeTrip.arr]);
                            
                            return (
                                <div style={{ display: "flex", height: "100%" }}>
                                    {/* Flighty Navigation Rail (hidden on mobile) */}
                                    <div className="nav-rail" style={{
                                        width: "72px", background: "var(--bg-elevated)",
                                        borderRight: "1px solid var(--card-border)",
                                        display: "flex", flexDirection: "column", alignItems: "center",
                                        paddingTop: 12, paddingBottom: 12, gap: 4
                                    }}>
                                        {tabList.map(t => {
                                            var active = tab === t.id;
                                            return (
                                                <button key={t.id} onClick={() => setTab(t.id)}
                                                    aria-label={t.label + ' tab'}
                                                    aria-current={active ? 'page' : undefined}
                                                    className={"nav-rail-item" + (active ? " active" : "")}
                                                    style={{ background: "none", border: "none", cursor: "pointer", width: "100%", padding: "6px 0" }}>
                                                    <div className="rail-pip">
                                                        <MdIcon name={t.icon} style={{ fontSize: 22, display: "block" }} aria-hidden="true" />
                                                    </div>
                                                    <span className="nav-rail-label">{t.label}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* Mobile Bottom Navigation (CSS makes it visible on small screens) */}
                                    <div className="mobile-bottom-nav">
                                        {tabList.map(function(t) {
                                            var active = tab === t.id;
                                            return (
                                                <button key={t.id} onClick={() => setTab(t.id)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'6px 10px', minWidth:48 }}>
                                                    <MdIcon name={t.icon} style={{ fontSize:22, color: active ? 'var(--accent)' : 'var(--text-tertiary)' }} />
                                                    <span style={{ fontSize:12, fontWeight: active ? 600 : 400, letterSpacing:'0.3px', color: active ? 'var(--accent)' : 'var(--text-tertiary)' }}>{t.label}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* Content Area */}
                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: "var(--bg)" }}>
                                        {/* Trip Header Banner — Flighty style */}
                                        <div style={{
                                            padding: "14px 24px",
                                            display: "flex", alignItems: "center", gap: 18,
                                            borderBottom: "1px solid var(--card-border)",
                                            background: "var(--header-bg)",
                                            backdropFilter: "blur(16px)",
                                            WebkitBackdropFilter: "blur(16px)"
                                        }}>
                                            <GoScoreRing score={activeTrip.goScore || 50} size={52} />
                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3, flexWrap: "wrap" }}>
                                                    {fullRoute.map((rt, idx) => (
                                                        <React.Fragment key={idx}>
                                                            <span className="font-mono" style={{
                                                                fontSize: 20, fontWeight: 800, letterSpacing: "-0.5px",
                                                                color: "var(--text-primary)"
                                                            }}>{rt}</span>
                                                            {idx < fullRoute.length - 1 && (
                                                                <MdIcon name="arrow_forward" style={{ color: "var(--text-tertiary)", fontSize: 15 }} />
                                                            )}
                                                        </React.Fragment>
                                                    ))}
                                                </div>
                                                <div style={{ fontSize: 12, color: "var(--text-tertiary)", fontWeight: 500 }}>
                                                    {ac.name}
                                                    <span style={{ margin: "0 6px", opacity: 0.4 }}>·</span>
                                                    {activeTrip.date}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Scrollable Tab Content */}
                                        <div className="briefing-content" style={{ flex: 1, overflowY: "auto", padding: "24px", maxWidth: "900px", margin: "0 auto", width: "100%" }}>
                                            {(tab === "brief" || tab === "export") && (
                                                <WxErrorBoundary label="Flight Briefing">
                                                    <BriefingPanel trip={activeTrip} tab={tab}
                                                    user={user}
                                                    personalMinimums={personalMinimums}
                                                    pendingAiPrompt={pendingAiPrompt}
                                                    onClearPendingPrompt={() => setPendingAiPrompt(null)}
                                                    onScoreUpdate={score => {
                                                        setActiveTrip(prev => prev ? { ...prev, goScore: score } : prev);
                                                        setTrips(prev => prev.map(t => t.id === activeTrip.id ? { ...t, goScore: score } : t));
                                                    }}
                                                    onFratUpdate={(answers, skipped) => {
                                                        setActiveTrip(prev => prev ? { ...prev, fratAnswers: answers, fratSkipped: skipped } : prev);
                                                        setTrips(prev => prev.map(t => t.id === activeTrip.id ? { ...t, fratAnswers: answers, fratSkipped: skipped } : t));
                                                    }} />
                                                </WxErrorBoundary>
                                            )}

                                            {tab === "wx" && (
                                                <div style={{display: 'flex', flexDirection: 'column', gap: '24px'}}>
                                                    {fullRoute.map((rt, idx) => {
                                                        let label = idx === 0 ? "Departure" : idx === fullRoute.length - 1 ? "Destination" : `Waypoint ${idx}`;
                                                        return (
                                                            <div key={idx}>
                                                                <h2 style={{fontSize: 14, fontWeight: 700, margin: "0 0 12px", color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.8px"}}>
                                                                    {label} · {getAirport(rt)?.city || rt}
                                                                </h2>
                                                                <WeatherDetail icao={rt} label={label} isDecodedWx={isDecodedWx} onAskAI={function(prompt) { setTab('brief'); setPendingAiPrompt(prompt); }} />
                                                                <WxErrorBoundary label={`Forecast Strip (${rt})`} compact>
                                                                    <ForecastStrip icao={rt} selectedDay={forecastDay} onSelect={setForecastDay} />
                                                                </WxErrorBoundary>
                                                            </div>
                                                        );
                                                    })}

                                                    <WindyMap dep={activeTrip.dep} arr={activeTrip.arr} wps={activeTrip.wps || []} />
                                                </div>
                                            )}

                                            {tab === "notam" && (
                                                <div style={{display: 'flex', flexDirection: 'column', gap: '24px'}}>
                                                    {fullRoute.map((rt, idx) => (
                                                        <div key={idx}>
                                                            <h2 style={{fontSize: 14, fontWeight: 700, margin: "0 0 12px", color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.8px"}}>
                                                                NOTAMs · {rt}
                                                            </h2>
                                                            <NotamsPanel icao={rt} />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {tab === "freq" && (
                                                <div style={{display: 'flex', flexDirection: 'column', gap: '24px'}}>
                                                    {fullRoute.map((rt, idx) => (
                                                        <FreqPanel key={idx} icao={rt} />
                                                    ))}
                                                </div>
                                            )}

                                            {tab === "fbo" && (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0' }}>
                                                    {fullRoute.map((rt, idx) => {
                                                        let label = idx === 0 ? "Departure" : idx === fullRoute.length - 1 ? "Destination" : `Waypoint ${idx}`;
                                                        return <FBOPanel key={idx} icao={rt} label={label} />;
                                                    })}
                                                </div>
                                            )}

                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </main>

                    {/* ── FAB: New Flight (shown on create/wx views only) ── */}
                    {view !== "briefing" && view !== "trips" && (
                        <button className="fab-new-flight" onClick={() => setView("create")}>
                            <MdIcon name="add" style={{ fontSize: 22 }} />
                            New Flight
                        </button>
                    )}

                    {/* ── ATIS / Clearance Scratchpad (always available) ── */}
                    <Scratchpad />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker registration — enables offline support on the ramp -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                    console.log('[SW] registered, scope:', reg.scope);
                }).catch(function(err) {
                    console.warn('[SW] registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
