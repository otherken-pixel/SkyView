                                                                                <div style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:'var(--md-sys-color-on-surface-variant)', marginTop:4, lineHeight:1.3 }}>{item.label}</div>
                                                                                {item.sub && (
                                                                                    <div style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:12, color:item.color||'var(--md-sys-color-on-surface-variant)', marginTop:2 }}>
                                                                                        {item.icon && <MdIcon name={item.icon} style={{ fontSize:13, color:item.color }} aria-hidden="true" />}
                                                                                        {item.sub}
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </>
                                                        ) : (
                                                            <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                                                                <div style={{ flex:'0 0 auto', background:'var(--md-sys-color-surface-container)', borderRadius:10, padding:'10px 16px', textAlign:'center', minWidth:80 }}>
                                                                    <div style={{ fontSize:26, fontWeight:800, lineHeight:1, color:fratBand ? fratBand.color : 'var(--md-sys-color-on-surface)' }}>{fratScore}</div>
                                                                    <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:'var(--md-sys-color-on-surface-variant)', marginTop:4 }}>FRAT Score</div>
                                                                    {fratBand && (
                                                                        <div style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:11, color:fratBand.color, marginTop:2 }}>
                                                                            <MdIcon name={fratBand.icon} style={{ fontSize:13, color:fratBand.color }} aria-hidden="true" />
                                                                            {fratBand.label}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                <div style={{ flex:1, fontSize:12, color:'var(--md-sys-color-on-surface-variant)', lineHeight:1.5 }}>
                                                                    <strong style={{ color:'var(--md-sys-color-on-surface)' }}>Live FRAT score</strong> — updates as you answer questions. Answer all {FRAT_TOTAL} to unlock the combined GO Score (70% weather + 30% FRAT).
                                                                    <div style={{ marginTop:5 }}>
                                                                        <div style={{ height:4, background:'var(--md-sys-color-surface-container)', borderRadius:2, overflow:'hidden' }}>
                                                                            <div style={{ height:'100%', width:`${(fratAnsweredCount/FRAT_TOTAL)*100}%`, background:'var(--accent)', borderRadius:2, transition:'width 0.3s' }} />
                                                                        </div>
                                                                        <div style={{ fontSize:11, marginTop:3, opacity:0.7 }}>{fratAnsweredCount} / {FRAT_TOTAL} answered</div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Action buttons */}
                                                <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                                                    <button onClick={function(){ setFratExpanded(false); }} style={{ flex:1, padding:'10px', background:'var(--accent)', color:'#fff', border:'none', borderRadius:10, fontSize:13, fontWeight:600, cursor:'pointer', minWidth:120 }}>
                                                        {fratComplete ? 'Done ✓' : 'Save & Close'}
                                                    </button>
                                                    {fratAnsweredCount > 0 && (
                                                        <button onClick={function(){ setFratAnswers({}); setFratAutoFilled({}); setFratSkipped(false); }} style={{ padding:'10px 14px', background:'var(--md-sys-color-surface-container-high)', color:'var(--md-sys-color-on-surface-variant)', border:'none', borderRadius:10, fontSize:12, cursor:'pointer' }}>
                                                            Clear FRAT
                                                        </button>
                                                    )}
                                                    {!fratComplete && (
                                                        <button onClick={function(){ setFratSkipped(true); setFratExpanded(false); }} style={{ padding:'10px 14px', background:'none', color:'var(--md-sys-color-on-surface-variant)', border:'1px solid var(--card-border)', borderRadius:10, fontSize:12, cursor:'pointer' }}>
                                                            Dismiss (keep −20)
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })()}

                            {/* Active Hazard Advisories (SIGMETs / AIRMETs / CWAs) */}
                            <HazardAdvisories sigmets={sigmets} gairmets={gairmets} cwas={cwas} loading={loadingAdvisory}
                                onAskAI={function(prompt) {
                                    setShowAI(true);
                                    setChatInput(prompt);
                                    setTimeout(function() {
                                        if (chatInputRef.current) {
                                            chatInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                            chatInputRef.current.focus();
                                        }
                                    }, 200);
                                }} />

                            {/* Winds Aloft card */}
                            <WindsAloftCard allRoutePts={allRoutePts} stations={windsAloft} cruiseAlt={ac.alt || 6000} />

                            {/* Go/No-Go banner — uses finalVerdict (may be overridden by convective SIGMET) */}
                            {(function() {
                                var _now = new Date();
                                var _ts = String(_now.getUTCHours()).padStart(2,'0') + String(_now.getUTCMinutes()).padStart(2,'0') + 'Z';
                                var _dt = _now.getUTCFullYear() + '-' + String(_now.getUTCMonth()+1).padStart(2,'0') + '-' + String(_now.getUTCDate()).padStart(2,'0');
                                return (
                                    <div style={{ background: finalVerdict.verdictBg, borderRadius: 16, padding: '20px 24px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 16 }} role="status" aria-live="polite">
                                        <MdIcon name={finalVerdict.verdictIcon} style={{ fontSize: 44, color: finalVerdict.verdictColor, flexShrink: 0 }} aria-hidden="true" />
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', color: finalVerdict.verdictColor, opacity: 0.75, marginBottom: 2 }}>Go/No-Go Assessment</div>
                                            <div style={{ fontSize: 30, fontWeight: 800, color: finalVerdict.verdictColor, fontFamily: 'monospace', lineHeight: 1 }}>{finalVerdict.verdict}</div>
                                            <div style={{ fontSize: 13, color: finalVerdict.verdictColor, opacity: 0.85, marginTop: 4, lineHeight: 1.4 }}>{finalVerdict.verdictDesc}</div>
                                        </div>
                                        {/* Timestamp — allows responder to screenshot and share with flight crew */}
                                        <div style={{ flexShrink: 0, textAlign: 'right', borderLeft: '1px solid ' + finalVerdict.verdictColor + '44', paddingLeft: 16 }} title="Score calculated at this UTC time">
                                            <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.8px', color: finalVerdict.verdictColor, opacity: 0.6, marginBottom: 3 }}>Assessed</div>
                                            <div className="font-mono" style={{ fontSize: 15, fontWeight: 800, color: finalVerdict.verdictColor, lineHeight: 1 }} aria-label={'Assessment time: ' + _ts}>{_ts}</div>
                                            <div className="font-mono" style={{ fontSize: 11, color: finalVerdict.verdictColor, opacity: 0.7, marginTop: 3 }}>{_dt}</div>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* ---- AI Preflight Weather Briefing — veteran aviation meteorologist ---- */}
                            <div style={{ background: 'var(--card)', border: '1px solid var(--card-border)', borderRadius: 20, marginBottom: 16, overflow: 'hidden', boxShadow: '0 2px 16px rgba(0,0,0,0.35)' }}>
                                {/* Section header — always visible, acts as toggle */}
                                <button onClick={() => setShowAI(!showAI)} style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', background: 'none', border: 'none', cursor: 'pointer', padding: '16px 18px', color: 'var(--text-primary)', fontFamily: 'var(--font-sans)' }}>
                                    <div style={{ width: 34, height: 34, borderRadius: 10, background: 'linear-gradient(135deg, var(--accent-dim), rgba(10,132,255,0.08))', border: '1px solid rgba(10,132,255,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                        <MdIcon name="auto_awesome" style={{ color: 'var(--accent)', fontSize: 18 }} />
                                    </div>
                                    <div style={{ flex: 1, textAlign: 'left' }}>
                                        <div style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-primary)' }}>AI Preflight Briefing</div>
                                        {aiSavedAt && !aiLoading && (
                                            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>
                                                Updated {new Date(aiSavedAt).toLocaleTimeString()} · {showAI ? 'Tap to collapse' : 'Tap to expand'}
                                            </div>
                                        )}
                                        {!aiSavedAt && !aiLoading && (
                                            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>Veteran meteorologist · FAA standard briefing format</div>
                                        )}
                                    </div>
                                    {aiResult && !aiLoading && (
                                        <span style={{ fontSize: 10, fontWeight: 700, background: 'var(--accent-dim)', color: 'var(--accent)', borderRadius: 6, padding: '3px 9px', letterSpacing: '0.5px', flexShrink: 0 }}>LIVE</span>
                                    )}
                                    {aiResult && (
                                        <button onClick={function(e) { e.stopPropagation(); runAiBriefing(); }} disabled={aiLoading || loadingWx} title="Refresh briefing" style={{ background: 'none', border: 'none', cursor: aiLoading || loadingWx ? 'default' : 'pointer', padding: 4, borderRadius: 8, color: 'var(--text-tertiary)', display: 'flex', alignItems: 'center', flexShrink: 0, opacity: aiLoading || loadingWx ? 0.4 : 1 }}>
                                            <MdIcon name="refresh" style={{ fontSize: 18, animation: aiLoading ? 'spin 1s linear infinite' : 'none' }} />
                                        </button>
                                    )}
                                    <MdIcon name={showAI ? 'expand_less' : 'expand_more'} style={{ fontSize: 20, color: 'var(--text-tertiary)', flexShrink: 0 }} />
                                </button>

                                {showAI && (
                                    <div style={{ padding: '0 16px 16px', borderTop: '1px solid var(--card-border-soft)' }}>

                                        {/* Loading state — shown while auto-generating */}
                                        {aiLoading && !aiResult && (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '20px 4px', color: 'var(--md-sys-color-on-surface-variant)', fontSize: 13 }}>
                                                <MdIcon name="sync" style={{ fontSize: 20, animation: 'spin 1s linear infinite', flexShrink: 0 }} />
                                                Generating preflight briefing…
                                            </div>
                                        )}

                                        {/* Empty state — prompt user to generate */}
                                        {!aiResult && !aiLoading && (
                                            <div style={{ padding: '20px 4px', textAlign: 'center' }}>
                                                {loadingWx ? (
                                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, color: 'var(--text-tertiary)', fontSize: 13 }}>
                                                        <MdIcon name="cloud_download" style={{ fontSize: 18 }} />
                                                        Loading weather data…
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div style={{ color: 'var(--text-tertiary)', fontSize: 12, marginBottom: 12 }}>Weather loaded — tap to generate your AI preflight briefing</div>
                                                        <button onClick={runAiBriefing} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, width: '100%', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 12, padding: '13px', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>
                                                            <MdIcon name="auto_awesome" style={{ fontSize: 18 }} />
                                                            Generate Briefing
                                                        </button>
                                                    </>
                                                )}
                                            </div>
                                        )}

                                        {aiError && (
                                            <div style={{ marginBottom: 12 }}>
                                                <MdCard style={{ background: 'var(--md-sys-color-error-container)', color: 'var(--md-sys-color-on-error-container)', marginBottom: 8 }}>
                                                    <MdIcon name="error" style={{ marginRight: 8 }} />{aiError}
                                                </MdCard>
                                                <MdButton variant="tonal" onClick={runAiBriefing} disabled={aiLoading || loadingWx} icon="refresh" style={{ width: '100%', padding: '10px', fontSize: '13px' }}>
                                                    Retry Briefing
                                                </MdButton>
                                            </div>
                                        )}

                                        {/* Briefing sections — collapsible accordion cards */}
                                        {(function() {
                                            // Which sections are expanded (all open by default)
                                            return aiSections.map(function(s, i) {
                                                var meta = sectionMeta[s.title] || { icon: 'info', color: 'var(--accent)' };
                                                var isHighlight = s.title === 'GO/NO-GO ASSESSMENT' || s.title === 'HAZARDS SUMMARY';
                                                return (
                                                    <details key={i} open={i < 3 || isHighlight} className="ai-section-accordion" style={{
                                                        background: isHighlight ? (meta.bg || 'var(--card)') : 'var(--card)',
                                                        border: '1px solid ' + (isHighlight ? meta.color + '44' : 'var(--card-border-soft)'),
                                                    }}>
                                                        <summary className="ai-section-trigger">
                                                            {/* Icon ring */}
                                                            <div className="ai-section-icon-ring" style={{ background: meta.color + '22', border: '1px solid ' + meta.color + '44' }}>
                                                                <MdIcon name={meta.icon} style={{ fontSize: 15, color: meta.color }} />
                                                            </div>
                                                            <span style={{ fontWeight: 700, fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.7px', color: meta.color, flex: 1 }}>
                                                                {s.title}
                                                            </span>
                                                            {isHighlight && (
                                                                <span style={{ fontSize: 10, fontWeight: 700, background: meta.color + '22', color: meta.color, borderRadius: 6, padding: '2px 7px', marginRight: 6, flexShrink: 0 }}>KEY</span>
                                                            )}
                                                            <MdIcon name="expand_more" style={{ fontSize: 18, color: 'var(--text-tertiary)', flexShrink: 0, transition: 'transform 0.2s' }} />
                                                        </summary>
                                                        <div className="ai-section-content" style={{ color: meta.onBg || 'var(--text-secondary)' }}>
                                                            {s.body.trim()}
                                                        </div>
                                                    </details>
                                                );
                                            });
                                        })()}

                                        {/* Update + speech buttons — only shown after briefing exists */}
                                        {aiResult && !aiLoading && (
                                            <div style={{ display: 'flex', gap: 8, marginTop: 4, marginBottom: 12 }}>
                                                <MdButton variant="tonal" onClick={runAiBriefing} disabled={loadingWx} icon="refresh" style={{ flex: 1, padding: '10px', fontSize: '13px' }}>
                                                    Update Briefing
                                                </MdButton>
                                                {window.speechSynthesis && (

                                    <div style={{ width: 34, height: 34, borderRadius: 10, background: 'var(--accent-dim)', border: '1px solid rgba(10,132,255,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>

                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-primary)' }}>En Route PIREPs</div>
                                        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>Live · AviationWeather.gov · within 200 NM</div>
                                    </div>
                                </div>
                                <div style={{ padding: '14px 18px' }}>
                                    <LivePireps dep={trip.dep} arr={trip.arr} />
                                </div>
                            </div>

                            {/* ---- Windy.com visual forecast (shown for NWS 7-day trips >30h) ---- */}
                            {finalVerdict.anyNws && (
                                <div style={{ background: 'var(--md-sys-color-surface-container)', borderRadius: 16, padding: '16px', marginBottom: 16 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
                                        <MdIcon name="air" style={{ color: 'var(--md-sys-color-tertiary)', fontSize: 18 }} />
                                        <span style={{ fontWeight: 700, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--md-sys-color-tertiary)' }}>Visual Forecast</span>
                                        <span style={{ fontSize: 12, fontWeight: 700, background: 'var(--md-sys-color-tertiary-container)', color: 'var(--md-sys-color-on-tertiary-container)', borderRadius: 4, padding: '2px 7px', letterSpacing: '0.5px' }}>WINDY.COM · ECMWF</span>
                                        <span style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', marginLeft: 'auto' }}>Centered on {effectiveWxData[0].icao} (dep)</span>
                                    </div>
                                    <WindyEmbed icao={effectiveWxData[0].icao} tripTargetUtc={tripTargetUtc} />
                                    <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', marginTop: 10, lineHeight: 1.5 }}>
                                        Use the timeline slider in the map to navigate to your departure date/time. Wind barbs show direction and speed in knots.
                                    </div>
                                </div>

                            {/* Route Map — at the bottom of the briefing */}
                            <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, marginBottom:16, overflow:'hidden' }}>
                                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'14px 16px', borderBottom:'1px solid var(--card-border)' }}>
                                    <MdIcon name="map" style={{ color:'var(--md-sys-color-tertiary)', fontSize:18 }} />
                                    <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-tertiary)' }}>Route Map</span>
                                </div>
                                <RouteMap dep={trip.dep} arr={trip.arr} wps={trip.wps||[]} />

                            <div style={{ fontSize: 12, color: 'var(--md-sys-color-on-surface-variant)', textAlign: 'center', padding: '4px 16px 20px', lineHeight: 1.5 }}>
                                {finalVerdict.anyNws
                                    ? <>NWS 7-day forecast from <strong>AviationWeather.gov</strong> · visual from <strong>Windy.com</strong>. Trip is beyond TAF range — <strong>re-check with TAF and METAR within 30h of departure</strong>.</>
                                    : finalVerdict.isFutureFlight
                                    ? <>TAF forecast from <strong>AviationWeather.gov</strong> for trip date/time. Conditions may change — <strong>re-check closer to departure</strong>.</>

        /* =========================================================

             • View and override the OpenAIP API key (stored in
               localStorage — never in the source file).
             • Check OurAirports database cache status and force refresh.
             • See real-time API status for both data sources.
           For production deployments, the OpenAIP key should be proxied
           via a Cloudflare Worker so it is not visible in the browser.
        ========================================================= */
        /* ═══════════════════════════════════════════════════════════════════
           PILOT PROFILE MODAL — Personal Minimums Configuration
        ═══════════════════════════════════════════════════════════════════ */
        function PilotProfileModal({ onClose, onSave }) {
            var saved = getPersonalMinimums() || {};
            var [vals, setVals] = React.useState({
                ceilingDay:    saved.ceilingDay    || '',
                ceilingNight:  saved.ceilingNight  || '',
                visDay:        saved.visDay        || '',
                visNight:      saved.visNight      || '',
                maxWind:       saved.maxWind       || '',
                maxGustSpread: saved.maxGustSpread || '',
                maxCrosswind:  saved.maxCrosswind  || '',
            });
            var [saved2, setSaved2] = React.useState(false);

            function field(key) { return vals[key] === '' ? '' : String(vals[key]); }
            function setField(key, raw) {
                var n = raw === '' ? '' : parseInt(raw);
                setVals(function(v) { return Object.assign({}, v, { [key]: isNaN(n) ? '' : n }); });
            }
            function handleSave() {
                // Convert empty strings to null so missing fields are detectable
                var out = {};
                Object.keys(vals).forEach(function(k) { out[k] = vals[k] === '' ? null : Number(vals[k]); });
                savePersonalMinimums(out);
                setSaved2(true);
                setTimeout(function() { setSaved2(false); }, 1800);
                if (onSave) onSave(out);
            }
            function handleClear() {
                savePersonalMinimums(null);
                setVals({ ceilingDay:'', ceilingNight:'', visDay:'', visNight:'', maxWind:'', maxGustSpread:'', maxCrosswind:'' });
                if (onSave) onSave(null);
            }

            var groups = [
                {
                    label: 'Ceiling', icon: 'cloud', color: 'var(--mvfr)',
                    fields: [
                        { key: 'ceilingDay',   label: 'Day Minimum',   unit: 'ft',  placeholder: '3000', hint: 'e.g. 3,000 ft AGL' },
                        { key: 'ceilingNight', label: 'Night Minimum', unit: 'ft',  placeholder: '5000', hint: 'e.g. 5,000 ft AGL' },
                    ]
                },
                {
                    label: 'Visibility', icon: 'visibility', color: 'var(--go)',
                    fields: [
                        { key: 'visDay',   label: 'Day Minimum',   unit: 'SM', placeholder: '5', hint: 'e.g. 5 SM' },
                        { key: 'visNight', label: 'Night Minimum', unit: 'SM', placeholder: '7', hint: 'e.g. 7 SM' },
                    ]
                },
                {
                    label: 'Wind Limits', icon: 'air', color: 'var(--caution)',
                    fields: [
                        { key: 'maxWind',       label: 'Max Total Wind',   unit: 'kt', placeholder: '20', hint: 'Sustained wind limit' },
                        { key: 'maxGustSpread', label: 'Max Gust Spread',  unit: 'kt', placeholder: '10', hint: 'Gust minus steady wind' },
                        { key: 'maxCrosswind',  label: 'Max Crosswind',    unit: 'kt', placeholder: '12', hint: 'Aircraft crosswind limit' },
                    ]
                },
            ];

            return (
                <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.72)', zIndex:9000, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
                    onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
                    <div style={{ background:'var(--card)', borderRadius:20, width:'100%', maxWidth:480, maxHeight:'90vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.6)', border:'1px solid var(--card-border)' }}>

                        {/* Header */}
                        <div style={{ display:'flex', alignItems:'center', gap:14, padding:'20px 22px 16px', borderBottom:'1px solid var(--card-border-soft)' }}>
                            <div style={{ width:40, height:40, borderRadius:12, background:'var(--accent-dim)', border:'1px solid rgba(10,132,255,0.3)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                                <MdIcon name="person" style={{ color:'var(--accent)', fontSize:22 }} />
                            </div>
                            <div style={{ flex:1 }}>
                                <div style={{ fontWeight:800, fontSize:16, color:'var(--text-primary)', letterSpacing:'-0.01em' }}>Pilot Profile</div>
                                <div style={{ fontSize:12, color:'var(--text-tertiary)', marginTop:2 }}>Personal minimums — used in flight safety scoring</div>
                            </div>
                            <button onClick={onClose} style={{ background:'var(--card-high)', border:'none', borderRadius:8, width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
                                <MdIcon name="close" style={{ fontSize:18, color:'var(--text-secondary)' }} />
                            </button>
                        </div>

                        {/* ADM notice */}
                        <div style={{ margin:'16px 22px 0', padding:'12px 14px', borderRadius:12, background:'var(--caution-bg)', border:'1px solid rgba(255,149,0,0.25)', display:'flex', gap:10 }}>
                            <MdIcon name="admin_panel_settings" style={{ color:'var(--caution)', fontSize:18, flexShrink:0, marginTop:1 }} />
                            <div style={{ fontSize:12, color:'var(--text-secondary)', lineHeight:1.55 }}>
                                <strong style={{ color:'var(--caution)' }}>ADM Notice:</strong> Leaving personal minimums blank applies a <strong>−25 pt ADM penalty</strong> to your safety score. Setting them enables precise buffer-zone warnings before conditions reach your limits.
                            </div>
                        </div>

                        {/* Fields */}
                        <div style={{ padding:'16px 22px' }}>
                            {groups.map(function(g) { return (
                                <div key={g.label} style={{ marginBottom:20 }}>
                                    {/* Group header */}
                                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12, paddingBottom:8, borderBottom:'1px solid var(--card-border-soft)' }}>
                                        <div style={{ width:26, height:26, borderRadius:7, background:g.color+'22', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                                            <MdIcon name={g.icon} style={{ fontSize:14, color:g.color }} />
                                        </div>
                                        <span style={{ fontWeight:700, fontSize:12, textTransform:'uppercase', letterSpacing:'0.7px', color:g.color }}>{g.label}</span>
                                    </div>
                                    {/* Fields */}
                                    <div style={{ display:'grid', gridTemplateColumns: g.fields.length === 3 ? '1fr 1fr 1fr' : '1fr 1fr', gap:10 }}>
                                        {g.fields.map(function(f) { return (
                                            <div key={f.key}>
                                                <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.6px', color:'var(--text-tertiary)', marginBottom:5 }}>{f.label}</div>
                                                <div style={{ display:'flex', alignItems:'center', gap:0, background:'var(--card-mid)', border:'1px solid var(--card-border-soft)', borderRadius:10, overflow:'hidden', transition:'border-color 0.15s' }}>
                                                    <input
                                                        type="number"
                                                        min="0"
                                                        placeholder={f.placeholder}
                                                        value={field(f.key)}
                                                        onChange={function(e){ setField(f.key, e.target.value); }}
                                                        style={{ flex:1, background:'none', border:'none', outline:'none', padding:'10px 10px', fontSize:14, fontWeight:700, color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:0 }}
                                                    />
                                                    <span style={{ padding:'0 10px 0 4px', fontSize:11, fontWeight:600, color:'var(--text-tertiary)', flexShrink:0 }}>{f.unit}</span>
                                                </div>
                                                <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:4 }}>{f.hint}</div>
                                            </div>
                                        ); })}
                                    </div>
                                </div>
                            ); })}
                        </div>

                        {/* Footer actions */}
                        <div style={{ display:'flex', gap:10, padding:'0 22px 22px', borderTop:'1px solid var(--card-border-soft)', paddingTop:16 }}>
                            <button onClick={handleClear} style={{ background:'var(--card-high)', border:'1px solid var(--card-border-soft)', borderRadius:10, padding:'10px 16px', fontSize:13, fontWeight:600, color:'var(--text-tertiary)', cursor:'pointer', flexShrink:0 }}>
                                Clear All
                            </button>
                            <button onClick={handleSave} style={{ flex:1, background: saved2 ? 'var(--go)' : 'var(--accent)', border:'none', borderRadius:10, padding:'10px 0', fontSize:14, fontWeight:700, color:'#fff', cursor:'pointer', transition:'background 0.2s', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                                <MdIcon name={saved2 ? 'check_circle' : 'save'} style={{ fontSize:16, color:'#fff' }} />
                                {saved2 ? 'Saved!' : 'Save Minimums'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsModal({ onClose }) {
            var [apiKey,     setApiKey]     = useState(getOpenAIPKey);
            var [testStatus, setTestStatus] = useState(null);   // null | 'testing' | {ok,msg}
            var [oaCount,    setOaCount]    = useState(function() {
                return _ourAirports ? Object.keys(_ourAirports).length : 0;
            });
            var [oaRefresh,  setOaRefresh]  = useState(false);

            var oaStatusLabel = oaRefresh
                ? 'Refreshing…'
                : oaCount > 0
                    ? oaCount.toLocaleString() + ' airports cached'
                    : _oaLoading
                        ? 'Loading…'
                        : 'Not loaded';

            function saveKey() {
                localStorage.setItem(_OAIP_LS_KEY, apiKey.trim());
                // Invalidate all cached OpenAIP responses so stale data is flushed
                Object.keys(localStorage)
                    .filter(function(k) { return k.startsWith('skyview_oaip_'); })
                    .forEach(function(k) { localStorage.removeItem(k); });
                setTestStatus(null);
            }

            async function testKey() {
                setTestStatus('testing');
                var r = await testOpenAIPKey(apiKey.trim());
                setTestStatus(r.ok
                    ? { ok: true,  msg: 'Connected — API key accepted' }
                    : { ok: false, msg: 'Failed (HTTP ' + r.status + ') — check your key' });
            }

            async function refreshOA() {
                setOaRefresh(true);
                localStorage.removeItem(_OA_LS_KEY);
                _ourAirports = null;
                _oaLoading   = false;
                await loadOurAirports();
                setOaCount(_ourAirports ? Object.keys(_ourAirports).length : 0);
                setOaRefresh(false);
            }

            var overlay = {
                position:'fixed', inset:0, zIndex:2000,
                background:'rgba(0,0,0,0.72)', backdropFilter:'blur(8px)',
                display:'flex', alignItems:'center', justifyContent:'center', padding:16
            };
            var box = {
                background:'var(--card)',
                border:'1px solid var(--card-border)',
                borderRadius:20, padding:'24px 24px 20px', width:'min(460px, 94vw)',
                boxShadow:'0 24px 80px rgba(0,0,0,0.6)',
                display:'flex', flexDirection:'column', gap:20
            };
            var sectionHead = {
                fontSize:12, fontWeight:700, textTransform:'uppercase',
                letterSpacing:'1px', color:'var(--accent)',
                borderBottom:'1px solid var(--card-border-soft)',
                paddingBottom:8, marginBottom:10
            };
            var fieldWrap = { display:'flex', flexDirection:'column', gap:8 };
            var inputStyle = {
                fontFamily:'var(--font-mono)', fontSize:13,
                background:'var(--card-high)',
                color:'var(--text-primary)',
                border:'1px solid var(--card-border)',
                borderRadius:10, padding:'9px 12px', width:'100%', boxSizing:'border-box'
            };

            return (
                <div style={overlay} onClick={function(e) { if (e.target === e.currentTarget) onClose(); }}>
                    <div style={box}>
                        {/* Header */}
                        <div style={{ display:'flex', alignItems:'center', gap:14, borderBottom:'1px solid var(--card-border-soft)', paddingBottom:16, marginBottom:4 }}>
                            <div style={{ width:40, height:40, borderRadius:12, background:'var(--accent-dim)', border:'1px solid rgba(10,132,255,0.3)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                                <MdIcon name="settings" style={{ color:'var(--accent)', fontSize:22 }} />
                            </div>
                            <div style={{ flex:1 }}>
                                <div style={{ fontWeight:800, fontSize:16, color:'var(--text-primary)', letterSpacing:'-0.01em' }}>Settings</div>
                                <div style={{ fontSize:12, color:'var(--text-tertiary)' }}>App configuration &amp; data sources</div>
                            </div>
                            <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-secondary)', padding:6, display:'flex', alignItems:'center', justifyContent:'center', borderRadius:8 }}>
                                <MdIcon name="close" style={{ fontSize:20 }} />
                            </button>
                        </div>

                        {/* ── OurAirports ── */}
                        <div>
                            <div style={sectionHead}>Airport Database (OurAirports)</div>
                            <div style={fieldWrap}>
                                <div style={{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.6 }}>
                                    Powers airport autocomplete with ~12,000 airports worldwide. Loaded once from <strong>ourairports.com</strong> open data and cached locally for 30 days.
                                </div>
                                <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                                    <div style={{
                                        fontSize:12, fontWeight:600,
                                        color: oaCount > 0 ? 'var(--go)' : 'var(--text-secondary)',
                                        display:'flex', alignItems:'center', gap:5
                                    }}>
                                        <MdIcon name={oaCount > 0 ? 'database' : 'cloud_off'} style={{ fontSize:16 }} />
                                        {oaStatusLabel}
                                    </div>
                                    <MdButton
                                        variant="text" icon={oaRefresh ? 'sync' : 'refresh'}
                                        onClick={refreshOA} disabled={oaRefresh}
                                        style={{ fontSize:13, animation: oaRefresh ? 'spin 1s linear infinite' : 'none' }}
                                    >
                                        {oaRefresh ? 'Refreshing…' : 'Force Refresh'}
                                    </MdButton>
                                </div>
                            </div>
                        </div>

                        {/* ── About / Data Sources ── */}
                        <div style={{ fontSize:12, color:'var(--text-secondary)', lineHeight:1.6, borderTop:'1px solid var(--card-border-soft)', paddingTop:14 }}>
                            <strong>Weather:</strong> NOAA AviationWeather.gov (free, no key) ·
                            <strong> Airports:</strong> OurAirports CC0 public domain ·
                            <strong> Enrichment:</strong> OpenAIP (rate-limited, 1 h cache)
                        </div>

                        {/* ── Build Version ── */}
                        {(function() {
                            var commitMeta = document.querySelector('meta[name="build-commit"]');
                            var tsMeta     = document.querySelector('meta[name="build-timestamp"]');
                            var commit     = commitMeta ? commitMeta.content : '';
                            var ts         = tsMeta     ? tsMeta.content     : '';
                            var hasVersion = commit && commit !== '__BUILD_COMMIT__';
                            var hasTs      = ts && ts !== '__BUILD_TIMESTAMP__';
                            if (!hasVersion && !hasTs) return null;
                            return (
                                <div style={{ fontSize:11, color:'var(--text-tertiary)', marginTop:4, fontFamily:'var(--font-mono)' }}>
                                    {hasVersion && <span>Build: {commit.substring(0, 7)}</span>}
                                    {hasVersion && hasTs && <span> · </span>}

        /* =========================================
           EXPORT / IMPORT MODAL
        ========================================= */
        function DataModal({ trips, onImport, onClose }) {
            var [toast, setToast] = useState('');
            var importRef = React.useRef();

            function showToast(msg) {
                setToast(msg);
                setTimeout(() => setToast(''), 2500);
            }

            // Shared helper: create a Blob URL, fire a link click, then revoke.
            // opts.download  → set the download filename (same-tab save)
            // opts.newTab    → open in a new tab instead (for print pages)
            // opts.revokeMs  → ms before revoking (default 0 = immediate)
            function triggerBlobLink(blob, opts) {
                opts = opts || {};
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                if (opts.download) a.download = opts.download;
                if (opts.newTab)   { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                // Immediate revoke is safe — the browser has already queued the
                // navigation/download, and a newly-opened tab retains the reference.
                var delay = opts.revokeMs != null ? opts.revokeMs : 0;
                if (delay > 0) { setTimeout(function() { URL.revokeObjectURL(url); }, delay); }
                else { URL.revokeObjectURL(url); }
            }

            function handleExport() {
                var blob = new Blob([JSON.stringify(trips, null, 2)], { type: 'application/json' });
                triggerBlobLink(blob, { download: 'flightscore-trips-' + new Date().toISOString().slice(0, 10) + '.json' });
                showToast('Trips exported!');
            }

            function handleImportFile(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = ev => {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (!Array.isArray(data)) throw new Error();
                        onImport(data);
                        showToast(data.length + ' trip(s) imported!');
                        setTimeout(onClose, 1500);
                    } catch(ex) {
                        showToast('Invalid file — could not import.');
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            }

            return (
                <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
                    style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                    <div style={{ background:'var(--md-sys-color-surface)', borderRadius:28, padding:32, width:'min(420px,100%)', boxShadow:'0 8px 32px rgba(0,0,0,0.3)' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                            <div style={{ fontSize:20, fontWeight:500 }}>My Trip Data</div>
                            <MdButton variant="text" icon="close" onClick={onClose} style={{ padding:8 }} />
                        </div>

                        {toast && (
                            <div style={{ background:'var(--md-sys-color-primary-container)', color:'var(--md-sys-color-on-primary-container)', borderRadius:12, padding:'10px 16px', marginBottom:16, fontSize:14, textAlign:'center' }}>{toast}</div>
                        )}

                        <div style={{ fontSize:13, color:'var(--md-sys-color-on-surface-variant)', marginBottom:20, lineHeight:1.6 }}>
                            Trips are automatically saved in this browser. Use export/import to move trips between devices, or to keep a backup.
                        </div>

                        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                            <MdButton variant="tonal" icon="download" onClick={handleExport}>
                                Export trips as JSON ({trips.length} trip{trips.length !== 1 ? 's' : ''})
                            </MdButton>
                            <input ref={importRef} type="file" accept=".json,application/json" style={{ display:'none' }} onChange={handleImportFile} />
                            <MdButton variant="outlined" icon="upload" onClick={() => importRef.current && importRef.current.click()}>
                                Import trips from JSON
                            </MdButton>
                        </div>

                        <div style={{ marginTop:20, padding:'14px 16px', background:'var(--md-sys-color-surface-container)', borderRadius:12, fontSize:12, color:'var(--md-sys-color-on-surface-variant)', lineHeight:1.7 }}>
                            <b>Tip:</b> To sync across devices, export on one device and import on another. To share a single trip, use the <MdIcon name="share" style={{ fontSize:14, verticalAlign:'middle' }} /> link button on the trip card.
                        </div>
                    </div>
                </div>
            );
        }

        /* =========================================
           NATURAL-LANGUAGE TRIP PARSER
        ========================================= */
        async function parseTripWithAi(inputText, apiKey) {
            var now   = new Date();
            var pad2  = function(n) { return String(n).padStart(2, '0'); };
            var today = now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate());
            var acList = AIRCRAFT.map(function(a) { return '"' + a.id + '" (' + a.name + ')'; }).join(', ');

            var system = [
                'You are an aviation flight parser. Today\'s date is ' + today + ' (YYYY-MM-DD). Current UTC time: ' + pad2(now.getUTCHours()) + ':' + pad2(now.getUTCMinutes()) + 'Z.',
                'Extract flight details from the user input and respond with ONLY a single raw JSON object — no markdown fences, no backticks, no explanation, no extra text.',
                'Required JSON fields:',
                '  "dep"      — 4-letter ICAO departure code (prepend K for US airports given without the K, e.g. JFK → KJFK)',
                '  "arr"      — 4-letter ICAO arrival code (same K-prefix rule)',
                '  "wps"      — array of intermediate ICAO waypoint codes (empty array [] if none mentioned)',
                '  "aircraft" — one of these exact IDs: ' + acList + '. Pick closest match; default "c172".',
                '  "date"     — departure date as YYYY-MM-DD. Resolve relative words: "today"=' + today + ', "tomorrow"=next calendar day.',
                '  "time"     — departure local time as HH:MM (24-hour). Default "09:00" if not stated.',
                '  "name"     — concise human-readable trip label, e.g. "New York to Chicago".',
                'Output ONLY the JSON object. No other text.'
            ].join('\n');

            var data = await callAnthropicApi({
                system,
                messages: [{ role: 'user', content: inputText }],
                max_tokens: 300,
                apiKey
            });
            var raw = (data.content && data.content[0] && data.content[0].text) || '';
            if (!raw.trim()) throw new Error('Empty response from Claude');
            // Strip any accidental markdown fences
            var cleaned = raw.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
            var parsed = JSON.parse(cleaned);
            if (!parsed.dep || !parsed.arr) throw new Error('Could not identify departure or arrival airport — please be more specific');
            parsed.dep = parsed.dep.toUpperCase();
            parsed.arr = parsed.arr.toUpperCase();
            parsed.wps = (parsed.wps || []).map(function(w) { return w.toUpperCase(); });
            return parsed;
        }

        /* =========================================
           MAIN APPLICATION COMPONENT
        ========================================= */
        function App() {
            // ── Auth state ──────────────────────────────────────────────────────
            // undefined = resolving, null = logged out, object = authenticated
            var user = useAuth();
            // Start at the trips list; active-trip / briefing-view is restored
            // after the Firestore load completes (inside the load useEffect below)
            // so we always have valid trip objects before navigating to 'briefing'.
            var [view, setView] = useState('trips');
            // Pick a random joke once per page load (useMemo with no deps = computed
            // once on mount; a hard refresh reloads the page giving a new pick).
            var dadJoke = useMemo(
                () => AVIATION_DAD_JOKES[Math.floor(Math.random() * AVIATION_DAD_JOKES.length)],
                []
            );

            var defaultTimeStr = (new Date(Date.now() + 7200000)).toTimeString().slice(0, 5);

            var [showDataModal,       setShowDataModal]       = useState(false);
            var [showSettingsModal,   setShowSettingsModal]   = useState(false);
            var [showLoginModal,      setShowLoginModal]      = useState(false);
            var [showProfileModal,    setShowProfileModal]    = useState(false);
            var [personalMinimums,    setPersonalMinimums]    = useState(getPersonalMinimums);
            var [showHamburger,    setShowHamburger]     = useState(false);
            var [isDecodedWx,      setIsDecodedWx]       = useState(false);
            var [pendingAiPrompt,  setPendingAiPrompt]   = useState(null);

            // ── Natural-Language Quick Add state ────────────────────────────────
            var [nlInput,   setNlInput]   = useState('');
            var [nlLoading, setNlLoading] = useState(false);
            var [nlError,   setNlError]   = useState(null);

            // Auto-close the login modal when auth resolves to a signed-in user
            useEffect(function() {
                if (user && user !== undefined) setShowLoginModal(false);
            }, [user]);


            // Theme: 3-way toggle — 'dark' (default), 'light', 'night' (red/black cockpit mode).
            // Uses 'flightscore_theme_manual' key so an explicit choice is distinguished
            // from the auto-detected initial value.
            var THEME_CYCLE = ['dark', 'light', 'night'];
            var THEME_ICONS = { dark: 'light_mode', light: 'nightlight', night: 'dark_mode' };
            var THEME_LABELS = { dark: 'Light Mode', light: 'Night Mode', night: 'Dark Mode' };
            var [theme, setTheme] = useState(function() {
                var manual = localStorage.getItem('flightscore_theme_manual');
                if (manual === 'dark' || manual === 'light' || manual === 'night') return manual;
                // No explicit preference — follow system
                var prefersDark = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                return prefersDark ? 'dark' : 'light';
            });
            function cycleTheme() {
                var idx = THEME_CYCLE.indexOf(theme);
                var next = THEME_CYCLE[(idx + 1) % THEME_CYCLE.length];
                setTheme(next);
                localStorage.setItem('flightscore_theme_manual', next);
            }
            useEffect(function() {
                document.body.classList.remove('dark-theme', 'light-theme', 'night-theme');
                document.body.classList.add(theme + '-theme');
            }, [theme]);
            // Auto-follow system preference changes (only when no manual override is saved)
            useEffect(function() {
                if (!window.matchMedia) return;
                var mq = window.matchMedia('(prefers-color-scheme: dark)');
                function onSystemChange(e) {
                    if (!localStorage.getItem('flightscore_theme_manual')) setTheme(e.matches ? 'dark' : 'light');
                }
                mq.addEventListener('change', onSystemChange);
                return function() { mq.removeEventListener('change', onSystemChange); };
            }, []);

            // Sync navigation state to sessionStorage so pull-to-refresh restores
            // the user's position.  We only persist the briefing view — trips list
            // and create form always start fresh on reload.
            useEffect(function() {
                try {
                    if (view === 'briefing' && activeTrip) {
                        sessionStorage.setItem('sc_view', 'briefing');
                        sessionStorage.setItem('sc_active_trip_id', String(activeTrip.id));
                        sessionStorage.setItem('sc_tab', tab);
                    } else {
                        sessionStorage.removeItem('sc_view');
                        sessionStorage.removeItem('sc_active_trip_id');
                        sessionStorage.removeItem('sc_tab');
                    }
                } catch(e) {}
            }, [view, activeTrip, tab]);

            // ── Trips — loaded from Firestore after auth ────────────────────────
            var [trips, setTrips]           = useState([]);

                    var id  = String(t.id);
                    if (scoredTripSigs.current.get(id) === sig) return;
                    scoredTripSigs.current.set(id, sig);

                    var allPts = [t.dep].concat(t.wps || []).concat([t.arr]).filter(Boolean);
                    var dist = 0;
                    for (var i = 0; i < allPts.length - 1; i++) {
                        var p1 = getAirport(allPts[i]), p2 = getAirport(allPts[i + 1]);
                        if (p1 && p2) dist += calcDist(p1.lat, p1.lon, p2.lat, p2.lon);
                    }
                    var routeDist = Math.round(dist);
                    fetchEffectiveWxForTrip(t, allPts).then(wxData => {
                        if (wxData.length > 0) {
                            var ds = calcDetailedScore(wxData, routeDist);
                            var weatherScore = ds.total;
                            // Mirror BriefingPanel combinedScore logic:
                            // — FRAT complete → 70/30 blend; otherwise → weather − 20 penalty

                                try {

                                } catch(e) {}

                            })();
                            var fratDone = FRAT_QUESTIONS.filter(function(q){ return savedAnswers[q.id] !== undefined; }).length === FRAT_TOTAL;
                            var score;
                            if (fratDone) {

                                score = Math.max(0, Math.min(100, Math.round(weatherScore * 0.70 + fratScore * 0.30)));
                            } else {
                                score = Math.max(0, weatherScore - 20);
                            }

                                score = Math.min(ds.scoreCap, score);

                        skipNextFirestoreWrite.current = true;
                        setTrips(initial);
                        setTripsLoaded(true);

                        skipNextFirestoreWrite.current = true;

                        setTripsLoaded(true);
                        prevTripIds.current = new Set(DEFAULT_TRIPS.map(function(t) { return String(t.id); }));

                        setTripsLoaded(true);

                            skipNextFirestoreWrite.current = true;
                            var seenKey = 'flightscore_uid_seen_' + user.uid;
                            var hasLocalData = (function() {
                                try { return localStorage.getItem('flightscore_trips') !== null; }
                                catch(e) { return false; }
                            })();
                            var seenBefore = (function() {
                                try { return !!localStorage.getItem(seenKey); }
                                catch(e) { return false; }
                            })();

                { id: "fbo", label: "FBO", icon: "local_gas_station" },

            // ── Flighty-style icon button ──────────────────────────────────────────
            var IconBtn = ({ icon, onClick, title, active, style: s, 'aria-label': ariaLabel }) => (
                <button onClick={onClick} title={title} aria-label={ariaLabel || title} style={{

            // ── Auth guards (must come after all hooks) ─────────────────────────
            if (user === undefined) return (
                // Firebase is still resolving the auth state — show a minimal splash

                    <div style={{ width:52, height:52, borderRadius:16, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'var(--accent-glow)' }}>

                                            <MdIcon name="import_export" style={{ fontSize: 20, color: 'var(--text-secondary)' }} />

                                            <MdIcon name="tune" style={{ fontSize: 20, color: 'var(--text-secondary)' }} />
                                            Settings
                                        </button>
                                        {user && (
                                            <>
                                                <div className="hamburger-dropdown-sep" />

                                                    <MdIcon name="logout" style={{ fontSize: 20, color: 'var(--text-secondary)' }} />
                                                    Sign Out
                                                </button>
                                            </>

                                    </div>
                                )}
                            </div>
