                                        var other  = aNotams.filter(n => n.type !== 'TFR' && n.type !== 'SECURITY' && n.type !== 'RWY' && n.type !== 'TWY');
                                        return (
                                            <div key={icao} style={{ marginBottom:8 }}>
                                                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                                                    <span style={{ ...mono, fontWeight:800, fontSize:12, color:'#0b57d0' }}>{icao}</span>
                                                    <span style={{ fontSize:10, color:'#555' }}>{apt ? apt.name : ''} · {role}</span>
                                                    {aNotams.length === 0 && <span style={{ fontSize:10, color:'#1b5e20', fontWeight:600 }}>No active NOTAMs</span>}
                                                </div>
                                                {tfrs.map((n, i) => (
                                                    <div key={'tfr'+i} style={{ display:'flex', gap:6, fontSize:11, color:'#b71c1c', lineHeight:1.4, paddingLeft:8, marginBottom:2 }}>
                                                        <span style={{ fontWeight:800, flexShrink:0, minWidth:42 }}>TFR</span>
                                                        <span style={{ ...mono, wordBreak:'break-word' }}>{n.text.substring(0,220)}{n.text.length>220?'…':''}</span>
                                                    </div>
                                                ))}
                                                {rwyNtm.map((n, i) => (
                                                    <div key={'rwy'+i} style={{ display:'flex', gap:6, fontSize:11, color:'#b45309', lineHeight:1.4, paddingLeft:8, marginBottom:2 }}>
                                                        <span style={{ fontWeight:800, flexShrink:0, minWidth:42 }}>{n.type}</span>
                                                        <span style={{ ...mono, wordBreak:'break-word' }}>{n.text.substring(0,200)}{n.text.length>200?'…':''}</span>
                                                    </div>
                                                ))}
                                                {other.slice(0,3).map((n, i) => (
                                                    <div key={'ot'+i} style={{ display:'flex', gap:6, fontSize:11, color:'#444', lineHeight:1.4, paddingLeft:8, marginBottom:2 }}>
                                                        <span style={{ fontWeight:700, flexShrink:0, minWidth:42, color:'#555' }}>{n.type}</span>
                                                        <span style={{ ...mono, wordBreak:'break-word' }}>{n.text.substring(0,180)}{n.text.length>180?'…':''}</span>
                                                    </div>
                                                ))}
                                                {other.length > 3 && <div style={{ fontSize:10, color:'#666', paddingLeft:8 }}>+{other.length-3} more NOTAMs — see NOTAMs tab for full list.</div>}
                                            </div>
                                        );
                                    })
                                )}
                            </div>

                            {/* ══ Body ════════════════════════════════════════ */}
                            <div style={{ padding:'12px 20px', display:'flex', flexDirection:'column', gap:16 }}>

                                {/* ── 4. NAVLOG — Vertical Timeline Stepper ─── */}
                                <div className="bs">
                                    <div style={sh}>Navigation Log — {allRoutePts.join(' → ')}</div>
                                    <div style={{ display:'flex', flexDirection:'column' }}>
                                        {navRows.map((row, idx) => {
                                            var cat = row.m ? row.m.cat : null;
                                            var isFirst = idx === 0;
                                            var isLast = idx === navRows.length - 1;
                                            var role = isFirst ? 'DEP' : isLast ? 'DEST' : `WP${idx}`;
                                            var legEte = row.legMin > 0 ? `${Math.floor(row.legMin/60)}h${String(row.legMin%60).padStart(2,'0')}m` : null;
                                            var nodeColor = cat ? catClr(cat) : '#0b57d0';
                                            var nodeBg = cat ? catBg(cat) : '#daeeff';
                                            return (
                                                <div key={row.icao} style={{ display:'flex', gap:0, alignItems:'stretch' }}>
                                                    {/* Timeline spine */}
                                                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:30, flexShrink:0 }}>
                                                        <div style={{ width:2, background: isFirst ? 'transparent' : '#c5d8f7', flex:'0 0 10px' }} />
                                                        <div style={{ width:16, height:16, borderRadius:'50%', background:nodeBg, border:`2.5px solid ${nodeColor}`, flexShrink:0, zIndex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                                            <div style={{ width:5, height:5, borderRadius:'50%', background:nodeColor }} />
                                                        </div>
                                                        <div style={{ width:2, background: isLast ? 'transparent' : '#c5d8f7', flex:'1 0 10px', minHeight:8 }} />
                                                    </div>
                                                    {/* Station content */}
                                                    <div style={{ flex:1, paddingLeft:8, paddingBottom: isLast ? 0 : 2, paddingTop:2 }}>
                                                        <div style={{ background:'#fff', border:`1px solid ${nodeColor}33`, borderLeft:`3px solid ${nodeColor}`, borderRadius:6, padding:'7px 10px', marginBottom:isLast?0:0 }}>
                                                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4, flexWrap:'wrap' }}>
                                                                <span style={{ ...mono, fontWeight:900, fontSize:13, color:'#0b57d0' }}>{row.icao}</span>
                                                                <span style={{ fontSize:9, fontWeight:800, color:'#fff', background:nodeColor, borderRadius:20, padding:'1px 7px', textTransform:'uppercase', letterSpacing:'0.5px' }}>{role}</span>
                                                                {catChip(cat)}
                                                                {row.apt && <span style={{ fontSize:10, color:'#555' }}>{row.apt.name}</span>}
                                                                <span style={{ marginLeft:'auto', ...mono, fontSize:10, color:'#444', fontWeight:700 }}>
                                                                    {row.eta ? `ETA ${row.eta}` : (isFirst ? `DEP ${depUtcStr}` : '')}
                                                                </span>
                                                            </div>
                                                            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(85px,1fr))', gap:'3px 10px' }}>
                                                                {idx > 0 && [
                                                                    ['Leg', `${row.legNm} NM`],
                                                                    ['Cum', `${row.cumNm} NM`],
                                                                    ['ETE', legEte || '—'],
                                                                ].map(([k,v]) => (
                                                                    <div key={k} style={{ display:'flex', gap:4, alignItems:'baseline' }}>
                                                                        <span style={{ fontSize:9, color:'#777', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px', flexShrink:0 }}>{k}</span>
                                                                        <span style={{ ...mono, fontSize:11, fontWeight:700, color:'#222' }}>{v}</span>
                                                                    </div>
                                                                ))}
                                                                {row.windStr !== '—' && (
                                                                    <div style={{ display:'flex', gap:4, alignItems:'baseline' }}>
                                                                        <span style={{ fontSize:9, color:'#777', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px', flexShrink:0 }}>@{Math.round(altFt/1000)}K</span>
                                                                        <span style={{ ...mono, fontSize:11, color:'#0b57d0', fontWeight:700 }}>{windArrow(row.windStr)}{row.windStr}</span>
                                                                    </div>
                                                                )}
                                                                {row.m && [
                                                                    ['Sfc Wind', row.m.wind || '—'],
                                                                    ['Vis', row.m.vis || '—'],
                                                                    ['Sky', row.m.sky || '—'],
                                                                    ['Temp', row.m.temp || '—'],
                                                                    ['Altim', row.m.alt || '—'],
                                                                ].map(([k,v]) => (
                                                                    <div key={k} style={{ display:'flex', gap:4, alignItems:'baseline' }}>
                                                                        <span style={{ fontSize:9, color:'#777', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px', flexShrink:0 }}>{k}</span>
                                                                        <span style={{ ...mono, fontSize:11, color:'#333' }}>{v}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        {/* Inter-leg strip */}
                                                        {!isLast && legEte && (
                                                            <div style={{ display:'flex', alignItems:'center', gap:6, padding:'1px 0', marginTop:1 }}>
                                                                <div style={{ flex:1, height:1, background:'#dde8f5' }} />
                                                                <span style={{ ...mono, fontSize:9, color:'#999', fontWeight:600, whiteSpace:'nowrap' }}>{legEte}</span>
                                                                <div style={{ flex:1, height:1, background:'#dde8f5' }} />
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div style={{ fontSize:10, color:'#555', marginTop:6, paddingLeft:38 }}>
                                        {ac.name} · {ac.kts} kts TAS · Cruise {(altFt/1000).toFixed(1)}k ft MSL · {routeDist} NM total · ETE {eteStr} · Winds from FD forecast
                                    </div>
                                </div>

                                {/* ── 5. NWKRAFT FLIGHT PLANNING ──────────────
                                     FAR 91.103 — pilot must be familiar with:
                                     N-otams · W-eather · K-nown ATC delays ·
                                     R-unway lengths · A-lternates · F-uel ·
                                     T-akeoff/Landing performance            */}
                                <div className="bs">
                                    <div style={sh}>NWKRAFT — Flight Planning Requirements (FAR 91.103)</div>
                                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px' }}>

                                        {/* Left column: Fuel + Alternates */}
                                        <div>
                                            {/* F — Fuel */}
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:'#0b57d0', marginBottom:4 }}>F — Fuel Requirements (FAR 91.151)</div>
                                            {ac.gph ? (
                                                <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:10 }}>
                                                    {[
                                                        ['Aircraft',           ac.name],
                                                        ['Usable fuel',        `${ac.fuel} gal`],
                                                        ['Burn rate (cruise)', `${ac.gph} gph`],
                                                        ['Trip fuel (ETE '+eteStr+')', tripFuelGal!=null ? `${tripFuelGal} gal` : '—'],
                                                        ['30-min reserve (FAR 91.151)', reserveGal!=null ? `${reserveGal} gal` : '—'],
                                                        ['Taxi allowance (12 min)',     taxiGal!=null ? `${taxiGal} gal` : '—'],
                                                        ['TOTAL REQUIRED',     totalReqGal!=null ? `${totalReqGal} gal` : '—'],
                                                        ['Fuel remaining at dest', fuelRemainingGal!=null ? `${fuelRemainingGal} gal (${remainingEnduranceMin!=null ? remainingEnduranceMin+'min' : '?'} reserve)` : '—'],
                                                        ['Total endurance',    totalEnduranceMin!=null ? `${Math.floor(totalEnduranceMin/60)}h ${totalEnduranceMin%60}m` : '—'],
                                                    ].map(([lbl,val],i) => (
                                                        <tr key={i} style={{ background: lbl.startsWith('TOTAL') ? '#e8f5e9' : (i%2===0?'#fff':'#f8faff') }}>
                                                            <td style={{ ...cell, fontWeight: lbl.startsWith('TOTAL') ? 700 : 400, color: lbl.startsWith('TOTAL') ? '#1b5e20' : '#333', width:'55%' }}>{lbl}</td>
                                                            <td style={{ ...cell, ...mono, fontWeight: lbl.startsWith('TOTAL') ? 700 : 600, color: lbl.startsWith('TOTAL') ? '#1b5e20' : '#222', textAlign:'right' }}>{val}</td>
                                                        </tr>
                                                    ))}
                                                </table>
                                            ) : <div style={{ fontSize:11, color:'#555', marginBottom:10 }}>No performance data — reference aircraft POH.</div>}

                                            {/* A — Alternates */}
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:'#0b57d0', marginBottom:4 }}>A — Alternate Airport Requirements</div>
                                            <div style={{ fontSize:11, color:'#333', lineHeight:1.6, marginBottom:4 }}>
                                                {(() => {
                                                    var arrWxM = arrWxEntry ? arrWxEntry.effectiveWx : null;
                                                    var destCat = arrWxM ? arrWxM.cat : null;
                                                    var needAlt = destCat === 'IFR' || destCat === 'LIFR';
                                                    return needAlt
                                                        ? <span style={{ color:'#b71c1c', fontWeight:600 }}>⚠ Destination category {destCat} — alternate strongly recommended. For IFR: FAR 91.169 requires alternate when ceiling &lt;2,000 ft or vis &lt;3 SM within ±1h of ETA.</span>
                                                        : <span>VFR: Alternates not legally required (FAR 91.151). However, consider alternates if destination weather deteriorates below VFR minimums (ceiling &lt;1,000 ft AGL, vis &lt;3 SM). Nearest airports: check <span style={{...mono}}>skyvector.com</span> or <span style={{...mono}}>airnav.com</span> for nearest suitable airports.</span>;
                                                })()}
                                            </div>

                                            {/* K — Known ATC delays */}
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:'#0b57d0', marginBottom:4, marginTop:6 }}>K — Known ATC Delays</div>
                                            <div style={{ fontSize:11, color:'#444', lineHeight:1.5 }}>
                                                Check <span style={{...mono}}>fly.faa.gov/ois</span> (NASSTATUS) for real-time Ground Delay Programs, Ground Stops, and en route delays before departure.
                                            </div>
                                        </div>

                                        {/* Right column: Runway + Performance */}
                                        <div>
                                            {/* R — Runway Lengths */}
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:'#0b57d0', marginBottom:4 }}>R — Runway Analysis</div>
                                            <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:10 }}>
                                                <thead>
                                                    <tr>
                                                        {['Airport','Role','Runways','Longest'].map(h => <th key={h} style={{...cellHd, textAlign:'left'}}>{h}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {[{icao:trip.dep, role:'Departure'},{icao:trip.arr, role:'Destination'}].map(({icao,role},i) => {
                                                        var a = getAirport(icao);
                                                        var maxR = getMaxRwy(icao);
                                                        return (
                                                            <tr key={icao} style={{ background:i%2===0?'#fff':'#f8faff' }}>
                                                                <td style={{ ...cell, ...mono, fontWeight:700, color:'#0b57d0' }}>{icao}</td>
                                                                <td style={{ ...cell }}>{role}</td>
                                                                <td style={{ ...cell, ...mono, fontSize:10 }}>{a && a.rwy ? a.rwy.join(', ') : '—'}</td>
                                                                <td style={{ ...cell, ...mono, fontWeight:600, color: maxR ? '#1b5e20' : '#555' }}>
                                                                    {maxR ? `${maxR.toLocaleString()} ft` : 'See A/FD'}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>

                                            {/* T — Takeoff & Landing Performance */}
                                            <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:'#0b57d0', marginBottom:4 }}>T — Takeoff &amp; Landing Performance</div>
                                            {ac.toRoll ? (
                                                <>
                                                <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:6 }}>
                                                    <thead>
                                                        <tr>
                                                            {['Phase','Airport','DA (ft)','Ground Roll','Over 50 ft'].map(h => <th key={h} style={{...cellHd, textAlign:'left'}}>{h}</th>)}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <tr style={{ background:'#fff' }}>
                                                            <td style={{ ...cell, fontWeight:600 }}>Takeoff</td>
                                                            <td style={{ ...cell, ...mono, fontWeight:700, color:'#0b57d0' }}>{trip.dep}</td>
                                                            <td style={{ ...cell, ...mono }}>{depDA.toLocaleString()}</td>
                                                            <td style={{ ...cell, ...mono, color: adjToRoll > (depMaxRwy||99999) ? '#b71c1c' : '#222', fontWeight:600 }}>{adjToRoll ? adjToRoll.toLocaleString()+' ft' : '—'}</td>
                                                            <td style={{ ...cell, ...mono, color: adjToOver50 > (depMaxRwy||99999) ? '#b71c1c' : '#222', fontWeight:600 }}>{adjToOver50 ? adjToOver50.toLocaleString()+' ft' : '—'}</td>
                                                        </tr>
                                                        <tr style={{ background:'#f8faff' }}>
                                                            <td style={{ ...cell, fontWeight:600 }}>Landing</td>
                                                            <td style={{ ...cell, ...mono, fontWeight:700, color:'#0b57d0' }}>{trip.arr}</td>
                                                            <td style={{ ...cell, ...mono }}>{arrDA.toLocaleString()}</td>
                                                            <td style={{ ...cell, ...mono, color: adjLdgRoll > (arrMaxRwy||99999) ? '#b71c1c' : '#222', fontWeight:600 }}>{adjLdgRoll ? adjLdgRoll.toLocaleString()+' ft' : '—'}</td>
                                                            <td style={{ ...cell, ...mono, color: adjLdgOver50 > (arrMaxRwy||99999) ? '#b71c1c' : '#222', fontWeight:600 }}>{adjLdgOver50 ? adjLdgOver50.toLocaleString()+' ft' : '—'}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                                <div style={{ fontSize:10, color:'#666', lineHeight:1.5 }}>
                                                    DA adjusted at 10% per 1,000 ft (TO) / 5% per 1,000 ft (LDG) above SL. Standard conditions; actual values per POH charts.
                                                    {(adjToRoll && depMaxRwy && adjToRoll > depMaxRwy) || (adjLdgRoll && arrMaxRwy && adjLdgRoll > arrMaxRwy)
                                                        ? <span style={{ color:'#b71c1c', fontWeight:700 }}> ⚠ Estimated distance exceeds available runway — verify with POH!</span>
                                                        : ''}
                                                </div>
                                                </>
                                            ) : <div style={{ fontSize:11, color:'#555' }}>Reference aircraft POH for performance data.</div>}
                                        </div>
                                    </div>
                                </div>

                                {/* ── 6. WINDS & TEMPERATURES ALOFT ───────────
                                     Multi-altitude FD forecast per route station */}
                                {windsAloft.length > 0 && (
                                    <div className="bs">
                                        <div style={sh}>Winds &amp; Temperatures Aloft — FD Forecast (Zulu)</div>
                                        <table style={{ width:'100%', borderCollapse:'collapse' }}>
                                            <thead>
                                                <tr>
                                                    <th style={{ ...cellHd, textAlign:'left' }}>Airport</th>
                                                    <th style={{ ...cellHd, textAlign:'left' }}>Station</th>
                                                    {windLevels.map(ft => (
                                                        <th key={ft} colSpan={2} style={{ ...cellHd, textAlign:'center', background:'#e8f0fe' }}>
                                                            {Math.round(ft/1000)}K ft
                                                        </th>
                                                    ))}
                                                </tr>
                                                <tr>
                                                    <th style={{ ...cellHd }}></th>
                                                    <th style={{ ...cellHd }}></th>
                                                    {windLevels.map(ft => (
                                                        <React.Fragment key={ft}>
                                                            <th style={{ ...cellHd, background:'#f0f4f8' }}>Dir/Spd</th>
                                                            <th style={{ ...cellHd, background:'#f0f4f8' }}>Temp°C</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {(() => {
                                                    var depAp = getAirport(allRoutePts[0]);
                                                    var arrAp = getAirport(allRoutePts[allRoutePts.length-1]);
                                                    var routeBearing = (depAp && arrAp)
                                                        ? Math.round((Math.atan2(arrAp.lon-depAp.lon, arrAp.lat-depAp.lat)*180/Math.PI+360)%360)
                                                        : null;
                                                    return windRows.map(({icao, stn, w}, idx) => {
                                                        var isInRange = altFt >= 3000;
                                                        return (
                                                            <tr key={icao} style={{ background:idx%2===0?'#fff':'#f8faff' }}>
                                                                <td style={{ ...cell, ...mono, fontWeight:700, color:'#0b57d0' }}>{icao}</td>
                                                                <td style={{ ...cell, fontSize:10, color:'#555' }}>{stn ? (stn.stationId || stn.wmoId || '—') : 'No data'}</td>
                                                                {windLevels.map(ft => {
                                                                    var wl = stn ? getWindAtAlt(stn, ft) : null;
                                                                    var dirSpd = wl ? (wl.lv ? 'LT&VRB' : `${String(wl.wdir).padStart(3,'0')}°/${wl.wspd}kt`) : '—';
                                                                    var tempStr = (wl && wl.temp!=null) ? `${wl.temp>0?'+':''}${wl.temp}` : '—';
                                                                    var isCruise = Math.abs(ft - altFt) < 1500;
                                                                    var bgStyle = isCruise ? '#fff9c4' : (idx%2===0?'#fff':'#f8faff');
                                                                    return (
                                                                        <React.Fragment key={ft}>
                                                                            <td style={{ ...cell, ...mono, background: bgStyle, fontWeight: isCruise ? 700 : 400 }}>{dirSpd}</td>
                                                                            <td style={{ ...cell, ...mono, background: bgStyle, color: wl && wl.temp!=null && wl.temp <= 0 ? '#1565c0' : '#333' }}>{tempStr}</td>
                                                                        </React.Fragment>
                                                                    );
                                                                })}
                                                            </tr>
                                                        );
                                                    });
                                                })()}
                                            </tbody>
                                        </table>
                                        <div style={{ fontSize:10, color:'#555', marginTop:4 }}>
                                            Highlighted columns = cruise altitude. Blue temp = at or below freezing — icing possible if visible moisture present.
                                            Source: aviationweather.gov winds aloft (FB Winds). Verify at <span style={{...mono}}>aviationweather.gov/windtemp</span>.
                                        </div>
                                    </div>
                                )}

                                {/* ── 7. COMPOSITE SAFETY SCORE ───────────────── */}
                                {detailedScore && (
                                    <div className="bs">
                                        <div style={sh}>Score Breakdown — {combinedScore ?? detailedScore.total} / 100</div>
                                        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:8 }}>
                                            {detailedScore.breakdown.map((b, i) => {
                                                var pct = b.score / b.max;
                                                var bClr = scoreClr(pct);
                                                var bBg = pct >= 0.80 ? '#d6f5de' : pct >= 0.60 ? '#fff4e5' : '#fde4e0';
                                                return (
                                                    <div key={i} style={{ background:bBg, borderRadius:8, padding:'8px 10px', border:`1px solid ${bClr}33` }}>
                                                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
                                                            <span style={{ fontSize:10, fontWeight:700, color:'#444', textTransform:'uppercase', letterSpacing:'0.4px' }}>{b.label}</span>
                                                            <span style={{ ...mono, fontSize:13, fontWeight:900, color:bClr }}>{b.score}<span style={{ fontSize:9, opacity:0.6 }}>/{b.max}</span></span>
                                                        </div>
                                                        <div style={{ height:6, background:'rgba(0,0,0,0.10)', borderRadius:3, overflow:'hidden' }}>
                                                            <div style={{ height:'100%', width:(pct*100)+'%', background:`linear-gradient(90deg,${bClr}bb,${bClr})`, borderRadius:3 }} />
                                                        </div>
                                                        {b.detail && <div style={{ fontSize:9, color:'#666', marginTop:4, lineHeight:1.4 }}>{b.detail}</div>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {verd && <div style={{ marginTop:8, padding:'8px 12px', background:vBg, borderRadius:8, border:`1px solid ${vClr}44`, fontSize:11, color:vClr, lineHeight:1.5, fontWeight:500 }}>{verd.verdictDesc}</div>}
                                    </div>
                                )}

                                {/* ── 8. KEY CONCERNS ────────────────────────── */}
                                {finalVerdict && (
                                    <div className="bs">
                                        <div style={sh}>Key Concerns</div>
                                        {finalVerdict.concerns.length === 0 ? (
                                            <div style={{ display:'flex', alignItems:'center', gap:8, color:'#2e7d32', fontSize:11, fontWeight:500 }}>
                                                <MdIcon name="check_circle" style={{ fontSize:14 }} />
                                                No flight concerns — conditions look good across all route airports.
                                            </div>
                                        ) : (
                                            <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                                                {finalVerdict.concerns.map((c, i) => (
                                                    <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:6, fontSize:11, color: c.level==='high'?'#b71c1c':'#b45309', lineHeight:1.4 }}>
                                                        <MdIcon name={c.icon} style={{ fontSize:13, marginTop:1, flexShrink:0 }} />
                                                        <span>{c.text}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* ── 9. STATION WEATHER — METAR / TAF ─────────
                                     Visual cards with accordion for raw data       */}
                                {effectiveWxData && effectiveWxData.length > 0 && (
                                    <div>
                                        <div style={sh}>Station Weather — METAR &amp; TAF</div>
                                        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                                            {effectiveWxData.map(e => {
                                                var m   = e.effectiveWx;
                                                var apt = getAirport(e.icao);
                                                var cat = m ? m.cat : null;
                                                var cClr = cat ? catClr(cat) : '#555';
                                                var cBg  = cat ? catBg(cat) : '#f5f5f5';
                                                var td  = parseTempDp(m ? m.temp : null);
                                                var altH = parseAltInHg(m ? m.alt : null);
                                                var elev = apt ? apt.elev : 0;
                                                var wxDA = (td.t != null) ? calculateDensityAltitude(td.t, altH || 29.92, elev || 0) : null;
                                                // Translate sky string to icon
                                                var skyIcon = '☀';
                                                if (m && m.sky) {
                                                    var sl = m.sky.toUpperCase();
                                                    if (sl.includes('OVC')) skyIcon = '☁';
                                                    else if (sl.includes('BKN')) skyIcon = '🌥';
                                                    else if (sl.includes('SCT')) skyIcon = '⛅';
                                                    else if (sl.includes('FEW')) skyIcon = '🌤';
                                                }
                                                return (
                                                    <div key={e.icao} className="bs" style={{ border:`1.5px solid ${cClr}44`, borderRadius:10, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
                                                        {/* Station header bar */}
                                                        <div style={{ background:`linear-gradient(135deg,${cBg},#fff)`, padding:'8px 12px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, borderBottom:`1px solid ${cClr}33` }}>
                                                            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                                                                <span style={{ ...mono, fontWeight:900, fontSize:15, color:'#0b57d0' }}>{e.icao}</span>
                                                                {catChip(cat)}
                                                                {apt && <span style={{ fontSize:11, color:'#555' }}>{apt.name} · Elev {(apt.elev||0).toLocaleString()} ft</span>}
                                                            </div>
                                                            <span style={{ fontSize:10, color:'#666', fontWeight:600 }}>{e.sourceLabel}</span>
                                                        </div>
                                                        {m && (
                                                            <div style={{ padding:'8px 12px', background:'#fafcff' }}>
                                                                {/* Visual metrics row */}
                                                                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))', gap:'6px 8px', marginBottom:8 }}>
                                                                    {[
                                                                        ['🌬 Wind',    <span>{windArrow(m.wind)}<span style={{...mono}}>{m.wind || '—'}</span></span>],
                                                                        ['👁 Vis',     <span style={{...mono}}>{m.vis || '—'}</span>],
                                                                        [skyIcon+' Sky', <span style={{...mono}}>{m.sky || '—'}</span>],
                                                                        ['🌡 Temp',    <span style={{...mono}}>{td.t != null ? `${td.t}°C` : '—'}</span>],
                                                                        ['💧 Dewpt',   <span style={{...mono}}>{td.dp != null ? `${td.dp}°C` : '—'}</span>],
                                                                        ['🔲 Altim',   <span style={{...mono}}>{altH != null ? `${altH.toFixed(2)}"` : (m.alt||'—')}</span>],
                                                                        ['⬆ DA',      <span style={{...mono}}>{wxDA != null ? `${wxDA.toLocaleString()}ft` : '—'}</span>],
                                                                    ].map(([k,v])=>(
                                                                        <div key={k} style={{ background:'#fff', borderRadius:6, padding:'4px 7px', border:'1px solid #eaeff7' }}>
                                                                            <div style={{ fontSize:9, color:'#888', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px', marginBottom:2 }}>{k}</div>
                                                                            <div style={{ fontSize:11, fontWeight:700, lineHeight:1.3 }}>{v}</div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                                {/* Accordion for raw METAR/TAF */}
                                                                {(m.raw || m.taf) && (
                                                                    <details style={{ borderTop:'1px solid #e8eef7' }}>
                                                                        <summary style={{ fontSize:10, fontWeight:700, color:'#0b57d0', textTransform:'uppercase', letterSpacing:'0.5px', cursor:'pointer', padding:'5px 0 2px', listStyle:'none', userSelect:'none' }}>
                                                                            ▶ Raw METAR / TAF
                                                                        </summary>
                                                                        {m.raw && (
                                                                            <div style={{ marginTop:4 }}>
                                                                                <div style={{ fontSize:9, color:'#666', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:2 }}>METAR</div>
                                                                                <div style={{ ...mono, fontSize:10, color:'#222', lineHeight:1.55, wordBreak:'break-all', background:'#f5f7fa', padding:'4px 6px', borderRadius:4 }}>{m.raw}</div>
                                                                            </div>
                                                                        )}
                                                                        {m.taf && (
                                                                            <div style={{ marginTop:6 }}>
                                                                                <div style={{ fontSize:9, color:'#666', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:2 }}>TAF</div>
                                                                                <div style={{ ...mono, fontSize:10, color:'#333', lineHeight:1.55, wordBreak:'break-all', whiteSpace:'pre-wrap', background:'#f5f7fa', padding:'4px 6px', borderRadius:4 }}>{m.taf}</div>
                                                                            </div>
                                                                        )}
                                                                    </details>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* ── 10. PILOT RECOMMENDATIONS ───────────────── */}
                                {finalVerdict && finalVerdict.recs && finalVerdict.recs.length > 0 && (
                                    <div className="bs">
                                        <div style={sh}>Pilot Recommendations</div>
                                        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                                            {finalVerdict.recs.map((r, i) => (
                                                <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:6, fontSize:11, color:'#1a1a1a', lineHeight:1.45 }}>
                                                    <span style={{ color:r.startsWith('⚠') ? '#b71c1c' : '#0b57d0', fontWeight:700, flexShrink:0, marginTop:1 }}>
                                                        {r.startsWith('⚠') ? '⚠' : '•'}
                                                    </span>
                                                    <span>{r.replace(/^⚠ /,'')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* ── 11. EN ROUTE PIREPs ──────────────────────── */}
                                <div className="bs" style={{ background:'#f8faff', border:'1px solid #c5d8f7', borderRadius:6, padding:'7px 10px' }}>
                                    <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'1px', color:'#0b57d0', marginBottom:3 }}>En Route PIREPs (FAR 91.103)</div>
                                    <div style={{ fontSize:11, color:'#444', lineHeight:1.5 }}>
                                        View live pilot reports within 200 NM in the <strong>Brief</strong> tab before departure.
                                        Reference: <span style={{ ...mono }}>aviationweather.gov/pirep</span> · Turbulence intensities: Light &lt;1/2g · Moderate 1/2–1g · Severe &gt;1g
                                    </div>
                                </div>

                            </div>{/* end body */}

                            {/* ══ FOOTER ══════════════════════════════════════ */}
                            <div style={{ background:'#f5f7fa', borderTop:'1px solid #e0e0e0', padding:'7px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:6 }}>
                                <div style={{ fontSize:10, color:'#444' }}>
                                    Generated by <strong>SkyView</strong> · {nowUtcStr} · FAR 91.103 preflight brief
                                </div>
                                <div style={{ fontSize:10, color:'#b71c1c', textAlign:'right', maxWidth:420, lineHeight:1.4, fontWeight:600 }}>
                                    ⚠ For flight planning reference only. Always obtain an official weather briefing at <strong>1800wxbrief.com</strong> before departure. Not a substitute for a standard briefing (FAR 91.103).
                                </div>
                            </div>

                        </div>{/* end #export-printable */}
                    </div>
                );
            }

            return (
                <div style={{ paddingBottom: 32 }}>

                    {/* ---- Loading state ---- */}
                    {loadingWx && (
                        <div style={{ textAlign: 'center', padding: '48px 24px', color: 'var(--md-sys-color-on-surface-variant)' }}>
                            <MdIcon name="sync" style={{ fontSize: 40, animation: 'spin 1s linear infinite', marginBottom: 12, display: 'block' }} />
                            <div style={{ fontSize: 14 }}>Fetching live weather from AviationWeather.gov…</div>
                        </div>
                    )}

                    {/* NWS 7-day loading indicator (trips >30h out) */}
                    {!loadingWx && Object.keys(nwsData).length === 0 && hoursUntilTrip !== null && hoursUntilTrip > 30 && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--md-sys-color-surface-container)', borderRadius: 12, marginBottom: 12, fontSize: 13, color: 'var(--md-sys-color-on-surface-variant)' }}>
                            <MdIcon name="sync" style={{ fontSize: 17, animation: 'spin 1s linear infinite', flexShrink: 0 }} />
                            <span>Loading NWS 7-day forecast for departure date…</span>
                        </div>
                    )}

                    {/* ---- Auto briefing ---- */}
                    {effectiveWxData && analysis && finalVerdict && (
                        <>
                            {/* ── GO/NO-GO Verdict Banner ── */}
                            {(function() {
                                var verd = finalVerdict;
                                var bannerClass = verd.verdict === 'GO' ? 'go-banner' : verd.verdict === 'CAUTION' ? 'caution-banner' : 'nogo-banner';
                                var sc = finalDisplayScore ?? combinedScore ?? (detailedScore ? detailedScore.total : null);
                                return (
                                    <div className={'verdict-banner ' + bannerClass} style={{ marginBottom: 16 }}>
                                        {/* Verdict icon ring */}
                                        <div className="verdict-icon-ring" style={{ color: verd.verdictColor }}>
                                            <MdIcon name={verd.verdictIcon} style={{ fontSize: 26, color: verd.verdictColor }} />
                                        </div>
                                        {/* Text */}
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
                                                <span style={{ fontSize: 20, fontWeight: 900, letterSpacing: '-0.02em', color: verd.verdictColor }}>{verd.verdict}</span>
                                                {sc != null && (
                                                    <span className="font-mono" style={{ fontSize: 13, fontWeight: 700, color: verd.verdictColor, opacity: 0.8 }}>{sc}/100</span>
                                                )}
                                            </div>
                                            <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginTop: 3, lineHeight: 1.5 }}>{verd.verdictDesc}</div>
                                        </div>
                                        {/* Score ring */}
                                        {sc != null && <GoScoreRing score={sc} size={72} />}
                                    </div>
                                );
                            })()}

                            {/* ── Trip Details header card ── */}
                            <div style={{ background: 'var(--card)', border: '1px solid var(--card-border)', borderRadius: 18, padding: '16px 20px', marginBottom: 16, boxShadow: '0 2px 12px rgba(0,0,0,0.3)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
                                    <div style={{ width: 28, height: 28, borderRadius: 8, background: 'var(--accent-dim)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <MdIcon name="flight" style={{ color: 'var(--accent)', fontSize: 16, transform: 'rotate(45deg)' }} />
                                    </div>
                                    <span style={{ fontWeight: 700, fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-secondary)' }}>Flight Details</span>
                                </div>

                                {/* 4-column metadata grid */}
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '10px 20px', marginBottom: 16 }}>
                                    {[
                                        { label: 'Route',       mono: true,  val: allRoutePts.join(' → '), sub: allRoutePts.length <= 2 ? [(getAirport(allRoutePts[0])||{}).city, (getAirport(allRoutePts[allRoutePts.length-1])||{}).city].filter(Boolean).join(' → ') : null },
                                        { label: 'Aircraft',    mono: false, val: ac.name, sub: ac.cat + ' · ' + ac.kts + ' kts' },
                                        { label: 'Departs',     mono: false, val: trip.date, sub: trip.time + ' local' + (tripTargetUtc ? ' · ' + String(tripTargetUtc.getUTCHours()).padStart(2,'0') + String(tripTargetUtc.getUTCMinutes()).padStart(2,'0') + 'Z' : '') },
                                        { label: 'Dist / ETE',  mono: true,  val: routeDist + ' NM', sub: eteStr + ' at cruise' },
                                    ].map(function(item) {
                                        return (
                                            <div key={item.label}>
                                                <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-tertiary)', marginBottom: 3 }}>{item.label}</div>
                                                <div className={item.mono ? 'font-mono' : ''} style={{ fontSize: item.mono ? 14 : 13, fontWeight: 700, color: 'var(--text-primary)', lineHeight: 1.2 }}>{item.val}</div>
                                                {item.sub && <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>{item.sub}</div>}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Route Timeline */}
                                <div style={{ borderTop: '1px solid var(--card-border-soft)', paddingTop: 14 }}>
                                    <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--text-tertiary)', marginBottom: 10 }}>Route Timeline</div>
                                    <RouteTimeline routePts={allRoutePts} wxData={wxData} effectiveWxData={effectiveWxData} />
                                </div>
                            </div>

                            {/* Composite Safety Score Breakdown */}
                            {detailedScore && (function() {
                                var augBreakdown = detailedScore.breakdown.slice();
                                if (fratComplete) {
                                    var fs = calcFratGoScore(fratAnswers);
                                    var fsColor = fs >= 80 ? 'var(--go)' : fs >= 60 ? 'var(--caution)' : 'var(--nogo)';
                                    augBreakdown = augBreakdown.concat([{
                                        label: 'FRAT Assessment',
                                        score: fs,
                                        max: 100,
                                        color: fsColor,
                                        icon: 'checklist_rtl',
                                        detail: 'FRAT score ' + fs + '/100 — 30% weight blended with weather (70%) for combined GO Score'
                                    }]);
                                }
                                // Personal Minimums factor (penalty-based, displayed as a special row)
                                if (minimumsCheck) {
                                    var mPenalty = minimumsCheck.penalty;
                                    // Bar: 0 penalty = full, 50 penalty = empty (out of 50 pts "cushion")
                                    var mScore = Math.max(0, 50 - mPenalty);
                                    augBreakdown = augBreakdown.concat([{
                                        label: 'Personal Minimums',
                                        score: mScore,
                                        max: 50,
                                        color: minimumsCheck.color,
                                        icon: 'person',
                                        detail: minimumsCheck.detail,
                                        isPenalty: true,
                                        penaltyAmount: mPenalty
                                    }]);
                                }
                                var displayTotal = finalDisplayScore ?? combinedScore ?? detailedScore.total;
                                return <ScoreBreakdown breakdown={augBreakdown} total={displayTotal} />;
                            })()}

                            {/* ── FRAT — Flight Risk Assessment Tool (MMOPA / PAVE) ── */}
                            {(function() {
                                var fratScore = fratAnsweredCount > 0 ? calcFratGoScore(fratAnswers) : null;
                                var baseScore = detailedScore ? detailedScore.total : null;
                                var fratBand  = fratScore === null ? null
                                    : fratScore >= 80 ? { color:'var(--go)',      label:'Low Risk — Proceed', icon:'check_circle' }
                                    : fratScore >= 60 ? { color:'var(--caution)', label:'Caution — Review',   icon:'warning' }
                                    :                   { color:'var(--nogo)',    label:'High Risk — No-Go',  icon:'cancel' };
                                var cats = ['P','A','V','E'];
                                return (
                                    <div style={{ background:'var(--md-sys-color-surface-container)', borderRadius:16, marginBottom:16, overflow:'hidden' }}>
                                        {/* Collapsible header */}
                                        <button onClick={() => setFratExpanded(function(x){ return !x; })} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', background:'none', border:'none', cursor:'pointer', padding:'14px 16px', color:'var(--md-sys-color-on-surface)', textAlign:'left' }}>
                                            <MdIcon name="checklist_rtl" style={{ color:'var(--accent)', fontSize:20, flexShrink:0 }} />
                                            <span style={{ fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.5px', flex:1 }}>FRAT — Flight Risk Assessment</span>
                                            {fratComplete
                                                ? <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:12, fontWeight:700, background:'var(--go)', color:'#fff', borderRadius:4, padding:'2px 7px', flexShrink:0 }} aria-label="FRAT complete">
                                                      <MdIcon name="check_circle" style={{ fontSize:13, color:'#fff' }} aria-hidden="true" />COMPLETE
                                                  </span>
                                                : fratSkipped
                                                ? <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:12, fontWeight:700, background:'var(--nogo)', color:'#fff', borderRadius:4, padding:'2px 7px', flexShrink:0 }} aria-label="FRAT skipped, minus 20 points penalty">
                                                      <MdIcon name="cancel" style={{ fontSize:13, color:'#fff' }} aria-hidden="true" />−20 PTS
                                                  </span>
                                                : fratAnsweredCount > 0
                                                ? <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:12, fontWeight:600, background:'var(--caution-bg)', color:'var(--caution)', borderRadius:4, padding:'2px 7px', flexShrink:0 }} aria-label={`FRAT in progress: ${fratAnsweredCount} of ${FRAT_TOTAL} answered`}>
                                                      <MdIcon name="warning" style={{ fontSize:13, color:'var(--caution)' }} aria-hidden="true" />{fratAnsweredCount}/{FRAT_TOTAL}
                                                  </span>
                                                : <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', background:'var(--md-sys-color-surface-container-high)', borderRadius:4, padding:'2px 7px', flexShrink:0 }}>OPTIONAL</span>
                                            }
                                            <MdIcon name={fratExpanded ? 'expand_less' : 'expand_more'} style={{ fontSize:20, color:'var(--md-sys-color-on-surface-variant)', flexShrink:0 }} />
                                        </button>

                                        {/* Collapsed state: penalty / progress banner */}
                                        {!fratExpanded && !fratComplete && (
                                            <div style={{ padding:'0 16px 14px' }}>
                                                {fratSkipped
                                                    ? <div style={{ background:'var(--nogo-bg)', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                                                          <MdIcon name="warning" style={{ color:'var(--nogo)', fontSize:18, flexShrink:0 }} />
                                                          <div style={{ flex:1 }}>
                                                              <div style={{ fontWeight:600, fontSize:12, color:'var(--nogo)' }}>FRAT Incomplete — −20 points applied to GO Score</div>
                                                              <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', marginTop:2 }}>The Flight Risk Assessment helps identify pilot, aircraft, and situational risks beyond weather.</div>
                                                          </div>
                                                          <button onClick={function(e){ e.stopPropagation(); setFratSkipped(false); setFratExpanded(true); }} style={{ background:'var(--nogo)', color:'#fff', border:'none', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer', flexShrink:0 }}>Restart</button>
                                                      </div>
                                                    : <div style={{ background:'var(--md-sys-color-surface-container-high)', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                                                          <MdIcon name="info" style={{ color:'var(--accent)', fontSize:18, flexShrink:0 }} />
                                                          <div style={{ flex:1 }}>
                                                              <div style={{ fontWeight:600, fontSize:12, color:'var(--md-sys-color-on-surface)' }}>FRAT not completed — −20 points applied to GO Score</div>
                                                              <div style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', marginTop:2 }}>Completing the FRAT unlocks a more accurate combined GO Score based on MMOPA PAVE methodology.</div>
                                                          </div>
                                                          <button onClick={function(e){ e.stopPropagation(); setFratExpanded(true); }} style={{ background:'var(--accent)', color:'#fff', border:'none', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer', flexShrink:0 }}>Edit FRAT</button>
                                                      </div>
                                                }
                                            </div>
                                        )}

                                        {/* Collapsed state: score summary when complete */}
                                        {!fratExpanded && fratComplete && fratBand && (
                                            <div style={{ padding:'0 16px 14px', display:'flex', gap:10 }}>
                                                {[
                                                    { label:'Base Weather', value:baseScore },
                                                    { label:'FRAT Score', value:fratScore, sub:fratBand.label, color:fratBand.color, icon:fratBand.icon },
                                                    { label:'Combined GO Score', value:combinedScore, sub:'70/30 blend' },
                                                ].map(function(item,i) {
                                                    return (
                                                        <div key={i} style={{ flex:1, background:'var(--md-sys-color-surface-container-high)', borderRadius:10, padding:'10px 8px', textAlign:'center' }}>
                                                            <div style={{ fontSize:22, fontWeight:800, lineHeight:1, color:item.color||'var(--md-sys-color-on-surface)' }}>{item.value}</div>
                                                            <div style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:'var(--md-sys-color-on-surface-variant)', marginTop:3, lineHeight:1.3 }}>{item.label}</div>
                                                            {item.sub && (
                                                                <div style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:12, color:item.color||'var(--md-sys-color-on-surface-variant)', marginTop:2 }}>
                                                                    {item.icon && <MdIcon name={item.icon} style={{ fontSize:13, color:item.color }} aria-hidden="true" />}
                                                                    {item.sub}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {/* Expanded panel */}
                                        {fratExpanded && (
                                            <div style={{ padding:'0 16px 16px' }}>
                                                {/* Safety disclaimer */}
                                                <div style={{ background:'var(--accent-dim)', borderRadius:10, padding:'10px 14px', marginBottom:16, fontSize:12, color:'var(--md-sys-color-on-surface)', lineHeight:1.5 }}>
                                                    <strong>Safety Notice:</strong> The FRAT is a structured thinking tool, not a substitute for pilot judgment. A green FRAT score does not mean the flight is safe — it means the risk factors you identified are within acceptable ranges. Based on MMOPA FRAT methodology and FAA PAVE framework. <em>When in doubt, don't go.</em>
                                                </div>

                                                {/* PAVE categories */}
                                                {cats.map(function(cat) {
                                                    var qs = FRAT_QUESTIONS.filter(function(q){ return q.cat === cat; });
                                                    var catWeight = { P:'35%', A:'25%', V:'25%', E:'15%' }[cat];
                                                    return (
                                                        <div key={cat} style={{ marginBottom:18 }}>
                                                            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, paddingBottom:6, borderBottom:'1px solid var(--card-border)' }}>
                                                                <MdIcon name={FRAT_CAT_ICON[cat]} style={{ color:'var(--md-sys-color-primary)', fontSize:18 }} />
                                                                <span style={{ fontWeight:700, fontSize:12, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-primary)' }}>{FRAT_CAT_LABEL[cat]}</span>
                                                                <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', marginLeft:'auto' }}>{catWeight} weight</span>
                                                            </div>
                                                            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                                                                {qs.map(function(q) {
                                                                    var isAuto = q.auto && fratAutoFilled[q.id] !== undefined && fratAnswers[q.id] === fratAutoFilled[q.id];
                                                                    return (
                                                                        <div key={q.id}>
                                                                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6, flexWrap:'wrap' }}>
                                                                                <span style={{ fontSize:12, fontWeight:600, color:'var(--md-sys-color-on-surface)' }}>{q.id}. {q.label}</span>
                                                                                {isAuto && <span style={{ fontSize:12, background:'var(--accent-dim)', color:'var(--accent)', borderRadius:4, padding:'1px 5px', fontWeight:700, flexShrink:0 }}>AUTO-FILLED · tap to override</span>}
                                                                                {q.hint && <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)', fontStyle:'italic', width:'100%' }}>{q.hint}</span>}
                                                                            </div>
                                                                            <div style={{ display:'flex', flexDirection:'column', gap:5 }} role="radiogroup" aria-label={q.label}>
                                                                                {q.opts.map(function(opt) {
                                                                                    var isSelected = fratAnswers[q.id] === opt.p;
                                                                                    var riskColor  = opt.p === 0 ? 'var(--go)' : opt.p <= 3 ? 'var(--caution)' : 'var(--nogo)';
                                                                                    var riskBg     = opt.p === 0 ? 'var(--go-bg)' : opt.p <= 3 ? 'var(--caution-bg)' : 'var(--nogo-bg)';
                                                                                    /* WCAG AA: icon communicates risk tier independent of color */
                                                                                    var riskIcon   = opt.p === 0 ? 'check_circle' : opt.p <= 3 ? 'warning' : 'cancel';
                                                                                    var riskLabel  = opt.p === 0 ? 'Low risk' : opt.p <= 3 ? 'Caution' : 'High risk';
                                                                                    return (
                                                                                        <button key={opt.l}
                                                                                            role="radio"
                                                                                            aria-checked={isSelected}
                                                                                            aria-label={opt.l + ' — ' + riskLabel}
                                                                                            onClick={function() {
                                                                                                setFratAnswers(function(prev){ return Object.assign({}, prev, { [q.id]: opt.p }); });
                                                                                                if (q.auto) setFratAutoFilled(function(prev){ var n=Object.assign({},prev); delete n[q.id]; return n; });
                                                                                            }} style={{
                                                                                                display:'flex', alignItems:'center', gap:10, padding:'8px 12px',
                                                                                                background: isSelected ? riskBg : 'var(--md-sys-color-surface-container-high)',
                                                                                                border:'1px solid '+(isSelected ? riskColor : 'transparent'),
                                                                                                borderRadius:8, cursor:'pointer', textAlign:'left', width:'100%', transition:'all 0.15s'
                                                                                            }}>
                                                                                            {/* Radio indicator */}
                                                                                            <div style={{ width:16, height:16, borderRadius:'50%', flexShrink:0,
                                                                                                border:'2px solid '+(isSelected ? riskColor : 'var(--md-sys-color-outline)'),
                                                                                                background: isSelected ? riskColor : 'transparent',
                                                                                                display:'flex', alignItems:'center', justifyContent:'center' }} aria-hidden="true">
                                                                                                {isSelected && <div style={{ width:5, height:5, borderRadius:'50%', background:'#fff' }} />}
                                                                                            </div>
                                                                                            <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface)', flex:1, lineHeight:1.4 }}>{opt.l}</span>
                                                                                            {/* Risk badge: icon + label for color-blind accessibility */}
                                                                                            <span style={{ display:'flex', alignItems:'center', gap:3, fontSize:11, fontWeight:700, color:riskColor, flexShrink:0, opacity: isSelected ? 1 : 0.65 }} aria-hidden="true">
                                                                                                <MdIcon name={riskIcon} style={{ fontSize:14, color:riskColor }} />
                                                                                                {opt.p === 0 ? 'OK' : riskLabel}
                                                                                            </span>
                                                                                        </button>
                                                                                    );
                                                                                })}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );
                                                })}

                                                {/* Progress bar */}
                                                <div style={{ marginBottom:16 }}>
                                                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                                                        <span style={{ fontSize:12, color:'var(--md-sys-color-on-surface-variant)' }}>Progress</span>
                                                        <span style={{ fontSize:12, fontWeight:600, color:'var(--md-sys-color-on-surface)' }}>{fratAnsweredCount} / {FRAT_TOTAL} answered</span>
                                                    </div>
                                                    <div style={{ height:6, background:'var(--md-sys-color-surface-container-high)', borderRadius:3, overflow:'hidden' }}>
                                                        <div style={{ height:'100%', width:`${(fratAnsweredCount/FRAT_TOTAL)*100}%`, background: fratComplete ? 'var(--go)' : 'var(--accent)', borderRadius:3, transition:'width 0.3s' }} />
                                                    </div>
                                                </div>

                                                {/* Score summary — live FRAT score (partial or complete) */}
                                                {fratAnsweredCount > 0 && fratScore !== null && (
                                                    <div style={{ background:'var(--md-sys-color-surface-container-high)', borderRadius:12, padding:'14px 16px', marginBottom:14 }}>
                                                        {fratComplete && fratBand ? (
                                                            <>
                                                                <div style={{ fontWeight:700, fontSize:12, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--md-sys-color-on-surface-variant)', marginBottom:10 }}>Score Breakdown — 70 / 30 Blend</div>
                                                                <div style={{ display:'flex', gap:10 }}>
                                                                    {[
                                                                        { label:'Base Weather Score', value:baseScore, sub:'weather + route' },
                                                                        { label:'FRAT Score', value:fratScore, sub:fratBand.label, color:fratBand.color, icon:fratBand.icon },
                                                                        { label:'Combined GO Score', value:combinedScore, sub:'final score' },
                                                                    ].map(function(item,i) {
                                                                        return (
                                                                            <div key={i} style={{ flex:1, background:'var(--md-sys-color-surface-container)', borderRadius:10, padding:'10px 8px', textAlign:'center' }}>
                                                                                <div style={{ fontSize:26, fontWeight:800, lineHeight:1, color:item.color||'var(--md-sys-color-on-surface)' }}>{item.value}</div>
