# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp build version into index.html
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          BUILD_TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s/__BUILD_COMMIT__/${COMMIT_SHA}/g" public/index.html
          sed -i "s/__BUILD_TIMESTAMP__/${BUILD_TS}/g" public/index.html

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLIGHTSCORE_CA7E0 }}
          channelId: live
          projectId: flightscore-ca7e0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy Firebase Functions and Firestore Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          cd functions && npm install && cd ..
          npx --yes firebase-tools deploy --only functions,firestore:rules --project flightscore-ca7e0 --non-interactive --token "$FIREBASE_TOKEN"
