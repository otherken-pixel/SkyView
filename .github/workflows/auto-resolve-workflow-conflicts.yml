# .github/workflows/auto-resolve-workflow-conflicts.yml
name: Auto-Resolve Workflow Conflicts

on:
  workflow_dispatch:  # Allows you to trigger manually

jobs:
  auto-resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-resolve workflow merge conflicts
        run: |
          git checkout --theirs .github/workflows/auto-merge-claude.yml || true
          git checkout --theirs .github/workflows/firebase-hosting-merge.yml || true
          git add .github/workflows/auto-merge-claude.yml .github/workflows/firebase-hosting-merge.yml
          git commit -m "CI: auto-resolve workflow file conflicts" || echo "Nothing to commit"
          git push origin HEAD || echo "Nothing to push"
